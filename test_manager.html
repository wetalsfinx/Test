<!DOCTYPE html>
<html>
<head>
    <title>Управление тестами</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
<div class="container mt-4">
    <h2>⚙️ Управление тестами</h2>
    
    <div class="d-flex justify-content-between align-items-center my-3">
        <h4>📋 Список тестов</h4>
        <button class="btn btn-primary" onclick="alert('Форма создания будет позже')">➕ Создать тест</button>
    </div>
    
    <div id="tests-list">Загрузка...</div>
    
    <hr>
    <a href="?mode=admin" class="btn btn-outline-secondary">← Вернуться к админке</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://qtostraaqrnjbxiydlip.supabase.co';
const SUPABASE_KEY = 'sb_publishable_0GzJSuoAi5zc7pHkicHMNg_cQ-rGAX7';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function loadTests() {
    const { data, error } = await sb.from('tests').select('*').order('created_at', { ascending: false });
    const container = document.getElementById('tests-list');
    
    if (error) {
        container.innerHTML = '<div class="alert alert-danger">Ошибка загрузки</div>';
        return;
    }
    
    if (!data || data.length === 0) {
        container.innerHTML = '<div class="alert alert-info">Нет созданных тестов. Нажмите "Создать тест"</div>';
        return;
    }
    
    let html = '';
    for (const test of data) {
        html += `
            <div class="card mb-2 p-3">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <strong>${escapeHtml(test.name)}</strong>
                        <span class="badge bg-secondary ms-2">${test.questions?.length || 0} вопросов</span>
                    </div>
                    <div>
                        <button class="btn btn-sm btn-outline-danger" onclick="deleteTest(${test.id}, '${test.slug || ''}')">🗑️ Удалить</button>
                    </div>
                </div>
            </div>
        `;
    }
    container.innerHTML = html;
}

async function deleteTest(testId, slug) {
    if (!confirm('Удалить этот тест? Все результаты тоже будут удалены!')) return;
    
    // Удаляем из Supabase
    const { error } = await sb.from('tests').delete().eq('id', testId);
    if (error) {
        alert('Ошибка: ' + error.message);
        return;
    }
    
    // Удаляем результаты
    await sb.from('results').delete().eq('test_slug', slug);
    
    alert('Тест удалён!');
    loadTests();
}

function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
}

loadTests();
</script>
</body>
</html>
