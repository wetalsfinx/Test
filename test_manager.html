<!DOCTYPE html>
<html>
<head>
    <title>Управление тестами</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h2>⚙️ Управление тестами</h2>
    <div id="testsList">Загрузка...</div>
    <hr>
    <a href="?mode=admin" class="btn btn-outline-secondary">← Вернуться к админке</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://qtostraaqrnjbxiydlip.supabase.co';
const SUPABASE_KEY = 'sb_publishable_0GzJSuoAi5zc7pHkicHMNg_cQ-rGAX7';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function loadTests() {
    const { data, error } = await sb.from('tests').select('*');
    const container = document.getElementById('testsList');
    
    if (error) {
        container.innerHTML = '<div class="alert alert-danger">Ошибка</div>';
        return;
    }
    
    if (!data || data.length === 0) {
        container.innerHTML = '<div class="alert alert-info">Нет тестов</div>';
        return;
    }
    
    let html = '';
    for (let i = 0; i < data.length; i++) {
        const test = data[i];
        html += '<div class="card mb-2 p-2">';
        html += '<div class="d-flex justify-content-between align-items-center">';
        html += '<div>' + test.name + '</div>';
        html += '<button class="btn btn-sm btn-danger" onclick="deleteTest(' + test.id + ')">Удалить</button>';
        html += '</div></div>';
    }
    container.innerHTML = html;
}

async function deleteTest(testId) {
    if (!confirm('Удалить тест?')) return;
    const { error } = await sb.from('tests').delete().eq('id', testId);
    if (error) { alert('Ошибка: ' + error.message); return; }
    alert('Тест удалён');
    loadTests();
}

loadTests();
</script>
</body>
</html>
