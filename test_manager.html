<!DOCTYPE html>
<html>
<head>
    <title>Управление тестами</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
<div class="container mt-4">
    <h2>⚙️ Управление тестами</h2>
    
    <div class="d-flex justify-content-between align-items-center my-3">
        <h4>📋 Список тестов</h4>
        <button class="btn btn-primary" onclick="showForm()">➕ Создать тест</button>
    </div>
    
    <!-- Форма создания -->
    <div id="createForm" style="display:none" class="card mb-3 p-3">
        <h5>Новый тест</h5>
        <input type="text" id="testName" class="form-control mb-2" placeholder="Название теста">
        <textarea id="testDesc" class="form-control mb-2" rows="2" placeholder="Описание (необязательно)"></textarea>
        <input type="password" id="githubToken" class="form-control mb-2" placeholder="GitHub токен">
        <button class="btn btn-success" onclick="createTest()">Сохранить</button>
        <button class="btn btn-secondary" onclick="hideForm()">Отмена</button>
    </div>
    
    <!-- Редактор вопросов -->
    <div id="questionsModal" style="display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.5); z-index:1000; overflow:auto">
        <div style="max-width:600px; margin:50px auto; background:white; border-radius:10px; padding:20px">
            <h5 id="modalTitle">Редактирование вопросов</h5>
            <input type="hidden" id="editTestId">
            <div id="questionsList"></div>
            <button class="btn btn-sm btn-outline-primary mt-2" onclick="addQuestion()">+ Добавить вопрос</button>
            <div class="mt-3">
                <button class="btn btn-success" onclick="saveQuestions()">Сохранить</button>
                <button class="btn btn-secondary" onclick="closeModal()">Отмена</button>
            </div>
        </div>
    </div>
    
    <div id="tests-list">Загрузка...</div>
    
    <hr>
    <a href="?mode=admin" class="btn btn-outline-secondary">← Вернуться к админке</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://qtostraaqrnjbxiydlip.supabase.co';
const SUPABASE_KEY = 'sb_publishable_0GzJSuoAi5zc7pHkicHMNg_cQ-rGAX7';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
let GITHUB_TOKEN = localStorage.getItem('github_token') || '';
let currentTestId = null;
let currentQuestions = [];

function showForm() {
    document.getElementById('createForm').style.display = 'block';
    if (GITHUB_TOKEN) document.getElementById('githubToken').value = GITHUB_TOKEN;
}
function hideForm() { document.getElementById('createForm').style.display = 'none'; }

async function createTest() {
    const name = document.getElementById('testName').value.trim();
    const desc = document.getElementById('testDesc').value.trim();
    const token = document.getElementById('githubToken').value.trim();
    if (!name) { alert('Введите название'); return; }
    if (token) { GITHUB_TOKEN = token; localStorage.setItem('github_token', token); }
    if (!GITHUB_TOKEN) { alert('Введите токен'); return; }
    
    let slug = name.toLowerCase().replace(/[^а-яёa-z0-9]/g, '-').replace(/-+/g, '-').replace(/^-|-$/g, '');
    if (!slug) slug = 'test_' + Date.now();
    
    const { error } = await sb.from('tests').insert({
        name: name, description: desc, questions: [], slug: slug,
        is_active: true, created_at: new Date().toISOString()
    });
    if (error) { alert('Ошибка: ' + error.message); return; }
    
    alert('Тест создан!');
    hideForm();
    loadTests();
}

function openQuestions(testId, testName) {
    currentTestId = testId;
    currentQuestions = [];
    document.getElementById('modalTitle').innerHTML = 'Вопросы: ' + testName;
    renderQuestionsList();
    document.getElementById('questionsModal').style.display = 'block';
}

function closeModal() {
    document.getElementById('questionsModal').style.display = 'none';
    currentTestId = null;
    currentQuestions = [];
}

function renderQuestionsList() {
    const container = document.getElementById('questionsList');
    if (!currentQuestions.length) {
        container.innerHTML = '<div class="text-muted">Нет вопросов. Нажмите "Добавить вопрос"</div>';
        return;
    }
    container.innerHTML = '';
    currentQuestions.forEach((q, idx) => {
        container.innerHTML += `
            <div class="card mb-2 p-2">
                <div class="d-flex justify-content-between">
                    <strong>Вопрос ${idx+1}</strong>
                    <button class="btn btn-sm btn-outline-danger" onclick="removeQuestion(${idx})">🗑️</button>
                </div>
                <input class="form-control mb-1" value="${escapeHtml(q.text)}" placeholder="Текст вопроса" onchange="updateQuestion(${idx}, 'text', this.value)">
                <div class="small">Варианты:</div>
                ${q.options.map((opt, optIdx) => `
                    <div class="input-group input-group-sm mb-1">
                        <div class="input-group-text"><input type="radio" name="correct-${idx}" ${optIdx === q.correct ? 'checked' : ''} onchange="updateQuestion(${idx}, 'correct', ${optIdx})"></div>
                        <input class="form-control" value="${escapeHtml(opt)}" onchange="updateOption(${idx}, ${optIdx}, this.value)">
                        <button class="btn btn-outline-danger" onclick="removeOption(${idx}, ${optIdx})">✖</button>
                    </div>
                `).join('')}
                <button class="btn btn-sm btn-outline-secondary mt-1" onclick="addOption(${idx})">+ Добавить вариант</button>
            </div>
        `;
    });
}

function addQuestion() {
    currentQuestions.push({ text: 'Новый вопрос', options: ['Вариант 1', 'Вариант 2', 'Вариант 3', 'Вариант 4'], correct: 0 });
    renderQuestionsList();
}

function removeQuestion(idx) {
    currentQuestions.splice(idx, 1);
    renderQuestionsList();
}

function updateQuestion(idx, field, val) {
    if (field === 'text') currentQuestions[idx].text = val;
    if (field === 'correct') currentQuestions[idx].correct = parseInt(val);
}

function updateOption(qIdx, optIdx, val) {
    currentQuestions[qIdx].options[optIdx] = val;
}

function addOption(qIdx) {
    currentQuestions[qIdx].options.push('Новый вариант');
    renderQuestionsList();
}

function removeOption(qIdx, optIdx) {
    currentQuestions[qIdx].options.splice(optIdx, 1);
    if (currentQuestions[qIdx].correct >= currentQuestions[qIdx].options.length) {
        currentQuestions[qIdx].correct = 0;
    }
    renderQuestionsList();
}

async function saveQuestions() {
    if (!currentTestId) return;
    
    const { error } = await sb.from('tests').update({ questions: currentQuestions }).eq('id', currentTestId);
    if (error) { alert('Ошибка: ' + error.message); return; }
    
    alert('Вопросы сохранены!');
    closeModal();
    loadTests();
}

async function deleteTest(testId) {
    if (!confirm('Удалить тест?')) return;
    const { error } = await sb.from('tests').delete().eq('id', testId);
    if (error) { alert('Ошибка: ' + error.message); return; }
    alert('Тест удалён');
    loadTests();
}

async function loadTests() {
    const { data, error } = await sb.from('tests').select('*').order('created_at', { ascending: false });
    const container = document.getElementById('tests-list');
    if (error) { container.innerHTML = '<div class="alert alert-danger">Ошибка</div>'; return; }
    if (!data || data.length === 0) { container.innerHTML = '<div class="alert alert-info">Нет тестов</div>'; return; }
    
    let html = '';
    for (const test of data) {
        const qCount = test.questions ? test.questions.length : 0;
        html += `
            <div class="card mb-2 p-2">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <strong>${escapeHtml(test.name)}</strong>
                        <span class="badge bg-secondary ms-2">${qCount} вопросов</span>
                    </div>
                    <div>
                        <button class="btn btn-sm btn-outline-primary" onclick="openQuestions(${test.id}, '${escapeHtml(test.name)}')">✏️ Вопросы</button>
                        <button class="btn btn-sm btn-outline-danger ms-1" onclick="deleteTest(${test.id})">🗑️ Удалить</button>
                    </div>
                </div>
            </div>
        `;
    }
    container.innerHTML = html;
}

function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
}

loadTests();
</script>
</body>
</html>
