<!DOCTYPE html>
<html>
<head>
    <title>Управление тестами</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h2>⚙️ Управление тестами</h2>
    
    <div class="d-flex justify-content-between align-items-center my-3">
        <h4>📋 Список тестов</h4>
        <button class="btn btn-primary" onclick="showForm()">➕ Создать тест</button>
    </div>
    
    <div id="createForm" style="display:none" class="card mb-3 p-3">
        <h5>Новый тест</h5>
        <input type="text" id="testName" class="form-control mb-2" placeholder="Название теста">
        <textarea id="testDesc" class="form-control mb-2" rows="2" placeholder="Описание (необязательно)"></textarea>
        <input type="password" id="githubToken" class="form-control mb-2" placeholder="GitHub токен">
        <button class="btn btn-success" onclick="createTest()">Сохранить</button>
        <button class="btn btn-secondary" onclick="hideForm()">Отмена</button>
    </div>
    
    <div id="tests-list">Загрузка...</div>
    
    <hr>
    <a href="?mode=admin" class="btn btn-outline-secondary">← Вернуться к админке</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://qtostraaqrnjbxiydlip.supabase.co';
const SUPABASE_KEY = 'sb_publishable_0GzJSuoAi5zc7pHkicHMNg_cQ-rGAX7';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
let GITHUB_TOKEN = localStorage.getItem('github_token') || '';

function showForm() {
    document.getElementById('createForm').style.display = 'block';
    if (GITHUB_TOKEN) document.getElementById('githubToken').value = GITHUB_TOKEN;
}
function hideForm() { document.getElementById('createForm').style.display = 'none'; }

async function createTest() {
    const name = document.getElementById('testName').value.trim();
    const desc = document.getElementById('testDesc').value.trim();
    const token = document.getElementById('githubToken').value.trim();
    if (!name) { alert('Введите название'); return; }
    if (token) { GITHUB_TOKEN = token; localStorage.setItem('github_token', token); }
    if (!GITHUB_TOKEN) { alert('Введите токен'); return; }
    
    let slug = name.toLowerCase().replace(/[^а-яёa-z0-9]/g, '-').replace(/-+/g, '-').replace(/^-|-$/g, '');
    if (!slug) slug = 'test_' + Date.now();
    
    const { error } = await sb.from('tests').insert({
        name: name, description: desc, questions: [], slug: slug,
        is_active: true, created_at: new Date().toISOString()
    });
    if (error) { alert('Ошибка: ' + error.message); return; }
    
    alert('Тест создан! Теперь добавьте вопросы через кнопку "Вопросы" (добавим позже)');
    hideForm();
    loadTests();
}

async function loadTests() {
    const { data, error } = await sb.from('tests').select('*').order('created_at', { ascending: false });
    const container = document.getElementById('tests-list');
    if (error) { container.innerHTML = '<div class="alert alert-danger">Ошибка</div>'; return; }
    if (!data || data.length === 0) { container.innerHTML = '<div class="alert alert-info">Нет тестов</div>'; return; }
    
    let html = '';
    for (const test of data) {
        html += '<div class="card mb-2 p-2">✅ ' + test.name + '</div>';
    }
    container.innerHTML = html;
}

loadTests();
</script>
</body>
</html>
