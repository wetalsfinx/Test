<!DOCTYPE html>
<html>
<head>
    <title>Управление тестами</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
<div class="container mt-4">
    <h2>⚙️ Управление тестами</h2>
    
    <!-- Кнопка создания теста -->
    <div class="d-flex justify-content-between align-items-center my-3">
        <h4>📋 Список тестов</h4>
        <button class="btn btn-primary" onclick="showCreateForm()">➕ Создать тест</button>
    </div>
    
    <!-- Форма создания теста (скрыта по умолчанию) -->
    <div id="createForm" class="card mb-4" style="display:none">
        <div class="card-body">
            <h5>Создание нового теста</h5>
            <div class="mb-2">
                <label>Название теста</label>
                <input type="text" id="testName" class="form-control" placeholder="Например: Стандарты продаж">
            </div>
            <div class="mb-2">
                <label>Описание (необязательно)</label>
                <textarea id="testDesc" class="form-control" rows="2"></textarea>
            </div>
            <div class="mb-2">
                <label>GitHub токен</label>
                <input type="password" id="githubToken" class="form-control" placeholder="Вставьте GitHub токен">
                <small class="text-muted">Нужен для создания HTML-файла теста</small>
            </div>
            <button class="btn btn-success" onclick="createTest()">Сохранить тест</button>
            <button class="btn btn-secondary" onclick="hideCreateForm()">Отмена</button>
        </div>
    </div>
    
    <!-- Список тестов -->
    <div id="tests-list">Загрузка...</div>
    
    <hr>
    <a href="?mode=admin" class="btn btn-outline-secondary">← Вернуться к админке</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://qtostraaqrnjbxiydlip.supabase.co';
const SUPABASE_KEY = 'sb_publishable_0GzJSuoAi5zc7pHkicHMNg_cQ-rGAX7';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let GITHUB_TOKEN = localStorage.getItem('github_token') || '';

function showCreateForm() {
    document.getElementById('createForm').style.display = 'block';
    if (GITHUB_TOKEN) document.getElementById('githubToken').value = GITHUB_TOKEN;
}

function hideCreateForm() {
    document.getElementById('createForm').style.display = 'none';
    document.getElementById('testName').value = '';
    document.getElementById('testDesc').value = '';
}

async function createTest() {
    const name = document.getElementById('testName').value.trim();
    const desc = document.getElementById('testDesc').value.trim();
    const token = document.getElementById('githubToken').value.trim();
    
    if (!name) {
        alert('Введите название теста');
        return;
    }
    
    if (token) {
        GITHUB_TOKEN = token;
        localStorage.setItem('github_token', token);
    }
    
    if (!GITHUB_TOKEN) {
        alert('Введите GitHub токен для создания файла теста');
        return;
    }
    
    // Временный slug из названия
    let slug = name.toLowerCase().replace(/[^а-яёa-z0-9]/g, '-').replace(/-+/g, '-').replace(/^-|-$/g, '');
    if (!slug) slug = `test_${Date.now()}`;
    
    // Сохраняем в Supabase
    const testData = {
        name: name,
        description: desc,
        questions: [], // пока без вопросов, добавим позже
        slug: slug,
        is_active: true,
        created_at: new Date().toISOString(),
        updated_at: new Date().toISOString()
    };
    
    const { error } = await sb.from('tests').insert(testData);
    
    if (error) {
        alert('Ошибка: ' + error.message);
        return;
    }
    
    alert('Тест создан! Теперь нужно добавить вопросы.');
    hideCreateForm();
    loadTests();
}

async function loadTests() {
    const { data, error } = await sb.from('tests').select('*').order('created_at', { ascending: false });
    const container = document.getElementById('tests-list');
    
    if (error) {
        container.innerHTML = '<div class="alert alert-danger">Ошибка загрузки</div>';
        return;
    }
    
    if (!data || data.length === 0) {
        container.innerHTML = '<div class="alert alert-info">Нет созданных тестов. Нажмите "Создать тест"</div>';
        return;
    }
    
    let html = '';
    for (const test of data) {
        const slug = test.slug || `test_${test.id}`;
        const url = `https://wetalsfinx.github.io/Test/${slug}.html`;
        const questionsCount = test.questions ? test.questions.length : 0;
        const status = test.is_active !== false ? 'Активен' : 'Отключён';
        const statusClass = test.is_active !== false ? 'success' : 'secondary';
        
        html += `
            <div class="card mb-3">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-start flex-wrap">
                        <div>
                            <h5 class="card-title">${escapeHtml(test.name)}</h5>
                            <p class="card-text text-muted small">📋 ${questionsCount} вопросов | ${status}</p>
                            <p class="card-text small">🔗 <a href="${url}" target="_blank">${url}</a></p>
                        </div>
                        <div>
                            <span class="badge bg-${statusClass} me-2">${status}</span>
                            <button class="btn btn-sm btn-outline-secondary" onclick="copyLink('${url}')">📋 Копировать ссылку</button>
                            <button class="btn btn-sm btn-outline-success" onclick="generateQR('${url}')">📱 QR-код</button>
                            <button class="btn btn-sm btn-outline-primary" onclick="editQuestions(${test.id})">✏️ Редактировать вопросы</button>
                        </div>
                    </div>
                </div>
            </div>
        `;
    }
    container.innerHTML = html;
}

function editQuestions(testId) {
    alert(`Редактирование вопросов для теста ${testId} будет добавлено позже`);
}

function copyLink(url) {
    navigator.clipboard.writeText(url);
    alert('Ссылка скопирована!');
}

function generateQR(url) {
    window.open(`https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(url)}`, '_blank');
}

function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
}

// Загружаем токен при старте
if (GITHUB_TOKEN) document.getElementById('githubToken').value = GITHUB_TOKEN;
loadTests();
</script>
</body>
</html>
