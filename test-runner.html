<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Загрузка теста...</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body{background:#f5f7fa;font-family:sans-serif;padding:20px}
.card{max-width:700px;margin:0 auto;border:none;box-shadow:0 4px 6px rgba(0,0,0,.1)}
.hidden{display:none!important}
.btn-answer{text-align:left;white-space:normal}
.btn-answer.selected{background-color:#0d6efd;color:white}
.loader{text-align:center;padding:50px}
.spinner{width:40px;height:40px;border:4px solid #e9ecef;border-top-color:#0d6efd;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="container">
    <div class="card p-4">
        <div id="loader" class="loader">
            <div class="spinner"></div>
            <p class="mt-3">Загрузка теста...</p>
        </div>
        
        <div id="login-screen" class="hidden">
            <h2 class="text-center mb-3" id="test-title">Загрузка...</h2>
            <p class="text-center text-muted" id="test-desc"></p>
            <p class="text-center text-muted">Заполните данные</p>
            <input type="text" id="name" class="form-control mb-2" placeholder="Имя">
            <input type="text" id="surname" class="form-control mb-2" placeholder="Фамилия">
            <select id="city" class="form-control mb-3"></select>
            <button onclick="startTest()" class="btn btn-primary w-100">▶ Начать тест</button>
        </div>
        
        <div id="quiz-screen" class="hidden">
            <div class="d-flex justify-content-between mb-3">
                <span id="user-name"></span>
                <span class="badge bg-primary" id="q-counter">Вопрос 1 из ?</span>
            </div>
            <h4 id="question-text" class="mb-3"></h4>
            <div id="options-area" class="d-grid gap-2"></div>
            <button id="submit-btn" class="btn btn-primary mt-3" disabled>📝 Ответить</button>
        </div>
        
        <div id="result-screen" class="hidden text-center">
            <h1>🎉 Готово!</h1>
            <h2 id="final-score" class="mt-3"></h2>
            <button onclick="location.reload()" class="btn btn-outline-primary mt-3">Пройти заново</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL='https://qtostraaqrnjbxiydlip.supabase.co';
const SUPABASE_KEY='sb_publishable_0GzJSuoAi5zc7pHkicHMNg_cQ-rGAX7';
const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

let testData = null;
let questions = [];
let step = 0;
let userName = "", userSurname = "", userCity = "";
let answers = [];
let score = 0;
let selectedAnswer = null;
let currentCorrect = null;

// Получаем slug из URL (например, /test-runner.html?slug=test3)
const urlParams = new URLSearchParams(location.search);
const slug = urlParams.get('slug');

if (!slug) {
    document.getElementById('loader').innerHTML = '<div class="alert alert-danger">❌ Не указан тест. Добавьте ?slug=название_теста</div>';
} else {
    loadTest();
}

async function loadTest() {
    try {
        const { data, error } = await sb.from('tests').select('*').eq('slug', slug).single();
        
        if (error || !data) {
            document.getElementById('loader').innerHTML = '<div class="alert alert-danger">❌ Тест не найден</div>';
            return;
        }
        
        testData = data;
        questions = testData.questions || [];
        
        document.getElementById('test-title').innerText = testData.name;
        document.getElementById('test-desc').innerText = testData.description || '';
        
        // Заполняем города
        const citySelect = document.getElementById('city');
        citySelect.innerHTML = '<option value="">Выберите город</option>';
        (testData.city_list || []).forEach(city => {
            citySelect.innerHTML += `<option value="${escapeHtml(city)}">${escapeHtml(city)}</option>`;
        });
        
        document.getElementById('loader').classList.add('hidden');
        document.getElementById('login-screen').classList.remove('hidden');
        
    } catch(e) {
        console.error(e);
        document.getElementById('loader').innerHTML = '<div class="alert alert-danger">❌ Ошибка загрузки теста</div>';
    }
}

function startTest() {
    userName = document.getElementById('name').value.trim();
    userSurname = document.getElementById('surname').value.trim();
    userCity = document.getElementById('city').value;
    
    if(!userName || !userSurname || !userCity) {
        alert("Заполните все поля! Выберите город из списка");
        return;
    }
    
    step = 0;
    score = 0;
    answers = [];
    selectedAnswer = null;
    
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('quiz-screen').classList.remove('hidden');
    document.getElementById('user-name').innerHTML = `${userName} ${userSurname} (${userCity})`;
    
    renderQuestion();
}

function renderQuestion() {
    if(step >= questions.length) {
        finishTest();
        return;
    }
    
    const q = questions[step];
    currentCorrect = q.correct;
    
    const shuffledOptions = [...q.options];
    for(let i = shuffledOptions.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffledOptions[i], shuffledOptions[j]] = [shuffledOptions[j], shuffledOptions[i]];
    }
    const newCorrectIndex = shuffledOptions.indexOf(q.options[q.correct]);
    currentCorrect = newCorrectIndex;
    q.shuffledOptions = shuffledOptions;
    q.shuffledCorrect = newCorrectIndex;
    
    document.getElementById('question-text').innerHTML = `${step+1}. ${q.text}`;
    document.getElementById('q-counter').innerHTML = `Вопрос ${step+1} из ${questions.length}`;
    
    const area = document.getElementById('options-area');
    area.innerHTML = '';
    selectedAnswer = null;
    document.getElementById('submit-btn').disabled = true;
    
    for(let i = 0; i < shuffledOptions.length; i++) {
        const btn = document.createElement('button');
        btn.className = 'btn btn-outline-dark btn-answer p-3 m-1';
        btn.innerHTML = shuffledOptions[i];
        btn.onclick = function() {
            document.querySelectorAll('#options-area button').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            selectedAnswer = i;
            document.getElementById('submit-btn').disabled = false;
        };
        area.appendChild(btn);
    }
}

function submitAnswer() {
    if(selectedAnswer === null) {
        alert('Выберите вариант ответа');
        return;
    }
    
    const q = questions[step];
    const isCorrect = (selectedAnswer === q.shuffledCorrect);
    if(isCorrect) score++;
    
    answers.push({
        num: step+1,
        question: q.text,
        selected: q.shuffledOptions[selectedAnswer],
        correct: q.options[q.correct],
        isCorrect: isCorrect
    });
    
    step++;
    
    if(step < questions.length) {
        renderQuestion();
    } else {
        finishTest();
    }
}

function finishTest() {
    const userId = `${userName} ${userSurname} (${userCity})`;
    const percent = Math.round(score / questions.length * 100);
    
    sb.from('results').insert({
        user_id: userId,
        name: userName,
        surname: userSurname,
        city: userCity,
        score: score,
        total: questions.length,
        test_type: slug,
        test_name: testData.name,
        answers: answers,
        created_at: new Date().toISOString()
    }).then(() => {}).catch(e => console.log(e));
    
    document.getElementById('quiz-screen').classList.add('hidden');
    document.getElementById('result-screen').classList.remove('hidden');
    const scoreEl = document.getElementById('final-score');
    scoreEl.innerHTML = `${score} из ${questions.length} (${percent}%)`;
    if(percent >= 80) scoreEl.className = 'badge bg-success fs-3 p-3';
    else if(percent >= 50) scoreEl.className = 'badge bg-warning fs-3 p-3';
    else scoreEl.className = 'badge bg-danger fs-3 p-3';
}

document.getElementById('submit-btn').onclick = submitAnswer;

function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
}
</script>
</body>
</html>
