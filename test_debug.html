<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Диагностика Supabase</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: monospace; padding: 20px; background: #1e1e1e; color: #d4d4d4; }
        .success { color: #4ec9b0; }
        .error { color: #f48771; }
        .info { color: #ce9178; }
        pre { background: #252526; padding: 10px; border-radius: 8px; overflow-x: auto; }
    </style>
</head>
<body>
<h2>🔍 Диагностика Supabase</h2>
<div id="output"></div>

<script>
const SUPABASE_URL = 'https://qtostraaqrnjbxiydlip.supabase.co';
const SUPABASE_KEY = 'sb_publishable_0GzJSuoAi5zc7pHkicHMNg_cQ-rGAX7';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const out = document.getElementById('output');

function log(msg, type = 'info') {
    const p = document.createElement('div');
    p.innerHTML = msg;
    p.className = type;
    out.appendChild(p);
}

async function check() {
    log('🔄 Проверка подключения...');
    
    // 1. Проверяем, работает ли Supabase
    try {
        const { data, error } = await sb.from('tests').select('count', { count: 'exact', head: true });
        if (error) throw error;
        log('✅ Supabase доступен', 'success');
    } catch (err) {
        log('❌ Ошибка подключения: ' + err.message, 'error');
        return;
    }
    
    // 2. Пытаемся получить список тестов
    log('🔄 Запрашиваем тесты...');
    try {
        const { data, error } = await sb.from('tests').select('*');
        if (error) throw error;
        
        if (!data || data.length === 0) {
            log('⚠️ Таблица "tests" пуста. Нет ни одного теста.', 'error');
            log('💡 Решение: добавьте тест в Supabase через Table Editor', 'info');
        } else {
            log(`✅ Найдено тестов: ${data.length}`, 'success');
            log('<pre>' + JSON.stringify(data, null, 2) + '</pre>', 'info');
        }
    } catch (err) {
        log('❌ Ошибка при запросе тестов: ' + err.message, 'error');
    }
    
    // 3. Проверяем таблицу results
    log('🔄 Проверяем таблицу results...');
    try {
        const { data, error } = await sb.from('results').select('count', { count: 'exact', head: true });
        if (error) throw error;
        log(`✅ Таблица "results" существует (примерно ${data?.count || 0} записей)`, 'success');
    } catch (err) {
        log('❌ Таблица "results" не найдена: ' + err.message, 'error');
    }
    
    log('🔍 Диагностика завершена', 'info');
}

check();
</script>
</body>
</html>
