<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>585GOLD | Тренировка продаж</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #f4f4f4; padding: 20px; }
        .card { background: white; border-radius: 20px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 6px rgba(0,0,0,0.05); }
        .badge-success { background: #28a745; color: white; padding: 4px 12px; border-radius: 30px; }
        .badge-danger { background: #dc3545; color: white; padding: 4px 12px; border-radius: 30px; }
        .badge-warning { background: #ffc107; color: black; padding: 4px 12px; border-radius: 30px; }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h2>🎯 585GOLD | Тренировка продаж</h2>
        <div class="row">
            <div class="col-md-8">
                <button id="loadBtn" class="btn btn-danger w-100">📥 Загрузить результаты</button>
            </div>
            <div class="col-md-4">
                <button id="exportBtn" class="btn btn-secondary w-100">📎 CSV</button>
            </div>
        </div>
        <div id="status" class="mt-2 text-muted small"></div>
    </div>

    <div id="statsBlock" style="display: none;">
        <div class="row" id="kpi"></div>
        <div class="row">
            <div class="col-md-5">
                <div class="card">
                    <h5>🏆 Лучшие результаты</h5>
                    <div id="topList"></div>
                </div>
            </div>
            <div class="col-md-7">
                <div class="card">
                    <h5>📋 Все сотрудники (<span id="empCount">0</span>)</h5>
                    <input type="text" id="searchInput" class="form-control mb-2" placeholder="🔍 Поиск...">
                    <div id="empList" style="max-height: 400px; overflow-y: auto;"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const supabase = supabase.createClient(
        'https://qtostraaqrnjbxiydlip.supabase.co',
        'sb_publishable_0GzJSuoAi5zc7pHkicHMNg_cQ-rGAX7'
    );

    let allData = [];
    let filteredData = [];

    async function loadTrainerResults() {
        setStatus('Загрузка...', 'info');
        document.getElementById('statsBlock').style.display = 'none';

        const { data, error } = await supabase
            .from('trainer_results')
            .select('*')
            .order('created_at', { ascending: false });

        if (error) {
            setStatus('Ошибка: ' + error.message, 'danger');
            return;
        }

        if (!data || data.length === 0) {
            setStatus('Нет результатов тренировки', 'warning');
            return;
        }

        allData = data.map(r => ({
            name: r.user_name || 'Аноним',
            city: r.city || 'Не указан',
            rulesCount: r.rules_count || 0,
            success: r.success || false,
            date: r.created_at
        }));

        filteredData = [...allData];
        renderStats();
        document.getElementById('statsBlock').style.display = 'block';
        setStatus(`✅ Загружено: ${allData.length} записей`, 'success');
    }

    function renderStats() {
        const total = filteredData.length;
        const successCount = filteredData.filter(r => r.success).length;
        const successPercent = total ? Math.round((successCount / total) * 100) : 0;
        const avgRules = total ? Math.round(filteredData.reduce((s, r) => s + r.rulesCount, 0) / total) : 0;

        document.getElementById('kpi').innerHTML = `
            <div class="col-md-4 mb-2"><div class="p-3 bg-light rounded"><h3>${total}</h3><div>Прошло тест</div></div></div>
            <div class="col-md-4 mb-2"><div class="p-3 bg-light rounded"><h3>${successPercent}%</h3><div>Успешно сдали</div></div></div>
            <div class="col-md-4 mb-2"><div class="p-3 bg-light rounded"><h3>${avgRules}</h3><div>Среднее правил</div></div></div>
        `;

        const top10 = [...filteredData].sort((a,b) => b.rulesCount - a.rulesCount).slice(0,10);
        document.getElementById('topList').innerHTML = top10.map((e,i) => `
            <div class="d-flex justify-content-between border-bottom py-2">
                <span><b>${i+1}.</b> ${e.name} (${e.city})</span>
                <span class="badge ${e.success ? 'badge-success' : 'badge-danger'}">${e.rulesCount}/6</span>
            </div>
        `).join('') || '<div class="text-muted">Нет данных</div>';

        document.getElementById('empCount').innerText = filteredData.length;
        document.getElementById('empList').innerHTML = filteredData.map(e => `
            <div class="d-flex justify-content-between border-bottom py-2">
                <div><b>${e.name}</b> <small class="text-muted">${e.city}</small></div>
                <div>
                    <span class="badge ${e.success ? 'badge-success' : 'badge-danger'}">${e.rulesCount}/6</span>
                    <small class="text-muted ms-2">${new Date(e.date).toLocaleDateString()}</small>
                </div>
            </div>
        `).join('');
    }

    function applyFilter() {
        const search = document.getElementById('searchInput').value.toLowerCase();
        filteredData = allData.filter(e => e.name.toLowerCase().includes(search));
        renderStats();
    }

    function exportCSV() {
        if (!filteredData.length) return alert('Нет данных');
        let csv = "Имя,Город,Правил применено,Успех,Дата\n";
        filteredData.forEach(e => {
            csv += `"${e.name}","${e.city}",${e.rulesCount},${e.success ? "Да" : "Нет"},"${new Date(e.date).toLocaleDateString()}"\n`;
        });
        const blob = new Blob(["\uFEFF" + csv], {type: 'text/csv'});
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `trainer_results_${new Date().toISOString().slice(0,10)}.csv`;
        link.click();
    }

    function setStatus(msg, type) {
        const el = document.getElementById('status');
        el.innerHTML = msg;
        el.className = 'mt-2 text-muted small text-' + type;
    }

    document.getElementById('loadBtn').onclick = loadTrainerResults;
    document.getElementById('exportBtn').onclick = exportCSV;
    document.getElementById('searchInput').addEventListener('input', applyFilter);
</script>
</body>
</html>
