<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>585GOLD | Входной тест — результаты</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #f0f2f5; padding: 20px; }
        .card { border-radius: 20px; background: white; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .badge-high { background: #28a745; color: white; padding: 4px 12px; border-radius: 30px; }
        .badge-mid { background: #ffc107; color: black; padding: 4px 12px; border-radius: 30px; }
        .badge-low { background: #dc3545; color: white; padding: 4px 12px; border-radius: 30px; }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h2>📊 585GOLD | Входной тест</h2>
        <div class="row mt-2">
            <div class="col-md-6">
                <select id="testSelect" class="form-select">
                    <option value="">-- Загрузка тестов --</option>
                </select>
            </div>
            <div class="col-md-3">
                <button id="loadBtn" class="btn btn-danger w-100">Загрузить</button>
            </div>
            <div class="col-md-3">
                <button id="exportBtn" class="btn btn-secondary w-100">CSV</button>
            </div>
        </div>
        <div id="status" class="mt-2 small text-muted"></div>
    </div>

    <div id="statsArea" style="display: none;">
        <div class="row" id="kpiRow"></div>
        <div class="row">
            <div class="col-md-5">
                <div class="card"><h5>Топ‑10</h5><div id="topList"></div></div>
            </div>
            <div class="col-md-7">
                <div class="card">
                    <h5>Все сотрудники (<span id="totalCount">0</span>)</h5>
                    <input type="text" id="searchInput" class="form-control mb-2" placeholder="Поиск...">
                    <div id="employeesList"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // ИНИЦИАЛИЗАЦИЯ SUPABASE (ОДИН РАЗ)
    const URL = 'https://qtostraaqrnjbxiydlip.supabase.co';
    const KEY = 'sb_publishable_0GzJSuoAi5zc7pHkicHMNg_cQ-rGAX7';
    const sb = supabase.createClient(URL, KEY);

    let allResults = [];
    let filtered = [];

    async function loadTests() {
        const { data, error } = await sb.from('tests').select('slug, name');
        const select = document.getElementById('testSelect');
        if (error || !data || data.length === 0) {
            select.innerHTML = '<option value="">Ошибка загрузки тестов</option>';
            return;
        }
        select.innerHTML = '<option value="">-- Выберите тест --</option>';
        data.forEach(t => {
            select.innerHTML += `<option value="${t.slug}">${t.name}</option>`;
        });
    }

    async function loadResults() {
        const slug = document.getElementById('testSelect').value;
        if (!slug) return alert('Выберите тест');

        document.getElementById('status').innerHTML = '⏳ Загрузка...';
        document.getElementById('statsArea').style.display = 'none';

        const { data, error } = await sb
            .from('results')
            .select('*')
            .eq('test_type', slug)
            .order('created_at', { ascending: false });

        if (error) {
            document.getElementById('status').innerHTML = '❌ ' + error.message;
            return;
        }

        if (!data || data.length === 0) {
            document.getElementById('status').innerHTML = 'Нет результатов по этому тесту';
            return;
        }

        allResults = data.map(r => ({
            name: r.name || r.user_id || 'Без имени',
            city: r.city || 'Не указан',
            score: r.score || 0,
            total: r.total || 11,
            date: r.created_at
        }));

        filtered = [...allResults];
        renderStats();
        document.getElementById('statsArea').style.display = 'block';
        document.getElementById('status').innerHTML = `✅ Загружено: ${allResults.length} записей`;
    }

    function renderStats() {
        const total = filtered.length;
        const avg = total ? Math.round(filtered.reduce((s, e) => s + (e.score / e.total) * 100, 0) / total) : 0;
        const excellent = filtered.filter(e => (e.score / e.total) >= 0.8).length;
        const errors = filtered.reduce((s, e) => s + (e.total - e.score), 0);

        document.getElementById('kpiRow').innerHTML = `
            <div class="col-md-3"><div class="p-3 bg-white rounded"><h3>${total}</h3><div>Сотрудников</div></div></div>
            <div class="col-md-3"><div class="p-3 bg-white rounded"><h3>${avg}%</h3><div>Средний балл</div></div></div>
            <div class="col-md-3"><div class="p-3 bg-white rounded"><h3>${excellent}</h3><div>Отлично (≥80%)</div></div></div>
            <div class="col-md-3"><div class="p-3 bg-white rounded"><h3>${errors}</h3><div>Ошибок</div></div></div>
        `;

        const top10 = [...filtered].sort((a,b)=>((b.score/b.total)-(a.score/a.total))).slice(0,10);
        document.getElementById('topList').innerHTML = top10.map((e,i) => `
            <div class="d-flex justify-content-between border-bottom py-2">
                <div><b>${i+1}.</b> ${e.name} (${e.city})</div>
                <div class="badge ${e.score/e.total >= 0.8 ? 'badge-high' : (e.score/e.total >= 0.5 ? 'badge-mid' : 'badge-low')}">${e.score}/${e.total} (${Math.round(e.score/e.total*100)}%)</div>
            </div>
        `).join('');

        document.getElementById('totalCount').innerText = filtered.length;
        document.getElementById('employeesList').innerHTML = filtered.map(e => `
            <div class="d-flex justify-content-between border-bottom py-2">
                <div>${e.name} (${e.city})</div>
                <div class="badge ${e.score/e.total >= 0.8 ? 'badge-high' : (e.score/e.total >= 0.5 ? 'badge-mid' : 'badge-low')}">${e.score}/${e.total} (${Math.round(e.score/e.total*100)}%)</div>
            </div>
        `).join('');
    }

    function filterData() {
        const search = document.getElementById('searchInput').value.toLowerCase();
        filtered = allResults.filter(e => e.name.toLowerCase().includes(search));
        renderStats();
    }

    function exportCSV() {
        if (!filtered.length) return alert('Нет данных для выгрузки');
        let csv = "Имя,Город,Баллы,Всего,Процент,Дата\n";
        filtered.forEach(e => {
            csv += `"${e.name}","${e.city}",${e.score},${e.total},${Math.round(e.score/e.total*100)},"${new Date(e.date).toLocaleDateString()}"\n`;
        });
        const blob = new Blob(["\uFEFF" + csv], {type: 'text/csv'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `vhodnoy_test_${new Date().toISOString().slice(0,10)}.csv`;
        a.click();
    }

    document.getElementById('loadBtn').addEventListener('click', loadResults);
    document.getElementById('exportBtn').addEventListener('click', exportCSV);
    document.getElementById('searchInput').addEventListener('input', filterData);

    loadTests();
</script>
</body>
</html>
