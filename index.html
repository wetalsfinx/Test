<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>585GOLD | Проверка Supabase</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <h2>Проверка загрузки результатов</h2>
    <button id="loadBtn">Загрузить результаты</button>
    <pre id="output">Нажмите кнопку</pre>

    <script>
        const sb = supabase.createClient(
            'https://qtostraaqrnjbxiydlip.supabase.co',
            'sb_publishable_0GzJSuoAi5zc7pHkicHMNg_cQ-rGAX7'
        );
        
        document.getElementById('loadBtn').onclick = async () => {
            const output = document.getElementById('output');
            output.innerText = 'Загрузка...';
            
            const { data, error } = await sb.from('results').select('*').eq('test_type', 'продажи-промежуточный-тест');
            
            if (error) {
                output.innerText = '❌ Ошибка: ' + JSON.stringify(error, null, 2);
                return;
            }
            
            if (!data || data.length === 0) {
                output.innerText = '⚠️ Нет данных для test_type = "продажи-промежуточный-тест"';
                return;
            }
            
            output.innerText = `✅ Загружено записей: ${data.length}\n\nПервая запись:\n${JSON.stringify(data[0], null, 2)}`;
        };
    </script>
</body>
</html>
