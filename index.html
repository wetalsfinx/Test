<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Тест: Стандарты Продаж</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body{background:#f5f7fa;font-family:sans-serif;padding:20px}
.card{max-width:700px;margin:0 auto;border:none;box-shadow:0 4px 6px rgba(0,0,0,.1)}
.hidden{display:none!important}
.btn-answer{text-align:left;white-space:normal}
.btn-answer.selected{background-color:#0d6efd;color:white}
</style>
</head>
<body>
<div class="container">
    <div class="card p-4">
        <div id="login-screen">
            <h2 class="text-center mb-3">📊 Тест: Стандарты Продаж</h2>
            <p class="text-center text-muted">Заполните данные</p>
            <input type="text" id="name" class="form-control mb-2" placeholder="Имя">
            <input type="text" id="surname" class="form-control mb-2" placeholder="Фамилия">
            <input type="text" id="city" class="form-control mb-3" placeholder="Город">
            <button onclick="startTest()" class="btn btn-primary w-100">▶ Начать тест</button>
        </div>
        
        <div id="quiz-screen" class="hidden">
            <div class="d-flex justify-content-between mb-3">
                <span id="user-name"></span>
                <span class="badge bg-primary" id="q-counter">Вопрос 1 из 7</span>
            </div>
            <h4 id="question-text" class="mb-3"></h4>
            <div id="options-area" class="d-grid gap-2"></div>
            <button id="submit-btn" class="btn btn-primary mt-3" disabled>📝 Ответить</button>
        </div>
        
        <div id="result-screen" class="hidden text-center">
            <h1>🎉 Готово!</h1>
            <h2 id="final-score" class="mt-3"></h2>
            <button onclick="location.reload()" class="btn btn-outline-primary mt-3">Пройти заново</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL='https://qtostraaqrnjbxiydlip.supabase.co';
const SUPABASE_KEY='sb_publishable_0GzJSuoAi5zc7pHkicHMNg_cQ-rGAX7';
const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

const questions = [
    {text:"Клиент ищет советское украшение, которого нет в ассортименте. Вы предложили альтернативу в ретро-стиле — не понравилось. Согласно технике переориентации, что делаете ДАЛЬШЕ?", options:["Предлагаете самые бюджетные аналоги — возможно, дело в цене","Показываете электронный каталог с изделиями на заказ в похожем стиле","Говорите, что советских украшений больше не будет, и завершаете диалог","Предлагаете отложить визит до поступления новой винтажной коллекции"], correct:1},
    {text:"Клиент сказал «Я подумаю» после примерки кольца за 45 000 ₽. Вы выяснили, что сомнение в цене. Согласно иерархии работы с возражениями, что предлагаете В ПЕРВУЮ ОЧЕРЕДЬ?", options:["Более бюджетный вариант за 25 000 ₽","Рассрочку или Яндекс Сплит, не меняя изделие","Отложить изделие на 24 часа для принятия решения","Дополнительную скидку через руководителя"], correct:1},
    {text:"Клиент из ломбарда рассматривает витрину 40 секунд, не подходит к консультанту. Согласно стандарту работы с трафиком, каково ваше следующее действие?", options:["Ждёте ещё 20 секунд — если не подойдёт сам, значит, не заинтересован","Сразу подходите с вопросом о потребностях, как с любым потенциальным покупателем","Сначала наблюдаете, к какой категории изделий тяготеет взгляд, затем подходите с предложением из этой категории","Не подходите — клиенты из ломбарда приходят по другим вопросам, это нецелевой трафик"], correct:1},
    {text:"Клиент купил кольцо, вы предложили серьги — отказался. Согласно стандарту завершения сделки, что вы делаете ДАЛЬШЕ?", options:["Завершаете продажу, провожаете с теплотой","Предлагаете каталог на заказ — возможно, там найдутся серьги, которые понравятся","Предлагаете футляр и чистящее средство, затем завершаете сделку","Спрашиваете причину отказа, чтобы отработать возражение"], correct:2},
    {text:"Как правильно предложить футляр и чистящее средство?", options:["Спросить: «Футляр нужен?»","Предложить как опцию после оплаты","Сказать: «Давайте добавим футляр и средство по уходу за изделиями. Выбирайте!»","Показать только если клиент спросит об уходе"], correct:2},
    {text:"Клиент говорит: «Дорого». Согласно нашей методике, как правильно отработать это возражение?", options:["«У нас есть изделия дешевле, давайте посмотрим»","«Это цена за качество, вы же хотите хорошее украшение?»","«Понимаю. Обратите внимание на чистоту камня и гарантию — это вложение на годы»","«Можем оформить рассрочку, это решит проблему»"], correct:2},
    {text:"Клиентка выбирает цепочку, вы показали 3 варианта в рамках бюджета. Она говорит: «Все красивые, не знаю, что выбрать». Согласно технике «Альтернативный выбор», как вы помогаете принять решение?", options:["«Давайте я выберу за вас — я эксперт, мне виднее»","«Выберите ту, которая больше откликается — все варианты достойные»","«Давайте сузим выбор: вы хотите цепочку для кулона или как самостоятельное украшение?»","«Возьмите обе — одна для повседневной носки, вторая для особых случаев»"], correct:2}
];

let step = 0;
let userName = "", userSurname = "", userCity = "";
let answers = [];
let score = 0;
let currentQuestions = [];
let selectedAnswer = null;
let currentCorrect = null;

function startTest() {
    userName = document.getElementById('name').value.trim();
    userSurname = document.getElementById('surname').value.trim();
    userCity = document.getElementById('city').value.trim();
    if(!userName || !userSurname || !userCity) {
        alert("Заполните все поля!");
        return;
    }
    
    currentQuestions = [...questions];
    step = 0;
    score = 0;
    answers = [];
    selectedAnswer = null;
    
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('quiz-screen').classList.remove('hidden');
    document.getElementById('user-name').innerHTML = `${userName} ${userSurname} (${userCity})`;
    
    renderQuestion();
}

function renderQuestion() {
    const q = currentQuestions[step];
    currentCorrect = q.correct;
    
    document.getElementById('question-text').innerHTML = `${step+1}. ${q.text}`;
    document.getElementById('q-counter').innerHTML = `Вопрос ${step+1} из ${questions.length}`;
    
    const area = document.getElementById('options-area');
    area.innerHTML = '';
    selectedAnswer = null;
    document.getElementById('submit-btn').disabled = true;
    
    for(let i = 0; i < q.options.length; i++) {
        const btn = document.createElement('button');
        btn.className = 'btn btn-outline-dark btn-answer p-3 m-1';
        btn.innerHTML = q.options[i];
        btn.onclick = function() {
            document.querySelectorAll('#options-area button').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            selectedAnswer = i;
            document.getElementById('submit-btn').disabled = false;
        };
        area.appendChild(btn);
    }
}

function submitAnswer() {
    if(selectedAnswer === null) {
        alert('Выберите вариант ответа');
        return;
    }
    
    const q = currentQuestions[step];
    const isCorrect = (selectedAnswer === currentCorrect);
    if(isCorrect) score++;
    
    answers.push({
        num: step+1,
        selected: q.options[selectedAnswer],
        correct: q.options[currentCorrect],
        isCorrect: isCorrect
    });
    
    step++;
    
    if(step < questions.length) {
        renderQuestion();
    } else {
        finishTest();
    }
}

function finishTest() {
    const userId = `${userName} ${userSurname} (${userCity})`;
    const percent = Math.round(score / questions.length * 100);
    
    sb.from('results').insert([{
        user_id: userId,
        name: userName,
        surname: userSurname,
        city: userCity,
        score: score,
        total: questions.length,
        answers: answers,
        created_at: new Date().toISOString()
    }]).catch(e => console.log('Ошибка сохранения:', e));
    
    document.getElementById('quiz-screen').classList.add('hidden');
    document.getElementById('result-screen').classList.remove('hidden');
    document.getElementById('final-score').innerHTML = `${score} из ${questions.length} (${percent}%)`;
}

document.getElementById('submit-btn').onclick = submitAnswer;
</script>
</body>
</html>
