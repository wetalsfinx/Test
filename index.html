<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Админка: Результаты тестов</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
<style>
body{background:#f5f7fa;font-family:sans-serif}
.card{margin-top:20px;border:none;box-shadow:0 4px 6px rgba(0,0,0,.1)}
.hidden{display:none!important}
.user-log{border-left:4px solid #0d6efd;padding:12px;background:#f8f9fa;margin-bottom:12px;border-radius:0 8px 8px 0;cursor:pointer}
.user-log:hover{background:#e9ecef}
.correct{color:#198754;font-weight:600}
.wrong{color:#dc3545;font-weight:600}
.score-badge{font-size:1.3em;padding:8px 20px}
.online-badge{position:fixed;top:10px;right:10px;background:#28a745;color:white;padding:5px 10px;border-radius:20px;font-size:12px;z-index:1000}
.splash-screen{position:fixed;top:0;left:0;right:0;bottom:0;background:#f5f7fa;display:flex;justify-content:center;align-items:center;z-index:10000}
.splash-spinner{width:50px;height:50px;border:4px solid #e9ecef;border-top-color:#0d6efd;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.answer-details{display:none;margin-top:10px;padding-top:10px;border-top:1px solid #dee2e6}
.answer-details.show{display:block}
.stats-card{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white;border-radius:10px;padding:15px;margin-bottom:15px;cursor:help}
.filter-bar{background:white;padding:15px;border-radius:10px;margin-bottom:20px;box-shadow:0 2px 4px rgba(0,0,0,.05)}
.user-name{font-weight:bold;font-size:1.1em}
.user-city{font-size:0.85em;color:#6c757d;margin-left:8px}
.expand-icon{float:right;color:#6c757d;transition:transform 0.3s}
.user-log.expanded .expand-icon{transform:rotate(180deg)}
.chart-card{background:white;border-radius:10px;padding:15px;margin-bottom:20px;box-shadow:0 2px 4px rgba(0,0,0,.05);cursor:help}
.chart-container{height:200px;position:relative}
.test-selector { background: white; border-radius: 12px; padding: 15px; margin-bottom: 20px; box-shadow: 0 2px 4px rgba(0,0,0,.05); }
.test-selector select { max-width: 300px; }
.import-area { border: 2px dashed #E30613; border-radius: 10px; padding: 10px 15px; text-align: center; cursor: pointer; transition: all 0.3s; background: #fff5f5; margin-top: 10px; }
.import-area:hover { background: #ffe5e5; }
.btn-pdf-city { background: #198754; color: white; border: none; padding: 8px 20px; border-radius: 5px; margin-right: 10px; }
.btn-pdf-city:hover { background: #0d6efd; }
.pagination { display: flex; justify-content: center; gap: 5px; margin-top: 20px; flex-wrap: wrap; }
.pagination button { padding: 5px 12px; margin: 0 2px; border: 1px solid #dee2e6; background: white; border-radius: 5px; cursor: pointer; }
.pagination button.active { background: #0d6efd; color: white; border-color: #0d6efd; }
.pagination button:hover:not(.active) { background: #e9ecef; }
@media (max-width: 768px) {
    .filter-bar .row { flex-direction: column; }
    .filter-bar .col-md-3, .filter-bar .col-md-2, .filter-bar .col-md-1 { width: 100%; margin-bottom: 10px; }
    .stats-card { margin-bottom: 15px; }
    .chart-card { margin-bottom: 20px; }
    .user-log .d-flex { flex-direction: column; gap: 8px; }
    .user-log .d-flex .d-flex { flex-direction: row; justify-content: space-between; width: 100%; }
    .btn-sm { padding: 4px 8px; font-size: 11px; }
}
</style>
</head>
<body>
<div id="splash" class="splash-screen">
    <div style="text-align:center"><div class="splash-spinner mx-auto mb-3"></div><p>Загрузка...</p></div>
</div>

<div class="online-badge" id="online-badge">🟢 Онлайн</div>
<div class="container mt-4"><div class="row justify-content-center"><div class="col-md-10">

<div id="admin-screen">
<div class="d-flex justify-content-between align-items-center mb-3">
    <h3>👨‍💼 Панель Администратора</h3>
    <div>
        <button id="copyFiltersBtn" class="btn btn-outline-secondary btn-sm me-2" title="Скопировать ссылку с текущими фильтрами">🔗 Копировать ссылку</button>
        <button id="exportExcelBtn" class="btn btn-success btn-sm me-2" title="Выгрузить отфильтрованные результаты в Excel">📎 Выгрузить в Excel</button>
        <button id="refreshBtn" class="btn btn-primary btn-sm me-2" title="Обновить данные">🔄 Обновить</button>
        <button id="pdfCityBtn" class="btn-pdf-city" style="display:none;" title="Скачать PDF по выбранному городу">📄 PDF по городу</button>
        <span id="realtime-status" class="badge bg-warning me-2">🔄</span>
        <a href="?" class="btn btn-outline-secondary btn-sm">← Выход</a>
    </div>
</div>

<!-- Выбор теста + импорт -->
<div class="test-selector">
    <div class="row align-items-center">
        <div class="col-md-4">
            <label class="form-label fw-bold mb-0">📋 Выберите тест</label>
        </div>
        <div class="col-md-5">
            <select id="testSelector" class="form-select">
                <option value="">Загрузка тестов...</option>
            </select>
        </div>
        <div class="col-md-3 text-end">
            <button class="btn btn-sm btn-outline-danger" onclick="deleteCurrentTest()" id="deleteTestBtn" style="display:none">
                <i class="bi bi-trash"></i> Удалить тест
            </button>
        </div>
    </div>
    <div class="row mt-2">
        <div class="col-12">
            <div class="import-area" id="importArea" onclick="document.getElementById('importFileInput').click()">
                <i class="bi bi-filetype-json"></i> 📥 Импортировать тест из JSON (конструктор)
                <input type="file" id="importFileInput" accept=".json" style="display:none">
            </div>
        </div>
    </div>
</div>

<!-- Блок результатов (динамический) -->
<div id="resultsContainer" style="display:none">
    <div class="row mb-4">
        <div class="col-md-4"><div class="stats-card" title="Всего сотрудников, прошедших этот тест"><div class="d-flex justify-content-between"><div><div class="small">Всего прошло</div><div class="h3 mb-0" id="total-count">0</div></div><i class="bi bi-people fs-1"></i></div></div></div>
        <div class="col-md-4"><div class="stats-card" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);" title="Средний процент правильных ответов"><div class="d-flex justify-content-between"><div><div class="small">Средний балл</div><div class="h3 mb-0" id="avg-score">0%</div></div><i class="bi bi-graph-up fs-1"></i></div></div></div>
        <div class="col-md-4"><div class="stats-card" style="background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);" title="Количество сотрудников с результатом 80% и выше"><div class="d-flex justify-content-between"><div><div class="small">Отлично (≥80%)</div><div class="h3 mb-0" id="excellent-count">0</div></div><i class="bi bi-star fs-1"></i></div></div></div>
    </div>
    <div class="row mb-4">
        <div class="col-md-6"><div class="chart-card" title="Распределение результатов по категориям"><h6><i class="bi bi-pie-chart"></i> Распределение баллов</h6><div class="chart-container"><canvas id="scoreChart"></canvas></div></div></div>
        <div class="col-md-6"><div class="chart-card" title="Средний балл по городам"><h6><i class="bi bi-bar-chart"></i> Успеваемость по городам</h6><div class="chart-container"><canvas id="cityChart"></canvas></div></div></div>
    </div>
    <div class="filter-bar"><div class="row g-3">
        <div class="col-md-4"><input type="text" id="search-input" class="form-control" placeholder="🔍 Поиск по имени..."></div>
        <div class="col-md-3"><select id="city-filter" class="form-select"><option value="">Все города</option></select></div>
        <div class="col-md-2"><input type="date" id="date-from" class="form-control" placeholder="Дата от"></div>
        <div class="col-md-2"><input type="date" id="date-to" class="form-control" placeholder="Дата до"></div>
        <div class="col-md-1"><button class="btn btn-outline-secondary w-100" onclick="resetFilters()" title="Сбросить все фильтры">Сброс</button></div>
    </div></div>
    <div id="results-area"><div class="text-center py-4">⏳ Выберите тест</div></div>
    <div id="pagination-container" class="pagination"></div>
</div>

</div>
</div></div></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
const SUPABASE_URL='https://qtostraaqrnjbxiydlip.supabase.co';
const SUPABASE_KEY='sb_publishable_0GzJSuoAi5zc7pHkicHMNg_cQ-rGAX7';
const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

let currentTest = null;
let currentTestData = null;
let currentResults = [];
let currentFilteredResults = [];
let currentPage = 1;
const itemsPerPage = 20;
let scoreChart = null;
let cityChart = null;

window.addEventListener('load', () => {
    setTimeout(() => { const splash = document.getElementById('splash'); if(splash) { splash.style.opacity = '0'; setTimeout(() => splash.style.display = 'none', 500); } }, 300);
    document.getElementById('splash').style.display = 'none';
    document.getElementById('admin-screen').classList.remove('hidden');
    loadTests();
    initRealtime();
    loadFiltersFromLocalStorage();
    
    document.getElementById('search-input').addEventListener('input', () => { currentPage = 1; filterAndDisplay(); saveFiltersToLocalStorage(); });
    document.getElementById('city-filter').addEventListener('change', () => { currentPage = 1; filterAndDisplay(); saveFiltersToLocalStorage(); });
    document.getElementById('date-from').addEventListener('change', () => { currentPage = 1; filterAndDisplay(); saveFiltersToLocalStorage(); });
    document.getElementById('date-to').addEventListener('change', () => { currentPage = 1; filterAndDisplay(); saveFiltersToLocalStorage(); });
    document.getElementById('refreshBtn').addEventListener('click', () => { if(currentTest) loadResults(currentTest.slug); });
    document.getElementById('exportExcelBtn').addEventListener('click', exportToExcel);
    document.getElementById('copyFiltersBtn').addEventListener('click', copyFiltersLink);
    document.getElementById('importFileInput').addEventListener('change', importTestFromJSON);
});

// ========== АВТОМАТИЧЕСКОЕ ЗАПОЛНЕНИЕ ГОРОДОВ ИЗ РЕЗУЛЬТАТОВ ==========
async function updateCityListFromResults() {
    if (!currentTest) return false;
    
    try {
        const { data: testData } = await sb.from('tests').select('city_list').eq('slug', currentTest.slug).single();
        if (testData?.city_list && testData.city_list.length > 0) {
            const cityFilter = document.getElementById('city-filter');
            let cityOptions = '<option value="">Все города</option>';
            for (const city of testData.city_list) {
                cityOptions += `<option value="${escapeHtml(city)}">${escapeHtml(city)}</option>`;
            }
            cityFilter.innerHTML = cityOptions;
            return true;
        }
        
        const { data: results } = await sb.from('results').select('city').eq('test_type', currentTest.slug);
        if (!results || results.length === 0) return false;
        
        const cities = [...new Set(results.map(r => r.city).filter(c => c && c !== 'null' && c !== 'undefined' && c.trim() !== ''))];
        if (cities.length === 0) return false;
        
        await sb.from('tests').update({ city_list: cities }).eq('slug', currentTest.slug);
        
        const cityFilter = document.getElementById('city-filter');
        let cityOptions = '<option value="">Все города</option>';
        for (const city of cities) {
            cityOptions += `<option value="${escapeHtml(city)}">${escapeHtml(city)}</option>`;
        }
        cityFilter.innerHTML = cityOptions;
        
        return true;
    } catch(e) {
        console.error('Ошибка обновления городов:', e);
        return false;
    }
}

function saveFiltersToLocalStorage() {
    const filters = {
        city: document.getElementById('city-filter').value,
        search: document.getElementById('search-input').value,
        dateFrom: document.getElementById('date-from').value,
        dateTo: document.getElementById('date-to').value
    };
    localStorage.setItem('adminFilters', JSON.stringify(filters));
}

function loadFiltersFromLocalStorage() {
    const saved = localStorage.getItem('adminFilters');
    if (saved) {
        try {
            const filters = JSON.parse(saved);
            if (filters.city) document.getElementById('city-filter').value = filters.city;
            if (filters.search) document.getElementById('search-input').value = filters.search;
            if (filters.dateFrom) document.getElementById('date-from').value = filters.dateFrom;
            if (filters.dateTo) document.getElementById('date-to').value = filters.dateTo;
        } catch(e) {}
    }
}

function copyFiltersLink() {
    const filters = {
        city: document.getElementById('city-filter').value,
        search: document.getElementById('search-input').value,
        dateFrom: document.getElementById('date-from').value,
        dateTo: document.getElementById('date-to').value,
        test: currentTest?.slug || ''
    };
    const url = new URL(window.location.href);
    if (filters.city && filters.city !== '') url.searchParams.set('city', filters.city);
    else url.searchParams.delete('city');
    if (filters.search) url.searchParams.set('search', filters.search);
    else url.searchParams.delete('search');
    if (filters.dateFrom) url.searchParams.set('from', filters.dateFrom);
    else url.searchParams.delete('from');
    if (filters.dateTo) url.searchParams.set('to', filters.dateTo);
    else url.searchParams.delete('to');
    if (filters.test) url.searchParams.set('test', filters.test);
    navigator.clipboard.writeText(url.toString());
    alert('✅ Ссылка с фильтрами скопирована!');
}

async function importTestFromJSON(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async (e) => {
        try {
            const testData = JSON.parse(e.target.result);
            if (!testData.name || !testData.questions || !testData.cities) throw new Error('Неверный формат');
            const slug = testData.name.toLowerCase().replace(/[^а-яa-z0-9]/g, '_').replace(/_+/g, '_').replace(/^_|_$/g, '');
            const { data: existing } = await sb.from('tests').select('slug').eq('slug', slug);
            if (existing && existing.length > 0) {
                if (!confirm(`Тест "${testData.name}" уже существует. Перезаписать?`)) return;
                await sb.from('tests').update({ name: testData.name, questions_count: testData.questions.length, city_list: testData.cities }).eq('slug', slug);
            } else {
                await sb.from('tests').insert([{ name: testData.name, slug: slug, questions_count: testData.questions.length, city_list: testData.cities, created_at: new Date().toISOString() }]);
            }
            alert(`✅ Тест "${testData.name}" импортирован!`);
            document.getElementById('importFileInput').value = '';
            await loadTests();
            const selector = document.getElementById('testSelector');
            for (let i = 0; i < selector.options.length; i++) {
                if (selector.options[i].value === slug) { selector.selectedIndex = i; selector.dispatchEvent(new Event('change')); break; }
            }
        } catch(err) { alert('Ошибка: ' + err.message); }
    };
    reader.readAsText(file);
}

async function loadTests() {
    const { data, error } = await sb.from('tests').select('*').order('created_at', { ascending: false });
    const selector = document.getElementById('testSelector');
    if (error || !data || data.length === 0) { selector.innerHTML = '<option value="">Нет тестов</option>'; return; }
    let options = '<option value="">-- Выберите тест --</option>';
    for (const test of data) options += `<option value="${test.slug}" data-cities='${JSON.stringify(test.city_list || [])}'>${test.name} (${test.questions_count || '?'} вопросов)</option>`;
    selector.innerHTML = options;
    selector.removeEventListener('change', selector.changeHandler);
    selector.changeHandler = async (e) => {
        const slug = e.target.value;
        if (!slug) { currentTest = null; document.getElementById('resultsContainer').style.display = 'none'; document.getElementById('deleteTestBtn').style.display = 'none'; return; }
        const selectedOption = selector.options[selector.selectedIndex];
        const citiesJson = selectedOption.getAttribute('data-cities');
        currentTestData = { slug, name: selectedOption.text, cities: JSON.parse(citiesJson || '[]') };
        currentTest = currentTestData;
        document.getElementById('deleteTestBtn').style.display = 'inline-block';
        await loadResults(slug);
        document.getElementById('resultsContainer').style.display = 'block';
    };
    selector.addEventListener('change', selector.changeHandler);
}

async function loadResults(slug) {
    const { data, error } = await sb.from('results').select('*').eq('test_type', slug).order('created_at', { ascending: false });
    if (error) { console.error(error); currentResults = []; } else { currentResults = data || []; }
    await updateCityListFromResults();
    filterAndDisplay();
}

function filterAndDisplay() {
    if (!currentTest) return;
    let filtered = [...currentResults];
    const search = document.getElementById('search-input')?.value.toLowerCase() || '';
    const cityF = document.getElementById('city-filter')?.value || '';
    const dateFrom = document.getElementById('date-from')?.value;
    const dateTo = document.getElementById('date-to')?.value;
    if(search) filtered = filtered.filter(r => r.user_id.toLowerCase().includes(search));
    if(cityF) filtered = filtered.filter(r => r.city && r.city === cityF);
    if(dateFrom) { const d = new Date(dateFrom); d.setHours(0,0,0,0); filtered = filtered.filter(r => new Date(r.created_at) >= d); }
    if(dateTo) { const d = new Date(dateTo); d.setHours(23,59,59,999); filtered = filtered.filter(r => new Date(r.created_at) <= d); }
    currentFilteredResults = filtered;
    
    const total = currentResults.length;
    if(total > 0) {
        const avg = Math.round(currentResults.reduce((s,r)=>s+(r.score/r.total),0)/total*100);
        const excellent = currentResults.filter(r=>(r.score/r.total)>=0.8).length;
        document.getElementById('total-count').innerText = total;
        document.getElementById('avg-score').innerText = `${avg}%`;
        document.getElementById('excellent-count').innerText = excellent;
    }
    
    const totalPages = Math.ceil(currentFilteredResults.length / itemsPerPage);
    const start = (currentPage - 1) * itemsPerPage;
    const paginatedResults = currentFilteredResults.slice(start, start + itemsPerPage);
    
    renderResultsList(paginatedResults);
    renderPagination(totalPages);
    updateCharts();
    document.getElementById('pdfCityBtn').style.display = 'inline-block';
}

function renderResultsList(results) {
    const area = document.getElementById('results-area');
    if(!results.length) { area.innerHTML='<div class="text-center py-4 text-muted">📭 Нет результатов</div>'; return; }
    area.innerHTML = '';
    results.forEach(r => {
        const p = Math.round(r.score/r.total*100);
        let details = '';
        if(r.answers) r.answers.forEach((a,i) => {
            const ok = a.isCorrect === true || a.ok === true;
            details += `<div class="small mb-2"><strong>В${i+1}:</strong> ${ok?'✅':'❌'} <span class="${ok?'correct':'wrong'}">${ok?'Верно':'Неверно'}</span>${!ok?`<div class="text-muted ms-3">✖ ${a.selected || a.sel}<br>✔ ${a.correct || a.cor}</div>`:''}</div>`;
        });
        const clr = p>=80?'success':p>=50?'warning':'danger';
        area.innerHTML += `<div class="user-log" onclick="if(event.target.tagName!=='BUTTON') this.querySelector('.answer-details').classList.toggle('show'); this.classList.toggle('expanded')">
            <div class="d-flex justify-content-between align-items-start">
                <div><span class="user-name">${escapeHtml(r.surname||'')} ${escapeHtml(r.name||'')}</span><span class="user-city">📍 ${escapeHtml(r.city||'не указан')}</span><span class="badge bg-${clr} ms-2">${r.score}/${r.total} (${p}%)</span></div>
                <div class="d-flex align-items-center gap-2">
                    <small>${new Date(r.created_at).toLocaleString()}</small>
                    <button class="btn btn-sm btn-outline-primary" onclick="event.stopPropagation(); generateUserReport('${r.id}')" style="padding:2px 8px" title="Отчёт"><i class="bi bi-file-text"></i></button>
                    <button class="btn btn-sm btn-outline-danger" onclick="event.stopPropagation(); deleteResult('${r.id}')" style="padding:2px 8px"><i class="bi bi-trash"></i></button>
                    <i class="bi bi-chevron-down expand-icon ms-2"></i>
                </div>
            </div>
            <div class="answer-details mt-2"><div class="bg-light p-2 rounded">${details}</div></div>
        </div>`;
    });
}

function renderPagination(totalPages) {
    const container = document.getElementById('pagination-container');
    if (totalPages <= 1) { container.innerHTML = ''; return; }
    let html = '';
    for (let i = 1; i <= totalPages; i++) {
        html += `<button class="${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
    }
    container.innerHTML = html;
}

function goToPage(page) {
    currentPage = page;
    filterAndDisplay();
}

async function deleteResult(resultId) {
    if(!confirm('Удалить этот результат?')) return;
    const { error } = await sb.from('results').delete().eq('id', resultId);
    if(error) alert('Ошибка: ' + error.message);
    else await loadResults(currentTest.slug);
}

async function deleteCurrentTest() {
    if(!currentTest) return;
    if(!confirm(`Удалить тест "${currentTest.name}" и ВСЕ его результаты?`)) return;
    await sb.from('results').delete().eq('test_type', currentTest.slug);
    await sb.from('tests').delete().eq('slug', currentTest.slug);
    alert('Тест удалён');
    await loadTests();
    document.getElementById('resultsContainer').style.display = 'none';
    currentTest = null;
    document.getElementById('deleteTestBtn').style.display = 'none';
}

function resetFilters() {
    document.getElementById('search-input').value = '';
    document.getElementById('city-filter').value = '';
    document.getElementById('date-from').value = '';
    document.getElementById('date-to').value = '';
    currentPage = 1;
    filterAndDisplay();
    saveFiltersToLocalStorage();
}

function updateCharts() {
    if(!currentResults.length) return;
    const cats = {'Отлично (80-100%)':0, 'Хорошо (60-79%)':0, 'Удовлетворительно (40-59%)':0, 'Плохо (0-39%)':0};
    currentResults.forEach(r => { let p = r.score/r.total*100; if(p>=80) cats['Отлично (80-100%)']++; else if(p>=60) cats['Хорошо (60-79%)']++; else if(p>=40) cats['Удовлетворительно (40-59%)']++; else cats['Плохо (0-39%)']++; });
    const ctx1 = document.getElementById('scoreChart');
    if(ctx1){ if(scoreChart) scoreChart.destroy(); scoreChart = new Chart(ctx1, {type:'pie', data:{labels:Object.keys(cats), datasets:[{data:Object.values(cats), backgroundColor:['#28a745','#17a2b8','#ffc107','#dc3545']}]}, options:{responsive:true, plugins:{tooltip:{callbacks:{label:function(context){return `${context.label}: ${context.raw} чел (${Math.round(context.raw/currentResults.length*100)}%)`;}}}}}}); }
    const cityStats = {};
    currentResults.forEach(r => { let city = r.city||'Не указан'; if(!cityStats[city]) cityStats[city]={total:0,count:0}; cityStats[city].total+=r.score/r.total; cityStats[city].count++; });
    const cities = Object.keys(cityStats);
    const avgScores = cities.map(c=>Math.round(cityStats[c].total/cityStats[c].count*100));
    const ctx2 = document.getElementById('cityChart');
    if(ctx2){ if(cityChart) cityChart.destroy(); cityChart = new Chart(ctx2, {type:'bar', data:{labels:cities, datasets:[{label:'Средний балл (%)', data:avgScores, backgroundColor:'#667eea'}]}, options:{responsive:true, scales:{y:{min:0,max:100,title:{display:true,text:'Средний балл (%)'}}, x:{title:{display:true,text:'Город'}}}, plugins:{tooltip:{callbacks:{label:function(context){return `${context.raw}%`;}}}}}}); }
}

function generateUserReport(resultId) {
    const userData = currentResults.find(r => r.id == resultId);
    if(!userData) return;
    const fullName = `${userData.surname || ''} ${userData.name || ''}`.trim();
    const percent = Math.round(userData.score / userData.total * 100);
    let answersHtml = '';
    if(userData.answers) userData.answers.forEach((a, i) => {
        const isCorrect = a.isCorrect === true || a.ok === true;
        if (!isCorrect) answersHtml += `<div style="margin-bottom:20px;padding:12px;background:#ffebee;border-radius:8px;border-left:4px solid #f44336">
            <div style="font-weight:bold;">❌ Ошибка в вопросе ${i+1}</div>
            <div style="margin-bottom:8px;color:#555;">${escapeHtml(a.text || a.qs || '')}</div>
            <div><span style="color:#d32f2f;">✖ Ваш ответ:</span> ${escapeHtml(a.selected || a.sel)}</div>
            <div><span style="color:#2e7d32;">✓ Правильный ответ:</span> ${escapeHtml(a.correct || a.cor)}</div>
        </div>`;
    });
    const reportHtml = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Отчёт: ${fullName}</title><style>body{font-family:Arial;padding:20px}h1{color:#0d6efd}.info{background:#f5f7fa;padding:15px;margin-bottom:20px}.score-good{background:#4caf50;color:white;display:inline-block;padding:5px 15px;border-radius:20px}.score-normal{background:#ff9800;color:white;display:inline-block;padding:5px 15px;border-radius:20px}.score-bad{background:#f44336;color:white;display:inline-block;padding:5px 15px;border-radius:20px}</style></head><body><div style="text-align:right;margin-bottom:10px"><button onclick="window.print()" style="background:#0d6efd;color:white;border:none;padding:8px 16px;border-radius:5px;cursor:pointer">🖨️ Распечатать / Сохранить PDF</button></div><h1>📊 Отчёт по тесту</h1><div class="info"><strong>Сотрудник:</strong> ${fullName}<br><strong>Город:</strong> ${userData.city || 'не указан'}<br><strong>Дата:</strong> ${new Date(userData.created_at).toLocaleString()}<br><strong>Результат:</strong> ${userData.score} из ${userData.total} (${percent}%)<br><div class="${percent>=80?'score-good':percent>=50?'score-normal':'score-bad'}">${percent>=80?'Отлично!':percent>=50?'Хороший результат':'Требуется изучение'}</div></div><h3>Разбор ошибок</h3>${answersHtml || '<div style="color:green;">✅ Нет ошибок!</div>'}</body></html>`;
    const win = window.open('', '_blank');
    win.document.write(reportHtml);
    win.document.close();
}

function initRealtime() {
    sb.channel('results-channel').on('postgres_changes', {event:'INSERT', schema:'public', table:'results'}, payload => {
        if (currentTest && payload.new.test_type === currentTest.slug) { currentResults.unshift(payload.new); filterAndDisplay(); }
    }).subscribe();
    document.getElementById('realtime-status').innerHTML = '🟢 Live';
    document.getElementById('realtime-status').className = 'badge bg-success';
}

function exportToExcel() {
    if (!currentFilteredResults.length) { alert('Нет данных для экспорта'); return; }
    const headers = ['ФИО', 'Город', 'Баллы', 'Процент', 'Дата'];
    for (let i = 1; i <= 11; i++) headers.push(`Вопрос ${i}`, `Ответ сотрудника ${i}`, `Правильный ответ ${i}`, `Результат ${i}`);
    const rows = [];
    for (const r of currentFilteredResults) {
        const percent = Math.round(r.score / r.total * 100);
        const row = [r.user_id || `${r.surname} ${r.name}`.trim(), r.city || '', `${r.score}/${r.total}`, `${percent}%`, new Date(r.created_at).toLocaleString('ru-RU')];
        for (let i = 0; i < 11; i++) {
            const answer = r.answers?.[i];
            if (answer) {
                row.push(answer.text || answer.qs || '');
                row.push(answer.selected || answer.sel || '');
                row.push(answer.correct || answer.cor || '');
                row.push((answer.isCorrect === true || answer.ok === true) ? 'Верно' : 'Ошибка');
            } else { row.push('', '', '', ''); }
        }
        rows.push(row);
    }
    const wsData = [headers, ...rows];
    const ws = XLSX.utils.aoa_to_sheet(wsData);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Результаты');
    XLSX.writeFile(wb, `${currentTest?.name || 'результаты'}_${new Date().toISOString().slice(0,19)}.xlsx`);
}

function escapeHtml(s){ if(!s) return ''; return s.replace(/[&<>]/g, m=>m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); }
</script>
