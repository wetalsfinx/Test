<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>585GOLD | Анализ тестов</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: Arial; padding: 20px; background: #f5f5f5; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 16px; border-top: 4px solid #E30613; }
        select, button { padding: 10px; margin: 10px 0; border-radius: 40px; border: 1px solid #ddd; }
        button { background: #E30613; color: white; border: none; cursor: pointer; }
        .error { color: red; }
        .success { color: green; }
        pre { background: #f0f0f0; padding: 10px; border-radius: 8px; overflow: auto; font-size: 12px; }
    </style>
</head>
<body>
<div class="container">
    <h1>💎 585GOLD | Анализ результатов тестирования</h1>
    
    <div id="status">🔄 Проверка подключения к Supabase...</div>
    
    <hr>
    
    <div id="testBlock" style="display:none;">
        <label>📋 Выберите тест:</label>
        <select id="testSelector" style="width:100%;"></select>
        <button id="loadResultsBtn">📊 Загрузить результаты</button>
    </div>
    
    <div id="resultsBlock" style="display:none; margin-top:20px;">
        <h3>Результаты</h3>
        <pre id="resultsPre">Нет данных</pre>
    </div>
    
    <div id="errorBlock" style="display:none; margin-top:20px;" class="error"></div>
</div>

<script>
const SUPABASE_URL = 'https://qtostraaqrnjbxiydlip.supabase.co';
const SUPABASE_KEY = 'sb_publishable_0GzJSuoAi5zc7pHkicHMNg_cQ-rGAX7';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const statusDiv = document.getElementById('status');
const testBlock = document.getElementById('testBlock');
const testSelector = document.getElementById('testSelector');
const loadBtn = document.getElementById('loadResultsBtn');
const resultsBlock = document.getElementById('resultsBlock');
const resultsPre = document.getElementById('resultsPre');
const errorDiv = document.getElementById('errorBlock');

async function testConnection() {
    statusDiv.innerHTML = '🔄 Проверка подключения...';
    try {
        const { data, error } = await sb.from('tests').select('count', { count: 'exact', head: true });
        if (error) throw error;
        statusDiv.innerHTML = '✅ Подключение к Supabase работает!';
        loadTests();
    } catch (err) {
        statusDiv.innerHTML = '❌ Ошибка подключения: ' + err.message;
        errorDiv.style.display = 'block';
        errorDiv.innerHTML = 'Ошибка: ' + err.message;
    }
}

async function loadTests() {
    statusDiv.innerHTML = '🔄 Загрузка тестов...';
    try {
        const { data, error } = await sb.from('tests').select('*').order('created_at', { ascending: false });
        if (error) throw error;
        
        if (!data || data.length === 0) {
            statusDiv.innerHTML = '⚠️ Тесты не найдены. Создайте тест в Supabase.';
            return;
        }
        
        statusDiv.innerHTML = `✅ Загружено ${data.length} тестов`;
        testSelector.innerHTML = '<option value="">-- Выберите тест --</option>';
        for (const test of data) {
            testSelector.innerHTML += `<option value="${test.slug}">${test.name} (${test.questions_count || '?'} вопросов)</option>`;
        }
        testBlock.style.display = 'block';
        
        // Автоматическая загрузка результатов для первого теста (опционально)
        if (data.length > 0) {
            // Не загружаем автоматически, ждём выбора
        }
    } catch (err) {
        statusDiv.innerHTML = '❌ Ошибка загрузки тестов: ' + err.message;
        errorDiv.style.display = 'block';
        errorDiv.innerHTML = 'Ошибка: ' + err.message;
    }
}

async function loadResults() {
    const slug = testSelector.value;
    if (!slug) {
        alert('Выберите тест');
        return;
    }
    
    resultsBlock.style.display = 'block';
    resultsPre.innerHTML = '🔄 Загрузка результатов...';
    
    try {
        const { data, error } = await sb.from('results').select('*').eq('test_type', slug).order('created_at', { ascending: false });
        if (error) throw error;
        
        if (!data || data.length === 0) {
            resultsPre.innerHTML = 'Нет результатов для этого теста';
            return;
        }
        
        // Показываем первые 5 результатов для диагностики
        const preview = data.slice(0, 5).map(r => ({
            name: `${r.surname || ''} ${r.name || ''}`.trim(),
            city: r.city,
            score: `${r.score}/${r.total}`,
            date: new Date(r.created_at).toLocaleString(),
            answers_count: r.answers?.length || 0
        }));
        resultsPre.innerHTML = JSON.stringify(preview, null, 2);
        
        // Дополнительная статистика
        const total = data.length;
        const avgScore = Math.round(data.reduce((s, r) => s + (r.score / r.total), 0) / total * 100);
        resultsPre.innerHTML += `\n\n📊 Статистика:\nВсего сотрудников: ${total}\nСредний балл: ${avgScore}%`;
        
    } catch (err) {
        resultsPre.innerHTML = '❌ Ошибка: ' + err.message;
    }
}

loadBtn.addEventListener('click', loadResults);
testConnection();
</script>
</body>
</html>
