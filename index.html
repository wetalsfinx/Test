<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>585GOLD | Анализ результатов</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter','Segoe UI',sans-serif;background:#f5f5f5;color:#1a2c3e;padding:1.5rem;transition:all .3s}
        body.dark-mode{background:#0a0e1a;color:#e0e4f0}
        body.dark-mode .card,body.dark-mode .kpi-card,body.dark-mode .chart-card,body.dark-mode .filter-bar{background:#111827;border:1px solid #1f2a40;box-shadow:0 0 10px rgba(255,255,255,.05)}
        body.dark-mode .stats-table th{color:#9ca3af}
        body.dark-mode .stats-table td{border-bottom-color:#1f2a40}
        body.dark-mode .form-control,body.dark-mode .form-select{background:#2d2d2d;color:#e0e4f0;border-color:#444}
        .container{max-width:1400px;margin:0 auto}
        .card{background:#fff;border-radius:24px;padding:1.5rem;margin-bottom:1.5rem;box-shadow:0 8px 20px rgba(0,0,0,.05);transition:transform .2s;border-top:4px solid #E30613}
        .card:hover{transform:translateY(-2px)}
        .card h1{color:#E30613;margin-bottom:.5rem;font-size:1.8rem}
        .card h3{color:#E30613;font-size:1.2rem;margin-bottom:1rem}
        .btn-brand{background:#E30613;color:#fff;border:none;padding:8px 20px;border-radius:40px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:8px;transition:all .2s}
        .btn-brand:hover{background:#c41c2a;transform:translateY(-2px)}
        .btn-outline-brand{background:transparent;border:1px solid #E30613;color:#E30613;padding:7px 19px;border-radius:40px;font-weight:600;cursor:pointer}
        .btn-outline-brand:hover{background:#E30613;color:#fff}
        .kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1.2rem;margin-bottom:1.5rem}
        .kpi-card{background:#fff;border-radius:20px;padding:1.2rem 1.5rem;box-shadow:0 4px 12px rgba(0,0,0,.04);border-left:4px solid #E30613;transition:all .2s}
        .kpi-card:hover{transform:translateY(-2px);box-shadow:0 12px 24px rgba(0,0,0,.08)}
        .kpi-label{font-size:.75rem;text-transform:uppercase;color:#7a95ae;margin-bottom:8px}
        .kpi-value{font-size:2.2rem;font-weight:800;color:#E30613;line-height:1}
        .charts-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(400px,1fr));gap:1.5rem;margin-bottom:1.5rem}
        .chart-card{background:#fff;border-radius:20px;padding:1.2rem;box-shadow:0 4px 12px rgba(0,0,0,.05);transition:all .2s}
        .chart-card:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(0,0,0,.08)}
        .chart-title{font-weight:600;margin-bottom:1rem;font-size:1rem;color:#E30613;border-bottom:2px solid #E30613;padding-bottom:5px;display:flex;align-items:center;gap:8px}
        canvas{max-height:250px;width:100%}
        .stats-table{width:100%;border-collapse:collapse}
        .stats-table th,.stats-table td{padding:10px 8px;text-align:left;border-bottom:1px solid #eee}
        .stats-table th{font-weight:600;color:#E30613;font-size:.8rem}
        .filter-bar{background:#fff;padding:15px;border-radius:16px;margin-bottom:20px;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
        .form-control,.form-select{border-radius:40px;border:1px solid #ddd;padding:8px 16px}
        .theme-toggle{position:fixed;bottom:20px;right:20px;background:#E30613;color:#fff;border:none;width:50px;height:50px;border-radius:50%;cursor:pointer;font-size:22px;z-index:1000}
        .theme-toggle:hover{transform:scale(1.1);background:#c41c2a}
        @media (max-width:768px){.charts-row{grid-template-columns:1fr}}
        @media print{.no-print{display:none!important}}
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap">
            <div><h1><i class="fas fa-gem"></i> 585GOLD | Анализ результатов</h1><p class="text-muted mb-0">Выберите тест для онлайн-мониторинга</p></div>
            <div class="no-print" style="display:flex;gap:10px;flex-wrap:wrap">
                <button class="btn-brand" id="copyReportBtn">📧 Копировать в Outlook</button>
                <button class="btn-brand" id="pdfReportBtn">📄 Скачать PDF</button>
                <button class="btn-brand" id="refreshBtn" style="background:#2c7da0">🔄 Обновить</button>
            </div>
        </div>
    </div>

    <div class="card no-print">
        <div style="display:flex;gap:15px;flex-wrap:wrap;align-items:center">
            <label class="fw-bold">📋 Выберите тест:</label>
            <select id="testSelector" class="form-select" style="width:auto;min-width:300px">
                <option value="">-- Загрузка тестов... --</option>
            </select>
            <span id="status" class="text-muted"></span>
        </div>
    </div>

    <div id="resultsArea" style="display:none">
        <div class="kpi-grid" id="kpi"></div>
        <div class="charts-row">
            <div class="chart-card"><div class="chart-title"><i class="fas fa-chart-bar"></i> Распределение баллов</div><canvas id="scoreChart"></canvas></div>
            <div class="chart-card"><div class="chart-title"><i class="fas fa-city"></i> Успеваемость по городам</div><canvas id="cityChart"></canvas></div>
            <div class="chart-card"><div class="chart-title"><i class="fas fa-chart-pie"></i> Ошибки по темам</div><canvas id="pieChart"></canvas></div>
        </div>
        <div class="card"><h3><i class="fas fa-building"></i> Статистика по городам</h3><table class="stats-table"><thead><tr><th>Город</th><th>Сотр.</th><th>Средний балл</th><th>Ошибок</th></tr></thead><tbody id="cityStatsBody"></tbody></table></div>
        <div class="card"><h3><i class="fas fa-trophy"></i> Лучшие сотрудники</h3><table class="stats-table"><thead><tr><th>#</th><th>Сотрудник</th><th>Город</th><th>Результат</th></tr></thead><tbody id="topEmployeesBody"></tbody></table></div>
        <div class="card"><h3><i class="fas fa-exclamation-triangle"></i> Частые ошибки</h3><table class="stats-table"><thead><td><th>#</th><th>Тема ошибки</th><th>Кол-во</th></tr></thead><tbody id="errorsBody"></tbody></table></div>
        <div class="filter-bar">
            <input type="text" id="searchInput" class="form-control" placeholder="🔍 Поиск по имени..." style="width:200px">
            <select id="cityFilter" class="form-select" style="width:150px"><option value="all">Все города</option></select>
            <button class="btn-brand" onclick="resetFilters()" style="background:#6c757d;padding:6px 16px">Сброс фильтров</button>
        </div>
        <div id="employeesList" class="card"></div>
    </div>
</div>
<button class="theme-toggle no-print" id="themeToggleBtn">🌙</button>

<script>
    const SUPABASE_URL = 'https://qtostraaqrnjbxiydlip.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_0GzJSuoAi5zc7pHkicHMNg_cQ-rGAX7';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    
    let currentData = [];
    let scoreChart = null, cityChart = null, pieChart = null;
    let currentSlug = null;
    let currentCityFilter = "all";
    
    const questionTopics = {
        1: "Установление контакта", 2: "Выявление потребностей", 3: "Дополнительная продажа",
        4: "Переориентация на золото", 5: "Футляр и уход", 6: "Возражение по цене",
        7: "Альтернатива/каталог", 8: "Презентация подарка", 9: "Дополнительные модели",
        10: "Яндекс Сплит", 11: "Инициатива в продажах"
    };
    
    function escapeHtml(s) { if (!s) return ''; return s.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;'); }
    
    async function loadTests() {
        const { data, error } = await sb.from('tests').select('slug, name');
        const selector = document.getElementById('testSelector');
        if (error) {
            selector.innerHTML = '<option value="">Ошибка загрузки</option>';
            document.getElementById('status').innerHTML = '❌ ' + error.message;
            return;
        }
        selector.innerHTML = '<option value="">-- Выберите тест --</option>';
        for (const test of data) {
            selector.innerHTML += `<option value="${test.slug}">${test.name}</option>`;
        }
        document.getElementById('status').innerHTML = `✅ Загружено ${data.length} тестов`;
    }
    
    async function loadResults() {
        const slug = document.getElementById('testSelector').value;
        if (!slug) { alert('Выберите тест'); return; }
        currentSlug = slug;
        document.getElementById('status').innerHTML = '🔄 Загрузка результатов...';
        
        const { data, error } = await sb.from('results').select('*').eq('test_type', slug);
        if (error) { alert('Ошибка: ' + error.message); return; }
        if (!data || data.length === 0) { alert('Нет результатов для этого теста'); return; }
        
        currentData = data.map(row => ({
            name: row.user_id || row.name || 'Сотрудник',
            city: row.city || 'Не указан',
            score: row.score || 0,
            total: row.total || 11
        }));
        
        document.getElementById('status').innerHTML = `✅ Загружено ${currentData.length} сотрудников. Обновлено: ${new Date().toLocaleTimeString()}`;
        document.getElementById('resultsArea').style.display = 'block';
        
        const cities = [...new Set(currentData.map(e => e.city).filter(c => c && c !== 'Не указан'))];
        const citySelect = document.getElementById('cityFilter');
        citySelect.innerHTML = '<option value="all">Все города</option>' + cities.map(c => `<option value="${c}">${c}</option>`).join('');
        
        renderAll();
    }
    
    function renderAll() {
        let filtered = currentCityFilter === "all" ? currentData : currentData.filter(e => e.city === currentCityFilter);
        const search = document.getElementById('searchInput')?.value.toLowerCase() || '';
        if (search) filtered = filtered.filter(e => e.name.toLowerCase().includes(search));
        
        const total = filtered.length;
        let sumScore = 0, excellent = 0, errors = 0;
        for (const e of filtered) {
            const p = (e.score / e.total) * 100;
            sumScore += p;
            if (p >= 80) excellent++;
            errors += (e.total - e.score);
        }
        const avg = total ? Math.round(sumScore / total) : 0;
        
        document.getElementById('kpi').innerHTML = `
            <div class="kpi-card"><div class="kpi-label">👥 Всего сотрудников</div><div class="kpi-value">${total}</div></div>
            <div class="kpi-card"><div class="kpi-label">📈 Средний балл</div><div class="kpi-value">${avg}%</div></div>
            <div class="kpi-card"><div class="kpi-label">⭐ Отлично (≥80%)</div><div class="kpi-value">${excellent}</div></div>
            <div class="kpi-card"><div class="kpi-label">❌ Всего ошибок</div><div class="kpi-value">${errors}</div></div>
        `;
        
        const scores = filtered.map(e => (e.score/e.total)*100);
        const cats = ['Отлично (80-100%)', 'Хорошо (60-79%)', 'Удовлетворительно (40-59%)', 'Плохо (0-39%)'];
        const dist = [
            scores.filter(s => s >= 80).length,
            scores.filter(s => s >= 60 && s < 80).length,
            scores.filter(s => s >= 40 && s < 60).length,
            scores.filter(s => s < 40).length
        ];
        if (scoreChart) scoreChart.destroy();
        scoreChart = new Chart(document.getElementById('scoreChart'), {
            type: 'bar', data: { labels: cats, datasets: [{ label: 'Количество', data: dist, backgroundColor: '#E30613', borderRadius: 8 }] },
            options: { responsive: true, maintainAspectRatio: true }
        });
        
        const cityMap = new Map();
        for (const e of filtered) {
            const city = e.city;
            const p = (e.score/e.total)*100;
            if (!cityMap.has(city)) cityMap.set(city, { sum: 0, count: 0, errors: 0 });
            const s = cityMap.get(city);
            s.sum += p;
            s.count++;
            s.errors += (e.total - e.score);
        }
        const cityData = Array.from(cityMap.entries()).map(([c, s]) => ({ city: c, count: s.count, avg: (s.sum/s.count).toFixed(0), errors: s.errors })).sort((a,b) => b.avg - a.avg);
        if (cityChart) cityChart.destroy();
        cityChart = new Chart(document.getElementById('cityChart'), {
            type: 'bar', data: { labels: cityData.map(c => c.city), datasets: [{ label: 'Средний балл (%)', data: cityData.map(c => c.avg), backgroundColor: '#E30613', borderRadius: 8 }] },
            options: { responsive: true, scales: { y: { min: 0, max: 100 } } }
        });
        document.getElementById('cityStatsBody').innerHTML = cityData.map((c, i) => `<tr><td style="padding:8px">${c.city}${i === 0 ? ' 🥇' : ''}</td><td style="padding:8px">${c.count}</td onclick="applyCityFilter('${c.city}')"></td><td style="padding:8px">${c.avg}%</td onclick="applyCityFilter('${c.city}')"></td><td style="padding:8px">${c.errors}</td耶`).join('');
        
        const top10 = [...filtered].sort((a,b) => (b.score/b.total) - (a.score/a.total)).slice(0, 10);
        document.getElementById('topEmployeesBody').innerHTML = top10.map((e, i) => `<tr><td style="padding:8px">${i+1}</td><td style="padding:8px"><strong>${e.name}</strong></td><td style="padding:8px">${e.city}</td onclick="applyCityFilter('${e.city}')"></td><td style="padding:8px">${e.score}/${e.total} (${Math.round(e.score/e.total*100)}%)</td耶`).join('');
        
        document.getElementById('errorsBody').innerHTML = '<tr><td colspan="3">Детальные ошибки доступны при загрузке Excel</td</tr>';
        if (pieChart) pieChart.destroy();
        pieChart = new Chart(document.getElementById('pieChart'), {
            type: 'pie', data: { labels: ['Нет детальных данных'], datasets: [{ data: [1], backgroundColor: ['#ccc'] }] },
            options: { responsive: true }
        });
        
        const employeesHtml = filtered.map(e => {
            const percent = Math.round(e.score/e.total*100);
            const color = percent >= 80 ? '🟢' : (percent >= 50 ? '🟡' : '🔴');
            return `<div style="padding: 8px; border-bottom: 1px solid #eee;">${color} <strong>${e.name}</strong> — ${e.score}/${e.total} (${percent}%) — ${e.city}</div>`;
        }).join('');
        document.getElementById('employeesList').innerHTML = `<h3><i class="fas fa-users"></i> Список сотрудников (${filtered.length})</h3>${employeesHtml || '<div>Нет данных</div>'}`;
    }
    
    function generateReport() {
        if (!currentData.length) { alert('Нет данных'); return; }
        const total = currentData.length;
        const avg = Math.round(currentData.reduce((s,e) => s + (e.score/e.total), 0) / total * 100);
        const excellent = currentData.filter(e => (e.score/e.total) >= 0.8).length;
        const errors = currentData.reduce((s,e) => s + (e.total - e.score), 0);
        const date = new Date().toLocaleDateString('ru-RU');
        let text = `📊 ОТЧЁТ ПО ТЕСТУ\n${'━'.repeat(60)}\n📅 Дата: ${date}\n\n📈 ОБЩАЯ СТАТИСТИКА\n${'━'.repeat(60)}\nВсего сотрудников: ${total}\nСредний балл: ${avg}%\nОтлично (≥80%): ${excellent}\nВсего ошибок: ${errors}\n\n📊 РАСПРЕДЕЛЕНИЕ БАЛЛОВ\n${'━'.repeat(60)}\n`;
        const scores = currentData.map(e => (e.score/e.total)*100);
        text += `Отлично (80-100%): ${scores.filter(s => s >= 80).length}\nХорошо (60-79%): ${scores.filter(s => s >= 60 && s < 80).length}\nУдовлетворительно (40-59%): ${scores.filter(s => s >= 40 && s < 60).length}\nПлохо (0-39%): ${scores.filter(s => s < 40).length}\n\n🏙️ СТАТИСТИКА ПО ГОРОДАМ\n${'━'.repeat(60)}\n`;
        const cityStats = {};
        for (const e of currentData) { const city = e.city; if (!cityStats[city]) cityStats[city] = { sum: 0, total: 0, count: 0, errors: 0 }; cityStats[city].sum += e.score; cityStats[city].total += e.total; cityStats[city].count++; cityStats[city].errors += e.total - e.score; }
        for (const [city, d] of Object.entries(cityStats)) { const avgCity = Math.round(d.sum / d.total * 100); text += `${city}: ${d.count} сотрудников, средний балл ${avgCity}%, ошибок ${d.errors}\n`; }
        text += `\n🔝 ЛУЧШИЕ СОТРУДНИКИ\n${'━'.repeat(60)}\n`;
        const top5 = [...currentData].sort((a,b) => (b.score/b.total) - (a.score/a.total)).slice(0,5);
        top5.forEach((e,i) => { const p = Math.round(e.score/e.total*100); text += `${i+1}. ${e.name} — ${e.score}/${e.total} (${p}%)\n`; });
        navigator.clipboard.writeText(text).then(() => alert('✅ Отчёт скопирован! Вставьте в Outlook (Ctrl+V)')).catch(() => alert('Ошибка копирования'));
    }
    
    function downloadPDF() {
        if (!currentData.length) { alert('Нет данных'); return; }
        html2pdf().set({margin:0.5,filename:`отчёт_${new Date().toISOString().slice(0,19)}.pdf`,image:{type:'jpeg',quality:0.98},html2canvas:{scale:2},jsPDF:{unit:'in',format:'a4',orientation:'portrait'}}).from(document.querySelector('.container')).save();
    }
    
    function resetFilters() {
        document.getElementById('searchInput').value = '';
        document.getElementById('cityFilter').value = 'all';
        currentCityFilter = 'all';
        renderAll();
    }
    function applyCityFilter(city) { document.getElementById('cityFilter').value = city; currentCityFilter = city; renderAll(); }
    
    let isDark = false;
    document.getElementById('themeToggleBtn').onclick = () => {
        isDark = !isDark;
        document.body.classList.toggle('dark-mode', isDark);
        document.getElementById('themeToggleBtn').innerHTML = isDark ? '☀️' : '🌙';
    };
    
    document.getElementById('testSelector').onchange = loadResults;
    document.getElementById('copyReportBtn').onclick = generateReport;
    document.getElementById('pdfReportBtn').onclick = downloadPDF;
    document.getElementById('refreshBtn').onclick = () => { if (currentSlug) loadResults(); };
    document.getElementById('searchInput').addEventListener('input', () => renderAll());
    document.getElementById('cityFilter').addEventListener('change', (e) => { currentCityFilter = e.target.value; renderAll(); });
    
    loadTests();
</script>
</body>
</html>
