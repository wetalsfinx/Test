<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Админка: Результаты тестов</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
<style>
body{background:#f5f7fa;font-family:sans-serif}
.card{margin-top:20px;border:none;box-shadow:0 4px 6px rgba(0,0,0,.1)}
.hidden{display:none!important}
.user-log{border-left:4px solid #0d6efd;padding:12px;background:#f8f9fa;margin-bottom:12px;border-radius:0 8px 8px 0;cursor:pointer}
.user-log:hover{background:#e9ecef}
.correct{color:#198754;font-weight:600}
.wrong{color:#dc3545;font-weight:600}
.score-badge{font-size:1.3em;padding:8px 20px}
.online-badge{position:fixed;top:10px;right:10px;background:#28a745;color:white;padding:5px 10px;border-radius:20px;font-size:12px;z-index:1000}
.splash-screen{position:fixed;top:0;left:0;right:0;bottom:0;background:#f5f7fa;display:flex;justify-content:center;align-items:center;z-index:10000}
.splash-spinner{width:50px;height:50px;border:4px solid #e9ecef;border-top-color:#0d6efd;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.answer-details{display:none;margin-top:10px;padding-top:10px;border-top:1px solid #dee2e6}
.answer-details.show{display:block}
.stats-card{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white;border-radius:10px;padding:15px;margin-bottom:15px}
.filter-bar{background:white;padding:15px;border-radius:10px;margin-bottom:20px;box-shadow:0 2px 4px rgba(0,0,0,.05)}
.user-name{font-weight:bold;font-size:1.1em}
.user-city{font-size:0.85em;color:#6c757d;margin-left:8px}
.expand-icon{float:right;color:#6c757d;transition:transform 0.3s}
.user-log.expanded .expand-icon{transform:rotate(180deg)}
.chart-card{background:white;border-radius:10px;padding:15px;margin-bottom:20px;box-shadow:0 2px 4px rgba(0,0,0,.05)}
.chart-container{height:200px;position:relative}
.test-selector { background: white; border-radius: 12px; padding: 15px; margin-bottom: 20px; box-shadow: 0 2px 4px rgba(0,0,0,.05); }
.test-selector select { max-width: 300px; }
.export-buttons { display: flex; gap: 8px; }
@media (max-width: 768px) {
    .filter-bar .row { flex-direction: column; }
    .filter-bar .col-md-3, .filter-bar .col-md-2, .filter-bar .col-md-1 { width: 100%; margin-bottom: 10px; }
    .stats-card { margin-bottom: 15px; }
    .chart-card { margin-bottom: 20px; }
    .user-log { padding: 10px; }
    .user-log .d-flex { flex-direction: column; gap: 8px; }
    .user-log .d-flex .d-flex { flex-direction: row; justify-content: space-between; width: 100%; }
    .btn-sm { padding: 4px 8px; font-size: 11px; }
    .export-buttons { flex-wrap: wrap; }
}
</style>
</head>
<body>
<div id="splash" class="splash-screen">
    <div style="text-align:center"><div class="splash-spinner mx-auto mb-3"></div><p>Загрузка...</p></div>
</div>

<div class="online-badge" id="online-badge">🟢 Онлайн</div>
<div class="container mt-4"><div class="row justify-content-center"><div class="col-md-10">

<div id="admin-screen">
<div class="d-flex justify-content-between align-items-center mb-3">
    <h3>👨‍💼 Панель Администратора</h3>
    <div>
        <span id="realtime-status" class="badge bg-warning me-2">🔄</span>
        <a href="?" class="btn btn-outline-secondary btn-sm">← Выход</a>
    </div>
</div>

<!-- Выбор теста -->
<div class="test-selector">
    <div class="row align-items-center">
        <div class="col-md-4">
            <label class="form-label fw-bold mb-0">📋 Выберите тест</label>
        </div>
        <div class="col-md-5">
            <select id="testSelector" class="form-select">
                <option value="">Загрузка тестов...</option>
            </select>
        </div>
        <div class="col-md-3 text-end">
            <button class="btn btn-sm btn-outline-danger" onclick="deleteCurrentTest()" id="deleteTestBtn" style="display:none">
                <i class="bi bi-trash"></i> Удалить тест
            </button>
        </div>
    </div>
</div>

<!-- Блок результатов -->
<div id="resultsContainer" style="display:none">
    <div class="row mb-4">
        <div class="col-md-4"><div class="stats-card"><div class="d-flex justify-content-between"><div><div class="small">Всего прошло</div><div class="h3 mb-0" id="total-count">0</div></div><i class="bi bi-people fs-1"></i></div></div></div>
        <div class="col-md-4"><div class="stats-card" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);"><div class="d-flex justify-content-between"><div><div class="small">Средний балл</div><div class="h3 mb-0" id="avg-score">0%</div></div><i class="bi bi-graph-up fs-1"></i></div></div></div>
        <div class="col-md-4"><div class="stats-card" style="background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);"><div class="d-flex justify-content-between"><div><div class="small">Отлично (≥80%)</div><div class="h3 mb-0" id="excellent-count">0</div></div><i class="bi bi-star fs-1"></i></div></div></div>
    </div>
    <div class="row mb-4">
        <div class="col-md-6"><div class="chart-card"><h6><i class="bi bi-pie-chart"></i> Распределение баллов</h6><div class="chart-container"><canvas id="scoreChart"></canvas></div></div></div>
        <div class="col-md-6"><div class="chart-card"><h6><i class="bi bi-bar-chart"></i> Успеваемость по городам</h6><div class="chart-container"><canvas id="cityChart"></canvas></div></div></div>
    </div>
    <div class="filter-bar">
        <div class="row g-3">
            <div class="col-md-3"><input type="text" id="search-input" class="form-control" placeholder="🔍 Поиск по имени..."></div>
            <div class="col-md-2"><select id="city-filter" class="form-select"><option value="">Все города</option></select></div>
            <div class="col-md-2"><input type="date" id="date-from" class="form-control"></div>
            <div class="col-md-2"><input type="date" id="date-to" class="form-control"></div>
            <div class="col-md-2">
                <div class="export-buttons">
                    <button class="btn btn-sm btn-outline-success" onclick="exportToExcel()">📎 Экспорт</button>
                    <button class="btn btn-sm btn-outline-primary" onclick="exportDetailedToExcel()">📎 Детальный</button>
                </div>
            </div>
            <div class="col-md-1"><button class="btn btn-outline-secondary w-100" onclick="resetFilters()">Сброс</button></div>
        </div>
    </div>
    <div id="results-area"><div class="text-center py-4">⏳ Выберите тест</div></div>
</div>

</div>
</div></div></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL='https://qtostraaqrnjbxiydlip.supabase.co';
const SUPABASE_KEY='sb_publishable_0GzJSuoAi5zc7pHkicHMNg_cQ-rGAX7';
const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

let currentTest = null;
let currentResults = [];
let scoreChart = null;
let cityChart = null;

window.addEventListener('load', () => {
    setTimeout(() => { const splash = document.getElementById('splash'); if(splash) { splash.style.opacity = '0'; setTimeout(() => splash.style.display = 'none', 500); } }, 300);
    document.getElementById('splash').style.display = 'none';
    document.getElementById('admin-screen').classList.remove('hidden');
    loadTests();
    initRealtime();
    
    document.getElementById('search-input').addEventListener('input', () => renderResults());
    document.getElementById('city-filter').addEventListener('change', () => renderResults());
    document.getElementById('date-from').addEventListener('change', () => renderResults());
    document.getElementById('date-to').addEventListener('change', () => renderResults());
});

async function loadTests() {
    const { data, error } = await sb.from('tests').select('*').order('created_at', { ascending: false });
    const selector = document.getElementById('testSelector');
    
    if (error || !data || data.length === 0) {
        selector.innerHTML = '<option value="">Нет тестов</option>';
        return;
    }
    
    let options = '<option value="">-- Выберите тест --</option>';
    for (const test of data) {
        options += `<option value="${test.slug}" data-cities='${JSON.stringify(test.city_list || [])}'>${test.name} (${test.questions_count || '?'} вопросов)</option>`;
    }
    selector.innerHTML = options;
    
    selector.addEventListener('change', async (e) => {
        const slug = e.target.value;
        if (!slug) {
            currentTest = null;
            document.getElementById('resultsContainer').style.display = 'none';
            document.getElementById('deleteTestBtn').style.display = 'none';
            return;
        }
        const selectedOption = selector.options[selector.selectedIndex];
        const citiesJson = selectedOption.getAttribute('data-cities');
        currentTest = { slug, name: selectedOption.text, cities: JSON.parse(citiesJson || '[]') };
        
        const cityFilter = document.getElementById('city-filter');
        let cityOptions = '<option value="">Все города</option>';
        for (const city of currentTest.cities) {
            cityOptions += `<option value="${escapeHtml(city)}">${escapeHtml(city)}</option>`;
        }
        cityFilter.innerHTML = cityOptions;
        
        document.getElementById('deleteTestBtn').style.display = 'inline-block';
        await loadResults(slug);
        document.getElementById('resultsContainer').style.display = 'block';
    });
}

async function loadResults(slug) {
    const { data, error } = await sb.from('results').select('*').eq('test_type', slug).order('created_at', { ascending: false });
    currentResults = error ? [] : (data || []);
    renderResults();
}

function renderResults() {
    if (!currentTest) return;
    
    let filtered = [...currentResults];
    const search = document.getElementById('search-input')?.value.toLowerCase() || '';
    const cityF = document.getElementById('city-filter')?.value || '';
    const dateFrom = document.getElementById('date-from')?.value;
    const dateTo = document.getElementById('date-to')?.value;
    
    if(search) filtered = filtered.filter(r => r.user_id.toLowerCase().includes(search));
    if(cityF) filtered = filtered.filter(r => r.city && r.city === cityF);
    if(dateFrom) { const d = new Date(dateFrom); d.setHours(0,0,0,0); filtered = filtered.filter(r => new Date(r.created_at) >= d); }
    if(dateTo) { const d = new Date(dateTo); d.setHours(23,59,59,999); filtered = filtered.filter(r => new Date(r.created_at) <= d); }
    
    const total = currentResults.length;
    if(total > 0) {
        const avg = Math.round(currentResults.reduce((s,r)=>s+(r.score/r.total),0)/total*100);
        const excellent = currentResults.filter(r=>(r.score/r.total)>=0.8).length;
        document.getElementById('total-count').innerText = total;
        document.getElementById('avg-score').innerText = `${avg}%`;
        document.getElementById('excellent-count').innerText = excellent;
    }
    
    const area = document.getElementById('results-area');
    if(!filtered.length) { area.innerHTML='<div class="text-center py-4 text-muted">📭 Нет результатов</div>'; updateCharts(); return; }
    
    area.innerHTML = '';
    filtered.forEach((r, idx) => {
        const p = Math.round(r.score/r.total*100);
        let details = '';
        if(r.answers) r.answers.forEach((a,i) => {
            const ok = a.isCorrect === true || a.ok === true;
            details += `<div class="small mb-2"><strong>В${i+1}:</strong> ${ok?'✅':'❌'} <span class="${ok?'correct':'wrong'}">${ok?'Верно':'Неверно'}</span>${!ok?`<div class="text-muted ms-3">✖ ${a.selected || a.sel}<br>✔ ${a.correct || a.cor}</div>`:''}</div>`;
        });
        const clr = p>=80?'success':p>=50?'warning':'danger';
        area.innerHTML += `<div class="user-log" onclick="if(event.target.tagName!=='BUTTON') this.querySelector('.answer-details').classList.toggle('show'); this.classList.toggle('expanded')">
            <div class="d-flex justify-content-between align-items-start">
                <div><span class="user-name">${escapeHtml(r.surname||'')} ${escapeHtml(r.name||'')}</span><span class="user-city">📍 ${escapeHtml(r.city||'не указан')}</span><span class="badge bg-${clr} ms-2">${r.score}/${r.total} (${p}%)</span></div>
                <div class="d-flex align-items-center gap-2">
                    <small>${new Date(r.created_at).toLocaleString()}</small>
                    <button class="btn btn-sm btn-outline-primary" onclick="event.stopPropagation(); generateUserReport('${r.id}')" style="padding:2px 8px"><i class="bi bi-file-text"></i></button>
                    <button class="btn btn-sm btn-outline-danger" onclick="event.stopPropagation(); deleteResult('${r.id}')" style="padding:2px 8px"><i class="bi bi-trash"></i></button>
                    <i class="bi bi-chevron-down expand-icon ms-2"></i>
                </div>
            </div>
            <div class="answer-details mt-2"><div class="bg-light p-2 rounded">${details}</div></div>
        </div>`;
    });
    updateCharts();
}

async function deleteResult(resultId) {
    if(!confirm('Удалить этот результат?')) return;
    await sb.from('results').delete().eq('id', resultId);
    await loadResults(currentTest.slug);
}

async function deleteCurrentTest() {
    if(!currentTest) return;
    if(!confirm(`Удалить тест "${currentTest.name}" и все результаты?`)) return;
    await sb.from('results').delete().eq('test_type', currentTest.slug);
    await sb.from('tests').delete().eq('slug', currentTest.slug);
    alert('Тест удалён');
    await loadTests();
    document.getElementById('resultsContainer').style.display = 'none';
    currentTest = null;
    document.getElementById('deleteTestBtn').style.display = 'none';
}

function resetFilters() {
    document.getElementById('search-input').value = '';
    document.getElementById('city-filter').value = '';
    document.getElementById('date-from').value = '';
    document.getElementById('date-to').value = '';
    renderResults();
}

function updateCharts() {
    if(!currentResults.length) return;
    
    const cats = {'Отлично (80-100%)':0, 'Хорошо (60-79%)':0, 'Удовлетворительно (40-59%)':0, 'Плохо (0-39%)':0};
    currentResults.forEach(r => { let p = r.score/r.total*100; if(p>=80) cats['Отлично (80-100%)']++; else if(p>=60) cats['Хорошо (60-79%)']++; else if(p>=40) cats['Удовлетворительно (40-59%)']++; else cats['Плохо (0-39%)']++; });
    const ctx1 = document.getElementById('scoreChart');
    if(ctx1){ if(scoreChart) scoreChart.destroy(); scoreChart = new Chart(ctx1, {type:'pie', data:{labels:Object.keys(cats), datasets:[{data:Object.values(cats), backgroundColor:['#28a745','#17a2b8','#ffc107','#dc3545']}]}, options:{responsive:true}}); }
    
    const cityStats = {};
    currentResults.forEach(r => { let city = r.city||'Не указан'; if(!cityStats[city]) cityStats[city]={total:0,count:0}; cityStats[city].total+=r.score/r.total; cityStats[city].count++; });
    const cities = Object.keys(cityStats);
    const avgScores = cities.map(c=>Math.round(cityStats[c].total/cityStats[c].count*100));
    const ctx2 = document.getElementById('cityChart');
    if(ctx2){ if(cityChart) cityChart.destroy(); cityChart = new Chart(ctx2, {type:'bar', data:{labels:cities, datasets:[{label:'Средний балл (%)', data:avgScores, backgroundColor:'#667eea'}]}, options:{responsive:true, scales:{y:{min:0,max:100}}}}); }
}

function generateUserReport(resultId) {
    const userData = currentResults.find(r => r.id == resultId);
    if(!userData) return;
    const fullName = `${userData.surname || ''} ${userData.name || ''}`.trim();
    const percent = Math.round(userData.score / userData.total * 100);
    let answersHtml = '';
    if(userData.answers) {
        userData.answers.forEach((a, i) => {
            const isCorrect = a.isCorrect === true || a.ok === true;
            if (!isCorrect) {
                answersHtml += `<div style="margin-bottom:15px;padding:12px;background:#ffebee;border-radius:8px">
                    <strong>❌ Вопрос ${i+1}</strong><br>
                    <div><strong>Ваш ответ:</strong> ${escapeHtml(a.selected || a.sel)}</div>
                    <div><strong>Правильный ответ:</strong> ${escapeHtml(a.correct || a.cor)}</div>
                </div>`;
            }
        });
    }
    const win = window.open('', '_blank');
    win.document.write(`
        <!DOCTYPE html>
        <html>
        <head><meta charset="UTF-8"><title>Отчёт: ${fullName}</title>
        <style>body{font-family:Arial;padding:20px}</style>
        </head>
        <body>
            <h1>📊 Отчёт по тесту</h1>
            <p><strong>Сотрудник:</strong> ${fullName}</p>
            <p><strong>Город:</strong> ${userData.city || 'не указан'}</p>
            <p><strong>Результат:</strong> ${userData.score} из ${userData.total} (${percent}%)</p>
            <h3>Разбор ошибок:</h3>
            ${answersHtml || '<p>✅ Нет ошибок</p>'}
            <p style="margin-top:30px;font-size:12px;color:#999;">Отчёт сгенерирован автоматически</p>
        </body>
        </html>
    `);
    win.document.close();
}

// ========== ЭКСПОРТ ==========
// ========== ЭКСПОРТ ==========
function exportToExcel() {
    if (!currentResults.length) return alert("Нет данных");
    
    try {
        const data = currentResults.map(r => ({
            'ФИО': `${r.surname || ''} ${r.name || ''}`.trim(),
            'Город': r.city || '',
            'Баллы': `${r.score}/${r.total}`,
            'Процент': `${Math.round(r.score / r.total * 100)}%`,
            'Дата': new Date(r.created_at).toLocaleString()
        }));
        
        // Обрезаем название листа до 31 символа
        let sheetName = currentTest?.name || 'Результаты';
        if (sheetName.length > 31) sheetName = sheetName.substring(0, 28) + '...';
        
        const ws = XLSX.utils.json_to_sheet(data);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, sheetName);
        XLSX.writeFile(wb, `${sheetName}_${new Date().toLocaleDateString()}.xlsx`);
    } catch(e) {
        console.error('Ошибка экспорта:', e);
        alert('Ошибка при экспорте');
    }
}

function exportDetailedToExcel() {
    if (!currentResults.length) return alert("Нет данных");
    
    try {
        const excelData = [];
        for (const r of currentResults) {
            const row = {
                'ФИО': `${r.surname || ''} ${r.name || ''}`.trim(),
                'Город': r.city || '',
                'Баллы': `${r.score}/${r.total}`,
                'Процент': `${Math.round(r.score / r.total * 100)}%`,
                'Дата': new Date(r.created_at).toLocaleString()
            };
            
            if (r.answers && r.answers.length > 0) {
                for (let i = 0; i < r.answers.length; i++) {
                    const a = r.answers[i];
                    row[`Вопрос ${i+1}`] = (a.question || a.qs || '').substring(0, 200);
                    row[`Ответ сотрудника ${i+1}`] = (a.selected || a.sel || '').substring(0, 200);
                    row[`Правильный ответ ${i+1}`] = (a.correct || a.cor || '').substring(0, 200);
                    row[`Результат ${i+1}`] = (a.isCorrect === true || a.ok === true) ? 'Верно' : 'Ошибка';
                }
            }
            excelData.push(row);
        }
        
        // Обрезаем название листа до 31 символа
        let sheetName = currentTest?.name || 'Детальные';
        if (sheetName.length > 31) sheetName = sheetName.substring(0, 28) + '...';
        
        const ws = XLSX.utils.json_to_sheet(excelData);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, sheetName);
        XLSX.writeFile(wb, `${sheetName}_детальный_${new Date().toLocaleDateString()}.xlsx`);
    } catch(e) {
        console.error('Ошибка детального экспорта:', e);
        alert('Ошибка при экспорте');
    }
}

function initRealtime() {
    sb.channel('results-channel').on('postgres_changes', {event:'INSERT', schema:'public', table:'results'}, payload => {
        if (currentTest && payload.new.test_type === currentTest.slug) {
            currentResults.unshift(payload.new);
            renderResults();
        }
    }).subscribe();
    document.getElementById('realtime-status').innerHTML = '🟢 Live';
    document.getElementById('realtime-status').className = 'badge bg-success';
}

function escapeHtml(s){ if(!s) return ''; return s.replace(/[&<>]/g, m=>m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); }
</script>
</body>
</html>
