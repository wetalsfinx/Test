<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест: Стандарты продаж | 585GOLD</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <style>
        body { background: #f5f7fa; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .card { margin-top: 20px; border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .hidden { display: none !important; }
        .btn-answer { text-align: left; white-space: normal; padding: 12px 16px; margin-bottom: 8px; }
        .score-badge { font-size: 1.3em; padding: 8px 20px; }
        .upload-area { border: 2px dashed #E30613; border-radius: 10px; padding: 30px; text-align: center; cursor: pointer; transition: all 0.3s; background: white; margin-bottom: 20px; }
        .upload-area:hover { background: #f8f9fa; }
        .btn-primary { background: #E30613; border: none; }
        .btn-primary:hover { background: #c41c2a; }
    </style>
</head>
<body>
<div class="container">

    <!-- Экран загрузки JSON -->
    <div id="load-screen">
        <div class="card p-5 shadow text-center">
            <h2 class="mb-3" style="color:#E30613;">📋 Загрузите тест</h2>
            <p class="text-muted">Выберите JSON-файл, созданный в конструкторе тестов</p>
            <div class="upload-area" id="jsonUploadArea" onclick="document.getElementById('jsonFileInput').click()">
                <i class="bi bi-filetype-json fs-1"></i>
                <p class="mt-2">Нажмите или перетащите JSON-файл</p>
                <input type="file" id="jsonFileInput" accept=".json" style="display:none">
            </div>
            <div id="loadError" class="text-danger mt-2"></div>
        </div>
    </div>

    <!-- Экран регистрации -->
    <div id="login-screen" class="hidden">
        <div class="card p-4 shadow">
            <h2 class="text-center mb-3" style="color:#E30613;">📊 <span id="testName"></span></h2>
            <p class="text-center text-muted">Заполните данные для начала</p>
            <div class="mb-3"><label class="form-label fw-bold">Имя</label><input type="text" id="name-input" class="form-control form-control-lg"></div>
            <div class="mb-3"><label class="form-label fw-bold">Фамилия</label><input type="text" id="surname-input" class="form-control form-control-lg"></div>
            <div class="mb-3"><label class="form-label fw-bold">Город работы</label>
                <select id="city-select" class="form-select form-select-lg">
                    <option value="">-- Выберите город --</option>
                </select>
            </div>
            <button onclick="startQuiz()" class="btn btn-primary w-100 btn-lg">▶ Начать тест</button>
        </div>
    </div>

    <!-- Экран тестирования -->
    <div id="quiz-screen" class="hidden">
        <div class="card p-4 shadow">
            <div class="d-flex justify-content-between mb-3">
                <span class="text-muted small" id="user-display"></span>
                <span class="badge bg-primary fs-6" id="progress-badge">Вопрос 1 из ?</span>
            </div>
            <h4 id="question-text" class="mb-4 fw-normal">Загрузка...</h4>
            <div id="options-area" class="d-grid gap-2"></div>
        </div>
    </div>

    <!-- Экран результатов -->
    <div id="result-screen" class="hidden">
        <div class="card p-5 shadow text-center">
            <h1 class="mb-3">🎉 Готово!</h1>
            <div class="mb-4"><span id="final-score" class="badge bg-success score-badge"></span></div>
            <p class="text-muted">Спасибо за прохождение теста!</p>
            <button onclick="location.reload()" class="btn btn-outline-primary">Пройти заново</button>
        </div>
    </div>

    <!-- Админ-панель -->
    <div id="admin-screen" class="hidden">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h3 style="color:#E30613;">👨💼 Панель Администратора</h3>
            <a href="?" class="btn btn-outline-secondary btn-sm">← Выход</a>
        </div>
        <div id="admin-panel" class="shadow-sm p-3 bg-white rounded">
            <h5 class="mb-3">📈 Результаты сотрудников</h5>
            <div id="results-area"><div class="text-center py-4 text-muted">⏳ Загрузка...</div></div>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ========== НАСТРОЙКИ SUPABASE ==========
const SUPABASE_URL = 'https://qtostraqrnjbxlydlip.supabase.co';
const SUPABASE_KEY = 'sb_publishable_0GzJSuoAi5zc7pHkicHMNg_cQ-rGAX7';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ========== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ==========
let currentQuestions = [];
let currentCities = [];
let step = 0, nm = "", sn = "", ct = "", answers = [], score = 0, shuffledQuestions = [];

// ========== ЗАГРУЗКА JSON ==========
document.getElementById('jsonFileInput').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;
    
    const reader = new FileReader();
    reader.onload = function(e) {
        try {
            const testData = JSON.parse(e.target.result);
            currentQuestions = testData.questions;
            currentCities = testData.cities || [];
            
            if (!currentQuestions || currentQuestions.length === 0) {
                throw new Error('Нет вопросов');
            }
            
            document.getElementById('testName').innerText = testData.name || 'Тест';
            
            // Заполняем выпадающий список городов
            const citySelect = document.getElementById('city-select');
            citySelect.innerHTML = '<option value="">-- Выберите город --</option>';
            currentCities.forEach(city => {
                citySelect.innerHTML += `<option value="${escapeHtml(city)}">${escapeHtml(city)}</option>`;
            });
            
            // Переход к экрану регистрации
            document.getElementById('load-screen').classList.add('hidden');
            document.getElementById('login-screen').classList.remove('hidden');
            
        } catch(err) {
            document.getElementById('loadError').innerText = 'Ошибка: неверный JSON-файл';
        }
    };
    reader.readAsText(file);
});

// Drag & drop для JSON
const jsonArea = document.getElementById('jsonUploadArea');
jsonArea.addEventListener('dragover', e => { e.preventDefault(); jsonArea.style.borderColor = '#0d6efd'; });
jsonArea.addEventListener('dragleave', e => { e.preventDefault(); jsonArea.style.borderColor = '#E30613'; });
jsonArea.addEventListener('drop', e => {
    e.preventDefault();
    jsonArea.style.borderColor = '#E30613';
    const file = e.dataTransfer.files[0];
    if (file && file.name.endsWith('.json')) {
        const reader = new FileReader();
        reader.onload = e => {
            try {
                const testData = JSON.parse(e.target.result);
                currentQuestions = testData.questions;
                currentCities = testData.cities || [];
                document.getElementById('testName').innerText = testData.name || 'Тест';
                const citySelect = document.getElementById('city-select');
                citySelect.innerHTML = '<option value="">-- Выберите город --</option>';
                currentCities.forEach(city => {
                    citySelect.innerHTML += `<option value="${escapeHtml(city)}">${escapeHtml(city)}</option>`;
                });
                document.getElementById('load-screen').classList.add('hidden');
                document.getElementById('login-screen').classList.remove('hidden');
            } catch(err) {
                document.getElementById('loadError').innerText = 'Ошибка: неверный JSON';
            }
        };
        reader.readAsText(file);
    } else {
        alert('Загрузите JSON-файл');
    }
});

// ========== ФУНКЦИИ ТЕСТА ==========
async function startQuiz() {
    nm = document.getElementById('name-input').value.trim();
    sn = document.getElementById('surname-input').value.trim();
    ct = document.getElementById('city-select').value;
    
    if (!nm || !sn || !ct) return alert("⚠️ Заполните все поля и выберите город!");
    
    const id = `${nm} ${sn} (${ct})`;
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('quiz-screen').classList.remove('hidden');
    document.getElementById('user-display').innerText = id;
    
    // Перемешиваем вопросы
    shuffledQuestions = [...currentQuestions];
    for (let i = shuffledQuestions.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffledQuestions[i], shuffledQuestions[j]] = [shuffledQuestions[j], shuffledQuestions[i]];
    }
    
    step = 0;
    score = 0;
    answers = [];
    
    saveToSupabase('logs', { user_id: id, action: '🟢 Начал тест' });
    renderQuestion();
}

function renderQuestion() {
    const q = shuffledQuestions[step];
    document.getElementById('question-text').innerHTML = `${step+1}. ${q.text}`;
    document.getElementById('progress-badge').innerHTML = `Вопрос ${step+1} из ${shuffledQuestions.length}`;
    
    const area = document.getElementById('options-area');
    area.innerHTML = '';
    
    // Перемешиваем варианты ответов
    const indices = [0, 1, 2, 3];
    for (let i = indices.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [indices[i], indices[j]] = [indices[j], indices[i]];
    }
    
    indices.forEach(idx => {
        const btn = document.createElement('button');
        btn.className = 'btn btn-outline-dark btn-answer w-100';
        const letter = String.fromCharCode(65 + idx);
        btn.innerHTML = `<strong>${letter}.</strong> ${escapeHtml(q.options[idx])}`;
        btn.onclick = () => handleAnswer(idx);
        area.appendChild(btn);
    });
}

async function handleAnswer(selectedIdx) {
    const btns = document.querySelectorAll('#options-area button');
    btns.forEach(btn => btn.style.pointerEvents = 'none');
    
    const q = shuffledQuestions[step];
    const isCorrect = (selectedIdx === q.correct);
    if (isCorrect) score++;
    
    const letterSelected = String.fromCharCode(65 + selectedIdx);
    const letterCorrect = String.fromCharCode(65 + q.correct);
    
    answers.push({
        num: step+1,
        text: q.text,
        selected: `${letterSelected}. ${q.options[selectedIdx]}`,
        correct: `${letterCorrect}. ${q.options[q.correct]}`,
        isCorrect: isCorrect
    });
    
    const userId = `${nm} ${sn} (${ct})`;
    saveToSupabase('logs', {
        user_id: userId,
        action: `В${step+1}: ${isCorrect ? '✅' : '❌'} ${letterSelected}`
    });
    
    step++;
    
    if (step < shuffledQuestions.length) {
        renderQuestion();
        setTimeout(() => {
            const newBtns = document.querySelectorAll('#options-area button');
            newBtns.forEach(btn => btn.style.pointerEvents = '');
        }, 100);
    } else {
        finishTest(userId);
    }
}

function finishTest(userId) {
    const percent = Math.round(score / shuffledQuestions.length * 100);
    
    const scoreSpan = document.getElementById('final-score');
    scoreSpan.innerText = `${score} из ${shuffledQuestions.length} (${percent}%)`;
    scoreSpan.className = `badge score-badge ${percent >= 80 ? 'bg-success' : (percent >= 50 ? 'bg-warning' : 'bg-danger')}`;
    
    document.getElementById('quiz-screen').classList.add('hidden');
    document.getElementById('result-screen').classList.remove('hidden');
    
    const resultData = {
        user_id: userId,
        name: nm,
        surname: sn,
        city: ct,
        score: score,
        total: shuffledQuestions.length,
        answers: answers,
        created_at: new Date().toISOString()
    };
    saveToSupabase('results', resultData);
    saveToSupabase('logs', { user_id: userId, action: `🏁 Завершил: ${score}/${shuffledQuestions.length}` });
}

// ========== ОТПРАВКА В SUPABASE (ФОН) ==========
function saveToSupabase(table, data) {
    sb.from(table).insert([data]).then(() => {}).catch(e => {
        console.error('Ошибка сохранения:', e);
        const pending = JSON.parse(localStorage.getItem('pending_saves') || '[]');
        pending.push({ table, data, timestamp: Date.now() });
        localStorage.setItem('pending_saves', JSON.stringify(pending));
    });
}

function retryPendingSaves() {
    const pending = JSON.parse(localStorage.getItem('pending_saves') || '[]');
    if (pending.length === 0) return;
    pending.forEach((item, index) => {
        sb.from(item.table).insert([item.data]).then(() => {
            pending.splice(index, 1);
            localStorage.setItem('pending_saves', JSON.stringify(pending));
        }).catch(() => {});
    });
}
setInterval(retryPendingSaves, 30000);

// ========== АДМИН-ПАНЕЛЬ ==========
const urlParams = new URLSearchParams(location.search);
if (urlParams.get('mode') === 'admin') {
    document.getElementById('load-screen').classList.add('hidden');
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('admin-screen').classList.remove('hidden');
    loadAdmin();
    setInterval(loadAdmin, 5000);
}

async function loadAdmin() {
    const area = document.getElementById('results-area');
    area.innerHTML = '<div class="text-center py-4 text-muted">⏳ Загрузка...</div>';
    
    try {
        const { data, error } = await sb.from('results').select('*').order('created_at', { ascending: false });
        
        if (error || !data || data.length === 0) {
            area.innerHTML = '<p class="text-muted text-center py-3">Пока нет результатов</p>';
            return;
        }
        
        area.innerHTML = '';
        data.forEach(r => {
            const percent = Math.round(r.score / r.total * 100);
            let answersHtml = '';
            if (r.answers && Array.isArray(r.answers)) {
                r.answers.forEach((a, i) => {
                    answersHtml += `<div class="small mb-2 ps-2"><strong>В${i+1}:</strong> ${a.isCorrect ? '✅' : '❌'} <span class="${a.isCorrect ? 'text-success' : 'text-danger'}">${a.isCorrect ? 'Верно' : 'Неверно'}</span>${!a.isCorrect ? `<div class="text-muted ms-3">Выбрано: ${a.selected}<br>Правильно: ${a.correct}</div>` : ''}</div>`;
                });
            }
            const color = percent >= 80 ? 'success' : (percent >= 50 ? 'warning' : 'danger');
            const date = new Date(r.created_at).toLocaleString('ru-RU');
            
            const div = document.createElement('div');
            div.className = 'border rounded p-3 mb-3';
            div.innerHTML = `<div class="d-flex justify-content-between align-items-start">
                <div><strong class="fs-5">${escapeHtml(r.user_id)}</strong><span class="badge bg-${color} ms-2">${r.score}/${r.total} (${percent}%)</span></div>
                <small class="text-muted">${date}</small>
            </div>
            <div class="mt-2"><small class="text-muted">📍 Город: ${escapeHtml(r.city)}</small></div>
            <div class="mt-2 border-top pt-2">${answersHtml}</div>`;
            area.appendChild(div);
        });
    } catch(e) {
        area.innerHTML = '<p class="text-muted text-center py-3">Ошибка загрузки</p>';
    }
}

function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
}
</script>
</body>
</html>
