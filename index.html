<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Тест: Стандарты Продаж</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
body{background:#f5f7fa;font-family:sans-serif}
.card{margin-top:20px;border:none;box-shadow:0 4px 6px rgba(0,0,0,.1)}
.hidden{display:none!important}
#admin-panel{background:#fff;padding:20px;border-radius:10px}
.user-log{border-left:4px solid #0d6efd;padding:12px;background:#f8f9fa;margin-bottom:12px;border-radius:0 8px 8px 0;cursor:pointer}
.user-log:hover{background:#e9ecef}
.correct{color:#198754;font-weight:600}
.wrong{color:#dc3545;font-weight:600}
.score-badge{font-size:1.3em;padding:8px 20px}
.btn-answer{text-align:left;white-space:normal}
.btn-answer.selected{background-color:#0d6efd;color:white;border-color:#0d6efd}
.btn-submit{font-size:1.1em;padding:12px;margin-top:15px}
.online-badge{position:fixed;top:10px;right:10px;background:#28a745;color:white;padding:5px 10px;border-radius:20px;font-size:12px;z-index:1000}
.splash-screen{position:fixed;top:0;left:0;right:0;bottom:0;background:#f5f7fa;display:flex;justify-content:center;align-items:center;z-index:10000}
.splash-spinner{width:50px;height:50px;border:4px solid #e9ecef;border-top-color:#0d6efd;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.answer-details{display:none;margin-top:10px;padding-top:10px;border-top:1px solid #dee2e6}
.answer-details.show{display:block}
.stats-card{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white;border-radius:10px;padding:15px;margin-bottom:15px}
.filter-bar{background:white;padding:15px;border-radius:10px;margin-bottom:20px;box-shadow:0 2px 4px rgba(0,0,0,.05)}
.user-name{font-weight:bold;font-size:1.1em}
.user-city{font-size:0.85em;color:#6c757d;margin-left:8px}
.expand-icon{float:right;color:#6c757d}
.user-log.expanded .expand-icon{transform:rotate(180deg)}
.modal-test .modal-dialog{max-width:800px}
.chart-card{background:white;border-radius:10px;padding:15px;margin-bottom:20px;box-shadow:0 2px 4px rgba(0,0,0,.05)}
.chart-container{height:200px;position:relative}
</style>
</head>
<body>
<div id="splash" class="splash-screen">
    <div style="text-align:center"><div class="splash-spinner mx-auto mb-3"></div><p>Загрузка...</p></div>
</div>

<div class="online-badge" id="online-badge">🟢 Онлайн</div>
<div class="container mt-4"><div class="row justify-content-center"><div class="col-md-10">

<div id="user-test-area">
    <div id="login-screen"><div class="card p-4 shadow">
    <h2 class="text-center mb-3">📊 Тест: Стандарты Продаж</h2>
    <p class="text-center text-muted">Заполните данные</p>
    <div class="mb-3"><input type="text" id="name-input" class="form-control form-control-lg" placeholder="Имя"></div>
    <div class="mb-3"><input type="text" id="surname-input" class="form-control form-control-lg" placeholder="Фамилия"></div>
    <div class="mb-3"><input type="text" id="city-input" class="form-control form-control-lg" placeholder="Город"></div>
    <button onclick="startQuiz()" class="btn btn-primary w-100 btn-lg">▶ Начать тест</button>
    </div></div>

    <div id="quiz-screen" class="hidden"><div class="card p-4 shadow">
    <div class="d-flex justify-content-between mb-3"><span id="user-display"></span><span class="badge bg-primary" id="progress-badge">Вопрос 1 из 7</span></div>
    <h4 id="question-text" class="mb-4"></h4>
    <div id="options-area" class="d-grid gap-2"></div>
    <button id="submit-btn" class="btn btn-primary btn-submit w-100 mt-3" disabled>📝 Ответить</button>
    </div></div>

    <div id="result-screen" class="hidden"><div class="card p-5 shadow text-center">
    <h1>🎉 Готово!</h1><div class="mb-4"><span id="final-score" class="badge bg-success score-badge"></span></div>
    <button onclick="location.reload()" class="btn btn-outline-primary">Пройти заново</button>
    </div></div>
</div>

<div id="admin-screen" class="hidden">
<div class="d-flex justify-content-between align-items-center mb-3">
    <h3>👨‍💼 Панель Администратора</h3>
    <div>
        <button class="btn btn-success me-2" onclick="exportToExcel()"><i class="bi bi-file-excel"></i> Экспорт</button>
        <button class="btn btn-primary me-2" onclick="openTestModal()"><i class="bi bi-play-circle"></i> Пройти тест</button>
        <span id="realtime-status" class="badge bg-warning">🔄</span>
        <a href="?" class="btn btn-outline-secondary btn-sm ms-2">← Выход</a>
    </div>
</div>

<div class="row mb-4">
    <div class="col-md-4"><div class="stats-card"><div class="d-flex justify-content-between"><div><div class="small">Всего прошло</div><div class="h3 mb-0" id="total-count">0</div></div><i class="bi bi-people fs-1"></i></div></div></div>
    <div class="col-md-4"><div class="stats-card" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);"><div class="d-flex justify-content-between"><div><div class="small">Средний балл</div><div class="h3 mb-0" id="avg-score">0%</div></div><i class="bi bi-graph-up fs-1"></i></div></div></div>
    <div class="col-md-4"><div class="stats-card" style="background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);"><div class="d-flex justify-content-between"><div><div class="small">Отлично (≥80%)</div><div class="h3 mb-0" id="excellent-count">0</div></div><i class="bi bi-star fs-1"></i></div></div></div>
</div>

<div class="row mb-4">
    <div class="col-md-6"><div class="chart-card"><h6><i class="bi bi-pie-chart"></i> Распределение баллов</h6><div class="chart-container"><canvas id="scoreDistributionChart"></canvas></div></div></div>
    <div class="col-md-6"><div class="chart-card"><h6><i class="bi bi-bar-chart"></i> Успеваемость по городам</h6><div class="chart-container"><canvas id="cityChart"></canvas></div></div></div>
</div>

<div class="filter-bar"><div class="row g-3">
    <div class="col-md-4"><input type="text" id="search-input" class="form-control" placeholder="🔍 Поиск..."></div>
    <div class="col-md-3"><input type="text" id="city-filter" class="form-control" placeholder="🏙️ Фильтр по городу"></div>
    <div class="col-md-3"><select id="sort-select" class="form-select"><option value="date-desc">📅 Сначала новые</option><option value="score-desc">⭐ Сначала высокий балл</option></select></div>
    <div class="col-md-2"><button class="btn btn-outline-secondary w-100" onclick="resetFilters()">Сброс</button></div>
</div></div>

<div id="admin-panel"><h5>Результаты <span id="results-count" class="badge bg-secondary"></span></h5><div id="results-area"><div class="text-center py-4">⏳ Загрузка...</div></div></div>
</div>
</div></div></div>

<div class="modal fade" id="testModal" tabindex="-1"><div class="modal-dialog modal-test"><div class="modal-content"><div class="modal-header"><h5>📊 Тест</h5><button class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body" id="modal-body"></div></div></div></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
<script>
const SUPABASE_URL='https://qtostraaqrnjbxiydlip.supabase.co';
const SUPABASE_KEY='sb_publishable_0GzJSuoAi5zc7pHkicHMNg_cQ-rGAX7';
const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

const questions = [
    {text:"Клиент ищет советское украшение, которого нет в ассортименте. Вы предложили альтернативу в ретро-стиле — не понравилось. Согласно технике переориентации, что делаете ДАЛЬШЕ?", options:["Предлагаете самые бюджетные аналоги — возможно, дело в цене","Показываете электронный каталог с изделиями на заказ в похожем стиле","Говорите, что советских украшений больше не будет, и завершаете диалог","Предлагаете отложить визит до поступления новой винтажной коллекции"], correct:1},
    {text:"Клиент сказал «Я подумаю» после примерки кольца за 45 000 ₽. Вы выяснили, что сомнение в цене. Согласно иерархии работы с возражениями, что предлагаете В ПЕРВУЮ ОЧЕРЕДЬ?", options:["Более бюджетный вариант за 25 000 ₽","Рассрочку или Яндекс Сплит, не меняя изделие","Отложить изделие на 24 часа для принятия решения","Дополнительную скидку через руководителя"], correct:1},
    {text:"Клиент из ломбарда рассматривает витрину 40 секунд, не подходит к консультанту. Согласно стандарту работы с трафиком, каково ваше следующее действие?", options:["Ждёте ещё 20 секунд — если не подойдёт сам, значит, не заинтересован","Сразу подходите с вопросом о потребностях, как с любым потенциальным покупателем","Сначала наблюдаете, к какой категории изделий тяготеет взгляд, затем подходите с предложением из этой категории","Не подходите — клиенты из ломбарда приходят по другим вопросам, это нецелевой трафик"], correct:1},
    {text:"Клиент купил кольцо, вы предложили серьги — отказался. Согласно стандарту завершения сделки, что вы делаете ДАЛЬШЕ?", options:["Завершаете продажу, провожаете с теплотой","Предлагаете каталог на заказ — возможно, там найдутся серьги, которые понравятся","Предлагаете футляр и чистящее средство, затем завершаете сделку","Спрашиваете причину отказа, чтобы отработать возражение"], correct:2},
    {text:"Как правильно предложить футляр и чистящее средство?", options:["Спросить: «Футляр нужен?»","Предложить как опцию после оплаты","Сказать: «Давайте добавим футляр и средство по уходу за изделиями. Выбирайте!»","Показать только если клиент спросит об уходе"], correct:2},
    {text:"Клиент говорит: «Дорого». Согласно нашей методике, как правильно отработать это возражение?", options:["«У нас есть изделия дешевле, давайте посмотрим»","«Это цена за качество, вы же хотите хорошее украшение?»","«Понимаю. Обратите внимание на чистоту камня и гарантию — это вложение на годы»","«Можем оформить рассрочку, это решит проблему»"], correct:2},
    {text:"Клиентка выбирает цепочку, вы показали 3 варианта в рамках бюджета. Она говорит: «Все красивые, не знаю, что выбрать». Согласно технике «Альтернативный выбор», как вы помогаете принять решение?", options:["«Давайте я выберу за вас — я эксперт, мне виднее»","«Выберите ту, которая больше откликается — все варианты достойные»","«Давайте сузим выбор: вы хотите цепочку для кулона или как самостоятельное украшение?»","«Возьмите обе — одна для повседневной носки, вторая для особых случаев»"], correct:2}
];

let allResults = [];
let scoreChart = null, cityChart = null;

window.addEventListener('load', () => {
    setTimeout(() => {
        const splash = document.getElementById('splash');
        if(splash) { splash.style.opacity = '0'; setTimeout(() => splash.style.display = 'none', 500); }
    }, 300);
});

const urlParams = new URLSearchParams(location.search);
if(urlParams.get('mode') === 'admin'){
    document.getElementById('splash').style.display = 'none';
    document.getElementById('user-test-area').classList.add('hidden');
    document.getElementById('admin-screen').classList.remove('hidden');
    loadAdmin();
    initRealtime();
}

function saveToSupabase(table, data) { 
    sb.from(table).insert(data).then(() => {}).catch(e => console.error(e));
}

// ========== ОСНОВНОЙ ТЕСТ ==========
let quizStep=0, quizNm="", quizSn="", quizCt="", quizAns=[], quizSc=0, quizQs=[], quizSelected=null, quizCorrect=null;

function startQuiz(){
    quizNm=document.getElementById('name-input').value.trim();
    quizSn=document.getElementById('surname-input').value.trim();
    quizCt=document.getElementById('city-input').value.trim();
    if(!quizNm||!quizSn||!quizCt) return alert("Заполните все поля!");
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('quiz-screen').classList.remove('hidden');
    document.getElementById('user-display').innerHTML = `${quizNm} ${quizSn} (${quizCt})`;
    quizQs = [...questions];
    quizStep=0; quizSc=0; quizAns=[]; quizSelected=null;
    renderQuiz();
}

function renderQuiz(){
    if(quizStep >= questions.length) {
        finishQuiz();
        return;
    }
    const q = quizQs[quizStep];
    quizCorrect = q.correct;
    document.getElementById('question-text').innerHTML = `${quizStep+1}. ${q.text}`;
    document.getElementById('progress-badge').innerHTML = `Вопрос ${quizStep+1} из ${questions.length}`;
    const area = document.getElementById('options-area');
    area.innerHTML = '';
    quizSelected = null;
    document.getElementById('submit-btn').disabled = true;
    
    for(let i=0; i<q.options.length; i++){
        const btn = document.createElement('button');
        btn.className = 'btn btn-outline-dark btn-answer p-3 m-1';
        btn.innerHTML = q.options[i];
        btn.onclick = () => {
            document.querySelectorAll('#options-area button').forEach(b=>b.classList.remove('selected'));
            btn.classList.add('selected');
            quizSelected = i;
            document.getElementById('submit-btn').disabled = false;
        };
        area.appendChild(btn);
    }
}

function submitQuizAnswer(){
    if(quizSelected === null) {
        alert('Выберите вариант ответа');
        return;
    }
    
    const ok = (quizSelected === quizCorrect);
    if(ok) quizSc++;
    quizAns.push({
        n: quizStep + 1,
        sel: quizQs[quizStep].options[quizSelected],
        cor: quizQs[quizStep].options[quizCorrect],
        ok: ok
    });
    
    quizStep++;
    
    if(quizStep < questions.length) {
        renderQuiz();
    } else {
        finishQuiz();
    }
}

function finishQuiz(){
    const userId = `${quizNm} ${quizSn} (${quizCt})`;
    const percent = Math.round(quizSc/questions.length*100);
    
    saveToSupabase('results', {
        user_id: userId,
        name: quizNm,
        surname: quizSn,
        city: quizCt,
        score: quizSc,
        total: questions.length,
        test_type: "test1",
        test_name: "Стандарты продаж",
        answers: quizAns,
        created_at: new Date().toISOString()
    });
    
    document.getElementById('quiz-screen').classList.add('hidden');
    document.getElementById('result-screen').classList.remove('hidden');
    const el = document.getElementById('final-score');
    el.innerHTML = `${quizSc} из ${questions.length} (${percent}%)`;
    if(percent>=80) el.className='badge bg-success score-badge';
    else if(percent>=50) el.className='badge bg-warning score-badge';
    else el.className='badge bg-danger score-badge';
}

document.getElementById('submit-btn').onclick = submitQuizAnswer;

// ========== АДМИНКА ==========
function exportToExcel(){
    if(!allResults.length) return alert("Нет данных");
    const data = allResults.map(r => ({
        'ФИО': `${r.surname||''} ${r.name||''}`.trim(),
        'Город': r.city||'',
        'Баллы': `${r.score}/${r.total}`,
        'Процент': `${Math.round(r.score/r.total*100)}%`,
        'Дата': new Date(r.created_at).toLocaleString()
    }));
    const ws = XLSX.utils.json_to_sheet(data);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Результаты');
    XLSX.writeFile(wb, `результаты_${new Date().toLocaleDateString()}.xlsx`);
}

function renderResults(){
    const area = document.getElementById('results-area');
    if(!area) return;
    let filtered = [...allResults];
    const search = document.getElementById('search-input')?.value.toLowerCase() || '';
    const cityF = document.getElementById('city-filter')?.value.toLowerCase() || '';
    if(search) filtered = filtered.filter(r => r.user_id.toLowerCase().includes(search));
    if(cityF) filtered = filtered.filter(r => r.city && r.city.toLowerCase().includes(cityF));
    const sortBy = document.getElementById('sort-select')?.value || 'date-desc';
    filtered.sort((a,b) => sortBy==='date-desc' ? new Date(b.created_at)-new Date(a.created_at) : (b.score/b.total)-(a.score/a.total));
    
    if(!filtered.length) { area.innerHTML='<div class="text-center py-4">📭 Нет результатов</div>'; document.getElementById('results-count').innerText='0'; return; }
    
    area.innerHTML = '';
    filtered.forEach((r, idx) => {
        const p = Math.round(r.score/r.total*100);
        let details = '';
        if(r.answers) r.answers.forEach((a,i) => {
            const ok = a.ok===true;
            details += `<div class="small mb-2"><strong>В${i+1}:</strong> ${ok?'✅':'❌'} <span class="${ok?'correct':'wrong'}">${ok?'Верно':'Неверно'}</span>${!ok?`<div class="text-muted ms-3">✖ ${a.sel}<br>✔ ${a.cor}</div>`:''}</div>`;
        });
        const clr = p>=80?'success':p>=50?'warning':'danger';
        area.innerHTML += `<div class="user-log" onclick="this.querySelector('.answer-details').classList.toggle('show'); this.classList.toggle('expanded')">
            <div class="d-flex justify-content-between"><div><span class="user-name">${escapeHtml(r.surname||'')} ${escapeHtml(r.name||'')}</span><span class="user-city">📍 ${escapeHtml(r.city||'не указан')}</span><span class="badge bg-${clr} ms-2">${r.score}/${r.total} (${p}%)</span></div><div><small>${new Date(r.created_at).toLocaleString()}</small><i class="bi bi-chevron-down expand-icon ms-2"></i></div></div>
            <div class="answer-details mt-2"><div class="bg-light p-2 rounded">${details}</div></div>
        </div>`;
    });
    document.getElementById('results-count').innerText = filtered.length;
    
    const total = allResults.length;
    if(total){
        const avg = Math.round(allResults.reduce((s,r)=>s+(r.score/r.total),0)/total*100);
        const excellent = allResults.filter(r=>(r.score/r.total)>=0.8).length;
        document.getElementById('total-count').innerText = total;
        document.getElementById('avg-score').innerText = `${avg}%`;
        document.getElementById('excellent-count').innerText = excellent;
    }
    updateCharts();
}

function updateCharts(){
    if(!allResults.length) return;
    const cats = {'Отлично (80-100%)':0, 'Хорошо (60-79%)':0, 'Удовлетворительно (40-59%)':0, 'Плохо (0-39%)':0};
    allResults.forEach(r => { let p = r.score/r.total*100; if(p>=80) cats['Отлично (80-100%)']++; else if(p>=60) cats['Хорошо (60-79%)']++; else if(p>=40) cats['Удовлетворительно (40-59%)']++; else cats['Плохо (0-39%)']++; });
    const ctx1 = document.getElementById('scoreDistributionChart');
    if(ctx1){ if(scoreChart) scoreChart.destroy(); scoreChart = new Chart(ctx1, {type:'pie', data:{labels:Object.keys(cats), datasets:[{data:Object.values(cats), backgroundColor:['#28a745','#17a2b8','#ffc107','#dc3545']}]}, options:{responsive:true}}); }
    
    const cityStats = {};
    allResults.forEach(r => { let city = r.city||'Не указан'; if(!cityStats[city]) cityStats[city]={total:0,count:0}; cityStats[city].total+=r.score/r.total; cityStats[city].count++; });
    const cities = Object.keys(cityStats);
    const avgScores = cities.map(c=>Math.round(cityStats[c].total/cityStats[c].count*100));
    const ctx2 = document.getElementById('cityChart');
    if(ctx2){ if(cityChart) cityChart.destroy(); cityChart = new Chart(ctx2, {type:'bar', data:{labels:cities, datasets:[{label:'Средний балл (%)', data:avgScores, backgroundColor:'#667eea'}]}, options:{responsive:true, scales:{y:{min:0,max:100}}}}); }
}

function resetFilters(){
    document.getElementById('search-input').value = '';
    document.getElementById('city-filter').value = '';
    document.getElementById('sort-select').value = 'date-desc';
    renderResults();
}

function escapeHtml(s){ if(!s) return ''; return s.replace(/[&<>]/g, m=>m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); }

async function loadAdmin(){
    const {data} = await sb.from('results').select('*').order('created_at',{ascending:false});
    if(data) { allResults = data; renderResults(); }
}

function initRealtime(){
    sb.channel('results-channel').on('postgres_changes', {event:'INSERT', schema:'public', table:'results'}, payload => { allResults.unshift(payload.new); renderResults(); }).subscribe();
    document.getElementById('realtime-status').innerHTML = '🟢 Live';
    document.getElementById('realtime-status').className = 'badge bg-success';
}

// ========== МОДАЛЬНОЕ ОКНО ==========
function openTestModal(){
    document.getElementById('modal-body').innerHTML = `<div class="p-3"><input id="modal-name" class="form-control mb-2" placeholder="Имя"><input id="modal-surname" class="form-control mb-2" placeholder="Фамилия"><input id="modal-city" class="form-control mb-3" placeholder="Город"><button class="btn btn-primary w-100" onclick="startModalQuiz()">Начать</button><div id="modal-quiz-area"></div></div>`;
    new bootstrap.Modal(document.getElementById('testModal')).show();
}

let mStep=0, mNm="", mSn="", mCt="", mAns=[], mSc=0, mQs=[], mSelected=null, mCorrect=null;

function startModalQuiz(){
    mNm = document.getElementById('modal-name').value.trim();
    mSn = document.getElementById('modal-surname').value.trim();
    mCt = document.getElementById('modal-city').value.trim();
    if(!mNm||!mSn||!mCt) return alert("Заполните поля");
    mQs = [...questions];
    mStep=0; mSc=0; mAns=[]; mSelected=null;
    renderModalQuiz();
}

function renderModalQuiz(){
    if(mStep >= questions.length) {
        finishModalQuiz();
        return;
    }
    const q = mQs[mStep];
    mCorrect = q.correct;
    document.getElementById('modal-quiz-area').innerHTML = `<div class="card p-3 mt-3"><div class="d-flex justify-content-between"><span>${mNm} ${mSn} (${mCt})</span><span>${mStep+1}/${questions.length}</span></div><h5>${mStep+1}. ${q.text}</h5><div id="modal-options" class="d-grid gap-2 my-2"></div><button id="modal-submit" class="btn btn-primary" disabled>Ответить</button></div>`;
    const area = document.getElementById('modal-options');
    for(let i=0;i<q.options.length;i++){
        const btn = document.createElement('button');
        btn.className = 'btn btn-outline-dark btn-answer';
        btn.innerHTML = q.options[i];
        btn.onclick = () => { document.querySelectorAll('#modal-options button').forEach(b=>b.classList.remove('selected')); btn.classList.add('selected'); mSelected=i; document.getElementById('modal-submit').disabled=false; };
        area.appendChild(btn);
    }
    document.getElementById('modal-submit').onclick = submitModalAnswer;
}

function submitModalAnswer(){
    if(mSelected===null) return;
    const ok = (mSelected===mCorrect);
    if(ok) mSc++;
    mAns.push({n:mStep+1, sel:mQs[mStep].options[mSelected], cor:mQs[mStep].options[mCorrect], ok:ok});
    mStep++;
    if(mStep<questions.length) renderModalQuiz();
    else finishModalQuiz();
}

function finishModalQuiz(){
    saveToSupabase('results', {user_id:`${mNm} ${mSn} (${mCt})`, name:mNm, surname:mSn, city:mCt, score:mSc, total:questions.length, answers:mAns, created_at:new Date().toISOString()});
    document.getElementById('modal-body').innerHTML = `<div class="text-center py-4"><h3>🎉 Готово!</h3><div class="badge bg-success fs-4 my-3">${mSc}/${questions.length}</div><button class="btn btn-primary" onclick="location.reload()">Закрыть</button></div>`;
    setTimeout(()=>loadAdmin(),1000);
}

window.startQuiz = startQuiz;
window.openTestModal = openTestModal;
window.startModalQuiz = startModalQuiz;
window.exportToExcel = exportToExcel;
window.resetFilters = resetFilters;
</script>
