<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>585GOLD | Анализ результатов</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f5f5f5; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        .card { background: white; border-radius: 16px; padding: 20px; margin-bottom: 20px; border-top: 4px solid #E30613; }
        .btn { background: #E30613; color: white; border: none; padding: 8px 20px; border-radius: 40px; cursor: pointer; margin: 5px; }
        .btn:hover { background: #c41c2a; }
        .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .kpi-card { background: white; padding: 20px; border-radius: 12px; text-align: center; border-left: 4px solid #E30613; }
        .kpi-value { font-size: 32px; font-weight: bold; color: #E30613; }
        .charts-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .chart-card { background: white; padding: 20px; border-radius: 12px; }
        canvas { max-height: 250px; width: 100%; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #eee; }
        th { color: #E30613; }
        select { padding: 8px 15px; border: 1px solid #ddd; border-radius: 40px; margin: 5px; width: 300px; }
        .theme-toggle { position: fixed; bottom: 20px; right: 20px; background: #E30613; color: white; width: 50px; height: 50px; border-radius: 50%; cursor: pointer; font-size: 22px; }
        @media (max-width: 768px) { .charts-row { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h1>💎 585GOLD | Анализ результатов тестирования</h1>
        <div style="margin-top: 10px;">
            <button class="btn" id="copyReportBtn">📧 Копировать в Outlook</button>
            <button class="btn" id="pdfReportBtn">📄 Скачать PDF</button>
        </div>
    </div>

    <div class="card">
        <h3>📋 Загрузка из Supabase</h3>
        <select id="testSelector">
            <option value="">-- Выберите тест --</option>
        </select>
        <button class="btn" id="loadSupabaseBtn">📊 Загрузить результаты</button>
        <div id="info" style="margin-top: 10px; color: #666;"></div>
    </div>

    <div id="resultsContainer" style="display: none;">
        <div class="kpi-grid" id="kpiGrid"></div>
        <div class="charts-row">
            <div class="chart-card"><h3>📊 Распределение баллов</h3><canvas id="scoreChart"></canvas></div>
            <div class="chart-card"><h3>🏙️ Успеваемость по городам</h3><canvas id="cityChart"></canvas></div>
            <div class="chart-card"><h3>🥧 Ошибки по темам</h3><canvas id="pieChart"></canvas></div>
        </div>
        <div class="card"><h3>🏙️ Статистика по городам</h3><table><thead><tr><th>Город</th><th>Сотр.</th><th>Средний балл</th><th>Ошибок</th></tr></thead><tbody id="cityStatsBody"></tbody></table></div>
        <div class="card"><h3>🏆 Лучшие сотрудники</h3><table><thead><tr><th>#</th><th>Сотрудник</th><th>Город</th><th>Результат</th></tr></thead><tbody id="topEmployeesBody"></tbody></table></div>
        <div class="card"><h3>❗ Частые ошибки</h3><table><thead><tr><th>#</th><th>Тема ошибки</th><th>Кол-во</th></tr></thead><tbody id="errorsBody"></tbody></table></div>
    </div>
</div>
<button class="theme-toggle" id="themeToggleBtn">🌙</button>

<script>
    const SUPABASE_URL = 'https://qtostraaqrnjbxiydlip.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_0GzJSuoAi5zc7pHkicHMNg_cQ-rGAX7';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    
    let currentData = [];
    let scoreChart = null, cityChart = null, pieChart = null;

    // Загрузка тестов
    async function loadTests() {
        const { data, error } = await sb.from('tests').select('*').order('created_at', { ascending: false });
        if (error) { console.error(error); return; }
        const selector = document.getElementById('testSelector');
        selector.innerHTML = '<option value="">-- Выберите тест --</option>';
        for (const test of data) {
            selector.innerHTML += `<option value="${test.slug}">${test.name} (${test.questions_count || '?'} вопросов)</option>`;
        }
    }

    // Загрузка результатов
    async function loadResults() {
        const slug = document.getElementById('testSelector').value;
        if (!slug) { alert('Выберите тест'); return; }
        
        document.getElementById('info').innerHTML = '🔄 Загрузка...';
        
        const { data, error } = await sb.from('results').select('*').eq('test_type', slug);
        if (error) { alert('Ошибка: ' + error.message); return; }
        if (!data || data.length === 0) { alert('Нет результатов'); return; }
        
        // Парсим данные (user_id содержит ФИО и город)
        const employees = [];
        for (const row of data) {
            let name = row.user_id || '';
            let city = row.city || '';
            
            // Если в user_id есть город в скобках — извлекаем
            const cityMatch = name.match(/\(([^)]+)\)/);
            if (cityMatch && !city) {
                city = cityMatch[1];
                name = name.replace(/\([^)]+\)/, '').trim();
            }
            
            employees.push({
                name: name || 'Сотрудник',
                city: city || 'Не указан',
                score: row.score || 0,
                total: row.total || 11,
                errors: row.errors || []
            });
        }
        
        currentData = employees;
        document.getElementById('info').innerHTML = `✅ Загружено: ${employees.length} сотрудников`;
        document.getElementById('resultsContainer').style.display = 'block';
        renderAll();
    }

    function renderAll() {
        const total = currentData.length;
        let sumPercent = 0, excellent = 0, totalErrors = 0;
        for (const e of currentData) {
            const p = (e.score / e.total) * 100;
            sumPercent += p;
            if (p >= 80) excellent++;
            totalErrors += (e.total - e.score);
        }
        const avgScore = total ? Math.round(sumPercent / total) : 0;
        
        document.getElementById('kpiGrid').innerHTML = `
            <div class="kpi-card"><div class="kpi-value">${total}</div><div class="kpi-label">Всего сотрудников</div></div>
            <div class="kpi-card"><div class="kpi-value">${avgScore}%</div><div class="kpi-label">Средний балл</div></div>
            <div class="kpi-card"><div class="kpi-value">${excellent}</div><div class="kpi-label">Отлично (≥80%)</div></div>
            <div class="kpi-card"><div class="kpi-value">${totalErrors}</div><div class="kpi-label">Всего ошибок</div></div>
        `;
        
        // График распределения баллов
        const scores = currentData.map(e => (e.score/e.total)*100);
        const cats = ['Отлично (80-100%)', 'Хорошо (60-79%)', 'Удовлетворительно (40-59%)', 'Плохо (0-39%)'];
        const dist = [
            scores.filter(s => s >= 80).length,
            scores.filter(s => s >= 60 && s < 80).length,
            scores.filter(s => s >= 40 && s < 60).length,
            scores.filter(s => s < 40).length
        ];
        if (scoreChart) scoreChart.destroy();
        scoreChart = new Chart(document.getElementById('scoreChart'), {
            type: 'bar', data: { labels: cats, datasets: [{ label: 'Количество', data: dist, backgroundColor: '#E30613' }] },
            options: { responsive: true }
        });
        
        // Города
        const cityMap = new Map();
        for (const e of currentData) {
            const city = e.city;
            const v = (e.score/e.total)*100;
            if (!cityMap.has(city)) cityMap.set(city, { sum: 0, count: 0, errors: 0 });
            const s = cityMap.get(city);
            s.sum += v;
            s.count++;
            s.errors += (e.total - e.score);
        }
        const cityData = Array.from(cityMap.entries()).map(([c, s]) => ({ city: c, count: s.count, avg: (s.sum / s.count).toFixed(0), errors: s.errors })).sort((a, b) => b.avg - a.avg);
        if (cityChart) cityChart.destroy();
        cityChart = new Chart(document.getElementById('cityChart'), {
            type: 'bar', data: { labels: cityData.map(c => c.city), datasets: [{ label: 'Средний балл (%)', data: cityData.map(c => c.avg), backgroundColor: '#E30613' }] },
            options: { responsive: true, scales: { y: { min: 0, max: 100 } } }
        });
        document.getElementById('cityStatsBody').innerHTML = cityData.map((c, i) => `<tr><td>${c.city}${i===0?' 🥇':''}</td><td>${c.count}</td><td>${c.avg}%</td><td>${c.errors}</td>`).join('');
        
        // Лучшие сотрудники
        const top10 = [...currentData].sort((a, b) => (b.score/b.total) - (a.score/a.total)).slice(0, 10);
        document.getElementById('topEmployeesBody').innerHTML = top10.map((e, i) => `<tr><td>${i+1}</td><td><strong>${e.name}</strong></td><td>${e.city}</td><td>${e.score}/${e.total} (${Math.round(e.score/e.total*100)}%)</td>`).join('');
        
        document.getElementById('errorsBody').innerHTML = '<tr><td colspan="3">Детальные ошибки доступны при загрузке Excel</td></tr>';
        if (pieChart) pieChart.destroy();
        pieChart = new Chart(document.getElementById('pieChart'), { type: 'pie', data: { labels: ['Нет данных'], datasets: [{ data: [1], backgroundColor: ['#ccc'] }] }, options: { responsive: true } });
    }
    
    function generateReport() {
        if (!currentData.length) { alert('Нет данных'); return; }
        const total = currentData.length;
        const avgScore = Math.round(currentData.reduce((s, e) => s + (e.score / e.total), 0) / total * 100);
        const excellent = currentData.filter(e => (e.score / e.total) >= 0.8).length;
        const totalErrors = currentData.reduce((s, e) => s + (e.total - e.score), 0);
        const cityStats = {};
        for (const e of currentData) { const city = e.city; if (!cityStats[city]) cityStats[city] = { sum: 0, total: 0, count: 0, errors: 0 }; cityStats[city].sum += e.score; cityStats[city].total += e.total; cityStats[city].count++; cityStats[city].errors += e.total - e.score; }
        const top5 = [...currentData].sort((a, b) => (b.score / b.total) - (a.score / a.total)).slice(0, 5);
        const date = new Date().toLocaleDateString('ru-RU');
        let report = `📊 ОТЧЁТ ПО ТЕСТУ\n${'━'.repeat(60)}\n📅 Дата: ${date}\n\n📈 ОБЩАЯ СТАТИСТИКА\n${'━'.repeat(60)}\nВсего сотрудников: ${total}\nСредний балл: ${avgScore}%\nОтлично (≥80%): ${excellent}\nВсего ошибок: ${totalErrors}\n\n📊 РАСПРЕДЕЛЕНИЕ БАЛЛОВ\n${'━'.repeat(60)}\n`;
        const scores = currentData.map(e => (e.score / e.total) * 100);
        report += `Отлично (80-100%): ${scores.filter(s => s >= 80).length}\nХорошо (60-79%): ${scores.filter(s => s >= 60 && s < 80).length}\nУдовлетворительно (40-59%): ${scores.filter(s => s >= 40 && s < 60).length}\nПлохо (0-39%): ${scores.filter(s => s < 40).length}\n\n🏙️ СТАТИСТИКА ПО ГОРОДАМ\n${'━'.repeat(60)}\n`;
        for (const [city, d] of Object.entries(cityStats)) { const avg = Math.round(d.sum / d.total * 100); report += `${city}: ${d.count} сотрудников, средний балл ${avg}%, ошибок ${d.errors}\n`; }
        report += `\n🔝 ЛУЧШИЕ СОТРУДНИКИ\n${'━'.repeat(60)}\n`;
        top5.forEach((e, i) => { const p = Math.round(e.score / e.total * 100); report += `${i+1}. ${e.name} — ${e.score}/${e.total} (${p}%)\n`; });
        navigator.clipboard.writeText(report).then(() => alert('✅ Отчёт скопирован!')).catch(() => alert('Ошибка копирования'));
    }
    
    function downloadPDF() { alert('PDF будет доступен после загрузки данных'); }
    
    document.getElementById('loadSupabaseBtn').onclick = loadResults;
    document.getElementById('copyReportBtn').onclick = generateReport;
    document.getElementById('pdfReportBtn').onclick = downloadPDF;
    
    let isDark = false;
    document.getElementById('themeToggleBtn').onclick = () => {
        isDark = !isDark;
        document.body.classList.toggle('dark-mode', isDark);
        document.getElementById('themeToggleBtn').innerHTML = isDark ? '☀️' : '🌙';
    };
    
    loadTests();
</script>
</body>
</html>
