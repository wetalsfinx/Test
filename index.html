<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Тест: Стандарты Продаж</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body{background:#f5f7fa;font-family:sans-serif;padding:20px}
.card{max-width:700px;margin:0 auto;border:none;box-shadow:0 4px 6px rgba(0,0,0,.1)}
.hidden{display:none!important}
.btn-answer{text-align:left;white-space:normal}
.btn-answer.selected{background-color:#0d6efd;color:white}
</style>
</head>
<body>
<div class="container">
    <div class="card p-4">
        <div id="login-screen">
            <h2 class="text-center mb-3">📊 Тест: Стандарты Продаж</h2>
            <p class="text-center text-muted">Заполните данные</p>
            <input type="text" id="name" class="form-control mb-2" placeholder="Имя">
            <input type="text" id="surname" class="form-control mb-2" placeholder="Фамилия">
            <input type="text" id="city" class="form-control mb-3" placeholder="Город">
            <button onclick="startTest()" class="btn btn-primary w-100">▶ Начать тест</button>
        </div>
        
        <div id="quiz-screen" class="hidden">
            <div class="d-flex justify-content-between mb-3">
                <span id="user-name"></span>
                <span class="badge bg-primary" id="q-counter">Вопрос 1 из 7</span>
            </div>
            <h4 id="question-text" class="mb-3"></h4>
            <div id="options-area" class="d-grid gap-2"></div>
            <button id="submit-btn" class="btn btn-primary mt-3" disabled>📝 Ответить</button>
        </div>
        
        <div id="result-screen" class="hidden text-center">
            <h1>🎉 Готово!</h1>
            <h2 id="final-score" class="mt-3"></h2>
            <button onclick="location.reload()" class="btn btn-outline-primary mt-3">Пройти заново</button>
        </div>
    </div>
</div>

<script>
const questions = [
    {text:"Вопрос 1: Клиент ищет советское украшение...", options:["Вариант А","Вариант Б","Вариант В","Вариант Г"], correct:1},
    {text:"Вопрос 2: Клиент сказал «Я подумаю»...", options:["Вариант А","Вариант Б","Вариант В","Вариант Г"], correct:1},
    {text:"Вопрос 3: Клиент из ломбарда...", options:["Вариант А","Вариант Б","Вариант В","Вариант Г"], correct:1},
    {text:"Вопрос 4: Клиент купил кольцо...", options:["Вариант А","Вариант Б","Вариант В","Вариант Г"], correct:2},
    {text:"Вопрос 5: Как правильно предложить футляр...", options:["Вариант А","Вариант Б","Вариант В","Вариант Г"], correct:2},
    {text:"Вопрос 6: Клиент говорит: «Дорого»...", options:["Вариант А","Вариант Б","Вариант В","Вариант Г"], correct:2},
    {text:"Вопрос 7: Клиентка выбирает цепочку...", options:["Вариант А","Вариант Б","Вариант В","Вариант Г"], correct:2}
];

let step = 0;
let userName = "", userSurname = "", userCity = "";
let answers = [];
let score = 0;
let selectedAnswer = null;
let currentCorrect = null;

function startTest() {
    userName = document.getElementById('name').value.trim();
    userSurname = document.getElementById('surname').value.trim();
    userCity = document.getElementById('city').value.trim();
    if(!userName || !userSurname || !userCity) {
        alert("Заполните все поля!");
        return;
    }
    
    step = 0;
    score = 0;
    answers = [];
    selectedAnswer = null;
    
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('quiz-screen').classList.remove('hidden');
    document.getElementById('user-name').innerHTML = `${userName} ${userSurname} (${userCity})`;
    
    renderQuestion();
}

function renderQuestion() {
    const q = questions[step];
    currentCorrect = q.correct;
    
    document.getElementById('question-text').innerHTML = `${step+1}. ${q.text}`;
    document.getElementById('q-counter').innerHTML = `Вопрос ${step+1} из ${questions.length}`;
    
    const area = document.getElementById('options-area');
    area.innerHTML = '';
    selectedAnswer = null;
    document.getElementById('submit-btn').disabled = true;
    
    for(let i = 0; i < q.options.length; i++) {
        const btn = document.createElement('button');
        btn.className = 'btn btn-outline-dark btn-answer p-3 m-1';
        btn.innerHTML = q.options[i];
        btn.onclick = function() {
            document.querySelectorAll('#options-area button').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            selectedAnswer = i;
            document.getElementById('submit-btn').disabled = false;
        };
        area.appendChild(btn);
    }
}

function submitAnswer() {
    if(selectedAnswer === null) {
        alert('Выберите вариант ответа');
        return;
    }
    
    const q = questions[step];
    const isCorrect = (selectedAnswer === currentCorrect);
    if(isCorrect) score++;
    
    answers.push({
        num: step+1,
        selected: q.options[selectedAnswer],
        correct: q.options[currentCorrect],
        isCorrect: isCorrect
    });
    
    step++;
    
    if(step < questions.length) {
        renderQuestion();
    } else {
        finishTest();
    }
}

function finishTest() {
    const percent = Math.round(score / questions.length * 100);
    
    document.getElementById('quiz-screen').classList.add('hidden');
    document.getElementById('result-screen').classList.remove('hidden');
    document.getElementById('final-score').innerHTML = `${score} из ${questions.length} (${percent}%)`;
}

document.getElementById('submit-btn').onclick = submitAnswer;
</script>
</body>
</html>
