<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Тест: Стандарты Продаж</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body{background:#f5f7fa;font-family:sans-serif}.card{margin-top:20px;border:none;box-shadow:0 4px 6px rgba(0,0,0,.1)}.hidden{display:none!important}#admin-panel{background:#fff;padding:20px;border-radius:10px;max-height:80vh;overflow-y:auto}.user-log{border-left:4px solid #0d6efd;padding:12px;background:#f8f9fa;margin-bottom:12px;border-radius:0 5px 5px 0;transition:all 0.3s ease}.user-log-new{animation:highlight 0.5s ease}.correct{color:#198754;font-weight:600}.wrong{color:#dc3545;font-weight:600}.score-badge{font-size:1.3em;padding:8px 20px}.btn-answer{text-align:left;white-space:normal}@keyframes highlight{0%{background:#d4edda;border-left-color:#28a745}100%{background:#f8f9fa;border-left-color:#0d6efd}}.online-badge{position:fixed;top:10px;right:10px;background:#28a745;color:white;padding:5px 10px;border-radius:20px;font-size:12px;z-index:1000}.splash-screen{position:fixed;top:0;left:0;right:0;bottom:0;background:#f5f7fa;display:flex;justify-content:center;align-items:center;z-index:10000;transition:opacity 0.5s}.splash-spinner{width:50px;height:50px;border:4px solid #e9ecef;border-top-color:#0d6efd;border-radius:50%;animation:spin 0.8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<!-- Экран загрузки -->
<div id="splash" class="splash-screen">
    <div style="text-align:center">
        <div class="splash-spinner mx-auto mb-3"></div>
        <p class="text-muted">Загрузка теста...</p>
    </div>
</div>

<div class="online-badge" id="online-badge">🟢 Онлайн</div>
<div class="container mt-4"><div class="row justify-content-center"><div class="col-md-8">
<div id="login-screen" class="hidden"><div class="card p-4 shadow">
<h2 class="text-center mb-3">📊 Тест: Стандарты Продаж</h2>
<p class="text-center text-muted">Заполните данные для начала</p>
<div class="mb-3"><label class="form-label fw-bold">Имя</label><input type="text" id="name-input" class="form-control form-control-lg" placeholder="Иван"></div>
<div class="mb-3"><label class="form-label fw-bold">Фамилия</label><input type="text" id="surname-input" class="form-control form-control-lg" placeholder="Иванов"></div>
<div class="mb-3"><label class="form-label fw-bold">Город работы</label><input type="text" id="city-input" class="form-control form-control-lg" placeholder="Москва"></div>
<button onclick="startQuiz()" class="btn btn-primary w-100 btn-lg" id="start-btn">▶ Начать тест</button>
</div></div>
<div id="quiz-screen" class="hidden"><div class="card p-4 shadow">
<div class="d-flex justify-content-between mb-3"><span class="text-muted small" id="user-display"></span><span class="badge bg-primary fs-6" id="progress-badge">Вопрос 1 из 7</span></div>
<h4 id="question-text" class="mb-4 fw-normal">Загрузка...</h4><div id="options-area" class="d-grid gap-2"></div>
</div></div>
<div id="result-screen" class="hidden"><div class="card p-5 shadow text-center">
<h1 class="mb-3">🎉 Готово!</h1><div class="mb-4"><span id="final-score" class="badge bg-success score-badge"></span></div>
<p class="text-muted">Спасибо за прохождение теста!</p>
<button onclick="location.reload()" class="btn btn-outline-primary">Пройти заново</button>
</div></div>
<div id="admin-screen" class="hidden"><div class="d-flex justify-content-between align-items-center mb-3">
<h3>👨‍💼 Панель Администратора</h3>
<div><span id="realtime-status" class="badge bg-success me-2">🟢 Live</span><a href="?" class="btn btn-outline-secondary btn-sm">← Выход</a></div>
</div><div id="admin-panel" class="shadow-sm"><h5 class="mb-3">📈 Результаты сотрудников <span id="results-count" class="badge bg-secondary"></span></h5><div id="results-area"><div class="text-center py-4 text-muted">⏳ Ожидание данных...</div></div></div></div>
</div></div></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// Скрываем сплеш-экран после полной загрузки
window.addEventListener('load', function() {
    setTimeout(function() {
        const splash = document.getElementById('splash');
        if(splash) {
            splash.style.opacity = '0';
            setTimeout(() => {
                splash.style.display = 'none';
                document.getElementById('login-screen').classList.remove('hidden');
            }, 500);
        }
    }, 300); // Минимальная задержка для плавности
});

const SUPABASE_URL='https://qtostraqrnjbxlydlip.supabase.co';
const SUPABASE_KEY='sb_publishable_0GzJSuoAi5zc7pHkicHMNg_cQ-rGAX7';
const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

const questions=[
{q:"Клиент ищет советское украшение, которого нет в ассортименте. Вы предложили альтернативу в ретро-стиле — не понравилось. Согласно технике переориентации, что делаете ДАЛЬШЕ?",a:["Предлагаете самые бюджетные аналоги — возможно, дело в цене","Показываете электронный каталог с изделиями на заказ в похожем стиле","Говорите, что советских украшений больше не будет, и завершаете диалог","Предлагаете отложить визит до поступления новой винтажной коллекции"],c:1},
{q:"Клиент сказал «Я подумаю» после примерки кольца за 45 000 ₽. Вы выяснили, что сомнение в цене. Согласно иерархии работы с возражениями, что предлагаете В ПЕРВУЮ ОЧЕРЕДЬ?",a:["Более бюджетный вариант за 25 000 ₽","Рассрочку или Яндекс Сплит, не меняя изделие","Отложить изделие на 24 часа для принятия решения","Дополнительную скидку через руководителя"],c:1},
{q:"Клиент из ломбарда рассматривает витрину 40 секунд, не подходит к консультанту. Согласно стандарту работы с трафиком, каково ваше следующее действие?",a:["Ждёте ещё 20 секунд — если не подойдёт сам, значит, не заинтересован","Сразу подходите с вопросом о потребностях, как с любым потенциальным покупателем","Сначала наблюдаете, к какой категории изделий тяготеет взгляд, затем подходите с предложением из этой категории","Не подходите — клиенты из ломбарда приходят по другим вопросам, это нецелевой трафик"],c:1},
{q:"Клиент купил кольцо, вы предложили серьги — отказался. Согласно стандарту завершения сделки, что вы делаете ДАЛЬШЕ?",a:["Завершаете продажу, провожаете с теплотой","Предлагаете каталог на заказ — возможно, там найдутся серьги, которые понравятся","Предлагаете футляр и чистящее средство, затем завершаете сделку","Спрашиваете причину отказа, чтобы отработать возражение"],c:2},
{q:"Как правильно предложить футляр и чистящее средство?",a:["Спросить: «Футляр нужен?»","Предложить как опцию после оплаты","Сказать: «Давайте добавим футляр и средство по уходу за изделиями. Выбирайте!»","Показать только если клиент спросит об уходе"],c:2},
{q:"Клиент говорит: «Дорого». Согласно нашей методике, как правильно отработать это возражение?",a:["«У нас есть изделия дешевле, давайте посмотрим»","«Это цена за качество, вы же хотите хорошее украшение?»","«Понимаю. Обратите внимание на чистоту камня и гарантию — это вложение на годы»","«Можем оформить рассрочку, это решит проблему»"],c:2},
{q:"Клиентка выбирает цепочку, вы показали 3 варианта в рамках бюджета. Она говорит: «Все красивые, не знаю, что выбрать». Согласно технике «Альтернативный выбор», как вы помогаете принять решение?",a:["«Давайте я выберу за вас — я эксперт, мне виднее»","«Выберите ту, которая больше откликается — все варианты достойные»","«Давайте сузим выбор: вы хотите цепочку для кулона или как самостоятельное украшение?»","«Возьмите обе — одна для повседневной носки, вторая для особых случаев»"],c:2}
];

let step=0,nm="",sn="",ct="",ans=[],sc=0,qs=[];
let realtimeSubscription = null;

// Функция отправки без ожидания
function saveToSupabase(table, data) {
    sb.from(table).insert([data]).then(() => {
        // Успешно
    }).catch(e => {
        console.error('Ошибка сохранения:', e);
        const pending = JSON.parse(localStorage.getItem('pending_saves') || '[]');
        pending.push({table, data, timestamp: Date.now()});
        localStorage.setItem('pending_saves', JSON.stringify(pending));
        const badge = document.getElementById('online-badge');
        if(badge) {
            badge.innerHTML = '⚠️ Оффлайн';
            badge.style.background = '#ffc107';
        }
    });
}

// Функция для восстановления несохраненных данных
function retryPendingSaves() {
    const pending = JSON.parse(localStorage.getItem('pending_saves') || '[]');
    if(pending.length === 0) return;
    
    pending.forEach((item, index) => {
        sb.from(item.table).insert([item.data]).then(() => {
            pending.splice(index, 1);
            localStorage.setItem('pending_saves', JSON.stringify(pending));
            const badge = document.getElementById('online-badge');
            if(badge && pending.length === 0) {
                badge.innerHTML = '🟢 Онлайн';
                badge.style.background = '#28a745';
            }
        }).catch(() => {});
    });
}

setInterval(retryPendingSaves, 30000);

const urlParams = new URLSearchParams(location.search);
if(urlParams.get('mode') === 'admin'){
    // Скрываем сплеш и показываем админку
    const splash = document.getElementById('splash');
    if(splash) splash.style.display = 'none';
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('admin-screen').classList.remove('hidden');
    initRealtime();
    loadAdmin();
} else {
    // Для обычного режима - показываем форму после загрузки
    // Сплеш скроется по load событию
}

async function startQuiz(){
    nm=document.getElementById('name-input').value.trim();
    sn=document.getElementById('surname-input').value.trim();
    ct=document.getElementById('city-input').value.trim();
    if(!nm||!sn||!ct)return alert("⚠️ Заполните все поля!");
    
    const startBtn = document.getElementById('start-btn');
    startBtn.disabled = true;
    startBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Загрузка...';
    
    const id=`${nm} ${sn} (${ct})`;
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('quiz-screen').classList.remove('hidden');
    document.getElementById('user-display').innerText=id;
    qs=[...questions].sort(()=>Math.random()-.5);
    step=0;
    sc=0;
    ans=[];
    
    saveToSupabase('logs', {user_id:id, action:'🟢 Начал тест'});
    
    render();
    startBtn.disabled = false;
    startBtn.innerHTML = '▶ Начать тест';
}

function render(){
    const q=qs[step];
    document.getElementById('question-text').innerText=`${step+1}. ${q.q}`;
    document.getElementById('progress-badge').innerText=`Вопрос ${step+1} из ${questions.length}`;
    const area=document.getElementById('options-area');
    area.innerHTML='';
    
    const indices = [0,1,2,3].sort(()=>Math.random()-.5);
    indices.forEach(i=>{
        const b=document.createElement('button');
        b.className='btn btn-outline-dark btn-answer p-3 m-1';
        b.innerText=q.a[i];
        b.onclick=() => handle(i, q.c);
        area.appendChild(b);
    });
}

function handle(sel,corr){
    const btns = document.querySelectorAll('#options-area button');
    btns.forEach(btn => btn.style.pointerEvents = 'none');
    
    const q=qs[step];
    const ok=sel===corr;
    if(ok)sc++;
    
    ans.push({
        n:step+1,
        qs:q.q.substring(0,40)+'...',
        sel:q.a[sel],
        cor:q.a[corr],
        ok:ok
    });
    
    const id=`${nm} ${sn} (${ct})`;
    saveToSupabase('logs', {user_id:id, action:`В${step+1}: ${ok?'✅':'❌'} ${q.a[sel].substring(0,25)}`});
    
    step++;
    
    if(step < questions.length){
        render();
        setTimeout(() => {
            const newBtns = document.querySelectorAll('#options-area button');
            newBtns.forEach(btn => btn.style.pointerEvents = '');
        }, 100);
    } else {
        finish();
    }
}

function finish() {
    const id = `${nm} ${sn} (${ct})`;
    const p = Math.round(sc/questions.length*100);
    
    const sbg = document.getElementById('final-score');
    sbg.innerText = `${sc} из ${questions.length} (${p}%)`;
    sbg.className = `badge score-badge ${p>=80?'bg-success':p>=50?'bg-warning':'bg-danger'}`;
    
    document.getElementById('quiz-screen').classList.add('hidden');
    document.getElementById('result-screen').classList.remove('hidden');
    
    const resultData = {
        user_id: id,
        name: nm,
        surname: sn,
        city: ct,
        score: sc,
        total: questions.length,
        answers: ans,
        created_at: new Date().toISOString()
    };
    
    saveToSupabase('results', resultData);
    saveToSupabase('logs', {user_id:id, action:`🏁 Завершил: ${sc}/${questions.length}`});
}

// Realtime подписка
function initRealtime() {
    if(realtimeSubscription) return;
    
    realtimeSubscription = sb
        .channel('results-channel')
        .on('postgres_changes', 
            { event: 'INSERT', schema: 'public', table: 'results' },
            (payload) => {
                console.log('Новый результат:', payload.new);
                addResultToAdmin(payload.new);
                updateResultsCount();
            }
        )
        .subscribe((status) => {
            console.log('Realtime статус:', status);
            const statusEl = document.getElementById('realtime-status');
            if(statusEl) {
                if(status === 'SUBSCRIBED') {
                    statusEl.innerHTML = '🟢 Live';
                    statusEl.className = 'badge bg-success me-2';
                } else {
                    statusEl.innerHTML = '🟡 Connecting...';
                    statusEl.className = 'badge bg-warning me-2';
                }
            }
        });
}

function addResultToAdmin(result) {
    const area = document.getElementById('results-area');
    if(!area) return;
    
    if(area.innerHTML.includes('Пока нет результатов') || area.innerHTML.includes('Ожидание данных')) {
        area.innerHTML = '';
    }
    
    const p = Math.round(result.score/result.total*100);
    let ah = '';
    
    if(result.answers && Array.isArray(result.answers)){
        result.answers.forEach((a,i) => {
            const isCorrect = a.ok === true;
            const cl = isCorrect ? 'correct' : 'wrong';
            const ic = isCorrect ? '✅' : '❌';
            ah += `<div class="small mb-2 ps-2"><strong>В${i+1}:</strong> ${ic} <span class="${cl}">${isCorrect ? 'Верно' : 'Неверно'}</span>${!isCorrect ? `<div class="text-muted ms-3">Выбрано: ${a.sel}<br>Правильно: ${a.cor}</div>` : ''}</div>`;
        });
    } else {
        ah = '<div class="small text-muted">Нет детальной информации</div>';
    }
    
    const clr = p>=80?'success':p>=50?'warning':'danger';
    const ts = new Date(result.created_at).toLocaleString('ru-RU');
    
    const c=document.createElement('div');
    c.className='user-log user-log-new';
    c.innerHTML = `<div class="d-flex justify-content-between align-items-start">
        <div>
            <strong class="fs-5">${escapeHtml(result.user_id)}</strong>
            <span class="badge bg-${clr} ms-2 fs-6">${result.score}/${result.total} (${p}%)</span>
        </div>
        <small class="text-muted">${ts}</small>
    </div>
    <div class="mt-2"><small class="text-muted">📍 Город: ${escapeHtml(result.city)}</small></div>
    <div class="mt-2 border-top pt-2 bg-white rounded">${ah}</div>`;
    
    area.insertBefore(c, area.firstChild);
    
    setTimeout(() => {
        c.classList.remove('user-log-new');
    }, 500);
}

function escapeHtml(str) {
    if(!str) return '';
    return str.replace(/[&<>]/g, function(m) {
        if(m === '&') return '&amp;';
        if(m === '<') return '&lt;';
        if(m === '>') return '&gt;';
        return m;
    });
}

function updateResultsCount() {
    const count = document.querySelectorAll('#results-area .user-log').length;
    const countBadge = document.getElementById('results-count');
    if(countBadge) countBadge.innerText = count;
}

async function loadAdmin(){
    const area=document.getElementById('results-area');
    if(!area) return;
    
    area.innerHTML = '<div class="text-center py-4 text-muted">⏳ Загрузка...</div>';
    
    try {
        const {data,error} = await sb.from('results').select('*').order('created_at',{ascending:false});
        
        const pending = JSON.parse(localStorage.getItem('pending_saves') || '[]');
        const localResults = pending.filter(p => p.table === 'results').map(p => p.data);
        
        let allResults = [];
        if(data && !error) allResults.push(...data);
        if(localResults.length) allResults.push(...localResults);
        
        allResults.sort((a,b) => new Date(b.created_at) - new Date(a.created_at));
        
        if(!allResults.length){
            area.innerHTML='<p class="text-muted text-center py-3">Пока нет результатов</p>';
            updateResultsCount();
            return;
        }
        
        area.innerHTML='';
        allResults.forEach(r => {
            const p = Math.round(r.score/r.total*100);
            let ah = '';
            
            if(r.answers && Array.isArray(r.answers)){
                r.answers.forEach((a,i) => {
                    const isCorrect = a.ok === true;
                    const cl = isCorrect ? 'correct' : 'wrong';
                    const ic = isCorrect ? '✅' : '❌';
                    ah += `<div class="small mb-2 ps-2"><strong>В${i+1}:</strong> ${ic} <span class="${cl}">${isCorrect ? 'Верно' : 'Неверно'}</span>${!isCorrect ? `<div class="text-muted ms-3">Выбрано: ${a.sel}<br>Правильно: ${a.cor}</div>` : ''}</div>`;
                });
            } else {
                ah = '<div class="small text-muted">Нет детальной информации</div>';
            }
            
            const clr = p>=80?'success':p>=50?'warning':'danger';
            const ts = new Date(r.created_at).toLocaleString('ru-RU');
            const isLocal = !r.created_at ? ' (ожидает отправки)' : '';
            
            const c=document.createElement('div');
            c.className='user-log';
            c.innerHTML = `<div class="d-flex justify-content-between align-items-start">
                <div>
                    <strong class="fs-5">${escapeHtml(r.user_id)}${isLocal}</strong>
                    <span class="badge bg-${clr} ms-2 fs-6">${r.score}/${r.total} (${p}%)</span>
                </div>
                <small class="text-muted">${ts}</small>
            </div>
            <div class="mt-2"><small class="text-muted">📍 Город: ${escapeHtml(r.city)}</small></div>
            <div class="mt-2 border-top pt-2 bg-white rounded">${ah}</div>`;
            area.appendChild(c);
        });
        
        updateResultsCount();
        
    } catch(e) {
        console.error('Ошибка загрузки:', e);
        area.innerHTML='<p class="text-muted text-center py-3">Ошибка подключения</p>';
    }
}
</script>
</body>
</html>
