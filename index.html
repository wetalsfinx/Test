<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>585GOLD | Старая админка (выгрузка Excel)</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body{background:#f5f5f5;font-family:'Segoe UI';padding:20px}
        .container{max-width:1200px;margin:0 auto}
        .card{background:#fff;border-radius:12px;padding:20px;margin-bottom:20px}
        .btn{background:#E30613;color:#fff;border:none;padding:8px 20px;border-radius:40px;cursor:pointer}
        select{padding:8px;border-radius:40px;border:1px solid #ddd}
        table{width:100%;border-collapse:collapse}
        th,td{padding:8px;text-align:left;border-bottom:1px solid #ddd}
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h1 style="color:#E30613">📊 Выгрузка детальных отчётов</h1>
        <p>Выберите тест → нажмите «Детальный» → сохраните Excel</p>
        <div style="margin:15px 0">
            <select id="testSelect" style="width:300px"></select>
            <button class="btn" id="detailBtn">📊 Детальный</button>
        </div>
    </div>
    <div id="status"></div>
</div>

<script>
const SUPABASE_URL = 'https://qtostraaqrnjbxiydlip.supabase.co';
const SUPABASE_KEY = 'sb_publishable_0GzJSuoAi5zc7pHkicHMNg_cQ-rGAX7';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentResults = [];
let currentTestSlug = null;

async function loadTests() {
    const { data, error } = await sb.from('tests').select('slug, name');
    if (error) { document.getElementById('status').innerHTML = '❌ Ошибка: ' + error.message; return; }
    const select = document.getElementById('testSelect');
    select.innerHTML = '<option value="">-- Выберите тест --</option>' + 
        data.map(t => `<option value="${t.slug}">${t.name}</option>`).join('');
}

async function loadResults() {
    const slug = document.getElementById('testSelect').value;
    if (!slug) return;
    currentTestSlug = slug;
    const { data, error } = await sb.from('results').select('*').eq('test_type', slug);
    if (error) { alert('Ошибка загрузки результатов'); return; }
    currentResults = data || [];
    document.getElementById('status').innerHTML = `✅ Загружено ${currentResults.length} результатов`;
}

function exportDetailedToExcel() {
    if (!currentResults.length) { alert("Нет данных"); return; }
    try {
        const excelData = [];
        for (const r of currentResults) {
            const row = {
                'ФИО': `${r.surname || ''} ${r.name || ''}`.trim(),
                'Город': r.city || '',
                'Баллы': `${r.score}/${r.total}`,
                'Процент': `${Math.round(r.score / r.total * 100)}%`,
                'Дата': new Date(r.created_at).toLocaleString()
            };
            if (r.answers && r.answers.length > 0) {
                for (let i = 0; i < r.answers.length; i++) {
                    const a = r.answers[i];
                    row[`Вопрос ${i+1}`] = (a.question || a.qs || '').substring(0, 300);
                    row[`Ответ сотрудника ${i+1}`] = (a.selected || a.sel || '').substring(0, 300);
                    row[`Правильный ответ ${i+1}`] = (a.correct || a.cor || '').substring(0, 300);
                    row[`Результат ${i+1}`] = (a.isCorrect === true || a.ok === true) ? 'Верно' : 'Ошибка';
                }
            }
            excelData.push(row);
        }
        let sheetName = currentTestSlug || 'Детальные';
        if (sheetName.length > 31) sheetName = sheetName.substring(0, 28) + '...';
        const ws = XLSX.utils.json_to_sheet(excelData);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, sheetName);
        XLSX.writeFile(wb, `${sheetName}_детальный_${new Date().toLocaleDateString()}.xlsx`);
        alert('✅ Excel сохранён!');
    } catch(e) { alert('Ошибка при экспорте'); }
}

document.getElementById('testSelect').onchange = loadResults;
document.getElementById('detailBtn').onclick = exportDetailedToExcel;
loadTests();
</script>
</body>
</html>
