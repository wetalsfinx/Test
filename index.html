<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Админка + Дашборд | Результаты тестов</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
    :root {
        --bg-body: #f5f7fa;
        --bg-card: white;
        --text-color: #212529;
        --text-muted: #6c757d;
        --border-color: #dee2e6;
        --header-bg: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        --filter-bg: white;
        --user-log-bg: #f8f9fa;
        --user-log-hover: #e9ecef;
        --user-log-border: #0d6efd;
        --expand-icon-color: #6c757d;
        --btn-outline-border: #dee2e6;
        --btn-outline-hover-bg: #e9ecef;
        --input-bg: white;
        --input-border: #ced4da;
        --chart-grid: #ddd;
    }
    body.dark {
        --bg-body: #1a1a2e;
        --bg-card: #16213e;
        --text-color: #e0e0e0;
        --text-muted: #aaa;
        --border-color: #2c3e50;
        --header-bg: linear-gradient(135deg, #0f3460 0%, #1a1a2e 100%);
        --filter-bg: #0f3460;
        --user-log-bg: #0f3460;
        --user-log-hover: #1a1a2e;
        --user-log-border: #4facfe;
        --expand-icon-color: #aaa;
        --btn-outline-border: #2c3e50;
        --btn-outline-hover-bg: #2c3e50;
        --input-bg: #0f3460;
        --input-border: #2c3e50;
        --chart-grid: #2c3e50;
    }
    body { background: var(--bg-body); font-family: 'Segoe UI', sans-serif; transition: all 0.3s; color: var(--text-color); }
    .user-log { border-left: 4px solid var(--user-log-border); padding: 12px; background: var(--user-log-bg); margin-bottom: 12px; border-radius: 0 8px 8px 0; cursor: pointer; transition: all 0.2s; }
    .user-log:hover { background: var(--user-log-hover); transform: translateX(4px); }
    .correct { color: #4caf50; font-weight: 600; }
    .wrong { color: #f44336; font-weight: 600; }
    .answer-details { display: none; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border-color); }
    .answer-details.show { display: block; }
    .stats-card { background: var(--header-bg); color: white; border-radius: 10px; padding: 15px; margin-bottom: 15px; cursor: pointer; transition: transform 0.2s; }
    .stats-card:hover { transform: translateY(-3px); }
    .filter-bar { background: var(--filter-bg); padding: 15px; border-radius: 10px; margin-bottom: 20px; }
    .chart-card { background: var(--bg-card); border-radius: 10px; padding: 15px; margin-bottom: 20px; }
    .chart-container { height: 200px; position: relative; }
    .test-selector { background: var(--bg-card); border-radius: 12px; padding: 15px; margin-bottom: 20px; }
    .theme-toggle { position: fixed; bottom: 20px; right: 20px; background: #0d6efd; color: white; border: none; border-radius: 50%; width: 50px; height: 50px; font-size: 24px; cursor: pointer; z-index: 1000; }
    .btn-pdf { background: #dc3545; color: white; border: none; padding: 4px 12px; border-radius: 20px; font-size: 12px; margin-left: 8px; }
    .btn-pdf:hover { background: #b02a37; }
    .btn-copy-report { background: #0d6efd; color: white; border: none; padding: 6px 16px; border-radius: 20px; font-size: 13px; }
    .btn-copy-report:hover { background: #0b5ed7; }
    @media (max-width: 768px) { .user-log .d-flex { flex-direction: column; gap: 8px; } }
</style>
</head>
<body>
<button class="theme-toggle" id="themeToggle">🌙</button>
<div class="container mt-4"><div class="row justify-content-center"><div class="col-md-10">

<div class="d-flex justify-content-between align-items-center mb-3">
    <h3 style="color: var(--text-color);">👨‍💼 Панель Администратора + Дашборд</h3>
    <div>
        <button id="copyReportBtn" class="btn-copy-report me-2" title="Копировать отчёт для руководителя">📊 Копировать отчёт</button>
        <a href="?" class="btn btn-outline-secondary btn-sm">← Выход</a>
    </div>
</div>

<div class="test-selector">
    <div class="row align-items-center">
        <div class="col-md-6"><label class="form-label fw-bold mb-0">📋 Выберите тест</label></div>
        <div class="col-md-6"><select id="testSelector" class="form-select"><option value="">Загрузка тестов...</option></select></div>
    </div>
</div>

<div id="resultsContainer" style="display:none">
    <div class="row mb-4">
        <div class="col-md-4"><div class="stats-card" onclick="resetFilters()"><div class="d-flex justify-content-between"><div><div class="small">Всего прошло</div><div class="h3 mb-0" id="total-count">0</div></div><i class="bi bi-people fs-1"></i></div></div></div>
        <div class="col-md-4"><div class="stats-card" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);" onclick="resetFilters()"><div class="d-flex justify-content-between"><div><div class="small">Средний балл</div><div class="h3 mb-0" id="avg-score">0%</div></div><i class="bi bi-graph-up fs-1"></i></div></div></div>
        <div class="col-md-4"><div class="stats-card" style="background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);" onclick="resetFilters()"><div class="d-flex justify-content-between"><div><div class="small">Отлично (≥80%)</div><div class="h3 mb-0" id="excellent-count">0</div></div><i class="bi bi-star fs-1"></i></div></div></div>
    </div>
    
    <div class="row mb-4">
        <div class="col-md-6"><div class="chart-card"><h6>📊 Распределение баллов</h6><div class="chart-container"><canvas id="scoreChart"></canvas></div></div></div>
        <div class="col-md-6"><div class="chart-card"><h6>🏙️ Успеваемость по городам</h6><div class="chart-container"><canvas id="cityChart"></canvas></div></div></div>
    </div>
    
    <div class="filter-bar">
        <div class="row g-3">
            <div class="col-md-3"><input type="text" id="search-input" class="form-control" placeholder="🔍 Поиск по имени..."></div>
            <div class="col-md-2"><select id="city-filter" class="form-select"><option value="">Все города</option></select></div>
            <div class="col-md-2"><input type="date" id="date-from" class="form-control"></div>
            <div class="col-md-2"><input type="date" id="date-to" class="form-control"></div>
            <div class="col-md-2">
                <div class="d-flex gap-2">
                    <button class="btn btn-sm btn-outline-success" onclick="exportToExcel()">📎 Экспорт</button>
                    <button class="btn btn-sm btn-outline-primary" onclick="exportDetailedToExcel()">📊 Детальный</button>
                </div>
            </div>
            <div class="col-md-1"><button class="btn btn-outline-secondary w-100" onclick="resetFilters()">Сброс</button></div>
        </div>
    </div>
    
    <div id="results-area"><div class="text-center py-4">⏳ Выберите тест</div></div>
</div>

</div></div></div>

<script>
// ============ SUPABASE ============
const SUPABASE_URL = 'https://qtostraaqrnjbxiydlip.supabase.co';
const SUPABASE_KEY = 'sb_publishable_0GzJSuoAi5zc7pHkicHMNg_cQ-rGAX7';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentTest = null;
let currentResults = [];
let scoreChart = null;
let cityChart = null;

// ============ ТЁМНАЯ ТЕМА ============
function initTheme() {
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme === 'dark') {
        document.body.classList.add('dark');
        document.getElementById('themeToggle').innerHTML = '☀️';
    }
}
function toggleTheme() {
    document.body.classList.toggle('dark');
    const isDark = document.body.classList.contains('dark');
    localStorage.setItem('theme', isDark ? 'dark' : 'light');
    document.getElementById('themeToggle').innerHTML = isDark ? '☀️' : '🌙';
    updateCharts();
}
document.getElementById('themeToggle').addEventListener('click', toggleTheme);
initTheme();

// ============ ЗАГРУЗКА ТЕСТОВ ============
async function loadTests() {
    const { data, error } = await sb.from('tests').select('*').order('created_at', { ascending: false });
    const selector = document.getElementById('testSelector');
    
    if (error || !data || data.length === 0) {
        selector.innerHTML = '<option value="">Нет тестов</option>';
        console.error('Ошибка загрузки тестов:', error);
        return;
    }
    
    let options = '<option value="">-- Выберите тест --</option>';
    for (const test of data) {
        options += `<option value="${test.slug}" data-cities='${JSON.stringify(test.city_list || [])}'>${test.name} (${test.questions_count || '?'} вопросов)</option>`;
    }
    selector.innerHTML = options;
    
    selector.addEventListener('change', async (e) => {
        const slug = e.target.value;
        if (!slug) {
            currentTest = null;
            document.getElementById('resultsContainer').style.display = 'none';
            return;
        }
        const selectedOption = selector.options[selector.selectedIndex];
        const citiesJson = selectedOption.getAttribute('data-cities');
        currentTest = { 
            slug: slug, 
            name: selectedOption.text, 
            cities: JSON.parse(citiesJson || '[]') 
        };
        
        const cityFilter = document.getElementById('city-filter');
        let cityOptions = '<option value="">Все города</option>';
        for (const city of currentTest.cities) {
            cityOptions += `<option value="${escapeHtml(city)}">${escapeHtml(city)}</option>`;
        }
        cityFilter.innerHTML = cityOptions;
        
        await loadResults(slug);
        document.getElementById('resultsContainer').style.display = 'block';
    });
}

// ============ ЗАГРУЗКА РЕЗУЛЬТАТОВ ============
async function loadResults(slug) {
    const { data, error } = await sb.from('results').select('*').eq('test_type', slug).order('created_at', { ascending: false });
    if (error) {
        console.error('Ошибка загрузки результатов:', error);
        currentResults = [];
    } else {
        currentResults = data || [];
    }
    renderResults();
}

// ============ ОТОБРАЖЕНИЕ РЕЗУЛЬТАТОВ ============
function renderResults() {
    if (!currentTest) return;
    
    let filtered = [...currentResults];
    const search = document.getElementById('search-input')?.value.toLowerCase() || '';
    const cityF = document.getElementById('city-filter')?.value || '';
    const dateFrom = document.getElementById('date-from')?.value;
    const dateTo = document.getElementById('date-to')?.value;
    
    if (search) filtered = filtered.filter(r => (r.user_id || '').toLowerCase().includes(search));
    if (cityF) filtered = filtered.filter(r => r.city === cityF);
    if (dateFrom) filtered = filtered.filter(r => new Date(r.created_at) >= new Date(dateFrom));
    if (dateTo) filtered = filtered.filter(r => new Date(r.created_at) <= new Date(dateTo));
    
    const total = currentResults.length;
    if (total > 0) {
        const avg = Math.round(currentResults.reduce((s, r) => s + (r.score / r.total), 0) / total * 100);
        const excellent = currentResults.filter(r => (r.score / r.total) >= 0.8).length;
        document.getElementById('total-count').innerText = total;
        document.getElementById('avg-score').innerText = avg + '%';
        document.getElementById('excellent-count').innerText = excellent;
    }
    
    const area = document.getElementById('results-area');
    if (!filtered.length) {
        area.innerHTML = '<div class="text-center py-4">📭 Нет результатов</div>';
        updateCharts();
        return;
    }
    
    area.innerHTML = '';
    for (const r of filtered) {
        const percent = Math.round(r.score / r.total * 100);
        let details = '';
        if (r.answers) {
            for (let i = 0; i < r.answers.length; i++) {
                const a = r.answers[i];
                const ok = a.isCorrect === true || a.ok === true;
                const questionText = (a.question || a.qs || `Вопрос ${i+1}`).substring(0, 150);
                details += `<div class="small mb-2 p-2" style="border-left:3px solid ${ok ? '#4caf50' : '#f44336'}; background:var(--user-log-bg); border-radius:4px;">
                    <strong>${ok ? '✅' : '❌'} ${escapeHtml(questionText)}</strong>
                    <div><span class="${ok ? 'correct' : 'wrong'}">${ok ? 'Верно' : 'Ошибка'}</span></div>
                    ${!ok ? `<div class="mt-1 small"><strong>✖ Ваш ответ:</strong> ${escapeHtml(a.selected || a.sel || '—')}<br><strong>✔ Правильный ответ:</strong> ${escapeHtml(a.correct || a.cor || '—')}</div>` : ''}
                </div>`;
            }
        }
        const clr = percent >= 80 ? 'success' : (percent >= 50 ? 'warning' : 'danger');
        area.innerHTML += `<div class="user-log" onclick="if(event.target.tagName!=='BUTTON') this.querySelector('.answer-details').classList.toggle('show');">
            <div class="d-flex justify-content-between align-items-start">
                <div><strong>${escapeHtml(r.surname || '')} ${escapeHtml(r.name || '')}</strong> <span class="text-muted">📍 ${escapeHtml(r.city || '—')}</span> <span class="badge bg-${clr}">${r.score}/${r.total} (${percent}%)</span></div>
                <div><small>${new Date(r.created_at).toLocaleString()}</small>
                <button class="btn-pdf" onclick="event.stopPropagation(); generateUserPDF('${r.id}')">📄 PDF</button>
                <i class="bi bi-chevron-down ms-2"></i></div>
            </div>
            <div class="answer-details mt-2"><div class="p-2 rounded" style="background:var(--user-log-bg);">${details}</div></div>
        </div>`;
    }
    updateCharts();
}

// ============ ГРАФИКИ ============
function updateCharts() {
    if (!currentResults.length) return;
    
    const cats = { 'Отлично (80-100%)': 0, 'Хорошо (60-79%)': 0, 'Удовлетворительно (40-59%)': 0, 'Плохо (0-39%)': 0 };
    for (const r of currentResults) {
        const p = r.score / r.total * 100;
        if (p >= 80) cats['Отлично (80-100%)']++;
        else if (p >= 60) cats['Хорошо (60-79%)']++;
        else if (p >= 40) cats['Удовлетворительно (40-59%)']++;
        else cats['Плохо (0-39%)']++;
    }
    const ctx1 = document.getElementById('scoreChart');
    if (ctx1) {
        if (scoreChart) scoreChart.destroy();
        scoreChart = new Chart(ctx1, {
            type: 'pie',
            data: { labels: Object.keys(cats), datasets: [{ data: Object.values(cats), backgroundColor: ['#28a745', '#17a2b8', '#ffc107', '#dc3545'] }] },
            options: { responsive: true }
        });
    }
    
    const cityStats = {};
    for (const r of currentResults) {
        const city = r.city || 'Не указан';
        if (!cityStats[city]) cityStats[city] = { total: 0, count: 0 };
        cityStats[city].total += r.score / r.total;
        cityStats[city].count++;
    }
    const cities = Object.keys(cityStats);
    const avgs = cities.map(c => Math.round(cityStats[c].total / cityStats[c].count * 100));
    const ctx2 = document.getElementById('cityChart');
    if (ctx2) {
        if (cityChart) cityChart.destroy();
        cityChart = new Chart(ctx2, {
            type: 'bar',
            data: { labels: cities, datasets: [{ label: 'Средний балл (%)', data: avgs, backgroundColor: '#667eea' }] },
            options: { responsive: true, scales: { y: { min: 0, max: 100 } } }
        });
    }
}

// ============ PDF ДЛЯ СОТРУДНИКА ============
function generateUserPDF(resultId) {
    const r = currentResults.find(r => r.id == resultId);
    if (!r) return;
    const fullName = `${r.surname || ''} ${r.name || ''}`.trim();
    const percent = Math.round(r.score / r.total * 100);
    let errorsHtml = '';
    if (r.answers) {
        for (let i = 0; i < r.answers.length; i++) {
            const a = r.answers[i];
            const ok = a.isCorrect === true || a.ok === true;
            const questionText = (a.question || a.qs || `Вопрос ${i+1}`).substring(0, 150);
            if (!ok) {
                errorsHtml += `<div style="margin-bottom:15px;padding:12px;background:#ffebee;border-radius:8px">
                    <strong>❌ ${escapeHtml(questionText)}</strong><br>
                    <div><strong>Ваш ответ:</strong> ${escapeHtml(a.selected || a.sel || '—')}</div>
                    <div><strong>Правильный ответ:</strong> ${escapeHtml(a.correct || a.cor || '—')}</div>
                </div>`;
            }
        }
    }
    const html = `<!DOCTYPE html>
    <html>
    <head><meta charset="UTF-8"><title>Отчёт: ${fullName}</title><style>body{font-family:Arial;padding:20px}</style></head>
    <body>
        <h1>📊 Отчёт по тесту</h1>
        <p><strong>Сотрудник:</strong> ${fullName}</p>
        <p><strong>Город:</strong> ${r.city || '—'}</p>
        <p><strong>Результат:</strong> ${r.score}/${r.total} (${percent}%)</p>
        <h3>Разбор ошибок:</h3>
        ${errorsHtml || '<p>✅ Нет ошибок</p>'}
        <p style="margin-top:30px;font-size:12px;color:#999;">Отчёт сгенерирован автоматически</p>
    </body>
    </html>`;
    const win = window.open('', '_blank');
    win.document.write(html);
    win.document.close();
    win.print();
}

// ============ ОБЫЧНЫЙ ЭКСПОРТ ============
function exportToExcel() {
    if (!currentResults.length) return alert("Нет данных");
    const data = currentResults.map(r => ({
        'ФИО': `${r.surname || ''} ${r.name || ''}`.trim(),
        'Город': r.city || '',
        'Баллы': `${r.score}/${r.total}`,
        'Процент': `${Math.round(r.score / r.total * 100)}%`,
        'Дата': new Date(r.created_at).toLocaleString()
    }));
    const ws = XLSX.utils.json_to_sheet(data);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Результаты');
    XLSX.writeFile(wb, `${currentTest?.name || 'отчёт'}_${new Date().toLocaleDateString()}.xlsx`);
}

// ============ ДЕТАЛЬНЫЙ ЭКСПОРТ ============
function exportDetailedToExcel() {
    if (!currentResults.length) return alert("Нет данных");
    try {
        const excelData = [];
        for (const r of currentResults) {
            const row = {
                'ФИО': `${r.surname || ''} ${r.name || ''}`.trim(),
                'Город': r.city || '',
                'Баллы': `${r.score}/${r.total}`,
                'Процент': `${Math.round(r.score / r.total * 100)}%`,
                'Дата': new Date(r.created_at).toLocaleString()
            };
            if (r.answers && r.answers.length > 0) {
                for (let i = 0; i < r.answers.length; i++) {
                    const a = r.answers[i];
                    row[`Вопрос ${i+1}`] = (a.question || a.qs || '').substring(0, 300);
                    row[`Ответ сотрудника ${i+1}`] = (a.selected || a.sel || '').substring(0, 300);
                    row[`Правильный ответ ${i+1}`] = (a.correct || a.cor || '').substring(0, 300);
                    row[`Результат ${i+1}`] = (a.isCorrect === true || a.ok === true) ? 'Верно' : 'Ошибка';
                }
            }
            excelData.push(row);
        }
        let sheetName = currentTest?.name || 'Детальные';
        if (sheetName.length > 31) sheetName = sheetName.substring(0, 28) + '...';
        const ws = XLSX.utils.json_to_sheet(excelData);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, sheetName);
        XLSX.writeFile(wb, `${sheetName}_детальный_${new Date().toLocaleDateString()}.xlsx`);
    } catch(e) { 
        console.error(e);
        alert('Ошибка при экспорте'); 
    }
}

// ============ ОТЧЁТ ДЛЯ РУКОВОДИТЕЛЯ (С ТАБЛИЦАМИ) ============
function generateReport() {
    if (!currentResults.length) {
        alert('Нет данных для отчёта');
        return;
    }
    
    const testName = currentTest?.name || 'Тест';
    const total = currentResults.length;
    const avgScore = Math.round(currentResults.reduce((s, r) => s + (r.score / r.total), 0) / total * 100);
    const excellent = currentResults.filter(r => (r.score / r.total) >= 0.8).length;
    const totalErrors = currentResults.reduce((s, r) => s + (r.total - r.score), 0);
    
    // РАСПРЕДЕЛЕНИЕ БАЛЛОВ
    const dist = { 'Отлично (80-100%)': 0, 'Хорошо (60-79%)': 0, 'Удовлетворительно (40-59%)': 0, 'Плохо (0-39%)': 0 };
    for (const r of currentResults) {
        const p = r.score / r.total * 100;
        if (p >= 80) dist['Отлично (80-100%)']++;
        else if (p >= 60) dist['Хорошо (60-79%)']++;
        else if (p >= 40) dist['Удовлетворительно (40-59%)']++;
        else dist['Плохо (0-39%)']++;
    }
    
    // СТАТИСТИКА ПО ГОРОДАМ
    const cityStats = {};
    for (const r of currentResults) {
        const city = r.city || 'Не указан';
        if (!cityStats[city]) cityStats[city] = { sumScore: 0, sumTotal: 0, count: 0 };
        cityStats[city].sumScore += r.score;
        cityStats[city].sumTotal += r.total;
        cityStats[city].count++;
    }
    
    // ЛУЧШИЕ СОТРУДНИКИ
    const topEmployees = [...currentResults].sort((a, b) => (b.score / b.total) - (a.score / a.total)).slice(0, 5);
    
    // ТЕМЫ ОШИБОК
    const questionTopics = {
        1: "Установление контакта",
        2: "Выявление потребностей",
        3: "Дополнительная продажа",
        4: "Переориентация на золото",
        5: "Футляр и уход",
        6: "Возражение по цене",
        7: "Альтернатива/каталог",
        8: "Презентация подарка",
        9: "Дополнительные модели",
        10: "Яндекс Сплит",
        11: "Инициатива в продажах"
    };
    
    const errorCount = {};
    for (const r of currentResults) {
        if (r.answers) {
            for (let i = 0; i < r.answers.length; i++) {
                const a = r.answers[i];
                const isCorrect = a.isCorrect === true || a.ok === true;
                if (!isCorrect) {
                    const topic = questionTopics[i+1] || `Вопрос ${i+1}`;
                    errorCount[topic] = (errorCount[topic] || 0) + 1;
                }
            }
        }
    }
    const topErrors = Object.entries(errorCount).sort((a, b) => b[1] - a[1]).slice(0, 5);
    
    // ФОРМИРУЕМ ОТЧЁТ
    let report = `📊 ОТЧЁТ ПО ТЕСТУ\n`;
    report += `${'━'.repeat(60)}\n`;
    report += `📋 Тест: ${testName}\n`;
    report += `📅 Дата: ${new Date().toLocaleDateString('ru-RU')}\n\n`;
    
    report += `📈 ОБЩАЯ СТАТИСТИКА\n`;
    report += `${'━'.repeat(60)}\n`;
    report += `Всего сотрудников: ${total}\n`;
    report += `Средний балл: ${avgScore}%\n`;
    report += `Отлично (≥80%): ${excellent} человек\n`;
    report += `Всего ошибок: ${totalErrors}\n\n`;
    
    // ТАБЛИЦА РАСПРЕДЕЛЕНИЯ БАЛЛОВ
    report += `📊 РАСПРЕДЕЛЕНИЕ БАЛЛОВ\n`;
    report += `${'━'.repeat(60)}\n`;
    report += `Категория                    │ Кол-во │ %\n`;
    report += `${'─'.repeat(60)}\n`;
    for (const [cat, count] of Object.entries(dist)) {
        const percent = total ? Math.round(count / total * 100) : 0;
        report += `${cat.padEnd(28)} │ ${String(count).padStart(5)} │ ${String(percent).padStart(3)}%\n`;
    }
    report += `\n`;
    
    // ТАБЛИЦА ПО ГОРОДАМ
    report += `🏙️ СТАТИСТИКА ПО ГОРОДАМ\n`;
    report += `${'━'.repeat(60)}\n`;
    report += `Город                │ Сотр. │ Средний балл │ Ошибок\n`;
    report += `${'─'.repeat(60)}\n`;
    for (const [city, data] of Object.entries(cityStats).sort((a, b) => b[1].count - a[1].count)) {
        const avg = Math.round(data.sumScore / data.sumTotal * 100);
        const errors = data.sumTotal - data.sumScore;
        report += `${city.padEnd(20)} │ ${String(data.count).padStart(5)} │ ${String(avg).padStart(12)}% │ ${String(errors).padStart(6)}\n`;
    }
    report += `\n`;
    
    // ЛУЧШИЕ СОТРУДНИКИ
    report += `🔝 ЛУЧШИЕ СОТРУДНИКИ\n`;
    report += `${'━'.repeat(60)}\n`;
    topEmployees.forEach((emp, i) => {
        const percent = Math.round(emp.score / emp.total * 100);
        const name = emp.user_id || `${emp.surname || ''} ${emp.name || ''}`.trim();
        report += `${i+1}. ${name} — ${emp.score}/${emp.total} (${percent}%)\n`;
    });
    report += `\n`;
    
    // ТАБЛИЦА ОШИБОК ПО ТЕМАМ
    report += `📚 ЧАСТЫЕ ОШИБКИ (по темам)\n`;
    report += `${'━'.repeat(60)}\n`;
    if (topErrors.length) {
        report += `№ │ Тема ошибки                           │ Кол-во │ %\n`;
        report += `${'─'.repeat(60)}\n`;
        topErrors.forEach(([topic, count], i) => {
            const percent = totalErrors ? Math.round(count / totalErrors * 100) : 0;
            report += `${i+1} │ ${topic.padEnd(35)} │ ${String(count).padStart(5)} │ ${String(percent).padStart(3)}%\n`;
        });
    } else {
        report += `Нет ошибок\n`;
    }
    report += `\n`;
    
    // РЕКОМЕНДАЦИИ
    report += `💡 РЕКОМЕНДАЦИИ ДЛЯ УЛУЧШЕНИЯ\n`;
    report += `${'━'.repeat(60)}\n`;
    if (topErrors.length) {
        const topTopics = topErrors.slice(0, 3).map(e => e[0]).join(', ');
        report += `• Основные зоны роста: ${topTopics}\n`;
        report += `• Проведите дополнительное обучение по этим темам\n`;
        report += `• Разберите типичные ошибки на планерке\n`;
    } else {
        report += `• Отличный результат! Поддерживайте высокий уровень.\n`;
    }
    report += `\n`;
    report += `${'━'.repeat(60)}\n`;
    report += `Отчёт сгенерирован автоматически\n`;
    
    navigator.clipboard.writeText(report).then(() => {
        alert('✅ Отчёт скопирован в буфер обмена!\n\nВставьте его в письмо (Ctrl+V)');
    }).catch(() => {
        alert('❌ Не удалось скопировать');
    });
}

// ============ ФИЛЬТРЫ ============
function resetFilters() {
    document.getElementById('search-input').value = '';
    document.getElementById('city-filter').value = '';
    document.getElementById('date-from').value = '';
    document.getElementById('date-to').value = '';
    renderResults();
}

function escapeHtml(s) {
    if (!s) return '';
    return s.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
}

// ============ ОБРАБОТЧИКИ ============
document.getElementById('search-input')?.addEventListener('input', () => renderResults());
document.getElementById('city-filter')?.addEventListener('change', () => renderResults());
document.getElementById('date-from')?.addEventListener('change', () => renderResults());
document.getElementById('date-to')?.addEventListener('change', () => renderResults());
document.getElementById('copyReportBtn')?.addEventListener('click', generateReport);

// ============ ЗАПУСК ============
loadTests();
</script>
