<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>585GOLD | Онлайн-мониторинг</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial; background: #f5f5f5; padding: 20px; }
        .card { background: white; border-radius: 16px; padding: 20px; margin-bottom: 20px; border-top: 4px solid #E30613; }
        .kpi-grid { display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 20px; }
        .kpi-card { background: white; padding: 20px; border-radius: 12px; text-align: center; min-width: 150px; border-left: 4px solid #E30613; }
        .kpi-value { font-size: 32px; font-weight: bold; color: #E30613; }
        .charts-row { display: flex; gap: 20px; flex-wrap: wrap; }
        .chart-card { background: white; padding: 20px; border-radius: 12px; flex: 1; min-width: 300px; }
        canvas { max-height: 250px; width: 100%; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #eee; }
        th { color: #E30613; }
        select, button { padding: 10px; margin: 5px; border-radius: 40px; border: 1px solid #ddd; }
        button { background: #E30613; color: white; border: none; cursor: pointer; }
        .status { margin: 10px 0; padding: 10px; border-radius: 8px; }
        .online { background: #d4edda; color: #155724; }
        .offline { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
<div class="card">
    <h1>💎 585GOLD | Онлайн-мониторинг</h1>
    <div>
        <select id="testSelector"></select>
        <button id="refreshBtn">🔄 Обновить</button>
        <span id="status" class="status"></span>
    </div>
</div>

<div id="resultsArea" style="display: none;">
    <div class="kpi-grid" id="kpi"></div>
    <div class="charts-row">
        <div class="chart-card"><h3>📊 Распределение баллов</h3><canvas id="scoreChart"></canvas></div>
        <div class="chart-card"><h3>🏙️ Успеваемость по городам</h3><canvas id="cityChart"></canvas></div>
    </div>
    <div class="card"><h3>📋 Список сотрудников</h3><div id="employeesList"></div></div>
</div>

<script>
    const SUPABASE_URL = 'https://qtostraaqrnjbxiydlip.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_0GzJSuoAi5zc7pHkicHMNg_cQ-rGAX7';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    
    let currentData = [];
    let scoreChart = null, cityChart = null;
    let currentSlug = null;
    
    const statusDiv = document.getElementById('status');
    const resultsArea = document.getElementById('resultsArea');
    const testSelector = document.getElementById('testSelector');
    const refreshBtn = document.getElementById('refreshBtn');
    
    async function loadTests() {
        statusDiv.className = 'status';
        statusDiv.innerHTML = '🔄 Загрузка тестов...';
        const { data, error } = await sb.from('tests').select('slug, name');
        if (error) {
            statusDiv.innerHTML = '❌ Ошибка: ' + error.message;
            statusDiv.classList.add('offline');
            return;
        }
        testSelector.innerHTML = '<option value="">-- Выберите тест --</option>';
        for (const test of data) {
            testSelector.innerHTML += `<option value="${test.slug}">${test.name}</option>`;
        }
        statusDiv.innerHTML = '✅ Тесты загружены, выберите тест';
        statusDiv.classList.add('online');
        
        if (data.length > 0 && !currentSlug) {
            // Не загружаем автоматически, ждём выбора
        }
    }
    
    async function loadResults(slug) {
        if (!slug) return;
        currentSlug = slug;
        statusDiv.innerHTML = '🔄 Загрузка результатов...';
        statusDiv.classList.remove('online', 'offline');
        
        const { data, error } = await sb.from('results').select('*').eq('test_type', slug);
        if (error) {
            statusDiv.innerHTML = '❌ Ошибка: ' + error.message;
            statusDiv.classList.add('offline');
            return;
        }
        if (!data || data.length === 0) {
            statusDiv.innerHTML = '⚠️ Нет результатов для этого теста';
            statusDiv.classList.add('offline');
            resultsArea.style.display = 'none';
            return;
        }
        
        currentData = data.map(row => ({
            name: row.user_id || row.name || 'Сотрудник',
            city: row.city || 'Не указан',
            score: row.score || 0,
            total: row.total || 11
        }));
        
        statusDiv.innerHTML = `✅ Загружено ${currentData.length} сотрудников. Последнее обновление: ${new Date().toLocaleTimeString()}`;
        statusDiv.classList.add('online');
        resultsArea.style.display = 'block';
        renderStats();
    }
    
    function renderStats() {
        const total = currentData.length;
        let sumScore = 0, excellent = 0, errors = 0;
        for (const e of currentData) {
            const p = (e.score / e.total) * 100;
            sumScore += p;
            if (p >= 80) excellent++;
            errors += (e.total - e.score);
        }
        const avg = Math.round(sumScore / total);
        
        document.getElementById('kpi').innerHTML = `
            <div class="kpi-card"><div class="kpi-value">${total}</div><div>Сотрудников</div></div>
            <div class="kpi-card"><div class="kpi-value">${avg}%</div><div>Средний балл</div></div>
            <div class="kpi-card"><div class="kpi-value">${excellent}</div><div>Отлично (≥80%)</div></div>
            <div class="kpi-card"><div class="kpi-value">${errors}</div><div>Ошибок</div></div>
        `;
        
        const scores = currentData.map(e => (e.score/e.total)*100);
        const cats = ['Отлично (80-100%)', 'Хорошо (60-79%)', 'Удовлетворительно (40-59%)', 'Плохо (0-39%)'];
        const dist = [
            scores.filter(s => s >= 80).length,
            scores.filter(s => s >= 60 && s < 80).length,
            scores.filter(s => s >= 40 && s < 60).length,
            scores.filter(s => s < 40).length
        ];
        if (scoreChart) scoreChart.destroy();
        scoreChart = new Chart(document.getElementById('scoreChart'), {
            type: 'bar', data: { labels: cats, datasets: [{ label: 'Количество', data: dist, backgroundColor: '#E30613' }] }
        });
        
        const cityMap = new Map();
        for (const e of currentData) {
            const city = e.city;
            const p = (e.score/e.total)*100;
            if (!cityMap.has(city)) cityMap.set(city, { sum: 0, count: 0, errors: 0 });
            const s = cityMap.get(city);
            s.sum += p;
            s.count++;
            s.errors += (e.total - e.score);
        }
        const cityData = Array.from(cityMap.entries()).map(([c, s]) => ({ city: c, count: s.count, avg: (s.sum/s.count).toFixed(0), errors: s.errors })).sort((a,b) => b.avg - a.avg);
        if (cityChart) cityChart.destroy();
        cityChart = new Chart(document.getElementById('cityChart'), {
            type: 'bar', data: { labels: cityData.map(c => c.city), datasets: [{ label: 'Средний балл (%)', data: cityData.map(c => c.avg), backgroundColor: '#E30613' }] }
        });
        
        const employeesHtml = currentData.map(e => {
            const percent = Math.round(e.score/e.total*100);
            const color = percent >= 80 ? '🟢' : (percent >= 50 ? '🟡' : '🔴');
            return `<div style="padding: 8px; border-bottom: 1px solid #eee;">${color} <strong>${e.name}</strong> — ${e.score}/${e.total} (${percent}%) — ${e.city}</div>`;
        }).join('');
        document.getElementById('employeesList').innerHTML = employeesHtml || '<div>Нет данных</div>';
    }
    
    testSelector.onchange = () => {
        if (testSelector.value) loadResults(testSelector.value);
    };
    refreshBtn.onclick = () => {
        if (currentSlug) loadResults(currentSlug);
    };
    
    loadTests();
</script>
</body>
</html>
