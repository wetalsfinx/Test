<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>585GOLD | Анализ результатов тестирования</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #f8f9fc 0%, #f1f3f8 100%);
            min-height: 100vh;
            padding: 24px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        /* Header */
        .header {
            background: white;
            border-radius: 28px;
            padding: 24px 32px;
            margin-bottom: 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
            border: 1px solid rgba(227,6,19,0.08);
            position: relative;
            overflow: hidden;
        }
        
        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #E30613, #ff4d4d);
        }
        
        .header h1 {
            font-size: 28px;
            font-weight: 700;
            color: #1a1a2e;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .header h1 i {
            color: #E30613;
            font-size: 28px;
        }
        
        .header p {
            color: #6c757d;
            font-size: 14px;
            margin-top: 8px;
        }
        
        /* Cards */
        .card {
            background: white;
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.02);
            border: 1px solid #eef2f6;
            transition: all 0.2s ease;
        }
        
        .card:hover {
            box-shadow: 0 8px 28px rgba(0,0,0,0.06);
            transform: translateY(-2px);
        }
        
        .card-title {
            font-size: 18px;
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            padding-bottom: 12px;
            border-bottom: 2px solid #E30613;
        }
        
        .card-title i {
            color: #E30613;
            font-size: 20px;
        }
        
        /* KPI Grid */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 24px;
        }
        
        @media (max-width: 1000px) {
            .kpi-grid { grid-template-columns: repeat(2, 1fr); }
        }
        
        @media (max-width: 600px) {
            .kpi-grid { grid-template-columns: 1fr; }
        }
        
        .kpi-card {
            background: white;
            border-radius: 24px;
            padding: 20px;
            border-left: 4px solid #E30613;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
            transition: all 0.2s;
        }
        
        .kpi-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 24px rgba(227,6,19,0.08);
        }
        
        .kpi-value {
            font-size: 36px;
            font-weight: 800;
            color: #E30613;
            line-height: 1.2;
        }
        
        .kpi-label {
            font-size: 13px;
            font-weight: 500;
            color: #6c757d;
            margin-top: 8px;
            letter-spacing: 0.3px;
        }
        
        /* Buttons */
        .btn {
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            font-weight: 500;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-primary {
            background: #E30613;
            color: white;
        }
        
        .btn-primary:hover {
            background: #c41c2a;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(227,6,19,0.3);
        }
        
        .btn-secondary {
            background: #f0f2f5;
            color: #1a1a2e;
        }
        
        .btn-secondary:hover {
            background: #e4e8ec;
        }
        
        .btn-outline {
            background: transparent;
            border: 1px solid #E30613;
            color: #E30613;
        }
        
        .btn-outline:hover {
            background: #E30613;
            color: white;
        }
        
        /* Controls */
        .controls {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
            margin-top: 16px;
        }
        
        select, input {
            padding: 10px 18px;
            border-radius: 40px;
            border: 1px solid #ddd;
            font-size: 14px;
            background: white;
            outline: none;
            transition: all 0.2s;
        }
        
        select:focus, input:focus {
            border-color: #E30613;
            box-shadow: 0 0 0 3px rgba(227,6,19,0.1);
        }
        
        /* Tables */
        .stats-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .stats-table th,
        .stats-table td {
            padding: 14px 12px;
            text-align: left;
            border-bottom: 1px solid #edf2f7;
        }
        
        .stats-table th {
            font-weight: 600;
            color: #E30613;
            font-size: 13px;
            background: #fafbfc;
        }
        
        .stats-table tr:hover td {
            background: #fef5f5;
        }
        
        /* Employee list */
        .employee-item {
            padding: 14px 0;
            border-bottom: 1px solid #edf2f7;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            transition: all 0.2s;
        }
        
        .employee-item:hover {
            background: #fef5f5;
            padding-left: 12px;
        }
        
        .employee-name {
            font-weight: 600;
            color: #1a1a2e;
        }
        
        .employee-score {
            background: #E30613;
            color: white;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .employee-city {
            color: #6c757d;
            font-size: 13px;
        }
        
        /* Filter bar */
        .filter-bar {
            background: white;
            padding: 16px 20px;
            border-radius: 60px;
            margin-bottom: 20px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
            border: 1px solid #eef2f6;
        }
        
        /* Status */
        .status {
            font-size: 13px;
            padding: 8px 16px;
            border-radius: 40px;
            background: #f0f2f5;
            color: #6c757d;
        }
        
        .status.success {
            background: #e6f4ea;
            color: #2e7d64;
        }
        
        .status.error {
            background: #fee8e8;
            color: #E30613;
        }
        
        /* Charts row */
        .charts-row {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px;
            margin-bottom: 24px;
        }
        
        @media (max-width: 900px) {
            .charts-row { grid-template-columns: 1fr; }
        }
        
        canvas {
            max-height: 260px;
            width: 100%;
        }
        
        /* Footer */
        .footer {
            text-align: center;
            padding: 20px;
            color: #8ba3bc;
            font-size: 12px;
        }
        
        @media print {
            .no-print { display: none !important; }
            body { background: white; padding: 0; }
        }
    </style>
</head>
<body>
<div class="container">
    <!-- Header -->
    <div class="header">
        <h1><i class="bi bi-gem"></i> 585GOLD</h1>
        <p>Анализ результатов тестирования сотрудников</p>
        <div class="controls no-print">
            <select id="testSelector" style="min-width: 260px;">
                <option value="">-- Загрузка тестов... --</option>
            </select>
            <button class="btn btn-primary" id="loadBtn"><i class="bi bi-cloud-download"></i> Загрузить</button>
            <button class="btn btn-secondary" id="copyBtn"><i class="bi bi-envelope-paper"></i> Копировать отчёт</button>
            <button class="btn btn-secondary" id="pdfBtn"><i class="bi bi-file-pdf"></i> Скачать PDF</button>
        </div>
        <div id="status" class="status" style="margin-top: 16px;">🔄 Загрузка тестов...</div>
    </div>

    <!-- Results -->
    <div id="results" style="display: none;">
        <!-- KPI -->
        <div class="kpi-grid" id="kpi"></div>
        
        <!-- Charts -->
        <div class="charts-row">
            <div class="card">
                <div class="card-title"><i class="bi bi-bar-chart-steps"></i> Распределение баллов</div>
                <canvas id="scoreChart"></canvas>
            </div>
            <div class="card">
                <div class="card-title"><i class="bi bi-building"></i> Успеваемость по городам</div>
                <canvas id="cityChart"></canvas>
            </div>
        </div>
        
        <!-- City stats -->
        <div class="card">
            <div class="card-title"><i class="bi bi-table"></i> Статистика по городам</div>
            <table class="stats-table" id="cityTable">
                <thead><tr><th>Город</th><th>Сотрудников</th><th>Средний балл</th><th>Ошибок</th></tr></thead>
                <tbody id="cityBody"></tbody>
            </table>
        </div>
        
        <!-- Top employees -->
        <div class="card">
            <div class="card-title"><i class="bi bi-trophy"></i> Лучшие сотрудники</div>
            <table class="stats-table" id="topTable">
                <thead><tr><th>#</th><th>Сотрудник</th><th>Город</th><th>Результат</th></tr></thead>
                <tbody id="topBody"></tbody>
            </table>
        </div>
        
        <!-- Filters -->
        <div class="filter-bar no-print">
            <i class="bi bi-funnel"></i>
            <input type="text" id="searchInput" placeholder="Поиск по имени...">
            <select id="cityFilter">
                <option value="all">Все города</option>
            </select>
            <button class="btn btn-secondary" onclick="resetFilters()" style="padding: 8px 18px;">Сбросить</button>
        </div>
        
        <!-- Employees list -->
        <div class="card">
            <div class="card-title"><i class="bi bi-people"></i> Список сотрудников <span id="employeeCount" style="font-size: 14px; color: #6c757d;"></span></div>
            <div id="employeesList" style="max-height: 500px; overflow-y: auto;"></div>
        </div>
    </div>
    
    <div class="footer no-print">💎 585GOLD | Данные загружаются из Supabase</div>
</div>

<script>
    const SUPABASE_URL = 'https://qtostraaqrnjbxiydlip.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_0GzJSuoAi5zc7pHkicHMNg_cQ-rGAX7';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    
    let currentData = [];
    let scoreChart = null, cityChart = null;
    let currentCityFilter = "all";
    
    function escapeHtml(s) { if (!s) return ''; return s.replace(/[&<>]/g, function(m) { if (m === '&') return '&amp;'; if (m === '<') return '&lt;'; if (m === '>') return '&gt;'; return m; }); }
    
    async function loadTests() {
        const status = document.getElementById('status');
        status.innerHTML = '🔄 Загрузка тестов...';
        status.className = 'status';
        const { data, error } = await sb.from('tests').select('slug, name');
        if (error) {
            status.innerHTML = '❌ Ошибка: ' + error.message;
            status.classList.add('error');
            return;
        }
        const selector = document.getElementById('testSelector');
        selector.innerHTML = '<option value="">-- Выберите тест --</option>';
        for (const test of data) {
            selector.innerHTML += `<option value="${test.slug}">${test.name}</option>`;
        }
        status.innerHTML = '✅ Готово. Выберите тест и нажмите "Загрузить"';
        status.classList.add('success');
        status.classList.remove('error');
    }
    
    async function loadResults() {
        const slug = document.getElementById('testSelector').value;
        if (!slug) { alert('Выберите тест'); return; }
        const status = document.getElementById('status');
        status.innerHTML = '🔄 Загрузка результатов...';
        status.className = 'status';
        const { data, error } = await sb.from('results').select('*').eq('test_type', slug);
        if (error) {
            status.innerHTML = '❌ Ошибка: ' + error.message;
            status.classList.add('error');
            return;
        }
        if (!data || data.length === 0) {
            status.innerHTML = '⚠️ Нет результатов для этого теста';
            status.classList.add('error');
            return;
        }
        
        currentData = data.map(row => ({
            name: row.user_id || row.name || 'Сотрудник',
            city: row.city || 'Не указан',
            score: row.score || 0,
            total: row.total || 11
        }));
        
        status.innerHTML = '✅ Загружено ' + currentData.length + ' сотрудников';
        status.classList.add('success');
        document.getElementById('results').style.display = 'block';
        
        const cities = [...new Set(currentData.map(e => e.city).filter(c => c && c !== 'Не указан'))];
        const citySelect = document.getElementById('cityFilter');
        citySelect.innerHTML = '<option value="all">Все города</option>' + cities.map(c => `<option value="${c}">${c}</option>`).join('');
        
        renderAll();
    }
    
    function renderAll() {
        let filtered = currentCityFilter === "all" ? currentData : currentData.filter(e => e.city === currentCityFilter);
        const search = document.getElementById('searchInput')?.value.toLowerCase() || '';
        if (search) filtered = filtered.filter(e => e.name.toLowerCase().includes(search));
        
        const total = filtered.length;
        let sumScore = 0, excellent = 0, errors = 0;
        for (const e of filtered) {
            const p = (e.score / e.total) * 100;
            sumScore += p;
            if (p >= 80) excellent++;
            errors += (e.total - e.score);
        }
        const avg = total ? Math.round(sumScore / total) : 0;
        
        document.getElementById('kpi').innerHTML = `
            <div class="kpi-card">
                <div class="kpi-value">${total}</div>
                <div class="kpi-label"><i class="bi bi-people"></i> Сотрудников</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-value">${avg}%</div>
                <div class="kpi-label"><i class="bi bi-graph-up"></i> Средний балл</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-value">${excellent}</div>
                <div class="kpi-label"><i class="bi bi-star-fill"></i> Отлично (≥80%)</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-value">${errors}</div>
                <div class="kpi-label"><i class="bi bi-x-circle"></i> Всего ошибок</div>
            </div>
        `;
        
        // Score distribution chart
        const scores = currentData.map(e => (e.score/e.total)*100);
        const cats = ['Отлично (80-100%)', 'Хорошо (60-79%)', 'Удовлетворительно (40-59%)', 'Плохо (0-39%)'];
        const dist = [
            scores.filter(s => s >= 80).length,
            scores.filter(s => s >= 60 && s < 80).length,
            scores.filter(s => s >= 40 && s < 60).length,
            scores.filter(s => s < 40).length
        ];
        if (scoreChart) scoreChart.destroy();
        scoreChart = new Chart(document.getElementById('scoreChart'), {
            type: 'bar', data: { labels: cats, datasets: [{ label: 'Количество', data: dist, backgroundColor: '#E30613', borderRadius: 12 }] },
            options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { display: false } } }
        });
        
        // City chart
        const cityMap = new Map();
        for (const e of currentData) {
            const city = e.city;
            if (city === 'Не указан') continue;
            const p = (e.score/e.total)*100;
            if (!cityMap.has(city)) cityMap.set(city, { sum: 0, count: 0, errors: 0 });
            const s = cityMap.get(city);
            s.sum += p;
            s.count++;
            s.errors += (e.total - e.score);
        }
        const cityData = Array.from(cityMap.entries()).map(([c, s]) => ({ city: c, count: s.count, avg: (s.sum/s.count).toFixed(0), errors: s.errors })).sort((a,b) => b.avg - a.avg);
        if (cityChart) cityChart.destroy();
        cityChart = new Chart(document.getElementById('cityChart'), {
            type: 'bar', data: { labels: cityData.map(c => c.city), datasets: [{ label: 'Средний балл (%)', data: cityData.map(c => c.avg), backgroundColor: '#E30613', borderRadius: 12 }] },
            options: { responsive: true, scales: { y: { min: 0, max: 100, title: { display: true, text: 'Средний балл (%)' } } }, plugins: { legend: { display: false } } }
        });
        
        // City table
        document.getElementById('cityBody').innerHTML = cityData.map(c => `<tr><td style="padding:12px">${c.city}${c.avg === '100' ? ' <i class="bi bi-trophy-fill" style="color:#ffc107"></i>' : ''}</td><td style="padding:12px">${c.count}</td><td style="padding:12px"><strong>${c.avg}%</strong></td onclick="applyCityFilter('${c.city}')"><td><td style="padding:12px">${c.errors}</td></tr>`).join('');
        
        // Top employees
        const top10 = [...currentData].sort((a,b) => (b.score/b.total) - (a.score/a.total)).slice(0, 10);
        document.getElementById('topBody').innerHTML = top10.map((e, i) => {
            const p = Math.round(e.score/e.total*100);
            let medal = '';
            if (i === 0) medal = ' 🥇';
            else if (i === 1) medal = ' 🥈';
            else if (i === 2) medal = ' 🥉';
            return `<tr><td style="padding:12px"><strong>${i+1}</strong>${medal}</td><td style="padding:12px">${escapeHtml(e.name)}</td><td style="padding:12px">${escapeHtml(e.city)}</td><td style="padding:12px"><span class="employee-score" style="background:#28a745;">${e.score}/${e.total} (${p}%)</span></td></td>`;
        }).join('');
        
        // Employees list
        document.getElementById('employeeCount').innerHTML = `(${filtered.length})`;
        const employeesHtml = filtered.map(e => {
            const p = Math.round(e.score/e.total*100);
            let color = '';
            if (p >= 80) color = '#28a745';
            else if (p >= 50) color = '#ffc107';
            else color = '#dc3545';
            return `<div class="employee-item">
                <span class="employee-name">${escapeHtml(e.name)}</span>
                <div><span class="employee-score" style="background: ${color};">${e.score}/${e.total} (${p}%)</span></div>
                <span class="employee-city"><i class="bi bi-geo-alt"></i> ${escapeHtml(e.city)}</span>
            </div>`;
        }).join('');
        document.getElementById('employeesList').innerHTML = employeesHtml || '<div style="text-align:center; padding:40px; color:#999;">Нет данных</div>';
    }
    
    function resetFilters() { 
        document.getElementById('searchInput').value = ''; 
        document.getElementById('cityFilter').value = 'all'; 
        currentCityFilter = 'all'; 
        renderAll(); 
    }
    
    function applyCityFilter(city) { 
        document.getElementById('cityFilter').value = city; 
        currentCityFilter = city; 
        renderAll(); 
    }
    
    function generateReport() {
        if (!currentData.length) { alert('Нет данных'); return; }
        const total = currentData.length;
        const avg = Math.round(currentData.reduce((s,e) => s + (e.score/e.total), 0) / total * 100);
        const excellent = currentData.filter(e => (e.score/e.total) >= 0.8).length;
        const errors = currentData.reduce((s,e) => s + (e.total - e.score), 0);
        const date = new Date().toLocaleDateString('ru-RU');
        let text = `📊 ОТЧЁТ ПО ТЕСТУ\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n📅 Дата: ${date}\n\n📈 ОБЩАЯ СТАТИСТИКА\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\nВсего сотрудников: ${total}\nСредний балл: ${avg}%\nОтлично (≥80%): ${excellent}\nВсего ошибок: ${errors}\n\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\nОтчёт сгенерирован автоматически\n585GOLD`;
        navigator.clipboard.writeText(text).then(() => alert('✅ Отчёт скопирован в буфер обмена!'));
    }
    
    function downloadPDF() { 
        if (!currentData.length) { alert('Нет данных'); return; }
        const element = document.querySelector('.container');
        html2pdf().set({ margin: 0.5, filename: 'отчёт_585GOLD_' + new Date().toISOString().slice(0,19) + '.pdf', image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2 }, jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' } }).from(element).save();
    }
    
    document.getElementById('loadBtn').onclick = loadResults;
    document.getElementById('copyBtn').onclick = generateReport;
    document.getElementById('pdfBtn').onclick = downloadPDF;
    document.getElementById('searchInput').addEventListener('input', function() { renderAll(); });
    document.getElementById('cityFilter').addEventListener('change', function(e) { currentCityFilter = e.target.value; renderAll(); });
    
    loadTests();
</script>
</body>
</html>
