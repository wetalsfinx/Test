<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>585GOLD | Анализ результатов</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body{background:#f0f2f8;padding:20px;font-family:'Segoe UI',sans-serif}
        .card{background:#fff;border-radius:20px;padding:20px;margin-bottom:20px;border-top:4px solid #E30613;box-shadow:0 2px 8px rgba(0,0,0,0.05)}
        .btn{background:#E30613;color:#fff;border:none;padding:8px 20px;border-radius:40px;margin:5px;cursor:pointer;transition:0.2s}
        .btn:hover{background:#c41c2a}
        .btn-secondary{background:#6c757d}
        .mode-active{background:#c41c2a}
        .kpi-grid{display:flex;gap:20px;flex-wrap:wrap;margin-bottom:20px}
        .kpi-card{background:#fff;padding:20px;border-radius:16px;border-left:4px solid #E30613;min-width:150px;text-align:center}
        .kpi-value{font-size:32px;font-weight:bold;color:#E30613}
        .kpi-label{font-size:12px;color:#666;margin-top:5px}
        canvas{max-height:200px;width:100%}
        .mode-buttons{display:flex;gap:10px;margin-bottom:15px}
        select,input{padding:8px 15px;border-radius:40px;border:1px solid #ddd}
        .filter-bar{background:#fff;padding:15px;border-radius:16px;margin:15px 0;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
        .employees-container{max-height:400px;overflow-y:auto;border-radius:16px}
        .employee-item{padding:12px;border-bottom:1px solid #eee;cursor:pointer;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
        .employee-item:hover{background:#fef5f5}
        .employee-name{font-weight:600}
        .employee-score{background:#E30613;color:#fff;padding:4px 12px;border-radius:40px;font-size:12px;font-weight:600}
        .employee-city{color:#6c757d;font-size:13px}
        .city-stats{display:flex;flex-direction:column;gap:12px}
        .city-row{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:#f8f9fa;border-radius:12px;cursor:pointer}
        .city-row:hover{background:#fef5f5;transform:translateX(5px)}
        .city-name{font-weight:600;display:flex;align-items:center;gap:8px}
        .city-badge{background:#E30613;color:#fff;padding:4px 12px;border-radius:40px;font-size:14px;font-weight:600}
        .city-stats-info{display:flex;gap:20px}
        .city-stat{text-align:center;min-width:60px}
        .city-stat-value{font-size:18px;font-weight:700;color:#E30613}
        .city-stat-label{font-size:10px;color:#6c757d}
        .best-table{width:100%;border-collapse:collapse}
        .best-table th,.best-table td{padding:12px;text-align:left;border-bottom:1px solid #eee}
        .best-table th{background:#E30613;color:#fff}
        .best-table tr:hover td{background:#fef5f5;cursor:pointer}
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h1><i class="bi bi-gem"></i> 585GOLD | Анализ результатов</h1>
        <div class="mode-buttons">
            <button class="btn mode-active" id="modeSupabaseBtn">☁️ Supabase</button>
            <button class="btn btn-secondary" id="modeExcelBtn">📂 Excel</button>
        </div>
        <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:10px">
            <select id="testSelector" style="width:280px">
                <option value="">-- Загрузка тестов... --</option>
            </select>
            <button class="btn" id="loadBtn">📊 Загрузить</button>
            <button class="btn" id="copyBtn">📧 Копировать</button>
            <button class="btn" id="pdfBtn">📄 PDF</button>
        </div>
        <div id="excelUpload" style="display:none; margin-top:15px">
            <div style="border:2px dashed #ddd;border-radius:20px;padding:20px;text-align:center;cursor:pointer" id="uploadZone">
                <i class="bi bi-file-excel" style="font-size:32px;color:#E30613"></i>
                <p>Загрузите Excel-файл (кнопка «Детальный» из админки)</p>
                <input type="file" id="fileInput" accept=".xlsx,.xls" style="display:none">
                <button class="btn" id="selectFileBtn">📂 Выбрать файл</button>
            </div>
        </div>
        <div id="status" class="mt-2 text-muted"></div>
    </div>

    <div id="results" style="display:none">
        <div class="kpi-grid" id="kpi"></div>
        <div class="row">
            <div class="col-md-6"><div class="card"><h3>📊 Распределение баллов</h3><canvas id="scoreChart"></canvas></div></div>
            <div class="col-md-6"><div class="card"><h3>🏙️ Успеваемость по городам</h3><canvas id="cityChart"></canvas></div></div>
        </div>
        
        <div class="card">
            <h3>🏙️ Статистика по городам</h3>
            <div class="city-stats" id="cityStats"></div>
        </div>
        
        <div class="card">
            <h3>🏆 Лучшие сотрудники</h3>
            <table class="best-table"><thead><tr><th>#</th><th>Сотрудник</th><th>Город</th><th>Результат</th></tr></thead><tbody id="topList"></tbody></table>
        </div>
        
        <div class="filter-bar">
            <input type="text" id="searchInput" placeholder="Поиск...">
            <select id="cityFilter"><option value="all">Все города</option></select>
            <button class="btn" onclick="resetFilters()" style="background:#6c757d">Сброс</button>
        </div>
        
        <div class="card">
            <h3>📋 Список сотрудников (<span id="empCount">0</span>)</h3>
            <div class="employees-container" id="empList"></div>
        </div>
    </div>
</div>

<script>
    const sb = supabase.createClient('https://qtostraaqrnjbxiydlip.supabase.co', 'sb_publishable_0GzJSuoAi5zc7pHkicHMNg_cQ-rGAX7');
    
    let allData = [], excelErrors = [], scoreChart = null, cityChart = null;
    let cityFilter = "all", currentMode = 'supabase';
    
    async function loadTests() {
        const { data } = await sb.from('tests').select('slug, name');
        const sel = document.getElementById('testSelector');
        sel.innerHTML = '<option value="">-- Выберите тест --</option>';
        for (const t of data) sel.innerHTML += `<option value="${t.slug}">${t.name}</option>`;
    }
    
    async function loadSupabase() {
        const slug = document.getElementById('testSelector').value;
        if (!slug) { alert('Выберите тест'); return; }
        document.getElementById('status').innerHTML = 'Загрузка...';
        const { data } = await sb.from('results').select('*').eq('test_type', slug);
        if (!data || !data.length) { alert('Нет данных'); return; }
        allData = data.map(r => ({ name: r.user_id || r.name || 'Сотрудник', city: r.city || 'Не указан', score: r.score || 0, total: r.total || 11 }));
        excelErrors = [];
        document.getElementById('status').innerHTML = `✅ ${allData.length} сотрудников`;
        document.getElementById('results').style.display = 'block';
        updateCityFilter();
        renderAll();
    }
    
    function parseExcel(file) {
        const reader = new FileReader();
        reader.onload = e => {
            const sheet = XLSX.read(new Uint8Array(e.target.result), { type: 'array' }).Sheets[0];
            const rows = XLSX.utils.sheet_to_json(sheet);
            if (!rows.length) return alert('Файл пуст');
            const employees = [], errors = [];
            for (const row of rows) {
                const name = row['ФИО'] || '';
                if (!name) continue;
                let score = 0, total = 11;
                const match = (row['Баллы'] || '').match(/(\d+)\/(\d+)/);
                if (match) { score = +match[1]; total = +match[2]; }
                employees.push({ name, city: row['Город'] || '', score, total });
            }
            allData = employees;
            excelErrors = [];
            document.getElementById('status').innerHTML = `✅ ${employees.length} сотрудников из Excel`;
            document.getElementById('results').style.display = 'block';
            updateCityFilter();
            renderAll();
        };
        reader.readAsArrayBuffer(file);
    }
    
    function updateCityFilter() {
        const cities = [...new Set(allData.map(e => e.city).filter(c => c && c !== 'Не указан'))];
        const sel = document.getElementById('cityFilter');
        sel.innerHTML = '<option value="all">Все города</option>' + cities.map(c => `<option value="${c}">${c}</option>`).join('');
    }
    
    function renderAll() {
        let filtered = cityFilter === 'all' ? allData : allData.filter(e => e.city === cityFilter);
        const search = document.getElementById('searchInput')?.value.toLowerCase() || '';
        if (search) filtered = filtered.filter(e => e.name.toLowerCase().includes(search));
        
        const total = filtered.length, sum = filtered.reduce((s,e) => s + (e.score/e.total)*100, 0);
        const avg = total ? Math.round(sum/total) : 0;
        const excellent = filtered.filter(e => (e.score/e.total)*100 >= 80).length;
        const errors = filtered.reduce((s,e) => s + (e.total - e.score), 0);
        
        document.getElementById('kpi').innerHTML = `
            <div class="kpi-card"><div class="kpi-value">${total}</div><div>Сотрудников</div></div>
            <div class="kpi-card"><div class="kpi-value">${avg}%</div><div>Средний балл</div></div>
            <div class="kpi-card"><div class="kpi-value">${excellent}</div><div>Отлично (≥80%)</div></div>
            <div class="kpi-card"><div class="kpi-value">${errors}</div><div>Ошибок</div></div>
        `;
        
        const scores = allData.map(e => e.score/e.total*100);
        const dist = [scores.filter(s=>s>=80).length, scores.filter(s=>s>=60&&s<80).length, scores.filter(s=>s>=40&&s<60).length, scores.filter(s=>s<40).length];
        if (scoreChart) scoreChart.destroy();
        scoreChart = new Chart(document.getElementById('scoreChart'), { type: 'bar', data: { labels: ['80-100%','60-79%','40-59%','0-39%'], datasets: [{ label: 'Кол-во', data: dist, backgroundColor: '#E30613' }] } });
        
        const cityMap = new Map();
        for (const e of allData) {
            if (e.city === 'Не указан') continue;
            const p = e.score/e.total*100;
            const s = cityMap.get(e.city) || { sum:0, count:0, errors:0 };
            s.sum += p; s.count++; s.errors += e.total - e.score;
            cityMap.set(e.city, s);
        }
        const cityData = Array.from(cityMap.entries()).map(([c,s]) => ({ city:c, count:s.count, avg: (s.sum/s.count).toFixed(0), errors: s.errors })).sort((a,b)=>b.avg-a.avg);
        if (cityChart) cityChart.destroy();
        cityChart = new Chart(document.getElementById('cityChart'), { type: 'bar', data: { labels: cityData.map(c=>c.city), datasets: [{ label: 'Средний балл %', data: cityData.map(c=>c.avg), backgroundColor: '#E30613' }] } });
        
        document.getElementById('cityStats').innerHTML = cityData.map(c => `
            <div class="city-row" onclick="document.getElementById('cityFilter').value='${c.city}'; cityFilter='${c.city}'; renderAll()">
                <div class="city-name"><span class="city-badge">${c.city}</span>${c.avg=='100'?'🥇':''}</div>
                <div class="city-stats-info">
                    <div class="city-stat"><div class="city-stat-value">${c.count}</div><div class="city-stat-label">сотр.</div></div>
                    <div class="city-stat"><div class="city-stat-value">${c.avg}%</div><div class="city-stat-label">средний</div></div>
                    <div class="city-stat"><div class="city-stat-value">${c.errors}</div><div class="city-stat-label">ошибок</div></div>
                </div>
            </div>
        `).join('');
        
        const top10 = [...allData].sort((a,b)=>b.score/b.total - a.score/a.total).slice(0,10);
        document.getElementById('topList').innerHTML = top10.map((e,i)=>`
            <tr onclick="document.getElementById('cityFilter').value='${e.city}'; cityFilter='${e.city}'; renderAll()">
                <td><strong>${i+1}</strong>${i==0?'🥇':i==1?'🥈':i==2?'🥉':''}</td><td>${e.name}</td><td>${e.city}</td>
                <td><span style="background:#28a745;color:#fff;padding:4px 12px;border-radius:40px">${e.score}/${e.total} (${Math.round(e.score/e.total*100)}%)</span></td>
            </tr>
        `).join('');
        
        document.getElementById('empCount').innerText = filtered.length;
        document.getElementById('empList').innerHTML = filtered.map(e => {
            const p = Math.round(e.score/e.total*100);
            return `<div class="employee-item" onclick="document.getElementById('cityFilter').value='${e.city}'; cityFilter='${e.city}'; renderAll()">
                <span class="employee-name">${e.name}</span>
                <span class="employee-score" style="background:${p>=80?'#28a745':p>=50?'#ffc107':'#dc3545'}">${e.score}/${e.total} (${p}%)</span>
                <span class="employee-city"><i class="bi bi-geo-alt"></i> ${e.city}</span>
            </div>`;
        }).join('');
    }
    
    function resetFilters() { document.getElementById('searchInput').value = ''; document.getElementById('cityFilter').value = 'all'; cityFilter = 'all'; renderAll(); }
    
    document.getElementById('modeSupabaseBtn').onclick = () => {
        currentMode = 'supabase';
        document.getElementById('modeSupabaseBtn').classList.add('mode-active');
        document.getElementById('modeExcelBtn').classList.remove('mode-active');
        document.getElementById('testSelector').style.display = 'inline-block';
        document.getElementById('loadBtn').style.display = 'inline-block';
        document.getElementById('excelUpload').style.display = 'none';
        loadTests();
    };
    document.getElementById('modeExcelBtn').onclick = () => {
        currentMode = 'excel';
        document.getElementById('modeExcelBtn').classList.add('mode-active');
        document.getElementById('modeSupabaseBtn').classList.remove('mode-active');
        document.getElementById('testSelector').style.display = 'none';
        document.getElementById('loadBtn').style.display = 'none';
        document.getElementById('excelUpload').style.display = 'block';
    };
    document.getElementById('loadBtn').onclick = loadSupabase;
    document.getElementById('selectFileBtn').onclick = () => document.getElementById('fileInput').click();
    document.getElementById('fileInput').onchange = e => e.target.files[0] && parseExcel(e.target.files[0]);
    document.getElementById('copyBtn').onclick = () => { if(allData.length) navigator.clipboard.writeText(`Отчёт ${new Date().toLocaleDateString()}\nСотрудников: ${allData.length}\nСредний балл: ${Math.round(allData.reduce((s,e)=>s+e.score/e.total,0)/allData.length*100)}%`).then(()=>alert('Скопировано!')); else alert('Нет данных'); };
    document.getElementById('pdfBtn').onclick = () => { if(allData.length) html2pdf().set({margin:0.5,filename:'отчёт.pdf'}).from(document.querySelector('.container')).save(); else alert('Нет данных'); };
    document.getElementById('searchInput').addEventListener('input', () => renderAll());
    document.getElementById('cityFilter').addEventListener('change', (e) => { cityFilter = e.target.value; renderAll(); });
    
    loadTests();
</script>
</body>
</html>
