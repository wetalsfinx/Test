<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Админка + Дашборд | Результаты тестов</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
    :root {
        --bg-body: #f5f7fa;
        --bg-card: white;
        --text-color: #212529;
        --text-muted: #6c757d;
        --border-color: #dee2e6;
        --header-bg: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        --filter-bg: white;
        --user-log-bg: #f8f9fa;
        --user-log-hover: #e9ecef;
        --user-log-border: #0d6efd;
        --expand-icon-color: #6c757d;
        --btn-outline-border: #dee2e6;
        --btn-outline-hover-bg: #e9ecef;
        --input-bg: white;
        --input-border: #ced4da;
        --chart-grid: #ddd;
    }
    body.dark {
        --bg-body: #1a1a2e;
        --bg-card: #16213e;
        --text-color: #e0e0e0;
        --text-muted: #aaa;
        --border-color: #2c3e50;
        --header-bg: linear-gradient(135deg, #0f3460 0%, #1a1a2e 100%);
        --filter-bg: #0f3460;
        --user-log-bg: #0f3460;
        --user-log-hover: #1a1a2e;
        --user-log-border: #4facfe;
        --expand-icon-color: #aaa;
        --btn-outline-border: #2c3e50;
        --btn-outline-hover-bg: #2c3e50;
        --input-bg: #0f3460;
        --input-border: #2c3e50;
        --chart-grid: #2c3e50;
    }
    body { background: var(--bg-body); font-family: 'Segoe UI', sans-serif; transition: all 0.3s; color: var(--text-color); }
    .user-log { border-left: 4px solid var(--user-log-border); padding: 12px; background: var(--user-log-bg); margin-bottom: 12px; border-radius: 0 8px 8px 0; cursor: pointer; transition: all 0.2s; }
    .user-log:hover { background: var(--user-log-hover); transform: translateX(4px); }
    .correct { color: #4caf50; font-weight: 600; }
    .wrong { color: #f44336; font-weight: 600; }
    .answer-details { display: none; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border-color); }
    .answer-details.show { display: block; }
    .stats-card { background: var(--header-bg); color: white; border-radius: 10px; padding: 15px; margin-bottom: 15px; cursor: pointer; transition: transform 0.2s; }
    .stats-card:hover { transform: translateY(-3px); }
    .filter-bar { background: var(--filter-bg); padding: 15px; border-radius: 10px; margin-bottom: 20px; }
    .chart-card { background: var(--bg-card); border-radius: 10px; padding: 15px; margin-bottom: 20px; }
    .chart-container { height: 200px; position: relative; }
    .test-selector { background: var(--bg-card); border-radius: 12px; padding: 15px; margin-bottom: 20px; }
    .theme-toggle { position: fixed; bottom: 20px; right: 20px; background: #0d6efd; color: white; border: none; border-radius: 50%; width: 50px; height: 50px; font-size: 24px; cursor: pointer; z-index: 1000; }
    .btn-pdf { background: #dc3545; color: white; border: none; padding: 4px 12px; border-radius: 20px; font-size: 12px; margin-left: 8px; }
    .btn-pdf:hover { background: #b02a37; }
    .btn-copy-report { background: #0d6efd; color: white; border: none; padding: 6px 16px; border-radius: 20px; font-size: 13px; }
    .btn-copy-report:hover { background: #0b5ed7; }
    @media (max-width: 768px) { .user-log .d-flex { flex-direction: column; gap: 8px; } }
    
    /* Стили для красивых графиков (из report_dashboard) */
    .dashboard-header { margin-bottom: 2rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; }
    .dashboard-header h1 { font-size: 1.8rem; font-weight: 700; background: linear-gradient(135deg, #1a4d6b, #2c7da0); -webkit-background-clip: text; background-clip: text; color: transparent; display: flex; align-items: center; gap: 12px; }
    body.dark .dashboard-header h1 { background: linear-gradient(135deg, #00ccff, #00ff88); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.2rem; margin-bottom: 2rem; }
    .kpi-card { background: var(--bg-card); border-radius: 24px; padding: 1.2rem 1.5rem; box-shadow: 0 2px 8px rgba(0,0,0,0.04); border: 1px solid #eef2f0; transition: all 0.2s; position: relative; overflow: hidden; cursor: help; }
    .kpi-card::before { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; }
    .kpi-card.good::before { background: #198754; }
    .kpi-card.warning::before { background: #ffc107; }
    .kpi-card.danger::before { background: #dc3545; }
    .kpi-card.info::before { background: #0d6efd; }
    body.dark .kpi-card.good::before { background: #00ff88; box-shadow: 0 0 8px #00ff88; }
    body.dark .kpi-card.warning::before { background: #ffaa00; box-shadow: 0 0 8px #ffaa00; }
    body.dark .kpi-card.danger::before { background: #ff4444; box-shadow: 0 0 8px #ff4444; }
    body.dark .kpi-card.info::before { background: #00ccff; box-shadow: 0 0 8px #00ccff; }
    .kpi-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px; color: #7a95ae; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
    .kpi-value { font-size: 2.2rem; font-weight: 800; color: #1a4d6b; line-height: 1; }
    body.dark .kpi-value { color: #e0e4f0; }
    .charts-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
    canvas { max-height: 250px; width: 100%; }
    .leader-icon { font-size: 1.2rem; margin-left: 6px; cursor: help; }
    [data-tooltip] { position: relative; cursor: help; }
    [data-tooltip]:before { content: attr(data-tooltip); position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 5px 10px; border-radius: 8px; font-size: 12px; white-space: nowrap; z-index: 1000; display: none; }
    [data-tooltip]:hover:before { display: block; }
</style>
</head>
<body>
<button class="theme-toggle" id="themeToggle">🌙</button>
<div class="container mt-4"><div class="row justify-content-center"><div class="col-md-10">

<!-- ============ ШАПКА ============ -->
<div class="dashboard-header">
    <h1><i class="fas fa-chart-pie"></i> Анализ результатов тестирования</h1>
    <div>
        <button id="copyReportBtn" class="btn-copy-report me-2" title="Копировать отчёт для руководителя">📊 Копировать отчёт</button>
        <a href="?" class="btn btn-outline-secondary btn-sm">← Выход</a>
    </div>
</div>

<!-- ============ ВЫБОР ТЕСТА ============ -->
<div class="test-selector">
    <div class="row align-items-center">
        <div class="col-md-6"><label class="form-label fw-bold mb-0">📋 Выберите тест</label></div>
        <div class="col-md-6"><select id="testSelector" class="form-select"><option value="">Загрузка тестов...</option></select></div>
    </div>
</div>

<div id="resultsContainer" style="display:none">
    <!-- ============ KPI КАРТОЧКИ (из report_dashboard) ============ -->
    <div class="kpi-grid" id="kpiGrid"></div>
    
    <!-- ============ КРАСИВЫЕ ГРАФИКИ ============ -->
    <div class="charts-row" id="chartsRow">
        <div class="chart-card"><div class="chart-title"><i class="fas fa-chart-bar"></i> Распределение баллов</div><div class="chart-container"><canvas id="scoreDistChart"></canvas></div></div>
        <div class="chart-card"><div class="chart-title"><i class="fas fa-city"></i> Успеваемость по городам</div><div class="chart-container"><canvas id="cityChart"></canvas></div></div>
        <div class="chart-card"><div class="chart-title"><i class="fas fa-chart-pie"></i> Ошибки по темам вопросов</div><div class="chart-container"><canvas id="pieChart"></canvas></div></div>
    </div>
    
    <!-- ============ ТАБЛИЦА ГОРОДОВ ============ -->
    <div class="city-stats-card" style="background: var(--bg-card); border-radius: 24px; padding: 1.2rem 1.5rem; margin-bottom: 2rem;">
        <div class="section-title"><i class="fas fa-building"></i> Статистика по городам (сортировка по баллам)</div>
        <table class="stats-table" style="width:100%; border-collapse: collapse;"><thead><tr><th>Город</th><th>Сотр.</th><th>Средний балл</th><th>Ошибок</th></tr></thead><tbody id="cityStatsBody"></tbody></table>
    </div>
    
    <!-- ============ ЛУЧШИЕ СОТРУДНИКИ ============ -->
    <div class="top-employees-card" style="background: var(--bg-card); border-radius: 24px; padding: 1.2rem 1.5rem; margin-bottom: 2rem;">
        <div class="section-title"><i class="fas fa-trophy"></i> Лучшие сотрудники</div>
        <table class="stats-table" style="width:100%; border-collapse: collapse;"><thead><tr><th>#</th><th>Сотрудник</th><th>Город</th><th>Результат</th></tr></thead><tbody id="topEmployeesBody"></tbody></table>
    </div>
    
    <!-- ============ ЧАСТЫЕ ОШИБКИ ============ -->
    <div class="errors-card" style="background: var(--bg-card); border-radius: 24px; padding: 1.2rem 1.5rem; margin-bottom: 2rem;">
        <div class="section-title"><i class="fas fa-exclamation-triangle"></i> Частые ошибки</div>
        <table class="stats-table" style="width:100%; border-collapse: collapse;"><thead><tr><th>#</th><th>Тема ошибки</th><th>Кол-во ошибок</th></tr></thead><tbody id="errorsBody"></tbody></table>
    </div>
    
    <!-- ============ ФИЛЬТРЫ И РЕЗУЛЬТАТЫ СОТРУДНИКОВ ============ -->
    <div class="filter-bar">
        <div class="row g-3">
            <div class="col-md-3"><input type="text" id="search-input" class="form-control" placeholder="🔍 Поиск по имени..."></div>
            <div class="col-md-2"><select id="city-filter" class="form-select"><option value="">Все города</option></select></div>
            <div class="col-md-2"><input type="date" id="date-from" class="form-control"></div>
            <div class="col-md-2"><input type="date" id="date-to" class="form-control"></div>
            <div class="col-md-2">
                <div class="d-flex gap-2">
                    <button class="btn btn-sm btn-outline-success" onclick="exportToExcel()">📎 Экспорт</button>
                    <button class="btn btn-sm btn-outline-primary" onclick="exportDetailedToExcel()">📊 Детальный</button>
                </div>
            </div>
            <div class="col-md-1"><button class="btn btn-outline-secondary w-100" onclick="resetFilters()">Сброс</button></div>
        </div>
    </div>
    
    <div id="results-area"><div class="text-center py-4">⏳ Выберите тест</div></div>
</div>

</div></div></div>

<script>
// ============ SUPABASE ============
const SUPABASE_URL = 'https://qtostraaqrnjbxiydlip.supabase.co';
const SUPABASE_KEY = 'sb_publishable_0GzJSuoAi5zc7pHkicHMNg_cQ-rGAX7';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentTest = null;
let currentResults = [];
let scoreChart = null, cityChart = null, pieChart = null;

// ============ ТЁМНАЯ ТЕМА ============
function initTheme() {
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme === 'dark') {
        document.body.classList.add('dark');
        document.getElementById('themeToggle').innerHTML = '☀️';
    }
}
function toggleTheme() {
    document.body.classList.toggle('dark');
    const isDark = document.body.classList.contains('dark');
    localStorage.setItem('theme', isDark ? 'dark' : 'light');
    document.getElementById('themeToggle').innerHTML = isDark ? '☀️' : '🌙';
    updateCharts();
}
document.getElementById('themeToggle').addEventListener('click', toggleTheme);
initTheme();

// ============ ТЕМЫ ОШИБОК ============
const questionTopics = {
    1: "Установление контакта", 2: "Выявление потребностей", 3: "Дополнительная продажа",
    4: "Переориентация на золото", 5: "Футляр и уход", 6: "Возражение по цене",
    7: "Альтернатива/каталог", 8: "Презентация подарка", 9: "Дополнительные модели",
    10: "Яндекс Сплит", 11: "Инициатива в продажах"
};
function getTopicByQuestionNumber(q) { return questionTopics[q] || `Вопрос ${q}`; }
function escapeHtml(s) { if (!s) return ''; return s.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;'); }

// ============ ЗАГРУЗКА ТЕСТОВ ============
async function loadTests() {
    const { data, error } = await sb.from('tests').select('*').order('created_at', { ascending: false });
    const selector = document.getElementById('testSelector');
    if (error || !data || data.length === 0) {
        selector.innerHTML = '<option value="">Нет тестов</option>';
        return;
    }
    let options = '<option value="">-- Выберите тест --</option>';
    for (const test of data) {
        options += `<option value="${test.slug}" data-cities='${JSON.stringify(test.city_list || [])}'>${test.name} (${test.questions_count || '?'} вопросов)</option>`;
    }
    selector.innerHTML = options;
    selector.addEventListener('change', async (e) => {
        const slug = e.target.value;
        if (!slug) {
            currentTest = null;
            document.getElementById('resultsContainer').style.display = 'none';
            return;
        }
        const selectedOption = selector.options[selector.selectedIndex];
        const citiesJson = selectedOption.getAttribute('data-cities');
        currentTest = { slug: slug, name: selectedOption.text, cities: JSON.parse(citiesJson || '[]') };
        const cityFilter = document.getElementById('city-filter');
        let cityOptions = '<option value="">Все города</option>';
        for (const city of currentTest.cities) {
            cityOptions += `<option value="${escapeHtml(city)}">${escapeHtml(city)}</option>`;
        }
        cityFilter.innerHTML = cityOptions;
        await loadResults(slug);
        document.getElementById('resultsContainer').style.display = 'block';
    });
}

async function loadResults(slug) {
    const { data, error } = await sb.from('results').select('*').eq('test_type', slug).order('created_at', { ascending: false });
    currentResults = error ? [] : (data || []);
    renderAll();
}

// ============ ОСНОВНАЯ ФУНКЦИЯ ОТРИСОВКИ ============
function renderAll() {
    if (!currentTest) return;
    
    // Фильтрация
    let filtered = [...currentResults];
    const search = document.getElementById('search-input')?.value.toLowerCase() || '';
    const cityF = document.getElementById('city-filter')?.value || '';
    const dateFrom = document.getElementById('date-from')?.value;
    const dateTo = document.getElementById('date-to')?.value;
    if (search) filtered = filtered.filter(r => (r.user_id || '').toLowerCase().includes(search));
    if (cityF) filtered = filtered.filter(r => r.city === cityF);
    if (dateFrom) filtered = filtered.filter(r => new Date(r.created_at) >= new Date(dateFrom));
    if (dateTo) filtered = filtered.filter(r => new Date(r.created_at) <= new Date(dateTo));
    
    // KPI (по всем данным)
    const total = currentResults.length;
    const avgScore = total ? Math.round(currentResults.reduce((s, r) => s + (r.score / r.total), 0) / total * 100) : 0;
    const excellent = currentResults.filter(r => (r.score / r.total) >= 0.8).length;
    const totalErrors = currentResults.reduce((s, r) => s + (r.total - r.score), 0);
    
    document.getElementById('kpiGrid').innerHTML = `
        <div class="kpi-card info" data-tooltip="Общее количество сотрудников"><div class="kpi-label"><i class="fas fa-users"></i> Всего сотрудников</div><div class="kpi-value">${total}</div></div>
        <div class="kpi-card ${avgScore >= 80 ? 'good' : (avgScore >= 60 ? 'warning' : 'danger')}" data-tooltip="Средний процент правильных ответов"><div class="kpi-label"><i class="fas fa-chart-line"></i> Средний балл</div><div class="kpi-value">${avgScore}%</div></div>
        <div class="kpi-card info" data-tooltip="Сотрудники с результатом ≥80%"><div class="kpi-label"><i class="fas fa-star"></i> Отлично (≥80%)</div><div class="kpi-value">${excellent}</div></div>
        <div class="kpi-card info" data-tooltip="Общее количество ошибок"><div class="kpi-label"><i class="fas fa-times-circle"></i> Всего ошибок</div><div class="kpi-value">${totalErrors}</div></div>
    `;
    
    // Распределение баллов (график)
    const scores = currentResults.map(r => r.score / r.total * 100);
    const cats = ['Отлично (80-100%)', 'Хорошо (60-79%)', 'Удовлетворительно (40-59%)', 'Плохо (0-39%)'];
    const dist = [
        scores.filter(s => s >= 80).length,
        scores.filter(s => s >= 60 && s < 80).length,
        scores.filter(s => s >= 40 && s < 60).length,
        scores.filter(s => s < 40).length
    ];
    if (scoreChart) scoreChart.destroy();
    scoreChart = new Chart(document.getElementById('scoreDistChart'), {
        type: 'bar', data: { labels: cats, datasets: [{ label: 'Количество сотрудников', data: dist, backgroundColor: ['#198754', '#ffc107', '#fd7e14', '#dc3545'], borderRadius: 8 }] },
        options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { position: 'top' } } }
    });
    
    // Города (график и таблица)
    const cityMap = new Map();
    for (const r of currentResults) {
        const city = r.city || 'Не указан';
        if (!cityMap.has(city)) cityMap.set(city, { sum: 0, count: 0, errors: 0 });
        const stat = cityMap.get(city);
        stat.sum += r.score / r.total * 100;
        stat.count++;
        stat.errors += r.total - r.score;
    }
    const cityData = Array.from(cityMap.entries()).map(([c, s]) => ({ city: c, count: s.count, avg: (s.sum / s.count).toFixed(0), errors: s.errors })).sort((a, b) => b.avg - a.avg);
    if (cityChart) cityChart.destroy();
    cityChart = new Chart(document.getElementById('cityChart'), {
        type: 'bar', data: { labels: cityData.map(c => c.city), datasets: [{ label: 'Средний балл (%)', data: cityData.map(c => c.avg), backgroundColor: '#2c7da0', borderRadius: 8 }] },
        options: { responsive: true, scales: { y: { min: 0, max: 100 } } }
    });
    document.getElementById('cityStatsBody').innerHTML = cityData.map((c, i) => `<tr><td>${c.city}${i === 0 ? ' <span class="leader-icon" data-tooltip="Лидер">🥇</span>' : ''}</td><td>${c.count}</td><td>${c.avg}%</td><td>${c.errors}</td></tr>`).join('');
    
    // Лучшие сотрудники
    const top10 = [...currentResults].sort((a, b) => (b.score / b.total) - (a.score / a.total)).slice(0, 10);
    document.getElementById('topEmployeesBody').innerHTML = top10.map((e, i) => `<tr><td>${i+1}</td><td><strong>${e.surname || ''} ${e.name || ''}</strong></td><td>${e.city || '—'}</td><td>${e.score}/${e.total} (${Math.round(e.score/e.total*100)}%)</td></tr>`).join('');
    
    // Частые ошибки (по темам)
    const errorCount = {};
    for (const r of currentResults) {
        if (r.answers) {
            for (let i = 0; i < r.answers.length; i++) {
                const a = r.answers[i];
                const isCorrect = a.isCorrect === true || a.ok === true;
                if (!isCorrect) {
                    const topic = questionTopics[i+1] || `Вопрос ${i+1}`;
                    errorCount[topic] = (errorCount[topic] || 0) + 1;
                }
            }
        }
    }
    const topErrors = Object.entries(errorCount).sort((a, b) => b[1] - a[1]).slice(0, 5);
    document.getElementById('errorsBody').innerHTML = topErrors.map(([t, c], i) => `<tr><td>${i+1}</td><td><strong>${t}</strong></td><td>${c}</td></tr>`).join('');
    
    // Круговая диаграмма ошибок
    if (pieChart) pieChart.destroy();
    if (topErrors.length) {
        pieChart = new Chart(document.getElementById('pieChart'), {
            type: 'pie', data: { labels: topErrors.map(e => e[0]), datasets: [{ data: topErrors.map(e => e[1]), backgroundColor: ['#dc3545', '#fd7e14', '#ffc107', '#198754', '#0d6efd'], borderWidth: 0 }] },
            options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { position: 'right' } } }
        });
    }
    
    // Результаты сотрудников (с текстом вопроса)
    const area = document.getElementById('results-area');
    if (!filtered.length) { area.innerHTML = '<div class="text-center py-4">📭 Нет результатов</div>'; return; }
    area.innerHTML = '';
    for (const r of filtered) {
        const percent = Math.round(r.score / r.total * 100);
        let details = '';
        if (r.answers) {
            for (let i = 0; i < r.answers.length; i++) {
                const a = r.answers[i];
                const ok = a.isCorrect === true || a.ok === true;
                const questionText = (a.question || a.qs || `Вопрос ${i+1}`).substring(0, 150);
                details += `<div class="small mb-2 p-2" style="border-left:3px solid ${ok ? '#4caf50' : '#f44336'}; background:var(--user-log-bg); border-radius:4px;">
                    <strong>${ok ? '✅' : '❌'} ${escapeHtml(questionText)}</strong>
                    <div><span class="${ok ? 'correct' : 'wrong'}">${ok ? 'Верно' : 'Ошибка'}</span></div>
                    ${!ok ? `<div class="mt-1 small"><strong>✖ Ваш ответ:</strong> ${escapeHtml(a.selected || a.sel || '—')}<br><strong>✔ Правильный ответ:</strong> ${escapeHtml(a.correct || a.cor || '—')}</div>` : ''}
                </div>`;
            }
        }
        const clr = percent >= 80 ? 'success' : (percent >= 50 ? 'warning' : 'danger');
        area.innerHTML += `<div class="user-log" onclick="if(event.target.tagName!=='BUTTON') this.querySelector('.answer-details').classList.toggle('show');">
            <div class="d-flex justify-content-between align-items-start">
                <div><strong>${escapeHtml(r.surname || '')} ${escapeHtml(r.name || '')}</strong> <span class="text-muted">📍 ${escapeHtml(r.city || '—')}</span> <span class="badge bg-${clr}">${r.score}/${r.total} (${percent}%)</span></div>
                <div><small>${new Date(r.created_at).toLocaleString()}</small>
                <button class="btn-pdf" onclick="event.stopPropagation(); generateUserPDF('${r.id}')">📄 PDF</button>
                <i class="bi bi-chevron-down ms-2"></i></div>
            </div>
            <div class="answer-details mt-2"><div class="p-2 rounded" style="background:var(--user-log-bg);">${details}</div></div>
        </div>`;
    }
}

function updateCharts() { if (currentResults.length) renderAll(); }

// ============ PDF ДЛЯ СОТРУДНИКА ============
function generateUserPDF(resultId) {
    const r = currentResults.find(r => r.id == resultId);
    if (!r) return;
    const fullName = `${r.surname || ''} ${r.name || ''}`.trim();
    const percent = Math.round(r.score / r.total * 100);
    let errorsHtml = '';
    if (r.answers) {
        for (let i = 0; i < r.answers.length; i++) {
            const a = r.answers[i];
            const ok = a.isCorrect === true || a.ok === true;
            const questionText = (a.question || a.qs || `Вопрос ${i+1}`).substring(0, 150);
            if (!ok) {
                errorsHtml += `<div style="margin-bottom:15px;padding:12px;background:#ffebee;border-radius:8px">
                    <strong>❌ ${escapeHtml(questionText)}</strong><br>
                    <div><strong>Ваш ответ:</strong> ${escapeHtml(a.selected || a.sel || '—')}</div>
                    <div><strong>Правильный ответ:</strong> ${escapeHtml(a.correct || a.cor || '—')}</div>
                </div>`;
            }
        }
    }
    const html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Отчёт: ${fullName}</title><style>body{font-family:Arial;padding:20px}</style></head>
    <body><h1>📊 Отчёт по тесту</h1><p><strong>Сотрудник:</strong> ${fullName}</p><p><strong>Город:</strong> ${r.city || '—'}</p>
    <p><strong>Результат:</strong> ${r.score}/${r.total} (${percent}%)</p><h3>Разбор ошибок:</h3>${errorsHtml || '<p>✅ Нет ошибок</p>'}
    <p style="margin-top:30px;font-size:12px;color:#999;">Отчёт сгенерирован автоматически</p></body></html>`;
    const win = window.open('', '_blank'); win.document.write(html); win.document.close(); win.print();
}

// ============ ЭКСПОРТ ============
function exportToExcel() {
    if (!currentResults.length) return alert("Нет данных");
    const data = currentResults.map(r => ({ 'ФИО': `${r.surname || ''} ${r.name || ''}`.trim(), 'Город': r.city || '', 'Баллы': `${r.score}/${r.total}`, 'Процент': `${Math.round(r.score / r.total * 100)}%`, 'Дата': new Date(r.created_at).toLocaleString() }));
    const ws = XLSX.utils.json_to_sheet(data); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, 'Результаты'); XLSX.writeFile(wb, `${currentTest?.name || 'отчёт'}_${new Date().toLocaleDateString()}.xlsx`);
}
function exportDetailedToExcel() {
    if (!currentResults.length) return alert("Нет данных");
    try {
        const excelData = [];
        for (const r of currentResults) {
            const row = { 'ФИО': `${r.surname || ''} ${r.name || ''}`.trim(), 'Город': r.city || '', 'Баллы': `${r.score}/${r.total}`, 'Процент': `${Math.round(r.score / r.total * 100)}%`, 'Дата': new Date(r.created_at).toLocaleString() };
            if (r.answers) {
                for (let i = 0; i < r.answers.length; i++) {
                    const a = r.answers[i];
                    row[`Вопрос ${i+1}`] = (a.question || a.qs || '').substring(0, 300);
                    row[`Ответ сотрудника ${i+1}`] = (a.selected || a.sel || '').substring(0, 300);
                    row[`Правильный ответ ${i+1}`] = (a.correct || a.cor || '').substring(0, 300);
                    row[`Результат ${i+1}`] = (a.isCorrect === true || a.ok === true) ? 'Верно' : 'Ошибка';
                }
            }
            excelData.push(row);
        }
        let sheetName = currentTest?.name || 'Детальные';
        if (sheetName.length > 31) sheetName = sheetName.substring(0, 28) + '...';
        const ws = XLSX.utils.json_to_sheet(excelData); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, sheetName); XLSX.writeFile(wb, `${sheetName}_детальный_${new Date().toLocaleDateString()}.xlsx`);
    } catch(e) { alert('Ошибка при экспорте'); }
}

// ============ ОТЧЁТ ДЛЯ РУКОВОДИТЕЛЯ ============
function generateReport() {
    if (!currentResults.length) { alert('Нет данных'); return; }
    const testName = currentTest?.name || 'Тест', total = currentResults.length;
    const avgScore = Math.round(currentResults.reduce((s, r) => s + (r.score / r.total), 0) / total * 100);
    const excellent = currentResults.filter(r => (r.score / r.total) >= 0.8).length;
    const totalErrors = currentResults.reduce((s, r) => s + (r.total - r.score), 0);
    
    const dist = { 'Отлично (80-100%)': 0, 'Хорошо (60-79%)': 0, 'Удовлетворительно (40-59%)': 0, 'Плохо (0-39%)': 0 };
    for (const r of currentResults) { const p = r.score / r.total * 100; if (p >= 80) dist['Отлично (80-100%)']++; else if (p >= 60) dist['Хорошо (60-79%)']++; else if (p >= 40) dist['Удовлетворительно (40-59%)']++; else dist['Плохо (0-39%)']++; }
    
    const cityStats = {};
    for (const r of currentResults) { const city = r.city || 'Не указан'; if (!cityStats[city]) cityStats[city] = { sumScore: 0, sumTotal: 0, count: 0 }; cityStats[city].sumScore += r.score; cityStats[city].sumTotal += r.total; cityStats[city].count++; }
    
    const topEmployees = [...currentResults].sort((a, b) => (b.score / b.total) - (a.score / a.total)).slice(0, 5);
    
    const errorCount = {};
    for (const r of currentResults) if (r.answers) for (let i = 0; i < r.answers.length; i++) { const a = r.answers[i]; if (!(a.isCorrect === true || a.ok === true)) { const topic = questionTopics[i+1] || `Вопрос ${i+1}`; errorCount[topic] = (errorCount[topic] || 0) + 1; } }
    const topErrors = Object.entries(errorCount).sort((a, b) => b[1] - a[1]).slice(0, 5);
    
    let report = `📊 ОТЧЁТ ПО ТЕСТУ\n${'━'.repeat(60)}\n📋 Тест: ${testName}\n📅 Дата: ${new Date().toLocaleDateString('ru-RU')}\n\n📈 ОБЩАЯ СТАТИСТИКА\n${'━'.repeat(60)}\nВсего сотрудников: ${total}\nСредний балл: ${avgScore}%\nОтлично (≥80%): ${excellent} человек\nВсего ошибок: ${totalErrors}\n\n📊 РАСПРЕДЕЛЕНИЕ БАЛЛОВ\n${'━'.repeat(60)}\nКатегория                    │ Кол-во │ %\n${'─'.repeat(60)}\n`;
    for (const [cat, count] of Object.entries(dist)) { const percent = total ? Math.round(count / total * 100) : 0; report += `${cat.padEnd(28)} │ ${String(count).padStart(5)} │ ${String(percent).padStart(3)}%\n`; }
    report += `\n🏙️ СТАТИСТИКА ПО ГОРОДАМ\n${'━'.repeat(60)}\nГород                │ Сотр. │ Средний балл │ Ошибок\n${'─'.repeat(60)}\n`;
    for (const [city, data] of Object.entries(cityStats).sort((a, b) => b[1].count - a[1].count)) { const avg = Math.round(data.sumScore / data.sumTotal * 100); const errors = data.sumTotal - data.sumScore; report += `${city.padEnd(20)} │ ${String(data.count).padStart(5)} │ ${String(avg).padStart(12)}% │ ${String(errors).padStart(6)}\n`; }
    report += `\n🔝 ЛУЧШИЕ СОТРУДНИКИ\n${'━'.repeat(60)}\n`;
    topEmployees.forEach((emp, i) => { const percent = Math.round(emp.score / emp.total * 100); const name = emp.user_id || `${emp.surname || ''} ${emp.name || ''}`.trim(); report += `${i+1}. ${name} — ${emp.score}/${emp.total} (${percent}%)\n`; });
    report += `\n📚 ЧАСТЫЕ ОШИБКИ (по темам)\n${'━'.repeat(60)}\n№ │ Тема ошибки                           │ Кол-во │ %\n${'─'.repeat(60)}\n`;
    topErrors.forEach(([topic, count], i) => { const percent = totalErrors ? Math.round(count / totalErrors * 100) : 0; report += `${i+1} │ ${topic.padEnd(35)} │ ${String(count).padStart(5)} │ ${String(percent).padStart(3)}%\n`; });
    report += `\n💡 РЕКОМЕНДАЦИИ ДЛЯ УЛУЧШЕНИЯ\n${'━'.repeat(60)}\n• Основные зоны роста: ${topErrors.slice(0,3).map(e=>e[0]).join(', ')}\n• Проведите дополнительное обучение по этим темам\n• Разберите типичные ошибки на планерке\n\n${'━'.repeat(60)}\nОтчёт сгенерирован автоматически`;
    navigator.clipboard.writeText(report).then(() => alert('✅ Отчёт скопирован! Вставьте в письмо (Ctrl+V)')).catch(() => alert('❌ Ошибка копирования'));
}

function resetFilters() {
    document.getElementById('search-input').value = '';
    document.getElementById('city-filter').value = '';
    document.getElementById('date-from').value = '';
    document.getElementById('date-to').value = '';
    renderAll();
}

document.getElementById('search-input')?.addEventListener('input', () => renderAll());
document.getElementById('city-filter')?.addEventListener('change', () => renderAll());
document.getElementById('date-from')?.addEventListener('change', () => renderAll());
document.getElementById('date-to')?.addEventListener('change', () => renderAll());
document.getElementById('copyReportBtn')?.addEventListener('click', generateReport);

loadTests();
</script>
