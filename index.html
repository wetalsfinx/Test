<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>585GOLD | Тесты</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <h2>Список тестов из Supabase:</h2>
    <ul id="list"></ul>
    <pre id="debug"></pre>

    <script>
        const supabaseUrl = 'https://qtostraaqrnjbxiydlip.supabase.co';
        const supabaseKey = 'sb_publishable_0GzJSuoAi5zc7pHkicHMNg_cQ-rGAX7';
        const sb = supabase.createClient(supabaseUrl, supabaseKey);
        
        async function showTests() {
            const debug = document.getElementById('debug');
            debug.innerText = 'Загрузка...';
            
            try {
                const { data, error } = await sb.from('tests').select('*');
                if (error) {
                    debug.innerText = 'Ошибка: ' + JSON.stringify(error);
                    return;
                }
                debug.innerText = 'Успешно! Найдено ' + (data?.length || 0) + ' тестов:\n' + JSON.stringify(data, null, 2);
                
                const list = document.getElementById('list');
                list.innerHTML = '';
                for (const test of data) {
                    const li = document.createElement('li');
                    li.textContent = `${test.name} (slug: ${test.slug})`;
                    list.appendChild(li);
                }
            } catch(e) {
                debug.innerText = 'Исключение: ' + e.message;
            }
        }
        
        showTests();
    </script>
</body>
</html>
