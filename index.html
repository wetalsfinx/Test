<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>585GOLD | Анализ результатов</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',sans-serif;background:#f5f5f5;padding:20px}
        .card{background:#fff;border-radius:20px;padding:20px;margin-bottom:20px;border-top:4px solid #E30613}
        .btn{background:#E30613;color:#fff;border:none;padding:8px 20px;border-radius:40px;margin:5px;cursor:pointer}
        .btn:hover{background:#c41c2a}
        .kpi-grid{display:flex;gap:20px;flex-wrap:wrap;margin-bottom:20px}
        .kpi-card{background:#fff;padding:20px;border-radius:16px;border-left:4px solid #E30613;min-width:150px;text-align:center}
        .kpi-value{font-size:32px;font-weight:bold;color:#E30613}
        .kpi-label{font-size:12px;color:#666;margin-top:5px}
        table{width:100%;border-collapse:collapse;margin-top:10px}
        th,td{padding:12px 10px;text-align:left;border-bottom:1px solid #eee}
        th{background:#f8f9fa;color:#E30613;font-weight:600}
        select{padding:8px;border-radius:40px;border:1px solid #ddd;margin:5px;width:300px}
        .filter-bar{background:#fff;padding:15px;border-radius:16px;margin:15px 0;display:flex;gap:10px;flex-wrap:wrap}
        .form-control,.form-select{border-radius:40px;border:1px solid #ddd;padding:8px 16px}
        .employee-item{padding:10px;border-bottom:1px solid #eee;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap}
        .employee-name{font-weight:600}
        .employee-score{color:#E30613;font-weight:600}
        @media (max-width:768px){.employee-item{flex-direction:column;align-items:flex-start;gap:5px}}
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h1><i class="fas fa-gem"></i> 585GOLD | Анализ результатов</h1>
        <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:10px">
            <select id="testSelector"></select>
            <button class="btn" id="loadBtn">📊 Загрузить результаты</button>
            <button class="btn" id="copyBtn">📧 Копировать в Outlook</button>
            <button class="btn" id="pdfBtn">📄 Скачать PDF</button>
        </div>
        <div id="status" class="mt-2 text-muted"></div>
    </div>

    <div id="results" style="display:none">
        <div class="kpi-grid" id="kpi"></div>
        <div class="row">
            <div class="col-md-6"><div class="card"><h3>📊 Распределение баллов</h3><canvas id="scoreChart"></canvas></div></div>
            <div class="col-md-6"><div class="card"><h3>🏙️ Успеваемость по городам</h3><canvas id="cityChart"></canvas></div></div>
        </div>
        <div class="card"><h3>🏙️ Статистика по городам</h3>
            <table class="table"><thead><tr style="background:#E30613;color:white"><th>Город</th><th>Сотр.</th><th>Средний балл</th><th>Ошибок</th></tr></thead>
            <tbody id="cityBody"></tbody>
        </table>
        </div>
        <div class="card"><h3>🏆 Лучшие сотрудники (топ-10)</h3>
            <table class="table"><thead><tr style="background:#E30613;color:white"><th>#</th><th>Сотрудник</th><th>Город</th><th>Результат</th></tr></thead>
            <tbody id="topBody"></tbody>
        </table>
        </div>
        <div class="filter-bar">
            <input type="text" id="searchInput" class="form-control" placeholder="🔍 Поиск по имени..." style="width:200px">
            <select id="cityFilter" class="form-select" style="width:150px"><option value="all">Все города</option></select>
            <button class="btn" onclick="resetFilters()" style="background:#6c757d;padding:6px 16px">Сброс фильтров</button>
        </div>
        <div class="card"><h3>📋 Список сотрудников (<span id="employeeCount">0</span>)</h3>
            <div id="employeesList"></div>
        </div>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://qtostraaqrnjbxiydlip.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_0GzJSuoAi5zc7pHkicHMNg_cQ-rGAX7';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    
    let currentData = [];
    let scoreChart = null, cityChart = null;
    let currentCityFilter = "all";
    
    function escapeHtml(s) { if (!s) return ''; return s.replace(/[&<>]/g, function(m) { if (m === '&') return '&amp;'; if (m === '<') return '&lt;'; if (m === '>') return '&gt;'; return m; }); }
    
    async function loadTests() {
        const status = document.getElementById('status');
        status.innerHTML = '🔄 Загрузка тестов...';
        const { data, error } = await sb.from('tests').select('slug, name');
        if (error) {
            status.innerHTML = '❌ Ошибка: ' + error.message;
            return;
        }
        const selector = document.getElementById('testSelector');
        selector.innerHTML = '<option value="">-- Выберите тест --</option>';
        for (const test of data) {
            selector.innerHTML += `<option value="${test.slug}">${test.name}</option>`;
        }
        status.innerHTML = '✅ Загружено тестов: ' + data.length;
    }
    
    async function loadResults() {
        const slug = document.getElementById('testSelector').value;
        if (!slug) { alert('Выберите тест'); return; }
        const status = document.getElementById('status');
        status.innerHTML = '🔄 Загрузка результатов...';
        const { data, error } = await sb.from('results').select('*').eq('test_type', slug);
        if (error) {
            status.innerHTML = '❌ Ошибка: ' + error.message;
            return;
        }
        if (!data || data.length === 0) {
            status.innerHTML = '⚠️ Нет результатов для этого теста';
            return;
        }
        
        currentData = data.map(row => ({
            name: row.user_id || row.name || 'Сотрудник',
            city: row.city || 'Не указан',
            score: row.score || 0,
            total: row.total || 11
        }));
        
        status.innerHTML = '✅ Загружено сотрудников: ' + currentData.length;
        document.getElementById('results').style.display = 'block';
        
        const cities = [...new Set(currentData.map(e => e.city).filter(c => c && c !== 'Не указан'))];
        const citySelect = document.getElementById('cityFilter');
        citySelect.innerHTML = '<option value="all">Все города</option>' + cities.map(c => `<option value="${c}">${c}</option>`).join('');
        
        renderAll();
    }
    
    function renderAll() {
        let filtered = currentCityFilter === "all" ? currentData : currentData.filter(e => e.city === currentCityFilter);
        const search = document.getElementById('searchInput')?.value.toLowerCase() || '';
        if (search) filtered = filtered.filter(e => e.name.toLowerCase().includes(search));
        
        const total = filtered.length;
        let sumScore = 0, excellent = 0, errors = 0;
        for (const e of filtered) {
            const p = (e.score / e.total) * 100;
            sumScore += p;
            if (p >= 80) excellent++;
            errors += (e.total - e.score);
        }
        const avg = total ? Math.round(sumScore / total) : 0;
        
        document.getElementById('kpi').innerHTML = `
            <div class="kpi-card"><div class="kpi-value">${total}</div><div class="kpi-label">Сотрудников</div></div>
            <div class="kpi-card"><div class="kpi-value">${avg}%</div><div class="kpi-label">Средний балл</div></div>
            <div class="kpi-card"><div class="kpi-value">${excellent}</div><div class="kpi-label">Отлично (≥80%)</div></div>
            <div class="kpi-card"><div class="kpi-value">${errors}</div><div class="kpi-label">Ошибок</div></div>
        `;
        
        // График распределения баллов
        const scores = currentData.map(e => (e.score/e.total)*100);
        const cats = ['Отлично (80-100%)', 'Хорошо (60-79%)', 'Удовлетворительно (40-59%)', 'Плохо (0-39%)'];
        const dist = [
            scores.filter(s => s >= 80).length,
            scores.filter(s => s >= 60 && s < 80).length,
            scores.filter(s => s >= 40 && s < 60).length,
            scores.filter(s => s < 40).length
        ];
        if (scoreChart) scoreChart.destroy();
        scoreChart = new Chart(document.getElementById('scoreChart'), {
            type: 'bar', data: { labels: cats, datasets: [{ label: 'Количество сотрудников', data: dist, backgroundColor: '#E30613', borderRadius: 8 }] },
            options: { responsive: true }
        });
        
        // Города
        const cityMap = new Map();
        for (const e of currentData) {
            const city = e.city;
            if (city === 'Не указан') continue;
            const p = (e.score/e.total)*100;
            if (!cityMap.has(city)) cityMap.set(city, { sum: 0, count: 0, errors: 0 });
            const s = cityMap.get(city);
            s.sum += p;
            s.count++;
            s.errors += (e.total - e.score);
        }
        const cityData = Array.from(cityMap.entries()).map(([c, s]) => ({ city: c, count: s.count, avg: (s.sum/s.count).toFixed(0), errors: s.errors })).sort((a,b) => b.avg - a.avg);
        if (cityChart) cityChart.destroy();
        cityChart = new Chart(document.getElementById('cityChart'), {
            type: 'bar', data: { labels: cityData.map(c => c.city), datasets: [{ label: 'Средний балл (%)', data: cityData.map(c => c.avg), backgroundColor: '#E30613', borderRadius: 8 }] },
            options: { responsive: true, scales: { y: { min: 0, max: 100 } } }
        });
        document.getElementById('cityBody').innerHTML = cityData.map(c => `<tr><td style="padding:8px">${c.city}${c.avg === '100' ? ' 🥇' : ''}</td><td style="padding:8px">${c.count}</td><td style="padding:8px">${c.avg}%</td onclick="applyCityFilter('${c.city}')"></td><td style="padding:8px">${c.errors}</td></tr>`).join('');
        
        // Лучшие сотрудники
        const top10 = [...currentData].sort((a,b) => (b.score/b.total) - (a.score/a.total)).slice(0, 10);
        document.getElementById('topBody').innerHTML = top10.map((e, i) => {
            const p = Math.round(e.score/e.total*100);
            return `<tr><td style="padding:8px">${i+1}</td><td style="padding:8px"><strong>${escapeHtml(e.name)}</strong></td><td style="padding:8px">${escapeHtml(e.city)}</td onclick="applyCityFilter('${e.city}')"></td><td style="padding:8px">${e.score}/${e.total} (${p}%)</td耶`;
        }).join('');
        
        // Список сотрудников
        document.getElementById('employeeCount').innerText = filtered.length;
        const employeesHtml = filtered.map(e => {
            const p = Math.round(e.score/e.total*100);
            return `<div class="employee-item"><span class="employee-name">${escapeHtml(e.name)}</span><span class="employee-score">${e.score}/${e.total} (${p}%)</span><span class="text-muted">${escapeHtml(e.city)}</span></div>`;
        }).join('');
        document.getElementById('employeesList').innerHTML = employeesHtml || '<div class="text-muted">Нет данных</div>';
    }
    
    function resetFilters() { 
        document.getElementById('searchInput').value = ''; 
        document.getElementById('cityFilter').value = 'all'; 
        currentCityFilter = 'all'; 
        renderAll(); 
    }
    
    function applyCityFilter(city) { 
        document.getElementById('cityFilter').value = city; 
        currentCityFilter = city; 
        renderAll(); 
    }
    
    function generateReport() {
        if (!currentData.length) { alert('Нет данных'); return; }
        let text = '📊 ОТЧЁТ ПО ТЕСТУ\n' + '━'.repeat(60) + '\n';
        text += '📅 Дата: ' + new Date().toLocaleDateString() + '\n\n';
        text += '📈 ОБЩАЯ СТАТИСТИКА\n' + '━'.repeat(60) + '\n';
        text += 'Всего сотрудников: ' + currentData.length + '\n';
        text += 'Средний балл: ' + Math.round(currentData.reduce((s,e) => s + (e.score/e.total), 0) / currentData.length * 100) + '%\n';
        text += 'Всего ошибок: ' + currentData.reduce((s,e) => s + (e.total - e.score), 0) + '\n\n';
        navigator.clipboard.writeText(text).then(() => alert('✅ Отчёт скопирован!'));
    }
    
    function downloadPDF() { 
        if (currentData.length) {
            html2pdf().set({margin:0.5, filename:'отчёт_' + new Date().toISOString().slice(0,19) + '.pdf'}).from(document.querySelector('.container')).save();
        } else { 
            alert('Нет данных'); 
        }
    }
    
    document.getElementById('loadBtn').onclick = loadResults;
    document.getElementById('copyBtn').onclick = generateReport;
    document.getElementById('pdfBtn').onclick = downloadPDF;
    document.getElementById('searchInput').addEventListener('input', function() { renderAll(); });
    document.getElementById('cityFilter').addEventListener('change', function(e) { currentCityFilter = e.target.value; renderAll(); });
    
    loadTests();
</script>
</body>
</html>
