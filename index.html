<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>585GOLD | Анализ результатов тестирования</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter','Segoe UI',sans-serif;background:#f5f5f5;color:#333;padding:15px;transition:all .3s}
    body.dark{background:#121212;color:#e0e0e0}
    body.dark .dashboard-header,body.dark .test-selector,body.dark .chart-card,body.dark .data-card,body.dark .filter-bar,body.dark .user-log{background:#1e1e1e;border-color:#333}
    body.dark .dashboard-header h1{color:#E30613}
    body.dark .kpi-card{background:#1e1e1e;border-color:#333}
    body.dark .kpi-value{color:#E30613}
    body.dark .stats-table th{color:#E30613}
    body.dark .stats-table td{border-bottom-color:#333}
    body.dark .form-control,body.dark .form-select{background:#2d2d2d;color:#e0e0e0;border-color:#444}
    .container-custom{max-width:1400px;margin:0 auto}
    :root{--brand-red:#E30613}
    .dashboard-header{background:#fff;padding:15px 20px;border-radius:12px;margin-bottom:2rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem;border-top:4px solid var(--brand-red);box-shadow:0 2px 8px rgba(0,0,0,.05)}
    .dashboard-header h1{font-size:1.6rem;font-weight:700;color:var(--brand-red);display:flex;align-items:center;gap:10px;margin:0}
    .btn-brand{background:var(--brand-red);color:#fff;border:none;padding:8px 20px;border-radius:40px;font-size:13px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px}
    .btn-brand:hover{background:#c41c2a;transform:translateY(-2px)}
    .btn-outline-brand{background:transparent;border:1px solid var(--brand-red);color:var(--brand-red);padding:7px 19px;border-radius:40px;font-size:13px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px;text-decoration:none}
    .btn-outline-brand:hover{background:var(--brand-red);color:#fff}
    .kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1.2rem;margin-bottom:2rem}
    .kpi-card{background:#fff;border-radius:16px;padding:1.2rem 1.5rem;box-shadow:0 2px 8px rgba(0,0,0,.05);position:relative;border-left:4px solid var(--brand-red);cursor:help}
    .kpi-card:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(0,0,0,.1)}
    .kpi-label{font-size:.75rem;text-transform:uppercase;color:#666;margin-bottom:8px;display:flex;align-items:center;gap:6px}
    .kpi-value{font-size:2.2rem;font-weight:800;color:var(--brand-red)}
    .kpi-card .tooltip-text{visibility:hidden;opacity:0;background:#333;color:#fff;padding:5px 10px;border-radius:6px;position:absolute;bottom:100%;left:50%;transform:translateX(-50%);white-space:nowrap;font-size:12px;transition:opacity .2s;pointer-events:none}
    body.dark .kpi-card .tooltip-text{background:#555}
    .kpi-card:hover .tooltip-text{visibility:visible;opacity:1}
    .charts-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(400px,1fr));gap:1.5rem;margin-bottom:2rem}
    .chart-card{background:#fff;border-radius:20px;padding:1.2rem;box-shadow:0 2px 8px rgba(0,0,0,.05);border:1px solid #eee}
    .chart-title{font-weight:600;margin-bottom:1rem;font-size:1rem;display:flex;align-items:center;gap:8px;color:var(--brand-red);padding-bottom:6px;border-bottom:2px solid var(--brand-red)}
    canvas{max-height:250px;width:100%}
    .data-card{background:#fff;border-radius:20px;padding:1.2rem 1.5rem;margin-bottom:2rem}
    .section-title{font-weight:600;font-size:1rem;margin-bottom:1rem;display:flex;align-items:center;gap:8px;color:var(--brand-red);padding-bottom:6px;border-bottom:2px solid var(--brand-red)}
    .stats-table{width:100%;border-collapse:collapse}
    .stats-table th,.stats-table td{padding:10px 8px;text-align:left;border-bottom:1px solid #eee}
    .stats-table th{font-weight:600;color:var(--brand-red);font-size:.8rem}
    .filter-bar{background:#fff;padding:15px;border-radius:16px;margin-bottom:20px;border:1px solid #eee}
    .form-control,.form-select{border-radius:40px;border:1px solid #ddd;padding:8px 16px}
    .form-control:focus,.form-select:focus{border-color:var(--brand-red);box-shadow:0 0 0 2px rgba(227,6,19,.1);outline:none}
    .test-selector{background:#fff;border-radius:20px;padding:15px 20px;margin-bottom:20px}
    .user-log{border-left:4px solid var(--brand-red);padding:12px;background:#fff;margin-bottom:12px;border-radius:0 12px 12px 0;cursor:pointer;transition:all .2s}
    .user-log:hover{background:#ffebee;transform:translateX(4px)}
    body.dark .user-log:hover{background:#2a1a1a}
    .correct{color:#28a745;font-weight:600}
    .wrong{color:var(--brand-red);font-weight:600}
    .answer-details{display:none;margin-top:10px;padding-top:10px;border-top:1px solid #eee}
    .answer-details.show{display:block}
    .theme-toggle{position:fixed;bottom:20px;right:20px;width:50px;height:50px;border-radius:50%;background:var(--brand-red);color:#fff;border:none;font-size:22px;cursor:pointer;z-index:1000}
    @media (max-width:768px){.charts-row{grid-template-columns:1fr}.user-log .d-flex{flex-direction:column;gap:8px}}
    @media print{.no-print,.theme-toggle,.filter-bar{display:none!important}.answer-details{display:block!important}}
</style>
</head>
<body>
<button class="theme-toggle no-print" id="themeToggle">🌙</button>
<div class="container-custom">

<div class="dashboard-header">
    <h1><i class="fas fa-gem"></i> 585GOLD | Анализ результатов тестирования</h1>
    <div class="no-print" style="display:flex;gap:10px;flex-wrap:wrap">
        <button id="copyReportBtn" class="btn-brand">📧 Копировать в Outlook</button>
        <a href="https://wetalsfinx.github.io/Test/report_errors.html" target="_blank" class="btn-outline-brand">📋 Разбор ошибок</a>
        <a href="?" class="btn-brand" style="background:#6c757d">← Выход</a>
    </div>
</div>

<div class="test-selector">
    <div class="row align-items-center">
        <div class="col-md-6"><label class="form-label fw-bold mb-0">📋 Выберите тест</label></div>
        <div class="col-md-6"><select id="testSelector" class="form-select"><option value="">Загрузка тестов...</option></select></div>
    </div>
</div>

<div id="resultsContainer" style="display:none">
    <div class="kpi-grid" id="kpiGrid"></div>
    <div class="charts-row">
        <div class="chart-card"><div class="chart-title"><i class="fas fa-chart-bar"></i> Распределение баллов</div><canvas id="scoreDistChart"></canvas></div>
        <div class="chart-card"><div class="chart-title"><i class="fas fa-city"></i> Успеваемость по городам</div><canvas id="cityChart"></canvas></div>
        <div class="chart-card"><div class="chart-title"><i class="fas fa-chart-pie"></i> Ошибки по темам</div><canvas id="pieChart"></canvas></div>
    </div>
    <div class="data-card"><div class="section-title"><i class="fas fa-building"></i> Статистика по городам</div><table class="stats-table"><thead><tr><th>Город</th><th>Сотр.</th><th>Средний балл</th><th>Ошибок</th></tr></thead><tbody id="cityStatsBody"></tbody></table></div>
    <div class="data-card"><div class="section-title"><i class="fas fa-trophy"></i> Лучшие сотрудники</div><table class="stats-table"><thead><tr><th>#</th><th>Сотрудник</th><th>Город</th><th>Результат</th></tr></thead><tbody id="topEmployeesBody"></tbody></table></div>
    <div class="data-card"><div class="section-title"><i class="fas fa-exclamation-triangle"></i> Частые ошибки</div><table class="stats-table"><thead><tr><th>#</th><th>Тема ошибки</th><th>Кол-во</th></tr></thead><tbody id="errorsBody"></tbody></table></div>
    <div class="filter-bar no-print">
        <div class="row g-3">
            <div class="col-md-3"><input type="text" id="search-input" class="form-control" placeholder="🔍 Поиск по имени..."></div>
            <div class="col-md-2"><select id="city-filter" class="form-select"><option value="">Все города</option></select></div>
            <div class="col-md-2"><input type="date" id="date-from" class="form-control"></div>
            <div class="col-md-2"><input type="date" id="date-to" class="form-control"></div>
            <div class="col-md-2"><div class="d-flex gap-2"><button class="btn-brand" style="padding:6px 12px" onclick="exportToExcel()">📎 Экспорт</button><button class="btn-brand" style="padding:6px 12px" onclick="exportDetailedToExcel()">📊 Детальный</button></div></div>
            <div class="col-md-1"><button class="btn-brand" style="padding:6px 12px;width:100%" onclick="resetFilters()">Сброс</button></div>
        </div>
    </div>
    <div id="results-area"><div class="text-center py-4 text-muted">⏳ Выберите тест</div></div>
</div>
</div>

<script>
const SUPABASE_URL = 'https://qtostraaqrnjbxiydlip.supabase.co';
const SUPABASE_KEY = 'sb_publishable_0GzJSuoAi5zc7pHkicHMNg_cQ-rGAX7';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
let currentTest=null, currentResults=[], scoreChart=null, cityChart=null, pieChart=null;
const kpiTooltips={'Всего сотрудников':'Общее количество сотрудников','Средний балл':'Средний процент правильных ответов','Отлично (≥80%)':'Набрали 80% и выше','Всего ошибок':'Общее количество ошибок'};
const questionTopics={1:"Установление контакта",2:"Выявление потребностей",3:"Дополнительная продажа",4:"Переориентация на золото",5:"Футляр и уход",6:"Возражение по цене",7:"Альтернатива/каталог",8:"Презентация подарка",9:"Дополнительные модели",10:"Яндекс Сплит",11:"Инициатива в продажах"};
function escapeHtml(s){if(!s)return '';return s.replace(/[&<>]/g,m=>m==='&'?'&amp;':m==='<'?'&lt;':'&gt;');}
function initTheme(){if(localStorage.getItem('theme')==='dark'){document.body.classList.add('dark');document.getElementById('themeToggle').innerHTML='☀️';}else{document.getElementById('themeToggle').innerHTML='🌙';}}
function toggleTheme(){document.body.classList.toggle('dark');localStorage.setItem('theme',document.body.classList.contains('dark')?'dark':'light');document.getElementById('themeToggle').innerHTML=document.body.classList.contains('dark')?'☀️':'🌙';if(currentResults.length){setTimeout(()=>{if(scoreChart)scoreChart.update();if(cityChart)cityChart.update();if(pieChart)pieChart.update();},100);}}
document.getElementById('themeToggle').addEventListener('click',toggleTheme);
initTheme();

async function loadTests(){
    const{data,error}=await sb.from('tests').select('*').order('created_at',{ascending:false});
    const selector=document.getElementById('testSelector');
    if(error||!data||data.length===0){selector.innerHTML='<option value="">Нет тестов</option>';return;}
    let options='<option value="">-- Выберите тест --</option>';
    for(const test of data){options+=`<option value="${test.slug}" data-cities='${JSON.stringify(test.city_list||[])}'>${escapeHtml(test.name)} (${test.questions_count||'?'} вопросов)</option>`;}
    selector.innerHTML=options;
    selector.onchange=async(e)=>{
        const slug=e.target.value;
        if(!slug){currentTest=null;document.getElementById('resultsContainer').style.display='none';return;}
        const opt=selector.options[selector.selectedIndex];
        currentTest={slug:slug,name:opt.text,cities:JSON.parse(opt.getAttribute('data-cities')||'[]')};
        const cityFilter=document.getElementById('city-filter');
        let cityOptions='<option value="">Все города</option>';
        for(const city of currentTest.cities)cityOptions+=`<option value="${escapeHtml(city)}">${escapeHtml(city)}</option>`;
        cityFilter.innerHTML=cityOptions;
        const{data:res}=await sb.from('results').select('*').eq('test_type',slug).order('created_at',{ascending:false});
        currentResults=res||[];
        document.getElementById('resultsContainer').style.display='block';
        renderAll();
    };
}

function renderAll(){
    if(!currentTest)return;
    let filtered=[...currentResults];
    const search=(document.getElementById('search-input')?.value||'').toLowerCase();
    const cityF=document.getElementById('city-filter')?.value||'';
    const dateFrom=document.getElementById('date-from')?.value;
    const dateTo=document.getElementById('date-to')?.value;
    if(search)filtered=filtered.filter(r=>(r.user_id||'').toLowerCase().includes(search)||(r.name||'').toLowerCase().includes(search)||(r.surname||'').toLowerCase().includes(search));
    if(cityF)filtered=filtered.filter(r=>r.city===cityF);
    if(dateFrom)filtered=filtered.filter(r=>new Date(r.created_at)>=new Date(dateFrom));
    if(dateTo)filtered=filtered.filter(r=>new Date(r.created_at)<=new Date(dateTo));
    const total=currentResults.length;
    const avgScore=total?Math.round(currentResults.reduce((s,r)=>s+(r.score/r.total),0)/total*100):0;
    const excellent=currentResults.filter(r=>(r.score/r.total)>=0.8).length;
    const totalErrors=currentResults.reduce((s,r)=>s+(r.total-r.score),0);
    document.getElementById('kpiGrid').innerHTML=`
        <div class="kpi-card"><div class="kpi-label"><i class="fas fa-users"></i> Всего сотрудников</div><div class="kpi-value">${total}</div><div class="tooltip-text">${kpiTooltips['Всего сотрудников']}</div></div>
        <div class="kpi-card"><div class="kpi-label"><i class="fas fa-chart-line"></i> Средний балл</div><div class="kpi-value">${avgScore}%</div><div class="tooltip-text">${kpiTooltips['Средний балл']}</div></div>
        <div class="kpi-card"><div class="kpi-label"><i class="fas fa-star"></i> Отлично (≥80%)</div><div class="kpi-value">${excellent}</div><div class="tooltip-text">${kpiTooltips['Отлично (≥80%)']}</div></div>
        <div class="kpi-card"><div class="kpi-label"><i class="fas fa-times-circle"></i> Всего ошибок</div><div class="kpi-value">${totalErrors}</div><div class="tooltip-text">${kpiTooltips['Всего ошибок']}</div></div>
    `;
    const scores=currentResults.map(r=>r.score/r.total*100);
    const cats=['Отлично (80-100%)','Хорошо (60-79%)','Удовлетворительно (40-59%)','Плохо (0-39%)'];
    const dist=[scores.filter(s=>s>=80).length,scores.filter(s=>s>=60&&s<80).length,scores.filter(s=>s>=40&&s<60).length,scores.filter(s=>s<40).length];
    if(scoreChart)scoreChart.destroy();
    scoreChart=new Chart(document.getElementById('scoreDistChart'),{type:'bar',data:{labels:cats,datasets:[{label:'Количество сотрудников',data:dist,backgroundColor:['#E30613','#c41c2a','#E57373','#EF9A9A'],borderRadius:8}]},options:{responsive:true,maintainAspectRatio:true,plugins:{legend:{position:'top'}}}});
    const cityMap=new Map();
    for(const r of currentResults){const city=r.city||'Не указан';if(!cityMap.has(city))cityMap.set(city,{sum:0,count:0,errors:0});const s=cityMap.get(city);s.sum+=r.score/r.total*100;s.count++;s.errors+=r.total-r.score;}
    const cityData=Array.from(cityMap.entries()).map(([c,s])=>({city:c,count:s.count,avg:(s.sum/s.count).toFixed(0),errors:s.errors})).sort((a,b)=>b.avg-a.avg);
    if(cityChart)cityChart.destroy();
    cityChart=new Chart(document.getElementById('cityChart'),{type:'bar',data:{labels:cityData.map(c=>c.city),datasets:[{label:'Средний балл (%)',data:cityData.map(c=>c.avg),backgroundColor:'#E30613',borderRadius:8}]},options:{responsive:true,scales:{y:{min:0,max:100}}}});
    document.getElementById('cityStatsBody').innerHTML=cityData.map((c,i)=>`<tr><td>${c.city}${i===0?' 🥇':''}</td><td>${c.count}</td><td>${c.avg}%</td><td>${c.errors}</td></tr>`).join('');
    const top10=[...currentResults].sort((a,b)=>(b.score/b.total)-(a.score/a.total)).slice(0,10);
    document.getElementById('topEmployeesBody').innerHTML=top10.map((e,i)=>`<tr><td>${i+1}</td><td><strong>${escapeHtml(e.surname||'')} ${escapeHtml(e.name||'')}</strong></td><td>${escapeHtml(e.city||'—')}</td><td>${e.score}/${e.total} (${Math.round(e.score/e.total*100)}%)</td></tr>`).join('');
    const errCount={};
    for(const r of currentResults){if(r.answers){for(let i=0;i<r.answers.length;i++){const a=r.answers[i];const ok=a.isCorrect===true||a.ok===true;if(!ok){const topic=questionTopics[i+1]||`Вопрос ${i+1}`;errCount[topic]=(errCount[topic]||0)+1;}}}}
    const topErr=Object.entries(errCount).sort((a,b)=>b[1]-a[1]).slice(0,5);
    document.getElementById('errorsBody').innerHTML=topErr.map(([t,c],i)=>`<tr><td>${i+1}</td><td><strong>${t}</strong></td><td>${c}</td></tr>`).join('');
    if(pieChart)pieChart.destroy();
    if(topErr.length){pieChart=new Chart(document.getElementById('pieChart'),{type:'pie',data:{labels:topErr.map(e=>e[0]),datasets:[{data:topErr.map(e=>e[1]),backgroundColor:['#E30613','#c41c2a','#E57373','#EF9A9A','#F5B7B7'],borderWidth:0}]},options:{responsive:true,maintainAspectRatio:true,plugins:{legend:{position:'right'}}}});}
    const area=document.getElementById('results-area');
    if(!filtered.length){area.innerHTML='<div class="text-center py-4 text-muted">📭 Нет результатов</div>';return;}
    area.innerHTML='';
    for(const r of filtered){
        const percent=Math.round(r.score/r.total*100);
        let details='';
        if(r.answers){for(let i=0;i<r.answers.length;i++){const a=r.answers[i];const ok=a.isCorrect===true||a.ok===true;const qText=(a.question||a.qs||`Вопрос ${i+1}`).substring(0,150);details+=`<div class="small mb-2 p-2" style="border-left:3px solid ${ok?'#28a745':'#E30613'};background:#f9f9f9;border-radius:8px"><strong>${ok?'✅':'❌'} ${escapeHtml(qText)}</strong><div><span class="${ok?'correct':'wrong'}">${ok?'Верно':'Ошибка'}</span></div>${!ok?`<div class="mt-1 small"><strong>✖ Ваш ответ:</strong> ${escapeHtml(a.selected||a.sel||'—')}<br><strong>✔ Правильный ответ:</strong> ${escapeHtml(a.correct||a.cor||'—')}</div>`:''}</div>`;}}
        const clr=percent>=80?'danger':percent>=50?'warning':'secondary';
        area.innerHTML+=`<div class="user-log" onclick="if(event.target.tagName!=='BUTTON')this.querySelector('.answer-details').classList.toggle('show')"><div class="d-flex justify-content-between align-items-start flex-wrap gap-2"><div><strong>${escapeHtml(r.surname||'')} ${escapeHtml(r.name||'')}</strong> <span class="text-muted">📍 ${escapeHtml(r.city||'—')}</span> <span class="badge bg-${clr}">${r.score}/${r.total} (${percent}%)</span></div><div><small>${new Date(r.created_at).toLocaleString()}</small><button class="btn-brand" style="padding:4px 12px;font-size:11px" onclick="event.stopPropagation();generateUserPDF('${r.id}')">📄 PDF</button><i class="bi bi-chevron-down ms-2"></i></div></div><div class="answer-details mt-2"><div class="p-2 rounded" style="background:#f9f9f9">${details}</div></div></div>`;
    }
}

function generateUserPDF(id){const r=currentResults.find(r=>r.id==id);if(!r)return;const name=`${r.surname||''} ${r.name||''}`.trim();const percent=Math.round(r.score/r.total*100);let errs='';if(r.answers){for(let i=0;i<r.answers.length;i++){const a=r.answers[i];const ok=a.isCorrect===true||a.ok===true;const qText=(a.question||a.qs||`Вопрос ${i+1}`).substring(0,150);if(!ok){errs+=`<div style="margin-bottom:15px;padding:12px;background:#ffebee;border-radius:8px"><strong>❌ ${escapeHtml(qText)}</strong><br><div><strong>Ваш ответ:</strong> ${escapeHtml(a.selected||a.sel||'—')}</div><div><strong>Правильный ответ:</strong> ${escapeHtml(a.correct||a.cor||'—')}</div></div>`;}}}const html=`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Отчёт: ${name}</title><style>body{font-family:Arial;padding:20px}</style></head><body><h1>📊 Отчёт по тесту</h1><p><strong>Сотрудник:</strong> ${name}</p><p><strong>Город:</strong> ${r.city||'—'}</p><p><strong>Результат:</strong> ${r.score}/${r.total} (${percent}%)</p><h3>Разбор ошибок:</h3>${errs||'<p>✅ Нет ошибок</p>'}<p style="margin-top:30px;font-size:12px;color:#999;">Отчёт сгенерирован автоматически</p></body></html>`;const win=window.open('','_blank');win.document.write(html);win.document.close();win.print();}

function exportToExcel(){if(!currentResults.length)return alert("Нет данных");const data=currentResults.map(r=>({'ФИО':`${r.surname||''} ${r.name||''}`.trim(),'Город':r.city||'','Баллы':`${r.score}/${r.total}`,'Процент':`${Math.round(r.score/r.total*100)}%`,'Дата':new Date(r.created_at).toLocaleString()}));const ws=XLSX.utils.json_to_sheet(data);const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'Результаты');XLSX.writeFile(wb,`${currentTest?.name||'отчёт'}_${new Date().toLocaleDateString()}.xlsx`);}
function exportDetailedToExcel(){if(!currentResults.length)return alert("Нет данных");try{const excelData=[];for(const r of currentResults){const row={'ФИО':`${r.surname||''} ${r.name||''}`.trim(),'Город':r.city||'','Баллы':`${r.score}/${r.total}`,'Процент':`${Math.round(r.score/r.total*100)}%`,'Дата':new Date(r.created_at).toLocaleString()};if(r.answers){for(let i=0;i<r.answers.length;i++){const a=r.answers[i];row[`Вопрос ${i+1}`]=(a.question||a.qs||'').substring(0,300);row[`Ответ сотрудника ${i+1}`]=(a.selected||a.sel||'').substring(0,300);row[`Правильный ответ ${i+1}`]=(a.correct||a.cor||'').substring(0,300);row[`Результат ${i+1}`]=(a.isCorrect===true||a.ok===true)?'Верно':'Ошибка';}}excelData.push(row);}let sheetName=currentTest?.name||'Детальные';if(sheetName.length>31)sheetName=sheetName.substring(0,28)+'...';const ws=XLSX.utils.json_to_sheet(excelData);const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,sheetName);XLSX.writeFile(wb,`${sheetName}_детальный_${new Date().toLocaleDateString()}.xlsx`);}catch(e){alert('Ошибка при экспорте');}}

ws+=`<tr><td>${i+1}</td><td>${name}</td><td>${e.score}/${e.total}</td><td>${p}%</td></tr>`;});topErr.forEach(([t,c],i)=>{const p=totalErrors?Math.round(c/totalErrors*100):0;errRows+=`<tr><td>${i+1}</td><td>${t}</td><td>${c}</td><td>${p}%</td></tr>`;});const html=`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>585GOLD | Отчёт</title><style>body{font-family:'Segoe UI',Arial;margin:0;padding:20px;background:#f5f5f5}.container{max-width:1000px;margin:0 auto;background:#fff;border-radius:16px;padding:24px;border-top:4px solid #E30613}h1{color:#E30613}h2{color:#E30613;border-bottom:2px solid #E30613;padding-bottom:5px;margin:20px 0 12px}.kpi{display:flex;gap:20px;flex-wrap:wrap;margin:20px 0}.kpi-item{background:#fff5f5;padding:15px;border-radius:12px;min-width:150px;text-align:center;border-left:4px solid #E30613}.kpi-value{font-size:28px;font-weight:bold;color:#E30613}.kpi-label{font-size:12px;color:#666;margin-top:5px}table{width:100%;border-collapse:collapse;margin-bottom:20px}th{background:#E30613;color:#fff;padding:10px;text-align:left}td{padding:8px;border:1px solid #ddd}.footer{text-align:center;font-size:12px;color:#999;margin-top:30px;padding-top:20px;border-top:1px solid #eee}</style></head><body><div class="container"><h1>💎 585GOLD | ОТЧЁТ ПО ТЕСТУ</h1><p><strong>📋 Тест:</strong> ${escapeHtml(testName)}<br><strong>📅 Дата:</strong> ${date}</p><div class="kpi"><div class="kpi-item"><div class="kpi-value">${total}</div><div class="kpi-label">Всего сотрудников</div></div><div class="kpi-item"><div class="kpi-value">${avgScore}%</div><div class="kpi-label">Средний балл</div></div><div class="kpi-item"><div class="kpi-value">${excellent}</div><div class="kpi-label">Отлично (≥80%)</div></div><div class="kpi-item"><div class="kpi-value">${totalErrors}</div><div class="kpi-label">Всего ошибок</div></div></div><h2>📊 Распределение баллов</h2><table><thead><tr><th>Категория</th><th>Кол-во</th><th>%</th></tr></thead><tbody>${distRows}</tbody></table><h2>🏙️ Статистика по городам</h2><table><thead><tr><th>Город</th><th>Сотр.</th><th>Средний балл</th><th>Ошибок</th></tr></thead><tbody>${cityRows}</tbody></table><h2>🔝 Лучшие сотрудники</h2><table><thead><tr><th>#</th><th>Сотрудник</th><th>Результат</th><th>%</th></tr></thead><tbody>${topRows}</tbody></table><h2>📚 Частые ошибки</h2><table><thead><tr><th>#</th><th>Тема ошибки</th><th>Кол-во</th><th>%</th></tr></thead><tbody>${errRows}</tbody></table><h2>💡 Рекомендации</h2><ul><li>Основные зоны роста: ${topErr.slice(0,3).map(e=>e[0]).join(', ')}</li><li>Проведите дополнительное обучение</li><li>Разберите типичные ошибки на планерке</li></ul><div class="footer">💎 585GOLD | Отчёт сгенерирован автоматически</div></div></body></html>`;
