<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>585GOLD | Анализ тестов</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body{background:#f5f5f5;font-family:Segoe UI;padding:20px}
        .container{max-width:1200px;margin:0 auto}
        .card{background:#fff;border-radius:12px;padding:20px;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,.05)}
        .kpi{display:flex;gap:20px;margin-bottom:20px}
        .kpi-item{flex:1;background:#fff;padding:15px;border-radius:12px;text-align:center;border-left:4px solid #E30613}
        .kpi-value{font-size:32px;font-weight:bold;color:#E30613}
        table{width:100%;border-collapse:collapse}
        th,td{padding:8px;text-align:left;border-bottom:1px solid #ddd}
        .btn{background:#E30613;color:#fff;border:none;padding:8px 20px;border-radius:40px;cursor:pointer}
        select{padding:8px;border-radius:40px;border:1px solid #ddd}
        .hidden{display:none}
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h1 style="color:#E30613">585GOLD | Анализ результатов</h1>
        <div style="margin:15px 0">
            <label>📋 Выберите тест: </label>
            <select id="testSelect"></select>
            <button class="btn" id="loadBtn">Загрузить</button>
        </div>
    </div>
    
    <div id="stats" class="hidden">
        <div class="kpi" id="kpi"></div>
        <div class="card"><h3>📊 Результаты сотрудников</h3><table id="resultsTable"><thead><tr><th>Сотрудник</th><th>Город</th><th>Результат</th><th>Дата</th></tr></thead><tbody id="resultsBody"></tbody></table></div>
        <div class="card"><h3>🏆 Лучшие сотрудники</h3><table id="topTable"><thead><tr><th>#</th><th>Сотрудник</th><th>Город</th><th>Результат</th></tr></thead><tbody id="topBody"></tbody></table></div>
        <div class="card"><h3>❗ Частые ошибки (по темам)</h3><table id="errorsTable"><thead><tr><th>#</th><th>Тема ошибки</th><th>Кол-во</th></tr></thead><tbody id="errorsBody"></tbody></table></div>
    </div>
</div>

<script>
const SUPABASE_URL = 'https://qtostraaqrnjbxiydlip.supabase.co';
const SUPABASE_KEY = 'sb_publishable_0GzJSuoAi5zc7pHkicHMNg_cQ-rGAX7';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentResults = [];
let currentTestSlug = null;

const questionTopics = {
    1: "Установление контакта", 2: "Выявление потребностей", 3: "Дополнительная продажа",
    4: "Переориентация на золото", 5: "Футляр и уход", 6: "Возражение по цене",
    7: "Альтернатива/каталог", 8: "Презентация подарка", 9: "Дополнительные модели",
    10: "Яндекс Сплит", 11: "Инициатива в продажах"
};

async function loadTests() {
    const { data, error } = await sb.from('tests').select('slug, name');
    if (error) { console.error(error); return; }
    const select = document.getElementById('testSelect');
    select.innerHTML = '<option value="">-- Выберите тест --</option>' + 
        data.map(t => `<option value="${t.slug}">${t.name}</option>`).join('');
}

async function loadResults() {
    const slug = document.getElementById('testSelect').value;
    if (!slug) return;
    currentTestSlug = slug;
    const { data, error } = await sb.from('results').select('*').eq('test_type', slug);
    if (error) { console.error(error); return; }
    currentResults = data || [];
    renderStats();
    document.getElementById('stats').classList.remove('hidden');
}

function renderStats() {
    if (!currentResults.length) {
        document.getElementById('kpi').innerHTML = '<div class="card">Нет результатов</div>';
        return;
    }
    
    const total = currentResults.length;
    const avgScore = Math.round(currentResults.reduce((s, r) => s + (r.score / r.total), 0) / total * 100);
    const excellent = currentResults.filter(r => (r.score / r.total) >= 0.8).length;
    const totalErrors = currentResults.reduce((s, r) => s + (r.total - r.score), 0);
    
    document.getElementById('kpi').innerHTML = `
        <div class="kpi-item"><div class="kpi-value">${total}</div><div>Всего сотрудников</div></div>
        <div class="kpi-item"><div class="kpi-value">${avgScore}%</div><div>Средний балл</div></div>
        <div class="kpi-item"><div class="kpi-value">${excellent}</div><div>Отлично (≥80%)</div></div>
        <div class="kpi-item"><div class="kpi-value">${totalErrors}</div><div>Всего ошибок</div></div>
    `;
    
    // Таблица сотрудников
    document.getElementById('resultsBody').innerHTML = currentResults.map(r => `
        <tr><td>${r.surname || ''} ${r.name || ''}</td><td>${r.city || '—'}</td><td>${r.score}/${r.total} (${Math.round(r.score/r.total*100)}%)</td><td>${new Date(r.created_at).toLocaleDateString()}</td></tr>
    `).join('');
    
    // Топ-5
    const top5 = [...currentResults].sort((a,b) => (b.score/b.total) - (a.score/a.total)).slice(0,5);
    document.getElementById('topBody').innerHTML = top5.map((e,i) => `
        <tr><td>${i+1}</td><td>${e.surname || ''} ${e.name || ''}</td><td>${e.city || '—'}</td><td>${e.score}/${e.total} (${Math.round(e.score/e.total*100)}%)</td></tr>
    `).join('');
    
    // Частые ошибки по темам
    const errCount = {};
    for (const r of currentResults) {
        if (r.answers) {
            for (let i = 0; i < r.answers.length; i++) {
                const a = r.answers[i];
                if (a.isCorrect === false) {
                    const topic = questionTopics[i+1] || `Вопрос ${i+1}`;
                    errCount[topic] = (errCount[topic] || 0) + 1;
                }
            }
        }
    }
    const topErr = Object.entries(errCount).sort((a,b) => b[1] - a[1]).slice(0,5);
    document.getElementById('errorsBody').innerHTML = topErr.map(([t,c],i) => `<tr><td>${i+1}</td><td>${t}</td><td>${c}</td></tr>`).join('');
}

document.getElementById('loadBtn').onclick = loadResults;
loadTests();
</script>
</body>
</html>
