// ========== КАРТА СООТВЕТСТВИЯ ТЕКСТ ВОПРОСА → НОМЕР ВОПРОСА ==========
function getQuestionNumberByText(questionText) {
    const t = questionText.toLowerCase();
    if (t.includes("обеденный перерыв") || t.includes("торопитесь") || t.includes("витрине")) return 1;
    if (t.includes("детскими серьгами") || t.includes("ребёнок")) return 2;
    if (t.includes("день рождения подруге") || t.includes("бюджет")) return 3;
    if (t.includes("кулон в подарок") || t.includes("выпускной")) return 4;
    if (t.includes("купил цепочку")) return 5;
    if (t.includes("кольцо за") || t.includes("футляр")) return 6;
    if (t.includes("серьги за") || t.includes("не уверен")) return 7;
    if (t.includes("изумрудом") || t.includes("нет в наличии")) return 8;
    if (t.includes("браслет на витрине") || t.includes("рассматривает браслет")) return 9;
    if (t.includes("не уверена, что это моё") || t.includes("красиво, но")) return 10;
    if (t.includes("витрину с кольцами") || t.includes("2 минуты")) return 11;
    return 0;
}

        <!DOCTYPE html>
        <html>
        <head><meta charset="UTF-8"><title>Отчёт: ${emp.name}</title>
        <style>
            body { font-family: 'Segoe UI', Arial, sans-serif; padding: 20px; margin: 0; }
            h1 { color: #0d6efd; }
            .info { background: #f5f7fa; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
            .score-good { background: #4caf50; color: white; display: inline-block; padding: 5px 15px; border-radius: 20px; }
            .score-normal { background: #ff9800; color: white; display: inline-block; padding: 5px 15px; border-radius: 20px; }
            .score-bad { background: #f44336; color: white; display: inline-block; padding: 5px 15px; border-radius: 20px; }
            .summary { background: #e3f2fd; padding: 15px; border-radius: 8px; margin-top: 20px; border-left: 4px solid #0d6efd; }
            @media print {
                body { padding: 0; }
                .no-print { display: none; }
                .error-header, .stats-card { background: #0d6efd !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
                .recommendation { background: #fff3cd !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
                div { page-break-inside: avoid; }
            }
        </style>
        </head>
        <body>
            <div class="no-print" style="text-align:right; margin-bottom:10px;">
                <button onclick="window.print()" style="padding:8px 16px; background:#0d6efd; color:white; border:none; border-radius:5px; cursor:pointer;">🖨️ Сохранить PDF</button>
            </div>
            <h1>📊 Отчёт по тесту</h1>
            <div class="info">
                <strong>Сотрудник:</strong> ${escapeHtml(emp.name)}<br>
                <strong>Город:</strong> ${escapeHtml(emp.city)}<br>
                <strong>Результат:</strong> ${emp.score} из ${emp.total} (${percent}%)<br>
                <div class="${percent >= 80 ? 'score-good' : (percent >= 50 ? 'score-normal' : 'score-bad')}">
                    ${percent >= 80 ? '🎉 Отлично!' : (percent >= 50 ? '📈 Хороший результат' : '📚 Требуется изучение материалов')}
                </div>
            </div>
            <h3>📝 Разбор ошибок (${emp.errors.length})</h3>
            ${errorsHtml || '<div style="color:#4caf50;">✅ Нет ошибок! Отличная работа!</div>'}
            <div class="summary">
                <strong>🎯 Итог по сотруднику:</strong><br>
                ${percent >= 80 ? 'Отличный результат!' : (percent >= 50 ? 'Хороший результат, но есть куда расти.' : 'Требуется дополнительное обучение.')}
                ${weakZonesHtml}
                ${strongZonesHtml}
            </div>
            <p style="margin-top:40px; font-size:12px; color:#999; text-align:center;">Отчёт сгенерирован автоматически</p>
        </body>
        </html>
    `);
    printWindow.document.close();
}

// ========== ОСНОВНАЯ ЛОГИКА ==========
let employeesData = [];

document.getElementById('fileInput').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
        const data = new Uint8Array(e.target.result);
        const workbook = XLSX.read(data, { type: 'array' });
        const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(firstSheet);
        processData(rows);
    };
    reader.readAsArrayBuffer(file);
});

let employeeCounter = 0;

function processData(rows) {
    employeesData = [];
    employeeCounter = 0;
    
    for (const row of rows) {
        const name = row['ФИО'] || '';
        if (!name) continue;
        
        const employee = {
            id: employeeCounter++,
            name: name,
            city: row['Город'] || '',
            score: 0,
            total: 0,
            errors: []
        };
        
        const scoreMatch = (row['Баллы'] || '').match(/(\d+)\/(\d+)/);
        if (scoreMatch) {
            employee.score = parseInt(scoreMatch[1]);
            employee.total = parseInt(scoreMatch[2]);
        }
        
        for (let i = 1; i <= 11; i++) {
            const result = row[`Результат ${i}`];
            const questionText = row[`Вопрос ${i}`] || '';
            const userAnswer = row[`Ответ сотрудника ${i}`] || '';
            const correctAnswer = row[`Правильный ответ ${i}`] || '';
            
            if (result && result.toString().trim() === 'Ошибка') {
                const qNum = getQuestionNumberByText(questionText);
                // Определяем вариант ответа (A, B, C, D)
                let wrongVariant = '';
                const firstChar = userAnswer.trim().charAt(0);
                if (firstChar === 'А' || firstChar === 'A') wrongVariant = 'A';
                else if (firstChar === 'Б' || firstChar === 'B') wrongVariant = 'B';
                else if (firstChar === 'В' || firstChar === 'C') wrongVariant = 'C';
                else if (firstChar === 'Г' || firstChar === 'D') wrongVariant = 'D';
                
                employee.errors.push({
                    qNum: qNum,
                    wrongVariant: wrongVariant,
                    question: questionText,
                    userAnswer: userAnswer,
                    correctAnswer: correctAnswer
                });
            }
        }
        employeesData.push(employee);
    }
    
    displayResults();
}

function displayResults() {
    const total = employeesData.length;
    const avgScore = total > 0 ? Math.round(employeesData.reduce((s, e) => s + (e.score / e.total), 0) / total * 100) : 0;
    const perfectCount = employeesData.filter(e => e.errors.length === 0).length;
    const totalErrors = employeesData.reduce((s, e) => s + e.errors.length, 0);
    
    document.getElementById('statsPanel').style.display = 'flex';
    document.getElementById('totalCount').innerText = total;
    document.getElementById('avgScore').innerText = avgScore + '%';
    document.getElementById('totalErrors').innerText = totalErrors;
    document.getElementById('perfectCount').innerText = perfectCount;
    
    let html = '<h3 class="mb-3">📋 Результаты сотрудников</h3>';
    
    for (const emp of employeesData) {
        const percent = Math.round(emp.score / emp.total * 100);
        const errorCount = emp.errors.length;
        
        let errorsHtml = '';
        for (const err of emp.errors) {
            errorsHtml += `
                <div class="wrong-answer">
                    <strong>❌ Текст вопроса:</strong><br>${escapeHtml(err.question)}<br>
                    <div class="mt-2"><span style="color:#d32f2f;">✖ Ваш ответ:</span><br>${escapeHtml(err.userAnswer)}</div>
                    <div class="mt-1"><span style="color:#2e7d32;">✓ Правильный ответ:</span><br>${escapeHtml(err.correctAnswer)}</div>
                    ${getRecommendationHTML(err.qNum, err.wrongVariant)}
                </div>
            `;
        }
        
        html += `
            <div id="emp-${emp.id}" class="error-card">
                <div class="error-header ${errorCount === 0 ? 'green' : ''}" onclick="toggleBody(this)">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <strong class="emp-name">${escapeHtml(emp.name)}</strong>
                            <span class="badge bg-light text-dark ms-2 emp-city">${emp.city}</span>
                            <span class="emp-score badge ${percent >= 80 ? 'bg-success' : (percent >= 50 ? 'bg-warning text-dark' : 'bg-danger')} ms-2">${emp.score}/${emp.total} (${percent}%)</span>
                        </div>
                        <div>
                            <span class="badge bg-secondary">Ошибок: ${errorCount}</span>
                            <button class="btn-pdf no-print" onclick="event.stopPropagation(); generatePDF(${emp.id})">📄 Скачать PDF</button>
                            <i class="bi bi-chevron-down ms-2"></i>
                        </div>
                    </div>
                </div>
                <div class="error-body">
                    <p><strong>Результат:</strong> ${emp.score} из ${emp.total} (${percent}%)</p>
                    ${errorCount === 0 ? '<div class="alert alert-success">✅ Отлично! Нет ошибок.</div>' : `<div class="alert alert-warning">⚠️ Количество ошибок: ${errorCount}. Рекомендуется изучить рекомендации ниже.</div>`}
                    ${errorsHtml}
                </div>
            </div>
        `;
    }
    document.getElementById('resultsArea').innerHTML = html;
}

function toggleBody(header) {
    const body = header.nextElementSibling;
    body.classList.toggle('show');
    const icon = header.querySelector('.bi-chevron-down');
    if (icon) icon.style.transform = body.classList.contains('show') ? 'rotate(180deg)' : 'rotate(0deg)';
}

function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
}

const uploadArea = document.getElementById('uploadArea');
uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.style.borderColor = '#0d6efd'; uploadArea.style.background = '#f8f9fa'; });
uploadArea.addEventListener('dragleave', e => { uploadArea.style.borderColor = '#ccc'; uploadArea.style.background = 'white'; });
uploadArea.addEventListener('drop', e => {
    e.preventDefault();
    uploadArea.style.borderColor = '#ccc';
    uploadArea.style.background = 'white';
    const file = e.dataTransfer.files[0];
    if (file && (file.name.endsWith('.xlsx') || file.name.endsWith('.xls'))) {
        const reader = new FileReader();
        reader.onload = e => {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
            const rows = XLSX.utils.sheet_to_json(firstSheet);
            processData(rows);
        };
        reader.readAsArrayBuffer(file);
    } else { alert('Загрузите Excel файл'); }
});
</script>
