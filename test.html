<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Диагностика тестов</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <h2>Результат диагностики:</h2>
    <pre id="result">Загрузка...</pre>

    <script>
        (async function() {
            const SUPABASE_URL = 'https://qtostraaqrnjbxiydlip.supabase.co';
            const SUPABASE_KEY = 'sb_publishable_0GzJSuoAi5zc7pHkicHMNg_cQ-rGAX7';
            const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            
            const resultDiv = document.getElementById('result');
            
            try {
                resultDiv.innerText = 'Проверяем таблицу tests...\n';
                const { data, error } = await sb.from('tests').select('*');
                
                if (error) {
                    resultDiv.innerText += '❌ Ошибка: ' + JSON.stringify(error, null, 2);
                    return;
                }
                
                if (!data || data.length === 0) {
                    resultDiv.innerText += '⚠️ Тесты не найдены. Таблица "tests" пуста.\n\n';
                    resultDiv.innerText += '💡 Решение: добавьте тест в Supabase через Table Editor.\n';
                    resultDiv.innerText += 'Поля: slug, name, questions_count, city_list';
                } else {
                    resultDiv.innerText += '✅ Найдено тестов: ' + data.length + '\n\n';
                    resultDiv.innerText += JSON.stringify(data, null, 2);
                }
            } catch (err) {
                resultDiv.innerText = '❌ Исключение: ' + err.message;
            }
        })();
    </script>
</body>
</html>
