<!DOCTYPE html>
<html>
<head>
    <title>QR-код</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            max-width: 400px;
        }
        .qr-container {
            margin: 20px 0;
            padding: 10px;
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            margin: 10px 5px;
        }
        button:hover {
            background: #5a67d8;
        }
        .link {
            background: #f5f5f5;
            padding: 10px;
            border-radius: 10px;
            word-break: break-all;
            font-size: 12px;
            margin: 15px 0;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>📱 QR-код</h2>
        <p>Отсканируйте, чтобы открыть документ</p>
        
        <div class="qr-container" id="qrcode"></div>
        
        <div class="link">
            https://wetalsfinx.github.io/Test/Сервис.html
        </div>
        
        <div>
            <button onclick="downloadQR()">💾 Скачать QR-код</button>
            <button onclick="window.print()">🖨️ Распечатать</button>
        </div>
        
        <a href="https://wetalsfinx.github.io/Test/Сервис.html" target="_blank">🔗 Открыть документ</a>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script>
        // Создаем QR-код
        new QRCode(document.getElementById("qrcode"), {
            text: "https://wetalsfinx.github.io/Test/Сервис.html",
            width: 200,
            height: 200,
            colorDark: "#000000",
            colorLight: "#ffffff",
            correctLevel: QRCode.CorrectLevel.H
        });
        
        function downloadQR() {
            // Находим canvas с QR-кодом
            const canvas = document.querySelector('#qrcode canvas');
            if (canvas) {
                const link = document.createElement('a');
                link.download = 'qr-code.png';
                link.href = canvas.toDataURL();
                link.click();
            } else {
                // Если canvas не найден, ищем img
                const img = document.querySelector('#qrcode img');
                if (img) {
                    const link = document.createElement('a');
                    link.download = 'qr-code.png';
                    link.href = img.src;
                    link.click();
                }
            }
        }
    </script>
</body>
</html>
