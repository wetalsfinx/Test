<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>585GOLD | Дашборд тестов</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #f0f2f5;
            margin: 0;
            padding: 20px;
        }
        .dashboard { max-width: 1400px; margin: 0 auto; }
        .card {
            background: white;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border-top: 4px solid #c41e3a;
        }
        h2, h3 { color: #c41e3a; margin-top: 0; }
        .flex-row { display: flex; gap: 15px; flex-wrap: wrap; align-items: flex-end; }
        select, button {
            padding: 10px 16px;
            border-radius: 30px;
            border: 1px solid #ddd;
            font-size: 14px;
        }
        button {
            background: #c41e3a;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover { background: #8b1a2c; }
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .kpi-card {
            background: #f8f9fa;
            border-radius: 20px;
            padding: 15px;
            text-align: center;
        }
        .kpi-value { font-size: 32px; font-weight: bold; color: #c41e3a; }
        .top-employee, .city-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
        }
        .top-employee:hover, .city-row:hover, .employee-item:hover { background: #fff0f3; }
        .badge {
            background: #c41e3a;
            color: white;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 12px;
        }
        .employee-list { max-height: 400px; overflow-y: auto; }
        .employee-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
        }
        .employee-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .delete-employee {
            background: #8b1a2c;
            color: white;
            border: none;
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 12px;
            cursor: pointer;
        }
        .delete-employee:hover { background: #5c0f1e; }
        .charts-row { display: flex; gap: 20px; flex-wrap: wrap; }
        .chart-box { flex: 1; min-width: 250px; }
        canvas { max-height: 250px; }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            border-radius: 28px;
            padding: 24px;
        }
        .answer-item {
            background: #f8f9fa;
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 12px;
        }
        .answer-correct { border-left: 4px solid #28a745; }
        .answer-wrong { border-left: 4px solid #c41e3a; }
        .modal-actions {
            display: flex;
            gap: 10px;
            margin: 15px 0;
            flex-wrap: wrap;
        }
        .modal-actions button {
            width: auto;
            padding: 8px 20px;
        }
    </style>
</head>
<body>
<div class="dashboard">
    <div class="card">
        <h2>📊 585GOLD | Дашборд тестов</h2>
        <div class="flex-row">
            <select id="cityFilter">
                <option value="all">Все города</option>
            </select>
            <button id="loadBtn">Загрузить данные</button>
            <button id="exportCsvBtn">📎 CSV</button>
        </div>
        <div id="status" style="margin-top: 10px; color: #666;"></div>
    </div>

    <div id="statsArea" style="display: none;">
        <div class="kpi-grid" id="kpi"></div>
        
        <div class="charts-row">
            <div class="card chart-box">
                <h3>Распределение баллов</h3>
                <canvas id="scoreHistogram"></canvas>
            </div>
            <div class="card chart-box">
                <h3>Топ городов</h3>
                <canvas id="cityChart"></canvas>
            </div>
        </div>

        <div class="row" style="display: flex; gap: 20px; flex-wrap: wrap;">
            <div class="card" style="flex:1">
                <h3>🏆 Топ сотрудников (≥85%)</h3>
                <div id="topEmployees"></div>
            </div>
            <div class="card" style="flex:1">
                <h3>🏙️ Рейтинг городов</h3>
                <div id="cityRating"></div>
            </div>
        </div>

        <div class="card">
            <h3>📋 Список сотрудников (<span id="empCount">0</span>)</h3>
            <div class="employee-list" id="employeeList"></div>
        </div>
    </div>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle"></h3>
        <div id="modalAnswers"></div>
        <div class="modal-actions">
            <button id="modalDeleteBtn" style="background: #8b1a2c;">🗑 Удалить сотрудника</button>
            <button id="modalPdfBtn" style="background: #2c6e2c;">📄 PDF отчёт</button>
            <button onclick="closeModal()" style="background: #6c757d;">Закрыть</button>
        </div>
    </div>
</div>

<script>
    const supabaseClient = supabase.createClient(
        'https://qtostraaqrnjbxiydlip.supabase.co',
        'sb_publishable_0GzJSuoAi5zc7pHkicHMNg_cQ-rGAX7'
    );

    let allResults = [];
    let filteredResults = [];
    let cityChart = null;
    let scoreChart = null;
    let currentSelectedEmployee = null;

    async function loadResults() {
        const statusDiv = document.getElementById('status');
        statusDiv.innerHTML = 'Загрузка...';
        document.getElementById('statsArea').style.display = 'none';

        const { data, error } = await supabaseClient
            .from('results_new')
            .select('*')
            .eq('test_slug', 'prodazhi_2025')
            .order('created_at', { ascending: false });

        if (error) {
            statusDiv.innerHTML = 'Ошибка: ' + error.message;
            return;
        }

        if (!data || data.length === 0) {
            statusDiv.innerHTML = 'Нет результатов';
            return;
        }

        allResults = data;
        applyFilters();
        document.getElementById('statsArea').style.display = 'block';
        statusDiv.innerHTML = `✅ Загружено: ${allResults.length} записей`;
    }

    function applyFilters() {
        const cityFilter = document.getElementById('cityFilter').value;
        filteredResults = allResults.filter(r => cityFilter === 'all' || r.city === cityFilter);
        renderDashboard();
    }

    function renderDashboard() {
        const total = filteredResults.length;
        const avgPercent = total ? Math.round(filteredResults.reduce((s, r) => s + r.percent, 0) / total) : 0;
        const successCount = filteredResults.filter(r => r.percent >= 85).length;
        const totalErrors = filteredResults.reduce((s, r) => s + (r.total - r.score), 0);

        document.getElementById('kpi').innerHTML = `
            <div class="kpi-card"><div class="kpi-value">${total}</div><div>Сотрудников</div></div>
            <div class="kpi-card"><div class="kpi-value">${avgPercent}%</div><div>Средний балл</div></div>
            <div class="kpi-card"><div class="kpi-value">${successCount}</div><div>Успешно (≥85%)</div></div>
            <div class="kpi-card"><div class="kpi-value">${totalErrors}</div><div>Всего ошибок</div></div>
        `;

        const top5 = [...filteredResults]
            .filter(r => r.percent >= 85)
            .sort((a,b) => b.percent - a.percent)
            .slice(0,5);
        
        document.getElementById('topEmployees').innerHTML = top5.map((r, i) => {
            let medal = i === 0 ? '🥇' : (i === 1 ? '🥈' : (i === 2 ? '🥉' : ''));
            return `<div class="top-employee" onclick="showEmployeeDetails(${r.id})">
                <span><b>${i+1}</b> ${medal} ${r.user_name} (${r.city})</span>
                <span class="badge">${r.percent}%</span>
            </div>`;
        }).join('') || '<div>Нет сотрудников с результатом ≥85%</div>';

        const cityMap = new Map();
        filteredResults.forEach(r => {
            if (!cityMap.has(r.city)) cityMap.set(r.city, { sum: 0, count: 0 });
            const c = cityMap.get(r.city);
            c.sum += r.percent;
            c.count++;
        });
        const cityRating = Array.from(cityMap.entries())
            .map(([city, data]) => ({ city, avg: Math.round(data.sum / data.count), count: data.count }))
            .sort((a,b) => b.avg - a.avg);
        
        document.getElementById('cityRating').innerHTML = cityRating.map(c => `
            <div class="city-row" onclick="document.getElementById('cityFilter').value='${c.city}'; applyFilters();">
                <span><b>${c.city}</b> (${c.count} чел.)</span>
                <span class="badge">${c.avg}%</span>
            </div>
        `).join('');

        // Список сотрудников с кнопкой удаления
        document.getElementById('empCount').innerText = filteredResults.length;
        document.getElementById('employeeList').innerHTML = filteredResults.map(r => `
            <div class="employee-item">
                <div style="flex:1; cursor:pointer;" onclick="showEmployeeDetails(${r.id})">
                    <b>${r.user_name}</b> (${r.city}) <span class="badge" style="background:${r.percent>=85?'#28a745':'#c41e3a'}">${r.percent}%</span>
                </div>
                <div class="employee-actions">
                    <button class="delete-employee" onclick="deleteEmployee(event, ${r.id})">🗑</button>
                </div>
            </div>
        `).join('');

        // Фильтр городов
        const currentCityFilter = document.getElementById('cityFilter').value;
        const uniqueCities = [...new Set(allResults.map(r => r.city))];
        const citySelect = document.getElementById('cityFilter');
        citySelect.innerHTML = '<option value="all">Все города</option>' + 
            uniqueCities.map(c => `<option value="${c}" ${currentCityFilter===c ? 'selected' : ''}>${c}</option>`).join('');

        // Гистограмма
        if (scoreChart) scoreChart.destroy();
        const bins = [0,0,0,0,0];
        filteredResults.forEach(r => {
            if (r.percent <= 20) bins[0]++;
            else if (r.percent <= 40) bins[1]++;
            else if (r.percent <= 60) bins[2]++;
            else if (r.percent <= 80) bins[3]++;
            else bins[4]++;
        });
        scoreChart = new Chart(document.getElementById('scoreHistogram'), {
            type: 'bar',
            data: {
                labels: ['0-20%', '21-40%', '41-60%', '61-80%', '81-100%'],
                datasets: [{ label: 'Кол-во сотрудников', data: bins, backgroundColor: '#c41e3a' }]
            }
        });

        if (cityChart) cityChart.destroy();
        cityChart = new Chart(document.getElementById('cityChart'), {
            type: 'bar',
            data: {
                labels: cityRating.map(c => c.city),
                datasets: [{ label: 'Средний %', data: cityRating.map(c => c.avg), backgroundColor: '#c41e3a' }]
            }
        });
    }

    async function showEmployeeDetails(employeeId) {
        const employee = filteredResults.find(r => r.id === employeeId);
        if (!employee) return;
        currentSelectedEmployee = employee;
        
        document.getElementById('modalTitle').innerHTML = `Результаты: ${employee.user_name} (${employee.city}) — ${employee.percent}%`;
        const answers = employee.answers || [];
        
        let html = `<p><strong>Правильных ответов:</strong> ${employee.score} из ${employee.total}</p>`;
        answers.forEach((a, i) => {
            html += `
                <div class="answer-item ${a.correct ? 'answer-correct' : 'answer-wrong'}">
                    <b>Вопрос ${i+1}:</b> ${a.questionText}<br>
                    <b>Ваш ответ:</b> ${a.selectedText}<br>
                    ${!a.correct ? `<b>Правильный ответ:</b> ${a.correctText}<br>` : ''}
                    ${!a.correct ? `<b><span style="color:#c41e3a;">📌 Рекомендация:</span></b> Изучите материал и повторите попытку.` : ''}
                </div>
            `;
        });
        document.getElementById('modalAnswers').innerHTML = html;
        document.getElementById('modal').style.display = 'flex';
    }

    async function deleteEmployee(event, employeeId) {
        event.stopPropagation();
        if (!confirm('Удалить результаты этого сотрудника?')) return;
        
        const { error } = await supabaseClient
            .from('results_new')
            .delete()
            .eq('id', employeeId);
        
        if (error) {
            alert('Ошибка удаления: ' + error.message);
        } else {
            await loadResults();
        }
    }

    async function deleteCurrentEmployee() {
        if (!currentSelectedEmployee) return;
        if (!confirm(`Удалить результаты ${currentSelectedEmployee.user_name}?`)) return;
        
        await supabaseClient.from('results_new').delete().eq('id', currentSelectedEmployee.id);
        await loadResults();
        closeModal();
    }

    function exportEmployeePDF() {
        if (!currentSelectedEmployee) return;
        
        const employee = currentSelectedEmployee;
        const answers = employee.answers || [];
        let html = `
            <html><head><meta charset="UTF-8"><title>Отчёт ${employee.user_name}</title>
            <style>
                body { font-family: 'Segoe UI', sans-serif; padding: 30px; }
                h1 { color: #c41e3a; }
                .answer { margin-bottom: 15px; padding: 10px; border-left: 4px solid #ddd; }
                .correct { border-left-color: #28a745; }
                .wrong { border-left-color: #c41e3a; }
            </style></head>
            <body>
            <h1>585GOLD | Отчёт по тесту</h1>
            <p><strong>Сотрудник:</strong> ${employee.user_name}</p>
            <p><strong>Город:</strong> ${employee.city}</p>
            <p><strong>Дата:</strong> ${new Date(employee.created_at).toLocaleString()}</p>
            <p><strong>Результат:</strong> ${employee.percent}% (${employee.score}/${employee.total} правильных)</p>
            <hr>
            <h3>Детальные ответы</h3>
        `;
        answers.forEach((a, i) => {
            html += `
                <div class="answer ${a.correct ? 'correct' : 'wrong'}">
                    <b>${i+1}. ${a.questionText}</b><br>
                    Ответ: ${a.selectedText}<br>
                    ${!a.correct ? `✅ Правильный ответ: ${a.correctText}<br>` : ''}
                </div>
            `;
        });
        html += `</body></html>`;
        
        const opt = { margin: 0.5, filename: `report_${employee.user_name}.pdf`, image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2 }, jsPDF: { unit: 'in', format: 'a4' } };
        html2pdf().set(opt).from(html).save();
    }

    function exportCSV() {
        if (!filteredResults.length) return alert('Нет данных');
        let csv = "Имя,Город,Правильных,Всего,Процент,Дата\n";
        filteredResults.forEach(r => {
            csv += `"${r.user_name}","${r.city}",${r.score},${r.total},${r.percent},"${new Date(r.created_at).toLocaleDateString()}"\n`;
        });
        const blob = new Blob(["\uFEFF" + csv], {type: 'text/csv'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `test_results_${new Date().toISOString().slice(0,10)}.csv`;
        a.click();
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; currentSelectedEmployee = null; }

    document.getElementById('loadBtn').onclick = loadResults;
    document.getElementById('exportCsvBtn').onclick = exportCSV;
    document.getElementById('cityFilter').addEventListener('change', applyFilters);
    document.getElementById('modalDeleteBtn').onclick = deleteCurrentEmployee;
    document.getElementById('modalPdfBtn').onclick = exportEmployeePDF;
    window.showEmployeeDetails = showEmployeeDetails;
    window.closeModal = closeModal;
    window.deleteEmployee = deleteEmployee;

    loadResults();
</script>
</body>
</html>
