<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>585GOLD | Дашборд тестов</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #f0f2f5;
            margin: 0;
            padding: 0;
            transition: background 0.2s, color 0.2s;
        }
        body.dark { background: #1a1a2e; color: #e0e0e0; }
        body.dark .card, body.dark .kpi-card, body.dark .modal-content { background: #16213e; color: #e0e0e0; border-color: #0f3460; }
        .dashboard { max-width: 1400px; margin: 0 auto; padding: 20px; }
        .sticky-header { position: sticky; top: 0; z-index: 100; background: inherit; padding-bottom: 10px; }
        .card {
            background: white;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            border-top: 4px solid #c41e3a;
        }
        h2, h3 { color: #c41e3a; margin-top: 0; }
        .flex-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-end; }
        select, button, input {
            padding: 8px 14px;
            border-radius: 30px;
            border: 1px solid #ddd;
            font-size: 13px;
            background: white;
            cursor: pointer;
        }
        button { background: #c41e3a; color: white; border: none; }
        button:hover { background: #8b1a2c; }
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }
        .kpi-card {
            background: #f8f9fa;
            border-radius: 20px;
            padding: 12px;
            text-align: center;
        }
        .kpi-value { font-size: 28px; font-weight: bold; color: #c41e3a; }
        .charts-row { display: flex; gap: 15px; flex-wrap: wrap; }
        .chart-box { flex: 1; min-width: 250px; }
        canvas { max-height: 200px; width: 100%; }
        .employee-list { max-height: 400px; overflow-y: auto; }
        .employee-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            font-size: 14px;
        }
        .employee-item:hover { background: #fff0f3; }
        .badge { background: #c41e3a; color: white; padding: 2px 10px; border-radius: 30px; font-size: 11px; }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            max-width: 550px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            border-radius: 28px;
            padding: 20px;
        }
        .answer-item {
            background: #f8f9fa;
            border-radius: 16px;
            padding: 10px;
            margin-bottom: 10px;
            font-size: 13px;
        }
        .answer-correct { border-left: 4px solid #28a745; }
        .answer-wrong { border-left: 4px solid #c41e3a; }
        .recommendation {
            background: #e8f0e8;
            border-radius: 10px;
            padding: 8px;
            margin-top: 8px;
            font-size: 12px;
        }
        .leader-card {
            background: linear-gradient(135deg, #fff0f3, #ffe0e0);
            border-radius: 20px;
            padding: 12px;
            margin-bottom: 15px;
            text-align: center;
            font-size: 14px;
        }
        .skeleton { background: #e0e0e0; border-radius: 8px; animation: pulse 1s infinite; height: 80px; margin-bottom: 10px; }
        @keyframes pulse { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }
        .checkbox-col { width: 30px; text-align: center; }
        .theme-toggle { margin-left: auto; }
        .loading-text { text-align: center; padding: 20px; color: #666; }
    </style>
</head>
<body>
<div class="dashboard">
    <div class="sticky-header">
        <div class="card" style="margin-bottom: 10px; padding: 15px;">
            <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px;">
                <h2 style="margin: 0; font-size: 20px;">📊 585GOLD | Дашборд</h2>
                <button id="themeToggleBtn" style="background:#6c757d; padding: 6px 15px;">🌙 Тема</button>
            </div>
            <div class="flex-row" style="margin-top: 12px;">
                <select id="cityFilter"><option value="all">Все города</option></select>
                <select id="percentFilter"><option value="all">Все</option><option value="70">≥70%</option><option value="85">≥85%</option><option value="50"><50%</option></select>
                <select id="dateRangeSelect"><option value="all">Всё время</option><option value="today">Сегодня</option><option value="week">7 дней</option><option value="month">30 дней</option></select>
                <button id="loadBtn">Загрузить</button>
                <button id="exportCsvBtn">📎 CSV</button>
            </div>
            <div id="status" style="margin-top: 8px; font-size: 12px; color: #666;"></div>
        </div>
    </div>

    <div id="statsArea" style="display: none;">
        <div id="leaderCelebration" class="leader-card" style="display: none;"></div>
        <div class="kpi-grid" id="kpi"></div>
        <div class="charts-row">
            <div class="card chart-box"><h3>Распределение баллов</h3><canvas id="scoreHistogram"></canvas></div>
            <div class="card chart-box"><h3>Топ городов</h3><canvas id="cityChart"></canvas></div>
        </div>
        <div class="row" style="display: flex; gap: 15px; flex-wrap: wrap;">
            <div class="card" style="flex:1"><h3>🏆 Топ сотрудников (≥85%)</h3><div id="topEmployees"></div></div>
            <div class="card" style="flex:1"><h3>🏙️ Рейтинг городов</h3><div id="cityRating"></div></div>
        </div>
        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;">
                <h3>📋 Сотрудники (<span id="empCount">0</span>)</h3>
                <button id="massDeleteBtn" style="background:#8b1a2c; display: none;">🗑 Удалить выбранных</button>
            </div>
            <div class="employee-list" id="employeeList"></div>
        </div>
    </div>
    <div id="loadingSkeleton" class="loading-text">⏳ Загрузка данных...</div>
</div>

<div id="modal" class="modal"><div class="modal-content"><h3 id="modalTitle"></h3><div id="modalAnswers"></div><div class="modal-actions" style="display:flex; gap:8px; margin-top:15px;"><button id="modalDeleteBtn" style="background:#8b1a2c;">🗑 Удалить</button><button id="modalPdfBtn" style="background:#2c6e2c;">📄 PDF</button><button onclick="closeModal()" style="background:#6c757d;">Закрыть</button></div></div></div>

<script>
    const supabaseClient = supabase.createClient('https://qtostraaqrnjbxiydlip.supabase.co', 'sb_publishable_0GzJSuoAi5zc7pHkicHMNg_cQ-rGAX7');
    
    let allResults = [], filteredResults = [], cityChart = null, scoreChart = null, currentSelectedEmployee = null, selectedForDelete = new Set();

    function getRecommendation(text) {
        if (text.includes('первым') || text.includes('зрительный')) return '💡 Проявляй инициативу: дайте ценность (скидка+бонусы) и спросите «Для себя или в подарок?»';
        if (text.includes('бюджет')) return '💡 Задавай вопросы ДО показа: спросите о случае и предпочтениях.';
        if (text.includes('серьги')) return '💡 Презентуй с эмоцией: предложите собрать образ целиком.';
        if (text.includes('серебра')) return '💡 Предлагай примерку: сравните оба варианта вживую.';
        if (text.includes('футляр')) return '💡 Не отпускай без альтернативы: презентуйте аксессуар как часть образа.';
        if (text.includes('дороговато')) return '💡 Спросите: «Понимаю, цена важна. А с чем вы сравниваете?»';
        if (text.includes('размера')) return '💡 Предложите похожие модели и каталог заказа.';
        if (text.includes('подарок маме') || text.includes('юбилей')) return '💡 Свяжите украшение с моментом: «Это кольцо будет напоминать о юбилее».';
        if (text.includes('другие модели')) return '💡 Предложите идеи: «Давайте я покажу ещё несколько моделей».';
        if (text.includes('сплит')) return '💡 Расскажите о Сплите ДО итоговой цены.';
        if (text.includes('пауза') || text.includes('витрины')) return '💡 После паузы 20-30 секунд начните диалог: «Какое изделие выбираете?»';
        return '💡 Изучите правильный ответ и повторите материал.';
    }

    async function loadResults() {
        document.getElementById('loadingSkeleton').style.display = 'block';
        document.getElementById('statsArea').style.display = 'none';
        document.getElementById('status').innerHTML = 'Загрузка...';

        const { data, error } = await supabaseClient
            .from('results_new')
            .select('*')
            .eq('test_slug', 'prodazhi_2025')
            .order('created_at', { ascending: false })
            .limit(2000);

        document.getElementById('loadingSkeleton').style.display = 'none';
        if (error) { document.getElementById('status').innerHTML = 'Ошибка: ' + error.message; return; }
        if (!data || !data.length) { document.getElementById('status').innerHTML = 'Нет результатов'; return; }

        allResults = data;
        applyFilters();
        document.getElementById('statsArea').style.display = 'block';
        document.getElementById('status').innerHTML = `✅ ${allResults.length} записей`;
    }

    function applyFilters() {
        let filtered = [...allResults];
        const city = document.getElementById('cityFilter').value;
        if (city !== 'all') filtered = filtered.filter(r => r.city === city);
        
        const percent = document.getElementById('percentFilter').value;
        if (percent === '70') filtered = filtered.filter(r => r.percent >= 70);
        else if (percent === '85') filtered = filtered.filter(r => r.percent >= 85);
        else if (percent === '50') filtered = filtered.filter(r => r.percent < 50);
        
        const range = document.getElementById('dateRangeSelect').value;
        const now = new Date();
        if (range === 'today') filtered = filtered.filter(r => new Date(r.created_at).toDateString() === now.toDateString());
        else if (range === 'week') { const weekAgo = new Date(now.setDate(now.getDate()-7)); filtered = filtered.filter(r => new Date(r.created_at) >= weekAgo); }
        else if (range === 'month') { const monthAgo = new Date(now.setDate(now.getDate()-30)); filtered = filtered.filter(r => new Date(r.created_at) >= monthAgo); }
        
        filteredResults = filtered;
        renderDashboard();
    }

    function renderDashboard() {
        const total = filteredResults.length;
        if (!total) { document.getElementById('kpi').innerHTML = '<div class="kpi-card">Нет данных</div>'; return; }
        
        const avg = Math.round(filteredResults.reduce((s,r)=>s+r.percent,0)/total);
        const success = filteredResults.filter(r=>r.percent>=85).length;
        const errors = filteredResults.reduce((s,r)=>s+(r.total-r.score),0);
        document.getElementById('kpi').innerHTML = `
            <div class="kpi-card"><div class="kpi-value">${total}</div><div>Сотрудников</div></div>
            <div class="kpi-card"><div class="kpi-value">${avg}%</div><div>Средний балл</div></div>
            <div class="kpi-card"><div class="kpi-value">${success}</div><div>Успешно (≥85%)</div></div>
            <div class="kpi-card"><div class="kpi-value">${errors}</div><div>Ошибок всего</div></div>
        `;

        const top5 = [...filteredResults].filter(r=>r.percent>=85).sort((a,b)=>b.percent-a.percent).slice(0,5);
        document.getElementById('topEmployees').innerHTML = top5.map((r,i)=>`<div class="employee-item" onclick="showEmployeeDetails(${r.id})"><span><b>${i+1}</b> ${r.user_name} (${r.city})</span><span class="badge">${r.percent}%</span></div>`).join('') || 'Нет';

        const cityMap = new Map();
        filteredResults.forEach(r=>{cityMap.set(r.city, (cityMap.get(r.city)||0)+1); });
        const cities = [...cityMap.entries()].map(([c,count])=>({city:c, count})).sort((a,b)=>b.count-a.count).slice(0,6);
        document.getElementById('cityRating').innerHTML = cities.map(c=>`<div class="employee-item" onclick="document.getElementById('cityFilter').value='${c.city}'; applyFilters();"><span>🏙️ ${c.city}</span><span class="badge">${c.count} чел.</span></div>`).join('');

        const leader = [...filteredResults].sort((a,b)=>b.percent-a.percent)[0];
        const leaderDiv = document.getElementById('leaderCelebration');
        if(leader) leaderDiv.innerHTML = `🏆 Лучший: <strong>${leader.user_name}</strong> (${leader.city}) — ${leader.percent}%`;
        leaderDiv.style.display = 'block';

        selectedForDelete.clear();
        document.getElementById('empCount').innerText = filteredResults.length;
        document.getElementById('employeeList').innerHTML = filteredResults.map(r=>`
            <div class="employee-item">
                <div class="checkbox-col"><input type="checkbox" class="emp-checkbox" data-id="${r.id}"></div>
                <div style="flex:1; cursor:pointer;" onclick="showEmployeeDetails(${r.id})"><b>${r.user_name}</b> (${r.city}) <span class="badge" style="background:${r.percent>=85?'#28a745':'#c41e3a'}">${r.percent}%</span></div>
                <div><button class="delete-employee" style="background:#8b1a2c; border:none; border-radius:20px; padding:2px 10px; color:white;" onclick="deleteEmployee(event, ${r.id})">🗑</button></div>
            </div>
        `).join('');
        document.querySelectorAll('.emp-checkbox').forEach(cb=>cb.onchange=e=>{if(e.target.checked) selectedForDelete.add(e.target.dataset.id); else selectedForDelete.delete(e.target.dataset.id);});
        document.getElementById('massDeleteBtn').style.display = filteredResults.length ? 'inline-block' : 'none';

        // Графики (лениво, через setTimeout)
        setTimeout(()=>{
            const bins=[0,0,0,0,0];
            filteredResults.forEach(r=>{if(r.percent<=20)bins[0]++;else if(r.percent<=40)bins[1]++;else if(r.percent<=60)bins[2]++;else if(r.percent<=80)bins[3]++;else bins[4]++;});
            if(scoreChart) scoreChart.destroy();
            scoreChart = new Chart(document.getElementById('scoreHistogram'), { type: 'bar', data: { labels: ['0-20%','21-40%','41-60%','61-80%','81-100%'], datasets: [{ data: bins, backgroundColor: '#c41e3a' }] }, options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { display: false } }, animation: { duration: 0 } } });
            
            const cityAvg = [...new Map()];
            filteredResults.forEach(r=>{if(!cityAvg.has(r.city)) cityAvg.set(r.city,{sum:0,count:0}); const c=cityAvg.get(r.city); c.sum+=r.percent; c.count++; });
            const cityData = [...cityAvg.entries()].map(([c,{sum,count}])=>({city:c, avg:Math.round(sum/count)})).slice(0,6);
            if(cityChart) cityChart.destroy();
            cityChart = new Chart(document.getElementById('cityChart'), { type: 'bar', data: { labels: cityData.map(c=>c.city), datasets: [{ data: cityData.map(c=>c.avg), backgroundColor: '#c41e3a' }] }, options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { display: false } }, animation: { duration: 0 } } });
        },50);
    }

    async function deleteEmployee(e,id){ e.stopPropagation(); if(confirm('Удалить?')){ await supabaseClient.from('results_new').delete().eq('id',id); await loadResults(); } }
    async function massDelete(){ if(selectedForDelete.size && confirm(`Удалить ${selectedForDelete.size} записей?`)){ for(let id of selectedForDelete) await supabaseClient.from('results_new').delete().eq('id',id); await loadResults(); } }
    async function showEmployeeDetails(id){ currentSelectedEmployee = filteredResults.find(r=>r.id==id); if(!currentSelectedEmployee) return; document.getElementById('modalTitle').innerHTML = `${currentSelectedEmployee.user_name} (${currentSelectedEmployee.city}) — ${currentSelectedEmployee.percent}%`; let html = `<p>✅ Правильных: ${currentSelectedEmployee.score}/${currentSelectedEmployee.total}</p>`; currentSelectedEmployee.answers.forEach((a,i)=>{ html+=`<div class="answer-item ${a.correct?'answer-correct':'answer-wrong'}"><b>${i+1}. ${a.questionText}</b><br><b>Ваш ответ:</b> ${a.selectedText}<br>${!a.correct?`<b>✅ Правильный ответ:</b> ${a.correctText}<br><div class="recommendation">${getRecommendation(a.questionText)}</div>`:''}</div>`; }); document.getElementById('modalAnswers').innerHTML = html; document.getElementById('modal').style.display='flex'; }
    function exportEmployeePDF(){ if(!currentSelectedEmployee) return; const e=currentSelectedEmployee; let html=`<html><head><meta charset="UTF-8"><title>Отчёт ${e.user_name}</title><style>body{font-family:Segoe UI;padding:20px;} .answer{margin-bottom:15px;padding:8px;border-left:4px solid #ddd;} .correct{border-left-color:#28a745;} .wrong{border-left-color:#c41e3a;} .recommendation{background:#e8f0e8;padding:8px;margin-top:8px;border-radius:8px;}</style></head><body><h1>585GOLD | Отчёт по тесту</h1><p><strong>Сотрудник:</strong> ${e.user_name}</p><p><strong>Город:</strong> ${e.city}</p><p><strong>Результат:</strong> ${e.percent}% (${e.score}/${e.total} правильных)</p><hr>`; e.answers.forEach((a,i)=>{ html+=`<div class="answer ${a.correct?'correct':'wrong'}"><b>${i+1}. ${a.questionText}</b><br><b>Ваш ответ:</b> ${a.selectedText}<br>${!a.correct?`<b>✅ Правильный ответ:</b> ${a.correctText}<br><div class="recommendation">${getRecommendation(a.questionText)}</div>`:''}</div>`; }); html+=`</body></html>`; const w=window.open('','_blank'); w.document.write(html); w.document.close(); w.print(); }
    function exportCSV(){ if(!filteredResults.length) return alert('Нет данных'); let csv="Имя,Город,Правильных,Всего,Процент,Дата\n"; filteredResults.forEach(r=>csv+=`"${r.user_name}","${r.city}",${r.score},${r.total},${r.percent},"${new Date(r.created_at).toLocaleDateString()}"\n`); const blob=new Blob(["\uFEFF"+csv],{type:'text/csv'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`test_results_${new Date().toISOString().slice(0,10)}.csv`; a.click(); }
    function closeModal(){ document.getElementById('modal').style.display='none'; currentSelectedEmployee=null; }
    function initTheme(){ if(localStorage.getItem('theme')==='dark') document.body.classList.add('dark'); }
    function toggleTheme(){ document.body.classList.toggle('dark'); localStorage.setItem('theme', document.body.classList.contains('dark')?'dark':'light'); }

    document.getElementById('loadBtn').onclick = loadResults;
    document.getElementById('exportCsvBtn').onclick = exportCSV;
    document.getElementById('cityFilter').onchange = applyFilters;
    document.getElementById('percentFilter').onchange = applyFilters;
    document.getElementById('dateRangeSelect').onchange = applyFilters;
    document.getElementById('massDeleteBtn').onclick = massDelete;
    document.getElementById('modalDeleteBtn').onclick = async () => { if(currentSelectedEmployee && confirm('Удалить?')){ await supabaseClient.from('results_new').delete().eq('id', currentSelectedEmployee.id); await loadResults(); closeModal(); } };
    document.getElementById('modalPdfBtn').onclick = exportEmployeePDF;
    document.getElementById('themeToggleBtn').onclick = toggleTheme;
    window.showEmployeeDetails = showEmployeeDetails;
    window.closeModal = closeModal;
    window.deleteEmployee = deleteEmployee;

    initTheme();
    loadResults();
</script>
</body>
</html>
