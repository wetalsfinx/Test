<!DOCTYPE html>
<html>
<head>
    <title>Управление тестами</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h2>⚙️ Управление тестами</h2>
    
    <div class="alert alert-info">
        <strong>GitHub токен:</strong>
        <input type="password" id="tokenInput" class="form-control mt-1" placeholder="Вставьте GitHub токен">
        <button class="btn btn-sm btn-primary mt-1" onclick="saveToken()">Сохранить токен</button>
    </div>
    
    <div id="testsList">Загрузка...</div>
    
    <hr>
    <a href="?mode=admin" class="btn btn-outline-secondary">← Вернуться к админке</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://qtostraaqrnjbxiydlip.supabase.co';
const SUPABASE_KEY = 'sb_publishable_0GzJSuoAi5zc7pHkicHMNg_cQ-rGAX7';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let GITHUB_TOKEN = localStorage.getItem('github_token') || '';
if (GITHUB_TOKEN) document.getElementById('tokenInput').value = GITHUB_TOKEN;

function saveToken() {
    const token = document.getElementById('tokenInput').value.trim();
    if (token) {
        GITHUB_TOKEN = token;
        localStorage.setItem('github_token', token);
        alert('Токен сохранён!');
    }
}

async function loadTests() {
    const { data, error } = await sb.from('tests').select('*');
    const container = document.getElementById('testsList');
    if (error) { container.innerHTML = 'Ошибка'; return; }
    if (!data || data.length === 0) { container.innerHTML = 'Нет тестов'; return; }
    
    let html = '';
    for (let i = 0; i < data.length; i++) {
        html += '<div class="card mb-2 p-2">' + data[i].name + '</div>';
    }
    container.innerHTML = html;
}

loadTests();
</script>
</body>
</html>
