<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Тест 2: Сервисные навыки</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body{background:#f5f7fa;font-family:sans-serif;padding:20px}
.card{max-width:700px;margin:0 auto;border:none;box-shadow:0 4px 6px rgba(0,0,0,.1)}
.hidden{display:none!important}
.btn-answer{text-align:left;white-space:normal}
.btn-answer.selected{background-color:#0d6efd;color:white}
</style>
</head>
<body>
<div class="container">
    <div class="card p-4">
        <div id="login-screen">
            <h2 class="text-center mb-3">🎯 Тест 2: Сервисные навыки</h2>
            <p class="text-center text-muted">Заполните данные</p>
            <input type="text" id="name" class="form-control mb-2" placeholder="Имя">
            <input type="text" id="surname" class="form-control mb-2" placeholder="Фамилия">
            <input type="text" id="city" class="form-control mb-3" placeholder="Город">
            <button onclick="startTest()" class="btn btn-primary w-100">▶ Начать тест</button>
        </div>
        
        <div id="quiz-screen" class="hidden">
            <div class="d-flex justify-content-between mb-3">
                <span id="user-name"></span>
                <span class="badge bg-primary" id="q-counter">Вопрос 1 из 11</span>
            </div>
            <h4 id="question-text" class="mb-3"></h4>
            <div id="options-area" class="d-grid gap-2"></div>
            <button id="submit-btn" class="btn btn-primary mt-3" disabled>📝 Ответить</button>
        </div>
        
        <div id="result-screen" class="hidden text-center">
            <h1>🎉 Готово!</h1>
            <h2 id="final-score" class="mt-3"></h2>
            <button onclick="location.reload()" class="btn btn-outline-primary mt-3">Пройти заново</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL='https://qtostraaqrnjbxiydlip.supabase.co';
const SUPABASE_KEY='sb_publishable_0GzJSuoAi5zc7pHkicHMNg_cQ-rGAX7';
const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

// ========== ВОПРОСЫ ==========
const allQuestions = [
    {text:"Клиентка заходит в магазин, быстро проходит к витрине с кольцами и начинает рассматривать. Вы подходите. Что делаете ПЕРВЫМ?", 
     options:["«Добрый день! Чем могу помочь?»","«Здравствуйте! Подбираете кольцо для себя или в подарок?»","«Добрый день! У нас сегодня скидка 30% на бриллианты и можно оплатить бонусами до 80%»","Молча стоите рядом, давая клиентке время осмотреться"], correct:2},
     
    {text:"Мужчина 45 лет зашёл в магазин, вы поздаровались и рассказали речевую пластинку. Он смотрит на витрины, но к вам не подходит. Прошло 2 минуты. Ваши действия?", 
     options:["Ждёте ещё 1-2 минуты — возможно, он просто осматривается","Подходите и говорите: «Здравствуйте! Если будут вопросы — обращайтесь»","Подходите сразу и спрашиваете: «Для кого подбираете украшение: для себя, жены, дочери?»","Наблюдаете, к какой витрине он тяготеет, и только потом подходите с предложением из этой категории"], correct:2},
     
    {text:"Клиентка говорит: «Мне нужно кольцо, примерно до 30 000 рублей». Что делаете?", 
     options:["Сразу показываете 3-4 кольца в пределах 30 000 ₽","Спрашиваете: «А для какого случая? Это подарок или для себя?»","Показываете сначала кольцо за 35 000 ₽ (якорь), затем за 30 000 ₽","Спрашиваете: «А готовы ли вы немного добавить за лучшее качество камня?»"], correct:1},
     
    {text:"Клиент выбрал серьги за 25 000 ₽, примерил, говорит «Красиво». Вы видите, что ему действительно нравится. Что делаете ДАЛЬШЕ?", 
     options:["«Отлично! Оформляем?»","«Давайте к этим серьгам подберём кольцо или кулон из той же коллекции — вместе они создадут законченный образ»","«У нас на эту коллекцию действует рассрочка на 6 месяцев»","«Не хотите посмотреть ещё что-то? Может, браслет?»"], correct:1},
     
    {text:"Клиентка выбрала кольцо за 45 000 ₽, но говорит: «Дороговато… Я думала, дешевле будет». Что отвечаете?", 
     options:["«У нас есть кольца за 25 000 ₽, давайте посмотрим»","«Понимаю, цена важна. А с чем вы сравниваете?»","«Можно оформить рассрочку на 6 месяцев без переплат»","«Это кольцо с бриллиантом высокой чистоты, поэтому цена выше»"], correct:1},
     
    {text:"Клиентка ищет советское кольцо с аметистом, которого у вас нет. Вы предложили альтернативу в ретро-стиле — не понравилось. Что делаете?", 
     options:["«К сожалению, советских украшений у нас больше не будет»","«Давайте я покажу наш каталог с изделиями на заказ — там больше винтажных моделей»","«Можем оформить доставку из другого магазина сети — это займёт 2-3 дня»","«А что именно вам нравилось в советских украшениях? Может, найдём что-то похожее»"], correct:1},
     
    {text:"Клиент рассматривает кулон 3 минуты, задаёт вопросы о камне, но не просит примерку. Что делаете?", 
     options:["Ждёте, пока клиент сам попросит примерить","«Хотите, я достану этот кулон, чтобы вы посмотрели поближе?»","«Давайте примерим — так вы сразу увидите, как он смотрится»","«Этот кулон из новой коллекции, очень популярный»"], correct:2},
     
    {text:"Клиентка купила серьги, вы предложили футляр и средство — отказалась. Завершаете продажу. Что говорите?", 
     options:["«Хорошо, всего доброго!»","«Если передумаете — футляр и средство всегда можно докупить»","«Вы сделали отличный выбор! Дарите с любовью, ждём снова!»","«Не забывайте, у вас 14 дней только на возврат украшения»"], correct:2},
     
    {text:"Клиентка примеряет серьги, смотрит в зеркало, улыбается. Вы говорите: «Вам очень идёт!». Она отвечает: «Да, красиво… но я подумаю». Что делаете?", 
     options:["«Хорошо, подумайте. Если что — мы здесь»","«Понимаю, выбор непростой. Что именно вызывает сомнения: дизайн, цена или что-то ещё?»","«У нас на эти серьги действует рассрочка — может, это решит вопрос?»","«Давайте я отложу их для вас до завтра»"], correct:1},
     
    {text:"Мужчина выбирает серьги в подарок жене на годовщину. Вы показали 3 варианта, он выбрал. Что говорите для создания эмоциональной связи?", 
     options:["«Отличный выбор, эти серьги очень популярные»","«Эти серьги станут прекрасным напоминанием о вашей годовщине — каждый раз, надевая их, она будет вспоминать этот день»","«У нас на эти серьги скидка 20%»","«Можем упаковать как подарок»"], correct:1},
     
    {text:"Клиент выбрал кольцо, но размера нет в наличии. Что делаете?", 
     options:["«К сожалению, нет вашего размера. Приходите в другой раз»","«Можем заказать — доставка 3-5 дней»","«Давайте покажу похожие кольца, которые есть в наличии, а также каталог на заказ»","«Ваш размер будет только через месяц»"], correct:2}
];

// Перемешиваем вопросы при каждом запуске
let questions = [];

let step = 0;
let userName = "", userSurname = "", userCity = "";
let answers = [];
let score = 0;
let selectedAnswer = null;
let currentCorrect = null;

function startTest() {
    userName = document.getElementById('name').value.trim();
    userSurname = document.getElementById('surname').value.trim();
    userCity = document.getElementById('city').value.trim();
    if(!userName || !userSurname || !userCity) {
        alert("Заполните все поля!");
        return;
    }
    
    // Перемешиваем вопросы
    questions = [...allQuestions].sort(() => Math.random() - 0.5);
    
    step = 0;
    score = 0;
    answers = [];
    selectedAnswer = null;
    
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('quiz-screen').classList.remove('hidden');
    document.getElementById('user-name').innerHTML = `${userName} ${userSurname} (${userCity})`;
    
    renderQuestion();
}

function renderQuestion() {
    if(step >= questions.length) {
        finishTest();
        return;
    }
    
    const q = questions[step];
    currentCorrect = q.correct;
    
    // Перемешиваем варианты ответов
    const shuffledOptions = [...q.options];
    for(let i = shuffledOptions.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffledOptions[i], shuffledOptions[j]] = [shuffledOptions[j], shuffledOptions[i]];
    }
    // Сохраняем правильный ответ в новом индексе
    const newCorrectIndex = shuffledOptions.indexOf(q.options[q.correct]);
    currentCorrect = newCorrectIndex;
    q.shuffledOptions = shuffledOptions;
    q.shuffledCorrect = newCorrectIndex;
    
    document.getElementById('question-text').innerHTML = `${step+1}. ${q.text}`;
    document.getElementById('q-counter').innerHTML = `Вопрос ${step+1} из ${questions.length}`;
    
    const area = document.getElementById('options-area');
    area.innerHTML = '';
    selectedAnswer = null;
    document.getElementById('submit-btn').disabled = true;
    
    for(let i = 0; i < shuffledOptions.length; i++) {
        const btn = document.createElement('button');
        btn.className = 'btn btn-outline-dark btn-answer p-3 m-1';
        btn.innerHTML = shuffledOptions[i];
        btn.onclick = function() {
            document.querySelectorAll('#options-area button').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            selectedAnswer = i;
            document.getElementById('submit-btn').disabled = false;
        };
        area.appendChild(btn);
    }
}

function submitAnswer() {
    if(selectedAnswer === null) {
        alert('Выберите вариант ответа');
        return;
    }
    
    const q = questions[step];
    const isCorrect = (selectedAnswer === q.shuffledCorrect);
    if(isCorrect) score++;
    
    answers.push({
        num: step+1,
        selected: q.shuffledOptions[selectedAnswer],
        correct: q.options[q.correct],
        isCorrect: isCorrect
    });
    
    step++;
    
    if(step < questions.length) {
        renderQuestion();
    } else {
        finishTest();
    }
}

function finishTest() {
    const userId = `${userName} ${userSurname} (${userCity})`;
    const percent = Math.round(score / questions.length * 100);
    
    sb.from('results').insert({
        user_id: userId,
        name: userName,
        surname: userSurname,
        city: userCity,
        score: score,
        total: questions.length,
        test_type: "test2",
        test_name: "Сервисные навыки",
        answers: answers,
        created_at: new Date().toISOString()
    }).then(() => {
        console.log('Сохранено!');
    }).catch(e => {
        console.log('Ошибка сохранения:', e);
    });
    
    document.getElementById('quiz-screen').classList.add('hidden');
    document.getElementById('result-screen').classList.remove('hidden');
    document.getElementById('final-score').innerHTML = `${score} из ${questions.length} (${percent}%)`;
}

document.getElementById('submit-btn').onclick = submitAnswer;
</script>
</body>
</html>
