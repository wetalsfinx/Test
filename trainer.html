<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>585GOLD | Тренировка продаж</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #fff0f0;
            margin: 0;
            padding: 12px;
            min-height: 100vh;
        }
        .main-container { max-width: 700px; margin: 0 auto; }
        @media (max-width: 600px) {
            body { padding: 8px; }
            .employee-view { padding: 20px; }
            .choice-btn { font-size: 14px; padding: 12px 14px; }
        }
        :root {
            --primary-red: #c41e3a;
            --primary-rose: #e8a0b4;
            --primary-white: #ffffff;
            --light-rose: #fff0f3;
            --green-success: #2c6e2c;
        }
        .employee-view {
            background: var(--primary-white);
            border-radius: 28px;
            padding: 24px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            border: 1px solid var(--primary-rose);
        }
        .employee-view h1 {
            color: var(--primary-red);
            margin-top: 0;
            font-size: 26px;
            text-align: center;
        }
        .register-form {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .register-form input, .register-form select {
            padding: 14px 16px;
            border-radius: 30px;
            border: 1px solid var(--primary-rose);
            font-size: 16px;
            width: 100%;
            background: var(--primary-white);
        }
        .register-form button {
            background: var(--primary-red);
            color: white;
            border: none;
            padding: 14px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
        }
        .game-container {
            background: var(--primary-white);
            border-radius: 28px;
            overflow: hidden;
            margin-top: 16px;
            border: 1px solid var(--primary-rose);
        }
        .chat-area { padding: 18px; background: var(--light-rose); border-bottom: 1px solid var(--primary-rose); }
        .client-message {
            background: var(--primary-white);
            padding: 12px 16px;
            border-radius: 20px;
            font-size: 15px;
            color: #333;
            border-left: 4px solid var(--primary-red);
        }
        .choices-area { padding: 16px 18px 18px 18px; background: var(--primary-white); }
        .choice-btn {
            display: block;
            width: 100%;
            text-align: left;
            background: var(--light-rose);
            border: 1px solid var(--primary-rose);
            border-radius: 20px;
            padding: 12px 16px;
            margin-bottom: 10px;
            font-size: 14px;
            cursor: pointer;
        }
        .choice-btn.selected {
            background: var(--primary-rose);
            border: 2px solid var(--primary-red);
        }
        .next-area {
            padding: 0 18px 20px 18px;
            display: flex;
            justify-content: center;
        }
        .next-btn {
            background: var(--primary-red);
            color: white;
            border: none;
            border-radius: 50px;
            padding: 14px 20px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }
        .next-btn:disabled {
            background: var(--primary-rose);
            cursor: not-allowed;
        }
        .result-card {
            padding: 18px;
            margin: 16px 18px 18px 18px;
            border-radius: 20px;
            display: none;
            text-align: center;
        }
        .result-card.success { background: #e8f0e8; border-left: 8px solid var(--green-success); color: var(--green-success); }
        .result-card.loss { background: #ffe0e0; border-left: 8px solid var(--primary-red); color: var(--primary-red); }
        .applied-rules {
            background: var(--light-rose);
            border-radius: 24px;
            padding: 12px 16px;
            margin: 16px 18px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            border: 1px solid var(--primary-rose);
        }
        .applied-rule { background: #c41e3a20; color: var(--primary-red); padding: 4px 12px; border-radius: 40px; font-size: 12px; }
        .restart-btn {
            background: var(--primary-red);
            color: white;
            border: none;
            border-radius: 50px;
            padding: 12px 20px;
            font-size: 16px;
            margin: 0 18px 20px 18px;
            width: calc(100% - 36px);
            cursor: pointer;
        }
        .current-user {
            background: var(--light-rose);
            padding: 10px 16px;
            border-radius: 30px;
            display: inline-block;
            margin-bottom: 16px;
            color: var(--primary-red);
            font-weight: bold;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="main-container">
    <div class="employee-view">
        <h1>🎯 585GOLD | Тренировка продаж</h1>
        <p style="text-align: center; color: #666; font-size: 14px;">Пройди диалог с клиентом</p>
        <div class="register-form" id="registerForm">
            <input type="text" id="userName" placeholder="Введите имя и фамилию">
            <select id="userCity">
                <option value="">Выберите город</option>
                <option value="Санкт-Петербург">Санкт-Петербург</option>
                <option value="Тольятти">Тольятти</option>
                <option value="Новоуральск">Новоуральск</option>
                <option value="Прохладный">Прохладный</option>
                <option value="Пермь">Пермь</option>
                <option value="Москва">Москва</option>
            </select>
            <button id="startGameBtn">Начать диалог</button>
        </div>
        <div id="currentUserDisplay" class="current-user" style="display: none;"></div>
        <div id="gameContainer" style="display: none;">
            <div class="game-container">
                <div class="chat-area" id="chatArea"></div>
                <div class="applied-rules">
                    <span>🏆 Применённые правила:</span>
                    <span id="emptyRulesMsg">(пока ни одного)</span>
                    <div id="appliedRulesList" style="display: flex; flex-wrap: wrap; gap: 6px;"></div>
                </div>
                <div class="choices-area" id="choicesArea"></div>
                <div class="next-area" id="nextArea">
                    <button class="next-btn" id="nextBtn" disabled>➡ Далее</button>
                </div>
                <div class="result-card" id="resultCard">
                    <div id="resultMessage"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Инициализация Supabase (твои ключи)
    const supabase = supabase.createClient(
        'https://qtostraaqrnjbxiydlip.supabase.co',
        'sb_publishable_0GzJSuoAi5zc7pHkicHMNg_cQ-rGAX7'
    );

    const ALL_RULES = [
        { id: "initiative", name: "Проявляй инициативу" },
        { id: "askBeforeShow", name: "Задавай вопросы ДО показа" },
        { id: "emotionalHPW", name: "Презентуй с эмоцией (ХПВ)" },
        { id: "fittingOffer", name: "Предлагай примерку через «Давайте»" },
        { id: "alternative", name: "Не отпускай без альтернативы" },
        { id: "warmClosing", name: "Завершай с теплотой" }
    ];

    const QUESTIONS = [
        {
            client: "Клиент зашёл, молча смотрит на витрину с кольцами около 25 секунд. Что делаете?",
            ruleId: "initiative",
            correct: 1,
            choices: [
                "«Добрый день! Выбираете что-то конкретное или просто смотрите?»",
                "«Добрый день. У нас сегодня скидка 30% на бриллианты. Какое изделие выбираете? Для себя или в подарок?»",
                "«Здравствуйте! Если нужна помощь — обращайтесь»"
            ]
        },
        {
            client: "Клиент: «Хочу подарить жене кольцо, бюджет до 40 000 ₽». Что делаете?",
            ruleId: "askBeforeShow",
            correct: 1,
            choices: [
                "«Отлично! Давайте посмотрим вот эту коллекцию»",
                "«А для какого случая? Что ей нравится?»",
                "«40 тысяч — хороший бюджет. Покажу несколько вариантов»"
            ]
        },
        {
            client: "Клиент: «Годовщина 10 лет. Жена любит винтажный стиль». Что говорите?",
            ruleId: "emotionalHPW",
            correct: 2,
            choices: [
                "«Это кольцо из винтажной коллекции, хорошая цена»",
                "«Такие кольца сейчас в тренде»",
                "«Это кольцо будет напоминать о вашей годовщине каждый раз, когда вы на него посмотрите»"
            ]
        },
        {
            client: "Клиент: «Можно посмотреть?»",
            ruleId: "fittingOffer",
            correct: 1,
            choices: [
                "«Хотите, я покажу поближе?»",
                "«Давайте примерим — так вы сразу увидите, как оно сидит»",
                "«У нас есть зеркало, можете померить»"
            ]
        },
        {
            client: "Клиент: «Красиво… но размера 16,5 нет в наличии». Что делаете?",
            ruleId: "alternative",
            correct: 0,
            choices: [
                "«Давайте покажу похожие кольца в наличии и каталог на заказ»",
                "«Как жаль! Давайте посмотрим что-то ещё»",
                "«Можем заказать, внесёте предоплату?»"
            ]
        },
        {
            client: "Клиент оформил заказ. Прощается. Что говорите?",
            ruleId: "warmClosing",
            correct: 2,
            choices: [
                "«Спасибо за покупку! Хорошего дня»",
                "«Будем рады видеть вас снова»",
                "«Спасибо, что зашли! Если будете выбирать подарки — заходите, вместе найдём что-то особенное»"
            ]
        }
    ];

    let currentQuestionIndex = 0, currentAnswers = [], appliedRules = [], currentUserName = null, currentUserCity = null;
    let gameActive = false, selectedChoiceIndex = null;

    async function saveToSupabase(success, rulesArray, answersArray) {
        try {
            const { error } = await supabase
                .from('trainer_results')
                .insert([{
                    user_name: currentUserName,
                    city: currentUserCity,
                    rules_applied: rulesArray,
                    rules_count: rulesArray.length,
                    success: success,
                    answers: answersArray
                }]);
            if (error) {
                console.error('Ошибка Supabase:', error);
                alert('Ошибка сохранения результата. Сообщите администратору.');
            } else {
                console.log('Результат сохранён в Supabase!');
            }
        } catch(e) {
            console.error(e);
        }
    }

    function nextStep() {
        if (!gameActive || selectedChoiceIndex === null) return;
        const isCorrect = selectedChoiceIndex === QUESTIONS[currentQuestionIndex].correct;
        currentAnswers.push({ 
            question: currentQuestionIndex, 
            selected: selectedChoiceIndex, 
            correct: isCorrect, 
            ruleId: QUESTIONS[currentQuestionIndex].ruleId 
        });
        if (isCorrect) {
            const r = ALL_RULES.find(x => x.id === QUESTIONS[currentQuestionIndex].ruleId);
            if (r && !appliedRules.includes(r.name)) appliedRules.push(r.name);
        }
        currentQuestionIndex++;
        if (currentQuestionIndex >= QUESTIONS.length) finishGame();
        else { selectedChoiceIndex = null; renderQuestion(); }
    }

    function finishGame() {
        gameActive = false;
        const success = appliedRules.length === 6;
        document.getElementById("choicesArea").innerHTML = "";
        document.getElementById("nextArea").style.display = "none";
        const resultDiv = document.getElementById("resultCard");
        resultDiv.style.display = "block";
        resultDiv.className = `result-card ${success ? "success" : "loss"}`;
        if (success) {
            resultDiv.innerHTML = "<h2>🏆 ПОБЕДА!</h2><p>Вы применили все 6 правил!</p>";
        } else {
            const missing = ALL_RULES.filter(r => !appliedRules.includes(r.name));
            resultDiv.innerHTML = `<h2>😞 ТЕСТ НЕ ПРОЙДЕН</h2><p>Правил применено: ${appliedRules.length}/6</p><ul>${missing.map(r => `<li>${r.name}</li>`).join('')}</ul>`;
        }
        
        // Сохраняем в Supabase
        saveToSupabase(success, appliedRules, currentAnswers);
        
        const btn = document.createElement("button");
        btn.className = "restart-btn";
        btn.innerText = "🔄 Пройти заново";
        btn.onclick = () => resetGame();
        resultDiv.parentNode.appendChild(btn);
    }

    function renderQuestion() {
        const q = QUESTIONS[currentQuestionIndex];
        document.getElementById("chatArea").innerHTML = `<div class="client-message">${q.client}</div>`;
        const rulesDiv = document.getElementById("appliedRulesList");
        if (appliedRules.length) {
            document.getElementById("emptyRulesMsg").style.display = "none";
            rulesDiv.innerHTML = appliedRules.map(r => `<span class="applied-rule">✅ ${r}</span>`).join('');
        } else {
            document.getElementById("emptyRulesMsg").style.display = "inline";
            rulesDiv.innerHTML = "";
        }
        const choicesDiv = document.getElementById("choicesArea");
        choicesDiv.innerHTML = "";
        selectedChoiceIndex = null;
        document.getElementById("nextBtn").disabled = true;
        q.choices.forEach((c, idx) => {
            const btn = document.createElement("button");
            btn.className = "choice-btn";
            btn.innerText = c;
            btn.onclick = () => {
                document.querySelectorAll(".choice-btn").forEach(b => b.classList.remove("selected"));
                btn.classList.add("selected");
                selectedChoiceIndex = idx;
                document.getElementById("nextBtn").disabled = false;
            };
            choicesDiv.appendChild(btn);
        });
    }

    function startGame(name, city) {
        currentUserName = name;
        currentUserCity = city;
        currentQuestionIndex = 0;
        appliedRules = [];
        currentAnswers = [];
        gameActive = true;
        document.getElementById("gameContainer").style.display = "block";
        document.getElementById("currentUserDisplay").innerHTML = `👤 ${name} (${city})`;
        document.getElementById("currentUserDisplay").style.display = "inline-block";
        document.getElementById("registerForm").style.display = "none";
        renderQuestion();
    }

    function resetGame() { 
        document.getElementById("resultCard").innerHTML = '<div id="resultMessage"></div>';
        const oldBtn = document.querySelector(".restart-btn");
        if (oldBtn) oldBtn.remove();
        startGame(currentUserName, currentUserCity); 
    }

    document.getElementById("startGameBtn").onclick = () => {
        const name = document.getElementById("userName").value.trim();
        const city = document.getElementById("userCity").value;
        if (!name) return alert("Введите имя");
        if (!city) return alert("Выберите город");
        startGame(name, city);
    };
    document.getElementById("nextBtn").onclick = nextStep;
</script>
</body>
</html>
